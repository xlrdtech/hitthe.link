<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luckie "Links" Goggins · L7S · Business Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#000;--ink:#020706;
    --money-bright:#1aff95;--money:#00b86b;--money-deep:#003d22;
    --gold:#d4af37;--gold-bright:#f4dc8a;--gold-pale:#e8c97a;--gold-deep:#7a5618;
    --pearl:#f0f5f0;--bone:#dbe4dc;--buff:#a0b0a4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0a0a0a;color:var(--pearl);font-family:'Inter',sans-serif;min-height:100vh;display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased}
  body{background:radial-gradient(ellipse at center, #1a1a1c 0%, #050507 100%)}

  /* Business card — 3.5 x 2 in @ 96dpi = 336 x 192 px (we use 2x for screen) */
  .card{
    width:min(540px,92vw);
    aspect-ratio:1.75/1;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(212,175,55,0.18), transparent 55%),
      radial-gradient(ellipse at 100% 100%, rgba(26,255,149,0.14), transparent 55%),
      linear-gradient(135deg, #02100a 0%, #061a11 50%, #020706 100%);
    border:1px solid rgba(212,175,55,0.4);
    border-radius:8px;
    padding:22px 26px;
    display:grid;
    grid-template-columns:auto 1fr;
    gap:20px;
    align-items:center;
    box-shadow:0 30px 80px rgba(0,0,0,0.7), inset 0 0 60px rgba(0,184,107,0.08);
    position:relative;
    overflow:hidden;
  }
  /* gold corner ticks */
  .card::before,.card::after{content:'';position:absolute;width:14px;height:14px;border:1px solid var(--gold-bright)}
  .card::before{top:8px;left:8px;border-right:0;border-bottom:0}
  .card::after{bottom:8px;right:8px;border-left:0;border-top:0}

  /* Left: seal */
  .seal{width:130px;height:130px;flex-shrink:0}

  /* Right: contents */
  .info{display:flex;flex-direction:column;gap:6px;min-width:0}
  .label{font-family:'Cinzel',serif;font-weight:800;font-size:9px;letter-spacing:0.35em;color:var(--gold-bright);text-transform:uppercase}
  .name{font-family:'Cinzel',serif;font-weight:800;font-size:clamp(18px,3.3vw,24px);color:var(--pearl);letter-spacing:0.03em;line-height:1.05}
  .name .links{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:var(--money-bright);letter-spacing:0.02em}
  .title{font-family:'Instrument Serif',serif;font-style:italic;font-size:13px;color:var(--gold-pale);letter-spacing:0.02em}
  .co{font-family:'Cinzel',serif;font-weight:600;font-size:10px;letter-spacing:0.32em;color:var(--money-bright);text-transform:uppercase;margin-top:2px}

  .divider{height:1px;background:linear-gradient(90deg, transparent, rgba(212,175,55,0.5), transparent);margin:4px 0 2px}

  .prices{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:2px 0}
  .p-cell{padding:6px 4px;background:rgba(0,0,0,0.4);border:1px solid rgba(212,175,55,0.25);border-radius:3px;text-align:center}
  .p-cell .l{font-family:'Cinzel',serif;font-weight:800;font-size:9px;letter-spacing:0.25em;color:var(--gold-bright);margin-bottom:2px}
  .p-cell .v{font-family:'Cinzel',serif;font-weight:800;font-size:clamp(13px,2.2vw,16px);color:var(--money-bright);letter-spacing:0.02em}
  .p-cell .v::before{content:'$';opacity:0.6;margin-right:1px;font-size:0.85em}
  .p-cell.a .l{color:#f4dc8a}
  .p-cell.b .l{color:#1aff95}
  .p-cell.c .l{color:#06d490}

  .contact{display:grid;grid-template-columns:1fr 1fr;gap:4px 18px;font-family:'Inter',sans-serif;font-size:11px;color:var(--bone);letter-spacing:0.02em;margin-top:2px}
  .contact a{color:var(--gold-pale);text-decoration:none}
  .contact a:hover{color:var(--money-bright)}
  .contact .row{display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden}
  .contact .row .k{color:var(--money-bright);font-weight:700;font-size:9px;letter-spacing:0.18em;text-transform:uppercase}

  @media (max-width:540px){
    .card{grid-template-columns:1fr;text-align:center;aspect-ratio:auto;padding:20px}
    .seal{margin:0 auto;width:110px;height:110px}
    .contact{grid-template-columns:1fr;text-align:left}
  }

  /* Print at actual 3.5 x 2 in */
  @media print{
    body{background:#fff;padding:0;min-height:auto;display:block}
    .card{width:3.5in;height:2in;aspect-ratio:auto;background:#fff;color:#000;border:1px solid #000;box-shadow:none;padding:0.18in 0.22in;border-radius:4px;gap:0.18in}
    .seal{width:1.2in;height:1.2in}
    .card::before,.card::after{border-color:#000}
    .name,.title,.co,.label{color:#000!important}
    .name .links{color:#0a8a5e!important}
    .co{color:#0a8a5e!important}
    .p-cell{background:#fff!important;border-color:#000!important}
    .p-cell .v{color:#000!important}
    .p-cell .l,.contact .row .k{color:#0a8a5e!important}
    .contact a{color:#000!important}
    .divider{background:#000;opacity:0.5}
  }
</style>
</head>
<body>

<div class="card">

  <svg class="seal" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" aria-label="L7S seal">
    <defs>
      <radialGradient id="coin" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#003d22"/><stop offset="40%" stop-color="#020706"/><stop offset="100%" stop-color="#000"/></radialGradient>
      <linearGradient id="goldring" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7a5618"/><stop offset="35%" stop-color="#f4dc8a"/><stop offset="55%" stop-color="#d4af37"/><stop offset="100%" stop-color="#5a4010"/></linearGradient>
      <linearGradient id="moneyfill" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#f0f5f0"/><stop offset="50%" stop-color="#1aff95"/><stop offset="100%" stop-color="#00b86b"/></linearGradient>
    </defs>
    <circle cx="110" cy="110" r="106" fill="url(#coin)" stroke="url(#goldring)" stroke-width="3"/>
    <g fill="none" stroke="#003d22" stroke-width="0.5"><circle cx="110" cy="110" r="94"/><circle cx="110" cy="110" r="78"/></g>
    <g fill="url(#moneyfill)" stroke="#003d22" stroke-width="0.6" opacity="0.9"><ellipse cx="110" cy="78" rx="20" ry="26"/><ellipse cx="84" cy="106" rx="26" ry="20"/><ellipse cx="136" cy="106" rx="26" ry="20"/><ellipse cx="110" cy="134" rx="20" ry="26"/></g>
    <circle cx="110" cy="110" r="16" fill="#003d22" stroke="url(#goldring)" stroke-width="1.5"/>
    <text x="110" y="116" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="16" fill="#f4dc8a" letter-spacing="-1">L7S</text>
    <text x="110" y="44" text-anchor="middle" font-family="Instrument Serif, serif" font-style="italic" font-size="8" fill="#f4dc8a" letter-spacing="3">LUCKIE  "LINKS"  GOGGINS</text>
    <text x="110" y="194" text-anchor="middle" font-family="Instrument Serif, serif" font-style="italic" font-size="8" fill="#f4dc8a" letter-spacing="3">FOUNDER  ·  CEO</text>
  </svg>

  <div class="info">
    <div class="label">◈  L7S · INC.  ◈</div>
    <div class="name">Luckie <span class="links">"Links"</span> Goggins</div>
    <div class="title">Systems Superhero · ABC's Acronym Architect</div>
    <div class="co">FOUNDER · CEO · L7S, INC.</div>

    <div class="divider"></div>

    <div class="prices">
      <div class="p-cell a"><div class="l">A · Audit</div><div class="v">555</div></div>
      <div class="p-cell b"><div class="l">B · Build</div><div class="v">1,111</div></div>
      <div class="p-cell c"><div class="l">C · Compound</div><div class="v">333/mo</div></div>
    </div>

    <div class="contact">
      <div class="row"><span class="k">Mail</span><a href="mailto:east@xlrd.org">east@xlrd.org</a></div>
      <div class="row"><span class="k">Web</span><a href="https://hitthe.link/luckie/">hitthe.link/luckie</a></div>
    </div>
  </div>

</div>

</body>
</html>
