    <!--
      Stamp data-theme / data-accent on <html> before any CSS evaluates so the
      first paint already matches the user's choice. Without this, ThemeProvider
      only stamps the attributes after React mounts, producing a light/blue
      flash on every cold load (and on every spare-tab adoption).
      Mirrors the resolution logic in src/theme/theme-store.ts.
    -->
    <script>
      (function () {
        try {
          var html = document.documentElement;
          var params = new URLSearchParams(window.location.search);
          var queryOverride = params.has("dark")
            ? "dark"
            : params.has("light")
            ? "light"
            : params.has("system")
            ? "system"
            : null;

          var theme = queryOverride;
          if (!theme) {
            var raw = localStorage.getItem("forcedDarkOrLightMode");
            if (raw) {
              try {
                var parsed = JSON.parse(raw);
                if (parsed === "dark" || parsed === "light") theme = parsed;
              } catch (_) {}
            }
          }
          if (!theme || theme === "system") {
            theme =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          html.dataset.theme = theme;

          var accent = "blue";
          var accentRaw = localStorage.getItem("accentColor");
          if (accentRaw) {
            try {
              var p = JSON.parse(accentRaw);
              if (
                p === "blue" ||
                p === "pink" ||
                p === "green" ||
                p === "purple" ||
                p === "yellow" ||
                p === "gray"
              ) {
                accent = p;
              }
            } catch (_) {}
          }
          html.dataset.accent = accent;
        } catch (e) {}
      })();
    </script>
