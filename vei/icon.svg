<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- VEI · רוּחַ icon — XOS scheme parity (per qi 2026-05-23):
       dark green radial backdrop + phosphor green waveform + Hebrew Ruach glyph.
       Style cousin: /xos/icon.svg and /eats/icon.svg. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="62%">
      <stop offset="0%" stop-color="#1A4D2E"/>
      <stop offset="58%" stop-color="#0A1F12"/>
      <stop offset="100%" stop-color="#02060A"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="phosphor" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#5FFF9E"/>
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base rounded square (matches XOS 40px radius) -->
  <rect x="0" y="0" width="180" height="180" rx="40" ry="40" fill="url(#bg)"/>

  <!-- Inner soft glow ring -->
  <circle cx="90" cy="94" r="56" fill="none" stroke="#00FF88" stroke-opacity="0.10" stroke-width="22"/>

  <!-- Phosphor waveform — central -->
  <g filter="url(#glow)" transform="translate(0, 8)">
    <path
      d="M 24 90
         Q 36 60, 48 90
         T 72 90
         T 96 90
         T 120 90
         T 144 90
         T 156 90"
      stroke="url(#phosphor)"
      stroke-width="3.4"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"/>
    <path
      d="M 24 90
         Q 36 78, 48 90
         T 72 90
         T 96 90
         T 120 90
         T 144 90
         T 156 90"
      stroke="#00FF88"
      stroke-opacity="0.55"
      stroke-width="9"
      stroke-linecap="round"
      fill="none"/>
  </g>

  <!-- Hebrew Ruach glyph (רוּחַ) overlaid bottom-right, subtle -->
  <text x="90" y="148" text-anchor="middle"
        font-family="serif" font-size="32" font-weight="400"
        fill="#5FFF9E" fill-opacity="0.78"
        filter="url(#softglow)">רוּחַ</text>

  <!-- Top gloss sheen -->
  <rect x="0" y="0" width="180" height="180" rx="40" ry="40" fill="url(#sheen)" pointer-events="none"/>
</svg>
