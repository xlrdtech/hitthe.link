<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>VEI moved → VVSVEI</title>
<meta name="theme-color" content="#0A1F12">
<!-- /vei is DEPRECATED. Canon interface is /vvsvei/. Redirect browser + tear down stale /vei PWA. -->
<meta http-equiv="refresh" content="0; url=/vvsvei/">
<link rel="canonical" href="/vvsvei/">
<style>html,body{margin:0;height:100%;background:#0A1F12;color:#cfe9d8;font-family:-apple-system,system-ui,sans-serif;display:flex;align-items:center;justify-content:center}a{color:#7ee3a8}</style>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister();});}).catch(function(){});}
if(window.caches&&caches.keys){caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});}).catch(function(){});}
location.replace('/vvsvei/');
</script>
</head>
<body><p>VEI has moved to <a href="/vvsvei/">/vvsvei/</a> — redirecting…</p></body>
</html>
