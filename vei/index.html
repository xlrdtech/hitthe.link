<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>VEI · רוּחַ · voice echo input</title>
<meta name="description" content="VEI (Voice Echo Input). Meta-AI-inspired chat shell over the Ruach Web Speech + MediaRecorder pipeline. Public, no-auth, multi-device simultaneous. POSTs to omnimind /api/dictate-inject.">
<link rel="manifest" href="/vei/manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* VEI — Meta-AI-inspired dark chat shell. Reference: optimisticai_d4925249 (Meta AI codename).
   Palette pulled from Meta AI page: bg #1a1a1a, white text, soft-grey strokes, no chrome. */
:root {
  --bg:#1a1a1a;
  --bg-elev:#242424;
  --bg-input:#2a2a2a;
  --fg:#ffffff;
  --fg-dim:#a3a3a3;
  --fg-mute:#737373;
  --line:rgba(255,255,255,.08);
  --line-strong:rgba(255,255,255,.16);
  --accent:#0EA5E9;
  --accent-hover:#38BDF8;
  --good:#22C55E;
  --warn:#F59E0B;
  --bad:#EF4444;
  --r-card:16px;
  --r-pill:9999px;
  --sans:'Inter','SF Pro Text',-apple-system,system-ui,sans-serif;
  --mono:'JetBrains Mono','SF Mono',ui-monospace,monospace;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body {
  height:100dvh;
  background:var(--bg);
  color:var(--fg);
  font-family:var(--sans);
  font-feature-settings:"ss01","cv11";
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow:hidden;
}
.wrap {
  display:flex; flex-direction:column;
  height:100dvh; width:100%;
  max-width:760px; margin:0 auto;
  padding:env(safe-area-inset-top, 20px) 24px env(safe-area-inset-bottom, 20px);
}

/* Header — minimal, Meta-AI-tight */
header { padding:8px 0 18px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
.brand { display:flex; align-items:center; gap:12px; }
.brand-dot {
  width:10px; height:10px; border-radius:50%;
  background:var(--accent); box-shadow:0 0 12px var(--accent);
  flex-shrink:0;
}
.brand-text { display:flex; flex-direction:column; gap:2px; }
.title { font-size:18px; font-weight:600; letter-spacing:-.01em; line-height:1; color:var(--fg); }
.title .heb { font-weight:400; color:var(--fg-dim); margin-left:8px; font-size:16px; }
.subtitle { font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; color:var(--fg-mute); }

.count-chip {
  font-family:var(--mono); font-size:11px;
  background:var(--bg-elev); border:1px solid var(--line);
  padding:6px 12px; border-radius:var(--r-pill);
  color:var(--fg-dim);
}

/* Status pill — centered above transcript like Meta AI's input bar shadow */
.status-bar {
  display:inline-flex; align-items:center; gap:10px;
  padding:8px 14px; margin:0 auto 16px;
  background:var(--bg-elev); border:1px solid var(--line);
  border-radius:var(--r-pill);
  width:fit-content;
  font-family:var(--mono); font-size:11px; letter-spacing:.06em;
  color:var(--fg-dim); text-transform:lowercase;
  transition:all .2s;
}
.status-bar .dot { width:6px; height:6px; border-radius:50%; background:var(--fg-mute); transition:all .2s; }
.status-bar.listen .dot { background:var(--good); box-shadow:0 0 10px var(--good); animation:pulse 1.4s ease-in-out infinite; }
.status-bar.err .dot { background:var(--bad); }
.status-bar.idle .dot { background:var(--warn); }
@keyframes pulse { 0%, 100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(1.5); } }

/* Transcript = chat-feed pattern */
#transcript {
  flex:1; overflow-y:auto;
  display:flex; flex-direction:column; gap:12px;
  padding:8px 4px 16px;
  scroll-behavior:smooth;
}
#transcript::-webkit-scrollbar { width:6px; }
#transcript::-webkit-scrollbar-thumb { background:var(--line-strong); border-radius:3px; }

.final, .interim {
  max-width:88%; align-self:flex-start;
  padding:12px 16px; border-radius:var(--r-card);
  background:var(--bg-elev); border:1px solid var(--line);
  font-size:15.5px; line-height:1.5; color:var(--fg);
  animation:fadeIn .2s ease-out;
}
.final.posted-flag { border-color:rgba(34,197,94,.22); }
.interim { color:var(--fg-dim); font-style:italic; background:transparent; border:1px dashed var(--line); }
.posted { display:inline-block; margin-left:6px; padding:2px 8px; border-radius:var(--r-pill); background:rgba(34,197,94,.12); color:var(--good); font-family:var(--mono); font-size:10px; letter-spacing:.04em; }
.error-line { align-self:stretch; padding:10px 14px; border-radius:10px; background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.32); color:#FCA5A5; font-family:var(--mono); font-size:12.5px; }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

/* Composer area — Meta-AI bottom-anchored input zone with mic-button affordance */
.composer { padding:16px 0 0; border-top:1px solid var(--line); }
.controls { display:flex; gap:10px; }
button {
  flex:1; padding:14px 18px;
  border-radius:var(--r-pill); border:1px solid var(--line-strong);
  background:var(--bg-elev); color:var(--fg);
  font-family:var(--sans); font-size:14px; font-weight:600; letter-spacing:.01em;
  cursor:pointer; transition:transform .12s, background .12s, border-color .12s;
}
button:hover:not(:disabled) { background:var(--bg-input); border-color:var(--fg-mute); transform:translateY(-1px); }
button.start { background:var(--accent); color:#0a1620; border-color:var(--accent); }
button.start:hover:not(:disabled) { background:var(--accent-hover); border-color:var(--accent-hover); }
button.stop { background:transparent; }
button:disabled { opacity:.4; cursor:not-allowed; transform:none; }

.fallback {
  display:none; margin-top:12px;
  padding:14px; background:var(--bg-elev);
  border:1px solid var(--line); border-radius:var(--r-card);
}
.fallback.show { display:block; }
.fallback .hint {
  font-family:var(--mono); font-size:10.5px; color:var(--fg-mute);
  margin-bottom:10px; letter-spacing:.04em;
}
.fallback textarea {
  width:100%; min-height:80px;
  background:var(--bg-input); color:var(--fg);
  border:1px solid var(--line); border-radius:12px;
  padding:12px 14px;
  font-family:var(--sans); font-size:15px; line-height:1.5;
  resize:none; -webkit-appearance:none;
}
.fallback textarea:focus { outline:none; border-color:var(--accent); }
.fallback textarea::placeholder { color:var(--fg-mute); }
.fallback .send-btn {
  margin-top:10px; width:100%; padding:12px;
  background:var(--accent); color:#0a1620;
  border:0; border-radius:var(--r-pill);
  font-family:var(--sans); font-size:14px; font-weight:600;
  cursor:pointer; transition:background .12s;
}
.fallback .send-btn:hover:not(:disabled) { background:var(--accent-hover); }
.fallback .send-btn:disabled { opacity:.4; cursor:not-allowed; }

.unsupported {
  padding:16px; margin:14px 0;
  background:rgba(239,68,68,.06); border:1px solid rgba(239,68,68,.32);
  border-radius:12px; color:#FCA5A5; font-size:14px;
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-text">
      <div class="title">VEI<span class="heb">· רוּחַ</span></div>
      <div class="subtitle">voice echo input → xen.xlrd.org</div>
    </div>
  </div>
  <div class="count-chip" id="count">0 sent</div>
</header>

<div class="status-bar idle" id="status">
  <div class="dot"></div>
  <span id="status-lbl">tap start</span>
</div>

<div id="transcript"></div>

<div class="composer">
  <div class="controls">
    <button class="start" id="start-btn">Start listening</button>
    <button class="stop" id="stop-btn" disabled>Stop</button>
  </div>

  <div class="fallback" id="fallback">
    <div class="hint">keyboard fallback · tap mic on keyboard or type · enter sends</div>
    <textarea id="fb-text" placeholder="dictate via keyboard mic or type here…" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
    <button class="send-btn" id="fb-send">Send</button>
  </div>
</div>

</div>

<script>
const API_URL = 'https://xen.xlrd.org/api/dictate-inject';
const AUDIO_URL = 'https://xen.xlrd.org/api/dictate-audio';
const HEADERS = { 'Content-Type': 'application/json' };
const CHUNK_MS = 5000;

const transcript = document.getElementById('transcript');
const status = document.getElementById('status');
const statusLbl = document.getElementById('status-lbl');
const countEl = document.getElementById('count');
const startBtn = document.getElementById('start-btn');
const stopBtn = document.getElementById('stop-btn');

let recognition = null;
let listening = false;
let sentCount = 0;
let interimEl = null;
let networkErrorCount = 0;
let mediaRecorder = null;
let mediaStream = null;
let mediaMode = false;

const isFirefoxLike = /Firefox|Zen/i.test(navigator.userAgent);

const fallbackEl = document.getElementById('fallback');
const fbText = document.getElementById('fb-text');
const fbSend = document.getElementById('fb-send');

function showFallback(reason) {
  fallbackEl.classList.add('show');
  if (reason) appendError(reason);
  startBtn.disabled = true;
  stopBtn.disabled = true;
  setStatus('idle', 'fallback mode');
  setTimeout(() => fbText.focus(), 100);
}

async function sendFallback() {
  const text = fbText.value.trim();
  if (!text) return;
  fbSend.disabled = true;
  appendFinal(text, false);
  const posted = await postTranscript(text);
  if (posted) {
    const lastFinal = transcript.querySelector('.final:last-child');
    if (lastFinal && !lastFinal.innerHTML.includes('posted')) {
      lastFinal.innerHTML += ' <span class="posted">✓ posted</span>';
    }
  }
  fbText.value = '';
  fbSend.disabled = false;
  fbText.focus();
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
// Web Speech absence is fine — Start button routes to MediaRecorder + server Whisper

function setStatus(state, label) {
  status.className = 'status-bar ' + state;
  statusLbl.textContent = label;
}

function appendFinal(text, postedFlag) {
  const div = document.createElement('div');
  div.className = 'final';
  div.innerHTML = escapeHtml(text) + (postedFlag ? ' <span class="posted">✓ posted</span>' : '');
  transcript.appendChild(div);
  transcript.scrollTop = transcript.scrollHeight;
  if (interimEl) { interimEl.remove(); interimEl = null; }
}

function appendInterim(text) {
  if (!interimEl) {
    interimEl = document.createElement('div');
    interimEl.className = 'interim';
    transcript.appendChild(interimEl);
  }
  interimEl.textContent = text;
  transcript.scrollTop = transcript.scrollHeight;
}

function appendError(msg) {
  const div = document.createElement('div');
  div.className = 'error-line';
  div.textContent = msg;
  transcript.appendChild(div);
  transcript.scrollTop = transcript.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function postTranscript(text) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({ source: 'xen-vei', ts: Date.now(), text: text })
    });
    if (res.ok) {
      sentCount++;
      countEl.textContent = sentCount + ' sent';
      return true;
    } else {
      appendError(`POST ${API_URL} → ${res.status}`);
      return false;
    }
  } catch (e) {
    appendError(`POST failed: ${e.message}`);
    return false;
  }
}

async function postAudioChunk(blob) {
  try {
    const fd = new FormData();
    fd.append('audio', blob, 'chunk.webm');
    fd.append('source', 'xen-vei-audio');
    fd.append('ts', Date.now().toString());
    const res = await fetch(AUDIO_URL, { method: 'POST', body: fd });
    if (res.ok) {
      sentCount++;
      countEl.textContent = sentCount + ' chunks';
      const j = await res.json().catch(() => null);
      if (j && j.text) appendFinal(j.text, true);
      return true;
    } else {
      appendError(`audio POST → ${res.status}`);
      return false;
    }
  } catch (e) {
    appendError(`audio POST failed: ${e.message}`);
    return false;
  }
}

async function startMediaRecorder() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    appendError('MediaRecorder unavailable — falling to textarea');
    showFallback('MediaRecorder not supported. Use keyboard mic.');
    return;
  }
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : (MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '');
    mediaRecorder = mimeType ? new MediaRecorder(mediaStream, { mimeType }) : new MediaRecorder(mediaStream);
    mediaMode = true;
    listening = true;
    setStatus('listen', 'streaming audio');
    startBtn.disabled = true;
    stopBtn.disabled = false;
    appendError('MediaRecorder active — server-side Whisper transcribes chunks');
    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) postAudioChunk(e.data);
    };
    mediaRecorder.onerror = (e) => {
      appendError('MediaRecorder error: ' + (e.error ? e.error.message : 'unknown'));
    };
    mediaRecorder.start(CHUNK_MS);
  } catch (e) {
    appendError('mic access denied or unavailable: ' + e.message);
    showFallback('Mic access required. Use keyboard mic below or grant mic permission.');
  }
}

function stopMediaRecorder() {
  listening = false;
  mediaMode = false;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    try { mediaRecorder.stop(); } catch (_) {}
  }
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  setStatus('idle', 'stopped');
  startBtn.disabled = false;
  stopBtn.disabled = true;
}

let useContinuous = true;

function startListening() {
  if (!SR) return;
  recognition = new SR();
  recognition.continuous = useContinuous;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    listening = true;
    setStatus('listen', 'listening');
    startBtn.disabled = true;
    stopBtn.disabled = false;
  };

  recognition.onresult = async (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const result = e.results[i];
      if (result.isFinal) {
        const text = result[0].transcript.trim();
        if (text) {
          appendFinal(text, false);
          const posted = await postTranscript(text);
          if (posted) {
            const lastFinal = transcript.querySelector('.final:last-child');
            if (lastFinal && !lastFinal.innerHTML.includes('posted')) {
              lastFinal.innerHTML += ' <span class="posted">✓ posted</span>';
            }
          }
        }
      } else {
        interim += result[0].transcript;
      }
    }
    if (interim) appendInterim(interim);
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    setStatus('err', 'error: ' + e.error);
    appendError('speech error: ' + e.error);
    if (e.error === 'network') {
      networkErrorCount++;
      if (networkErrorCount === 2 && useContinuous) {
        useContinuous = false;
        appendError('switching to non-continuous mode for compatibility...');
      }
      if (networkErrorCount >= 3) {
        listening = false;
        try { recognition.stop(); } catch (_) {}
        appendError('Web Speech API blocked — switching to MediaRecorder + server Whisper');
        startMediaRecorder();
      }
    }
  };

  recognition.onend = () => {
    if (listening) {
      const delay = networkErrorCount > 0 ? Math.min(1000 * networkErrorCount, 4000) : 100;
      setTimeout(() => {
        if (listening) {
          try { startListening(); } catch (_) {}
        }
      }, delay);
    }
  };

  recognition.start();
}

function stopListening() {
  if (mediaMode) { stopMediaRecorder(); return; }
  listening = false;
  if (recognition) {
    try { recognition.stop(); } catch (_) {}
  }
  setStatus('idle', 'stopped');
  startBtn.disabled = false;
  stopBtn.disabled = true;
}

startBtn.addEventListener('click', () => {
  if (isFirefoxLike || !SR) {
    appendError('Firefox/Zen detected — using MediaRecorder + server Whisper');
    startMediaRecorder();
  } else {
    startListening();
  }
});
stopBtn.addEventListener('click', stopListening);

fbSend.addEventListener('click', sendFallback);
fbText.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendFallback();
  }
});

// SR absence handled by Start button → routes to MediaRecorder directly

window.addEventListener('beforeunload', stopListening);
</script>
</body>
</html>
