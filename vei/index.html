<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>VEI · רוּחַ · voice echo input</title>
<meta name="description" content="VEI (Voice Echo Input). Meta-AI-inspired chat shell over the Ruach Web Speech + MediaRecorder pipeline. Public, no-auth, multi-device simultaneous. POSTs to omnimind /api/dictate-inject.">
<link rel="manifest" href="/vei/manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* VEI — qi-locked design (Photoroom_20260523_134010.png reference).
   Deep green radial gradient bg, phosphor-green waveform, soft cream chat bubbles.
   Aesthetic: terminal-organism. Hebrew Ruach (breath/spirit) made visible. */
:root {
  --bg:#0A1F12;
  --bg-glow:#1A4D2E;
  --bg-elev:rgba(20, 60, 35, .25);
  --bg-input:rgba(20, 60, 35, .45);
  --fg:#F0EAD6;
  --fg-dim:#A8C0A4;
  --fg-mute:#6B8B72;
  --line:rgba(176, 255, 200, .12);
  --line-strong:rgba(176, 255, 200, .22);
  --accent:#00FF88;
  --accent-hover:#5FFF9E;
  --accent-glow:rgba(0, 255, 136, .35);
  --bubble-bg:rgba(176, 200, 170, .92);
  --bubble-fg:#0A1F12;
  --good:#00FF88;
  --warn:#F5C842;
  --bad:#FF6B5A;
  --r-card:18px;
  --r-pill:9999px;
  --sans:'Inter','SF Pro Text',-apple-system,system-ui,sans-serif;
  --mono:'JetBrains Mono','SF Mono',ui-monospace,monospace;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body {
  height:100dvh;
  background:var(--bg);
  color:var(--fg);
  font-family:var(--sans);
  font-feature-settings:"ss01","cv11";
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow:hidden;
}
/* Background video layer — 10s ping-pong loop, dim until touched (qi 2026-05-23). */
.bg-video {
  position:fixed; inset:0; width:100%; height:100%;
  object-fit:cover; z-index:0; pointer-events:none;
  opacity:.18;
  filter:blur(0px) saturate(.95);
  transition:opacity .55s ease-out, filter .55s ease-out;
}
body.lit .bg-video { opacity:.58; filter:blur(0px) saturate(1.15); }
/* Soft radial overlay for legibility */
.bg-overlay {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% 55%, rgba(10,31,18,.22), rgba(2,6,10,.78));
  transition:background .55s ease-out;
}
body.lit .bg-overlay { background:radial-gradient(ellipse 80% 60% at 50% 55%, rgba(10,31,18,.10), rgba(2,6,10,.52)); }
.wrap { position:relative; z-index:2; }
.wrap {
  display:flex; flex-direction:column;
  height:100dvh; width:100%;
  max-width:760px; margin:0 auto;
  padding:env(safe-area-inset-top, 18px) 20px env(safe-area-inset-bottom, 16px);
  position:relative;
}

/* Header — top-right mic icon, top-left brand, minimal chrome */
header { padding:8px 0 22px; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
.brand { display:flex; align-items:center; gap:10px; }
.brand-dot { display:none; }
.brand-text { display:flex; flex-direction:column; gap:3px; }
.title { font-size:15px; font-weight:500; letter-spacing:.02em; line-height:1; color:var(--fg-dim); }
.title .heb { color:var(--accent); margin-left:6px; font-size:14px; }
.subtitle { font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; color:var(--fg-mute); text-transform:uppercase; }

.mic-icon {
  width:32px; height:32px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  color:var(--fg);
  opacity:.85;
  cursor:pointer;
  transition:opacity .15s, transform .15s, color .15s;
}
.mic-icon svg { width:18px; height:18px; }
.mic-icon:hover { opacity:1; transform:scale(1.05); }
.mic-icon.active { color:var(--accent); opacity:1; filter:drop-shadow(0 0 6px var(--accent-glow)); }

.count-chip { display:none; }

/* Status pill removed — replaced by waveform-bottom-bar visual feedback */
.status-bar { display:none; }
@keyframes pulse { 0%, 100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(1.5); } }

/* Transcript = top-anchored chat bubbles, cream-on-green */
#transcript {
  flex:1; overflow-y:auto;
  display:flex; flex-direction:column; gap:10px;
  padding:4px 4px 100px;  /* bottom pad clears the waveform footer */
  scroll-behavior:smooth;
}
#transcript::-webkit-scrollbar { width:5px; }
#transcript::-webkit-scrollbar-thumb { background:var(--line-strong); border-radius:3px; }

/* Glass bubbles — heavy backdrop-blur + thin gloss highlight + translucent fill.
   qi-spec 2026-05-23: "super hyper realistic glass" */
.final, .interim, .xen-reply {
  position:relative;
  max-width:78%; align-self:flex-start;
  padding:12px 16px; border-radius:var(--r-card);
  background:linear-gradient(145deg, rgba(255,255,255,.22), rgba(255,255,255,.08));
  border:1px solid rgba(255,255,255,.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.30),
    inset 0 -1px 0 rgba(255,255,255,.06),
    0 8px 24px rgba(0,0,0,.28),
    0 0 0 0.5px rgba(255,255,255,.06);
  backdrop-filter:blur(18px) saturate(1.3);
  -webkit-backdrop-filter:blur(18px) saturate(1.3);
  color:var(--fg);
  font-size:15px; line-height:1.45; font-weight:500;
  word-break:break-word;
  animation:fadeIn .22s cubic-bezier(.32,.72,.2,1);
}
/* Top-gloss specular reflection */
.final::before, .interim::before, .xen-reply::before {
  content:""; position:absolute; inset:1px 1px auto 1px; height:38%;
  border-radius:var(--r-card) var(--r-card) 30% 30%/var(--r-card) var(--r-card) 60% 60%;
  background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,0));
  pointer-events:none;
}
.final.posted-flag { box-shadow:
    inset 0 1px 0 rgba(255,255,255,.30),
    inset 0 -1px 0 rgba(255,255,255,.06),
    0 8px 24px rgba(0,0,0,.28),
    0 0 0 1px var(--accent-glow); }
.interim { opacity:.78; font-style:italic; }
.xen-reply { align-self:flex-end; background:linear-gradient(145deg, rgba(0,255,136,.16), rgba(0,255,136,.04)); border-color:rgba(0,255,136,.28); color:var(--fg); }
.posted {
  display:inline-block; margin-left:6px; padding:1px 7px; border-radius:var(--r-pill);
  background:rgba(0,0,0,.32); color:var(--accent);
  font-family:var(--mono); font-size:9.5px; letter-spacing:.04em; font-weight:600;
}
/* Per-bubble action row (copy/share) */
.bubble-actions {
  display:flex; gap:6px; margin-top:8px;
  opacity:0; transition:opacity .15s;
}
.final:hover .bubble-actions, .xen-reply:hover .bubble-actions { opacity:1; }
.bubble-actions button {
  padding:3px 8px; font-size:9.5px; font-weight:600; letter-spacing:.06em;
  background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18);
  color:var(--fg-dim); border-radius:var(--r-pill);
  cursor:pointer; transition:background .12s, color .12s;
}
.bubble-actions button:hover { background:rgba(0,255,136,.16); color:var(--accent); }
/* Top transcript toolbar — copy-all / export / share */
.transcript-toolbar {
  display:flex; gap:6px; padding:0 4px 8px;
}
.transcript-toolbar button {
  padding:5px 10px; font-family:var(--mono); font-size:9.5px; font-weight:600;
  letter-spacing:.10em; text-transform:uppercase;
  background:rgba(255,255,255,.06); border:1px solid var(--line);
  color:var(--fg-dim); border-radius:var(--r-pill);
  cursor:pointer; transition:all .12s;
}
.transcript-toolbar button:hover { background:rgba(0,255,136,.12); border-color:var(--accent); color:var(--accent); }
.error-line {
  align-self:flex-start; max-width:78%; padding:10px 14px; border-radius:var(--r-card);
  background:rgba(255,107,90,.14); color:var(--bad);
  font-family:var(--mono); font-size:12px; line-height:1.4;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

/* Composer = waveform-anchored bottom bar (matches qi reference image). Buttons
   live IN the waveform pill, mic on left, stop on right. */
.composer {
  position:absolute;
  left:env(safe-area-inset-left, 16px); right:env(safe-area-inset-right, 16px);
  bottom:env(safe-area-inset-bottom, 16px);
  padding:0;
}
.waveform-bar {
  display:flex; align-items:center; gap:10px;
  background:var(--bg-input);
  border:1px solid var(--line);
  border-radius:var(--r-pill);
  padding:10px 14px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.waveform {
  flex:1; height:48px;
  position:relative;
  overflow:hidden;
}
.waveform canvas {
  width:100%; height:100%;
  display:block;
}
.waveform.err canvas { filter:hue-rotate(140deg) saturate(1.4); }

.controls { display:flex; gap:8px; }
button {
  padding:10px 16px;
  border-radius:var(--r-pill); border:1px solid var(--line-strong);
  background:transparent; color:var(--fg);
  font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:.14em; text-transform:uppercase;
  cursor:pointer; transition:transform .12s, background .12s, border-color .12s, color .12s;
}
button:hover:not(:disabled) { background:var(--bg-elev); border-color:var(--accent); color:var(--accent); transform:translateY(-1px); }
button.start { background:var(--accent); color:var(--bg); border-color:var(--accent); box-shadow:0 0 12px var(--accent-glow); }
button.start:hover:not(:disabled) { background:var(--accent-hover); border-color:var(--accent-hover); color:var(--bg); }
button.stop { color:var(--fg-dim); }
button.stop:hover:not(:disabled) { color:var(--bad); border-color:var(--bad); background:rgba(255,107,90,.08); }
button:disabled { opacity:.35; cursor:not-allowed; transform:none; }

/* Single unified composer bar — paperclip · field(waveform + textarea overlap) · send.
   No stacking. qi 2026-05-23: "only needs one input field I dont want it stacked" */
.composer-bar {
  display:flex; align-items:center; gap:6px;
  background:linear-gradient(145deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.14);
  border-radius:var(--r-pill);
  padding:6px 8px;
  backdrop-filter:blur(16px) saturate(1.3);
  -webkit-backdrop-filter:blur(16px) saturate(1.3);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.22), 0 8px 24px rgba(0,0,0,.28);
}
.field {
  flex:1; position:relative; min-height:36px;
  display:flex; align-items:center;
}
.field canvas {
  position:absolute; inset:0; width:100%; height:100%;
  display:block; pointer-events:none;
  opacity:.85;
}
.field textarea {
  position:relative; z-index:1;
  flex:1; min-height:20px; max-height:120px;
  background:transparent; color:var(--fg);
  border:0; outline:none; resize:none;
  font-family:var(--sans); font-size:15px; line-height:1.4;
  padding:8px 12px;
  -webkit-appearance:none;
  text-shadow:0 0 4px rgba(0,0,0,.6);
}
.field textarea::placeholder { color:rgba(240,234,214,.42); }
.composer-bar .icon-btn {
  width:36px; height:36px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:transparent; border:0;
  color:var(--fg-dim);
  cursor:pointer;
  border-radius:50%;
  transition:background .12s, color .12s, transform .12s;
}
.composer-bar .icon-btn:hover { background:rgba(255,255,255,.10); color:var(--accent); transform:translateY(-1px); }
.composer-bar .icon-btn svg { width:18px; height:18px; }
.composer-bar .icon-btn.send { background:transparent; color:var(--fg-dim); box-shadow:none; }
.composer-bar .icon-btn.send:hover:not(:disabled) { background:rgba(0,255,136,.12); color:var(--accent); }
.composer-bar .icon-btn.send:disabled { opacity:.35; cursor:not-allowed; box-shadow:none; }

/* Legacy hidden */
.text-row, .waveform-bar, .fallback { display:none; }

.unsupported {
  align-self:flex-start; max-width:88%; padding:14px 16px;
  background:rgba(255,107,90,.10); border:1px solid rgba(255,107,90,.32);
  border-radius:var(--r-card); color:var(--bad); font-size:14px; line-height:1.4;
}
</style>
</head>
<body>
<video class="bg-video" id="bg-video" autoplay muted playsinline preload="auto"
       src="/vei/bg.mp4" aria-hidden="true"></video>
<div class="bg-overlay" aria-hidden="true"></div>
<div class="wrap">

<header>
  <div class="brand">
    <div class="brand-text">
      <div class="title">VEI<span class="heb">· רוּחַ</span></div>
      <div class="subtitle" id="count">0 sent · xen.xlrd.org</div>
    </div>
  </div>
  <div class="mic-icon" id="mic-icon" title="Microphone status">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </div>
</header>

<div class="status-bar idle" id="status" hidden>
  <div class="dot"></div>
  <span id="status-lbl">tap start</span>
</div>

<div class="transcript-toolbar">
  <button id="tb-copy" title="Copy all">Copy</button>
  <button id="tb-export" title="Export as .txt">Export</button>
  <button id="tb-share" title="Share via Web Share API">Share</button>
</div>

<div id="transcript"></div>

<div class="composer">
  <!-- Single unified pill: paperclip · field (waveform behind, textarea overlay) · send. -->
  <div class="composer-bar">
    <button class="icon-btn" id="tb-attach" title="Send attachment">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
      </svg>
    </button>
    <div class="field" id="waveform">
      <canvas id="waveform-canvas"></canvas>
      <textarea id="fb-text" rows="1" placeholder="Type, dictate, or paste — voice stays on independently"
        autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
    </div>
    <button class="icon-btn send" id="fb-send" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <input type="file" id="file-input" hidden multiple>
  <button class="start" id="start-btn" hidden>Start</button>
  <button class="stop" id="stop-btn" hidden disabled>Stop</button>
  <div class="fallback" id="fallback" hidden></div>
</div>

</div>

<script>
const API_URL = 'https://xen.xlrd.org/api/dictate-inject';
const AUDIO_URL = 'https://xen.xlrd.org/api/dictate-audio';
const HEADERS = { 'Content-Type': 'application/json' };
const CHUNK_MS = 5000;

const transcript = document.getElementById('transcript');
const status = document.getElementById('status');
const statusLbl = document.getElementById('status-lbl');
const countEl = document.getElementById('count');
const startBtn = document.getElementById('start-btn');
const stopBtn = document.getElementById('stop-btn');

let recognition = null;
let listening = false;
let sentCount = 0;
let interimEl = null;
let networkErrorCount = 0;
let mediaRecorder = null;
let mediaStream = null;
let mediaMode = false;

const isFirefoxLike = /Firefox|Zen/i.test(navigator.userAgent);

const fallbackEl = document.getElementById('fallback');
const fbText = document.getElementById('fb-text');
const fbSend = document.getElementById('fb-send');

function showFallback(reason) {
  fallbackEl.classList.add('show');
  if (reason) appendError(reason);
  startBtn.disabled = true;
  stopBtn.disabled = true;
  setStatus('idle', 'fallback mode');
  setTimeout(() => fbText.focus(), 100);
}

async function sendFallback() {
  const text = fbText.value.trim();
  if (!text) return;
  fbSend.disabled = true;
  appendFinal(text, false);
  const posted = await postTranscript(text);
  if (posted) {
    const lastFinal = transcript.querySelector('.final:last-child');
    if (lastFinal && !lastFinal.innerHTML.includes('posted')) {
      lastFinal.innerHTML += ' <span class="posted">✓ posted</span>';
    }
  }
  fbText.value = '';
  fbSend.disabled = false;
  fbText.focus();
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
// Web Speech absence is fine — Start button routes to MediaRecorder + server Whisper

function setStatus(state, label) {
  // status pill is hidden in the new design; keep updating for a11y but drive the
  // visible feedback through waveform + mic-icon classes per the qi-locked image.
  status.className = 'status-bar ' + state;
  statusLbl.textContent = label;
  const wf = document.getElementById('waveform');
  const mic = document.getElementById('mic-icon');
  if (wf) {
    wf.classList.remove('listen', 'err', 'idle');
    wf.classList.add(state);
  }
  if (mic) {
    mic.classList.toggle('active', state === 'listen');
  }
}

function appendFinal(text, postedFlag) {
  const div = document.createElement('div');
  div.className = 'final';
  div.innerHTML = escapeHtml(text) + (postedFlag ? ' <span class="posted">✓ posted</span>' : '');
  transcript.appendChild(div);
  transcript.scrollTop = transcript.scrollHeight;
  if (interimEl) { interimEl.remove(); interimEl = null; }
}

function appendInterim(text) {
  if (!interimEl) {
    interimEl = document.createElement('div');
    interimEl.className = 'interim';
    transcript.appendChild(interimEl);
  }
  interimEl.textContent = text;
  transcript.scrollTop = transcript.scrollHeight;
}

function appendError(msg) {
  const div = document.createElement('div');
  div.className = 'error-line';
  div.textContent = msg;
  transcript.appendChild(div);
  transcript.scrollTop = transcript.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function postTranscript(text) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({ source: 'xen-vei', ts: Date.now(), text: text })
    });
    if (res.ok) {
      sentCount++;
      countEl.textContent = sentCount + ' sent';
      return true;
    } else {
      appendError(`POST ${API_URL} → ${res.status}`);
      return false;
    }
  } catch (e) {
    appendError(`POST failed: ${e.message}`);
    return false;
  }
}

async function postAudioChunk(blob) {
  try {
    const fd = new FormData();
    fd.append('audio', blob, 'chunk.webm');
    fd.append('source', 'xen-vei-audio');
    fd.append('ts', Date.now().toString());
    const res = await fetch(AUDIO_URL, { method: 'POST', body: fd });
    if (res.ok) {
      sentCount++;
      countEl.textContent = sentCount + ' chunks';
      const j = await res.json().catch(() => null);
      if (j && j.text) appendFinal(j.text, true);
      return true;
    } else {
      appendError(`audio POST → ${res.status}`);
      return false;
    }
  } catch (e) {
    appendError(`audio POST failed: ${e.message}`);
    return false;
  }
}

async function startMediaRecorder() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    appendError('MediaRecorder unavailable — falling to textarea');
    showFallback('MediaRecorder not supported. Use keyboard mic.');
    return;
  }
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : (MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '');
    mediaRecorder = mimeType ? new MediaRecorder(mediaStream, { mimeType }) : new MediaRecorder(mediaStream);
    mediaMode = true;
    listening = true;
    setStatus('listen', 'streaming audio');
    startBtn.disabled = true;
    stopBtn.disabled = false;
    appendError('MediaRecorder active — server-side Whisper transcribes chunks');
    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) postAudioChunk(e.data);
    };
    mediaRecorder.onerror = (e) => {
      appendError('MediaRecorder error: ' + (e.error ? e.error.message : 'unknown'));
    };
    mediaRecorder.start(CHUNK_MS);
  } catch (e) {
    appendError('mic access denied or unavailable: ' + e.message);
    showFallback('Mic access required. Use keyboard mic below or grant mic permission.');
  }
}

function stopMediaRecorder() {
  listening = false;
  mediaMode = false;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    try { mediaRecorder.stop(); } catch (_) {}
  }
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  setStatus('idle', 'stopped');
  startBtn.disabled = false;
  stopBtn.disabled = true;
}

let useContinuous = true;

function startListening() {
  if (!SR) return;
  recognition = new SR();
  recognition.continuous = useContinuous;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    listening = true;
    setStatus('listen', 'listening');
    startBtn.disabled = true;
    stopBtn.disabled = false;
  };

  recognition.onresult = async (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const result = e.results[i];
      if (result.isFinal) {
        const text = result[0].transcript.trim();
        if (text) {
          appendFinal(text, false);
          const posted = await postTranscript(text);
          if (posted) {
            const lastFinal = transcript.querySelector('.final:last-child');
            if (lastFinal && !lastFinal.innerHTML.includes('posted')) {
              lastFinal.innerHTML += ' <span class="posted">✓ posted</span>';
            }
          }
        }
      } else {
        interim += result[0].transcript;
      }
    }
    if (interim) appendInterim(interim);
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    setStatus('err', 'error: ' + e.error);
    appendError('speech error: ' + e.error);
    if (e.error === 'network') {
      networkErrorCount++;
      if (networkErrorCount === 2 && useContinuous) {
        useContinuous = false;
        appendError('switching to non-continuous mode for compatibility...');
      }
      if (networkErrorCount >= 3) {
        listening = false;
        try { recognition.stop(); } catch (_) {}
        appendError('Web Speech API blocked — switching to MediaRecorder + server Whisper');
        startMediaRecorder();
      }
    }
  };

  recognition.onend = () => {
    if (listening) {
      const delay = networkErrorCount > 0 ? Math.min(1000 * networkErrorCount, 4000) : 100;
      setTimeout(() => {
        if (listening) {
          try { startListening(); } catch (_) {}
        }
      }, delay);
    }
  };

  recognition.start();
}

function stopListening() {
  if (mediaMode) { stopMediaRecorder(); return; }
  listening = false;
  if (recognition) {
    try { recognition.stop(); } catch (_) {}
  }
  setStatus('idle', 'stopped');
  startBtn.disabled = false;
  stopBtn.disabled = true;
}

// ─── Canvas waveform — smooth continuous phosphor line + glow ─────────
const waveformEl = document.getElementById('waveform');
const waveCanvas = document.getElementById('waveform-canvas');
const waveCtx2d = waveCanvas.getContext('2d');
const micIcon = document.getElementById('mic-icon');
let audioCtx = null;
let analyser = null;
let analyserStream = null;
let rafId = null;
let viz_listening = false;

// Idle: canvas stays empty. Waveform only renders while the mic is on.
// (qi 2026-05-23: idle line crossing the text was distracting.)

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = waveformEl.clientWidth;
  const h = waveformEl.clientHeight;
  waveCanvas.width = Math.floor(w * dpr);
  waveCanvas.height = Math.floor(h * dpr);
  waveCanvas.style.width = w + 'px';
  waveCanvas.style.height = h + 'px';
  waveCtx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawWave(samples, listening) {
  const w = waveCanvas.width / (window.devicePixelRatio || 1);
  const h = waveCanvas.height / (window.devicePixelRatio || 1);
  waveCtx2d.clearRect(0, 0, w, h);
  // Skip drawing if amplitude is below silence threshold — no flat line baseline.
  // qi 2026-05-23: 'the sound wave should still work without starting with a line'.
  const N = samples.length;
  let peak = 0;
  for (let i = 0; i < N; i++) {
    const d = Math.abs(samples[i] - 128);
    if (d > peak) peak = d;
  }
  const SILENCE_THRESHOLD = 6;  // out of 128 — below this, no draw
  if (peak < SILENCE_THRESHOLD) return;
  // Amplitude-driven opacity ramp so soft voice doesn't slam into full glow
  const ampScale = Math.min(1, (peak - SILENCE_THRESHOLD) / 40);
  const mid = h / 2;
  waveCtx2d.lineWidth = 1.4;
  waveCtx2d.strokeStyle = '#00FF88';
  waveCtx2d.shadowColor = 'rgba(0,255,136,.85)';
  waveCtx2d.shadowBlur = 6 + 12 * ampScale;
  waveCtx2d.globalAlpha = 0.45 + 0.55 * ampScale;
  waveCtx2d.beginPath();
  for (let i = 0; i < N; i++) {
    const x = (i / (N - 1)) * w;
    const norm = (samples[i] - 128) / 128;
    const y = mid + norm * mid * 0.92;
    if (i === 0) waveCtx2d.moveTo(x, y);
    else waveCtx2d.lineTo(x, y);
  }
  waveCtx2d.stroke();
  // Secondary inner glow line
  waveCtx2d.lineWidth = 3.0;
  waveCtx2d.strokeStyle = 'rgba(0,255,136,.22)';
  waveCtx2d.shadowBlur = 0;
  waveCtx2d.stroke();
  waveCtx2d.globalAlpha = 1;
}

function tickListening() {
  if (!analyser) return;
  const samples = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(samples);
  drawWave(samples, true);
  rafId = requestAnimationFrame(tickListening);
}

function clearWave() {
  const w = waveCanvas.width / (window.devicePixelRatio || 1);
  const h = waveCanvas.height / (window.devicePixelRatio || 1);
  waveCtx2d.clearRect(0, 0, w, h);
}
// Start with a clean canvas. No idle drift.
clearWave();

async function startAnalyser() {
  if (analyser) return;
  try {
    analyserStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(analyserStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.78;
    source.connect(analyser);
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(tickListening);
  } catch (e) {
    appendError('mic visualizer denied: ' + e.message);
  }
}

function stopAnalyser() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (analyser) { try { analyser.disconnect(); } catch (_) {} analyser = null; }
  if (audioCtx) { try { audioCtx.close(); } catch (_) {} audioCtx = null; }
  if (analyserStream) { analyserStream.getTracks().forEach(t => t.stop()); analyserStream = null; }
  clearWave();   // no idle line — canvas stays empty when not listening
}

// ─── Mic icon = single toggle (start/stop) ─────────────────────────────
async function toggleMic() {
  if (viz_listening) {
    viz_listening = false;
    stopListening();
    stopAnalyser();
    return;
  }
  viz_listening = true;
  await startAnalyser();   // Audio Analyser fires first so the visualizer
                            // shows reaction even before Web Speech connects
  if (isFirefoxLike || !SR) {
    appendError('Firefox/Zen detected — using MediaRecorder + server Whisper');
    startMediaRecorder();
  } else {
    startListening();
  }
}
micIcon.addEventListener('click', toggleMic);

// Keep hidden buttons functional for legacy/automation triggers
startBtn.addEventListener('click', toggleMic);
stopBtn.addEventListener('click', () => { if (viz_listening) toggleMic(); });

// ─── Per-bubble actions (copy/share) attached to each .final ─────────────
function attachBubbleActions(bubbleEl, text) {
  const row = document.createElement('div');
  row.className = 'bubble-actions';
  const copyBtn = document.createElement('button');
  copyBtn.textContent = 'COPY';
  copyBtn.onclick = (e) => {
    e.stopPropagation();
    navigator.clipboard?.writeText(text).then(() => {
      copyBtn.textContent = 'COPIED'; setTimeout(() => copyBtn.textContent = 'COPY', 1200);
    });
  };
  row.appendChild(copyBtn);
  if (navigator.share) {
    const shareBtn = document.createElement('button');
    shareBtn.textContent = 'SHARE';
    shareBtn.onclick = (e) => {
      e.stopPropagation();
      navigator.share({ text }).catch(() => {});
    };
    row.appendChild(shareBtn);
  }
  bubbleEl.appendChild(row);
}

// Wrap appendFinal to add bubble actions
const _origAppendFinal = appendFinal;
appendFinal = function(text, postedFlag) {
  _origAppendFinal(text, postedFlag);
  const lastFinal = transcript.querySelector('.final:last-child');
  if (lastFinal) attachBubbleActions(lastFinal, text);
};

// ─── Top toolbar: copy-all / export / share / attach ─────────────────────
function collectTranscriptText() {
  const out = [];
  transcript.querySelectorAll('.final, .xen-reply').forEach(el => {
    const role = el.classList.contains('xen-reply') ? 'XEN' : 'YOU';
    const t = el.cloneNode(true);
    t.querySelectorAll('.bubble-actions, .posted').forEach(n => n.remove());
    out.push(`${role}: ${t.textContent.trim()}`);
  });
  return out.join('\n');
}

document.getElementById('tb-copy').addEventListener('click', () => {
  const text = collectTranscriptText();
  if (!text) return;
  navigator.clipboard?.writeText(text);
  const btn = document.getElementById('tb-copy');
  btn.textContent = 'Copied'; setTimeout(() => btn.textContent = 'Copy', 1200);
});

document.getElementById('tb-export').addEventListener('click', () => {
  const text = collectTranscriptText();
  if (!text) return;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `vei-transcript-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.txt`;
  document.body.appendChild(a); a.click(); a.remove();
});

document.getElementById('tb-share').addEventListener('click', async () => {
  const text = collectTranscriptText();
  if (!text) return;
  if (navigator.share) {
    try { await navigator.share({ title: 'VEI transcript', text }); } catch (_) {}
  } else {
    navigator.clipboard?.writeText(text);
    alert('Copied to clipboard (share API unavailable)');
  }
});

// ─── Attachments: file picker → upload to /api/dictate-attach ───────────
const fileInput = document.getElementById('file-input');
document.getElementById('tb-attach').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  for (const f of files) {
    const fd = new FormData();
    fd.append('file', f, f.name);
    fd.append('source', 'xen-vei-attach');
    fd.append('ts', Date.now().toString());
    appendError(`uploading ${f.name} (${(f.size/1024).toFixed(1)}KB)…`);
    try {
      const r = await fetch('https://xen.xlrd.org/api/dictate-attach', { method:'POST', body:fd });
      if (r.ok) {
        const j = await r.json().catch(() => ({}));
        appendFinal(`📎 ${f.name}${j.url ? ' → ' + j.url : ''}`, true);
      } else {
        appendError(`upload ${r.status}: ${f.name}`);
      }
    } catch (err) {
      appendError(`upload failed: ${err.message}`);
    }
  }
  e.target.value = '';
});

// ─── Local history (localStorage) + SSE replay (server-side) ────────────
// qi 2026-05-23: 'every time I go back to it everything that I said should
// still be there and everything you said to still be there'.
// Two layers:
// (1) localStorage 'vei-history' = array of {role, text, ts} — hydrates on load
// (2) /events SSE backfill (mirror-events.jsonl, last 5000 events)
// Dedupe by (source + text-prefix + ts).
const LS_KEY = 'vei-history';
const _renderedKeys = new Set();
const _history = (() => {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch (_) { return []; }
})();
function saveHistory(entry) {
  _history.push(entry);
  if (_history.length > 1000) _history.splice(0, _history.length - 1000);
  try { localStorage.setItem(LS_KEY, JSON.stringify(_history)); } catch (_) {}
}
function hydrateHistory() {
  for (const e of _history) {
    const key = `${e.role}|${(e.text || '').slice(0, 80)}|${e.ts || ''}`;
    if (_renderedKeys.has(key)) continue;
    _renderedKeys.add(key);
    const div = document.createElement('div');
    div.className = e.role === 'xen' ? 'xen-reply' : 'final';
    div.textContent = e.text;
    transcript.appendChild(div);
    attachBubbleActions(div, e.text);
  }
  transcript.scrollTop = transcript.scrollHeight;
}
hydrateHistory();
function renderEvent(d) {
  const txt = (d.text || d.body || d.message || '').toString().trim();
  if (!txt) return;
  const tag = (d.event || d.kind || '').toString().toLowerCase();
  const src = (d.source || d.sender || '').toString().toLowerCase();
  const key = `${src}|${txt.slice(0, 80)}|${d.ts || ''}`;
  if (_renderedKeys.has(key)) return;
  _renderedKeys.add(key);
  // Classify side
  const isXenOut = tag.includes('xen-out') || src.includes('xen-reply') || src.includes('xen-primary') || src.includes('xen-out');
  const isUserDictate = tag.includes('xen-dictate-in') || src.includes('xen-vei') || src.includes('xen-ruach') || src.includes('xen-dictate');
  if (isXenOut) {
    const div = document.createElement('div');
    div.className = 'xen-reply';
    div.textContent = txt;
    transcript.appendChild(div);
    attachBubbleActions(div, txt);
    transcript.scrollTop = transcript.scrollHeight;
    saveHistory({ role: 'xen', text: txt, ts: d.ts || Date.now() });
  } else if (isUserDictate) {
    const div = document.createElement('div');
    div.className = 'final';
    div.textContent = txt;
    transcript.appendChild(div);
    attachBubbleActions(div, txt);
    transcript.scrollTop = transcript.scrollHeight;
    saveHistory({ role: 'you', text: txt, ts: d.ts || Date.now() });
  }
}

function subscribeXenReplies() {
  try {
    const src = new EventSource('https://xen.xlrd.org/events');
    src.onmessage = (ev) => {
      try { renderEvent(JSON.parse(ev.data)); } catch (_) {}
    };
    src.onerror = () => { /* CF/omnimind SSE auto-reconnects */ };
  } catch (e) {}
}
subscribeXenReplies();

// ─── Background video: ping-pong loop (forward 10s, reverse 10s, repeat) ─
// qi 2026-05-23: 'plays for 10 seconds then 10 seconds reverse, seamless loop'
(function pingPongBg() {
  const v = document.getElementById('bg-video');
  if (!v) return;
  let reversing = false;
  let rafId = null;
  function reverseTick() {
    if (!reversing) return;
    v.currentTime = Math.max(0, v.currentTime - (1/30));
    if (v.currentTime <= 0.04) {
      reversing = false;
      v.play().catch(() => {});
      return;
    }
    rafId = requestAnimationFrame(reverseTick);
  }
  v.addEventListener('ended', () => {
    reversing = true;
    v.pause();
    rafId = requestAnimationFrame(reverseTick);
  });
  v.play().catch(() => {});  // autoplay (muted, playsinline allows on iOS)
})();

// ─── Touch-to-light: any user gesture brightens the bg for ~3s ────────
(function touchLight() {
  let timer = null;
  function lit() {
    document.body.classList.add('lit');
    if (timer) clearTimeout(timer);
    timer = setTimeout(() => document.body.classList.remove('lit'), 3000);
  }
  ['click','touchstart','keydown','input'].forEach(ev =>
    document.addEventListener(ev, lit, { passive: true })
  );
})();

// ─── Auto-start mic on load (qi 2026-05-23: 'start with voice mode'). ────
// Browsers require a user gesture for getUserMedia on first session, so we
// try immediately AND queue a fallback start on the first body click/touch.
(function autoStartMic() {
  // Optimistic: works when mic permission is already granted from prior session
  setTimeout(() => { if (!viz_listening) toggleMic().catch(() => {}); }, 250);
  // Gesture fallback: any user interaction triggers mic if not already on
  const onFirstGesture = () => {
    if (!viz_listening) toggleMic().catch(() => {});
    document.body.removeEventListener('click', onFirstGesture);
    document.body.removeEventListener('touchstart', onFirstGesture);
  };
  document.body.addEventListener('click', onFirstGesture, { once: false, passive: true });
  document.body.addEventListener('touchstart', onFirstGesture, { once: false, passive: true });
})();

fbSend.addEventListener('click', sendFallback);
fbText.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendFallback();
  }
});

// SR absence handled by Start button → routes to MediaRecorder directly

window.addEventListener('beforeunload', stopListening);
</script>
