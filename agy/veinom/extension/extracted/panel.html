<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AGY VENOM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0A0A0A;
    --fg:#FFFFFF;
    --fg-dim:#E0DCC8;
    --fg-mute:#8B866B;
    --accent:#FFD700;
    --accent-glow:rgba(255,215,0,.35);
    --line:rgba(255, 235, 176, .12);
    --line-strong:rgba(255, 235, 176, .22);
    --r-card:14px;
    --r-pill:9999px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    width:300px; padding:14px;
    background:linear-gradient(160deg, #0A0A0A 0%, #050505 100%);
    color:var(--fg);
    font-family:'Inter', system-ui, sans-serif;
    font-size:13px;
  }
  .head {
    display:flex; align-items:center; gap:10px;
    margin-bottom:14px; padding-bottom:12px;
    border-bottom:1px solid var(--line);
  }
  .dot {
    width:10px; height:10px; border-radius:50%;
    background:var(--fg-mute);
    transition:all .2s;
  }
  .dot.live { background:var(--accent); box-shadow:0 0 12px var(--accent); animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(1.3);} }
  .brand {
    font-weight:600; font-size:12px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--accent);
  }
  .sub {
    font-family:'JetBrains Mono', monospace;
    font-size:9.5px; letter-spacing:.10em; color:var(--fg-mute);
    text-transform:uppercase; margin-top:2px;
  }
  .row { display:flex; align-items:center; gap:8px; }
  .col { flex:1; min-width:0; }
  .status {
    background:rgba(255,215,0,.06);
    border:1px solid var(--line-strong);
    border-radius:var(--r-card);
    padding:10px 12px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px; color:var(--fg-dim);
    margin-bottom:12px;
    min-height:36px;
    word-break:break-word;
  }
  .controls { display:flex; gap:8px; }
  button {
    flex:1;
    background:rgba(255,215,0,.10);
    border:1px solid rgba(255,215,0,.32);
    color:var(--accent);
    font-family:'JetBrains Mono', monospace;
    font-size:11px; font-weight:500;
    letter-spacing:.16em; text-transform:uppercase;
    padding:10px;
    border-radius:var(--r-pill);
    cursor:pointer;
    transition:all .15s;
  }
  button:hover { background:rgba(255,215,0,.22); }
  button.secondary {
    background:transparent;
    border-color:var(--line-strong);
    color:var(--fg-dim);
  }
  .footer {
    margin-top:14px; padding-top:12px;
    border-top:1px solid var(--line);
    font-family:'JetBrains Mono', monospace;
    font-size:9.5px; letter-spacing:.10em;
    color:var(--fg-mute); text-transform:uppercase;
    text-align:center;
  }
  .footer a { color:var(--fg-dim); text-decoration:none; }
  .footer a:hover { color:var(--accent); }
  label {
    display:flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px; letter-spacing:.12em;
    color:var(--fg-dim); text-transform:uppercase;
    cursor:pointer;
    padding:8px 0;
  }
  label input[type=checkbox] {
    accent-color:var(--accent);
  }
</style>
</head>
<body>
  <div class="head">
    <div class="dot" id="dot"></div>
    <div class="col">
      <div class="brand">AGY VENOM</div>
      <div class="sub" id="adapterName">— offline —</div>
    </div>
  </div>

  <div class="status" id="status">Click Start on a chat page to begin the voice loop.</div>

  <div class="controls">
    <button id="toggleBtn">Start</button>
    <button class="secondary" id="reloadBtn">Reload</button>
  </div>

  <label>
    <input type="checkbox" id="autostart"> Autostart on chat pages
  </label>

  <div class="footer">
    <a href="https://hitthe.link/agyvenom/" target="_blank">Standalone bridge</a>
    · <a href="https://tui.xlrd.org/" target="_blank">TUI inject</a>
  </div>

  <script src="panel.js"></script>
</body>
</html>
