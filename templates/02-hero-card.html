<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hero Card · Stylism</title><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet"><link rel="stylesheet" href="./_tokens.css"><style>
.stage{perspective:1400px;perspective-origin:50% 25%;min-height:85vh;display:grid;place-items:center;padding:40px 16px}
.card{position:relative;width:clamp(300px,55vw,520px);aspect-ratio:3/4;background:linear-gradient(155deg,var(--ink-3),var(--ink-2));border-radius:22px;transform:rotateY(-8deg) rotateX(3deg);transform-style:preserve-3d;box-shadow:var(--lift);padding:40px;display:flex;flex-direction:column;justify-content:space-between}
.card::before{content:"";position:absolute;inset:-50px;background:var(--gradient-iridescent);border-radius:32px;filter:blur(50px);opacity:.55;z-index:-1}
.card::after{content:"";position:absolute;inset:0;border-radius:22px;border:1px solid transparent;background:linear-gradient(155deg,var(--chrome-hi),transparent 30%,transparent 70%,var(--chrome-lo)) border-box;-webkit-mask:linear-gradient(#000 0 0) padding-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.num{font-family:var(--font-display);font-size:10px;letter-spacing:.3em;color:var(--cyan-glow);text-transform:uppercase}
.name{font-family:var(--font-display);font-weight:700;font-size:32px;line-height:1.1;margin:14px 0 6px}
.role{font-family:"Cormorant Garamond",serif;font-style:italic;color:var(--chrome);font-size:18px;line-height:1.3}
.tag{font-family:var(--font-display);font-size:9px;letter-spacing:.25em;color:var(--text-3);text-transform:uppercase;border-top:1px solid rgba(192,200,208,.15);padding-top:12px;margin-top:auto}
</style></head><body class="env"><div class="wrap">
<div class="topbar"><div class="l"><span class="dot"></span><span>HERO CARD · TEMPLATE</span></div><div>STYLISM v1</div></div>
<section class="stage"><article class="card"><div><div class="num">№ 01 · A.I.M.</div><h2 class="name">[ Name <span class="iridescent">Here</span> ]</h2><div class="role">[ Role / Title / Hook ]</div></div><div class="tag">ECOSYSTEM · 2026</div></article></section>
<footer>STYLISM TEMPLATE · HERO CARD · 2026 · <a href="../">← templates index</a></footer>
</div></body></html>
