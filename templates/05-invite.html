<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Invite · Stylism</title><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital@1&family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet"><link rel="stylesheet" href="./_tokens.css"><style>
.invite{max-width:680px;margin:0 auto;text-align:center;position:relative}
.date-block{display:inline-block;padding:24px 32px;background:linear-gradient(155deg,var(--steel),var(--ink-3));border:1px solid var(--chrome-lo);border-radius:14px;box-shadow:var(--lift);margin-bottom:40px}
.date-block .month{font-family:var(--font-display);font-size:12px;letter-spacing:.3em;color:var(--cyan-glow);text-transform:uppercase}
.date-block .day{font-family:var(--font-display);font-weight:700;font-size:64px;line-height:1;margin:6px 0;color:var(--chrome-hi)}
.date-block .year{font-family:var(--font-mono);font-size:11px;color:var(--text-3);letter-spacing:.2em}
.title{font-family:var(--font-display);font-weight:700;font-size:clamp(36px,5vw,60px);line-height:1.05;margin:0 0 24px}
.subtitle{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:22px;color:var(--chrome);margin-bottom:32px}
.details{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;font-family:var(--font-mono);font-size:13px;color:var(--text-2);letter-spacing:.05em;margin-bottom:40px}
.details .det{display:flex;align-items:center;gap:8px}
.details .k{color:var(--text-3);text-transform:uppercase;font-size:10px;letter-spacing:.2em}
</style></head><body class="env"><div class="wrap">
<div class="topbar"><div class="l"><span class="dot"></span><span>INVITE · TEMPLATE</span></div><div>STYLISM v1</div></div>
<section class="invite"><div class="date-block"><div class="month">[ Month ]</div><div class="day">00</div><div class="year">2026</div></div><div class="eyebrow">[ Eyebrow ]</div><h1 class="title">[ Event <span class="iridescent">Name</span> ]</h1><div class="subtitle">[ One-line description ]</div><div class="details"><div class="det"><span class="k">When</span><span>[ Time ]</span></div><div class="det"><span class="k">Where</span><span>[ Venue / link ]</span></div><div class="det"><span class="k">Dress</span><span>[ Code ]</span></div></div><div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap"><a href="#" class="btn"><span class="dot"></span>RSVP</a><a href="#" class="btn alt">Add to Calendar</a></div></section>
<footer>STYLISM TEMPLATE · INVITE · 2026 · <a href="../">← templates index</a></footer>
</div></body></html>
