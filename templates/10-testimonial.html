<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Testimonial · Stylism</title><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital@0;1&family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet"><link rel="stylesheet" href="./_tokens.css"><style>
.test{max-width:780px;margin:0 auto;text-align:center;padding:64px 24px}
.test::before{content:"";display:block;width:60px;height:60px;margin:0 auto 32px;background:var(--gradient-iridescent);border-radius:50%;filter:blur(8px);opacity:.8}
