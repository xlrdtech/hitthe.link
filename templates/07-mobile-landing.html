<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mobile Landing · Stylism</title><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet"><link rel="stylesheet" href="./_tokens.css"><style>
.phone{max-width:420px;margin:0 auto;padding:0 4px}
.phone .topbar{margin-bottom:32px}
.hero-m{padding:40px 16px;text-align:center}
.hero-m h1{font-family:var(--font-display);font-weight:700;font-size:42px;line-height:1.05;margin:0 0 16px}
.hero-m .sub{font-size:16px;color:var(--text-2);line-height:1.55;margin-bottom:24px}
.action-stack{display:flex;flex-direction:column;gap:12px;margin:24px 0}
.action-stack .btn{width:100%;justify-content:center}
.card-stack{display:flex;flex-direction:column;gap:14px;margin:32px 0}
.mcard{padding:20px;background:linear-gradient(155deg,var(--steel),var(--ink-3));border:1px solid var(--chrome-lo);border-radius:14px;box-shadow:inset 0 1px 0 var(--chrome),0 6px 16px rgba(10,10,14,.5)}
.mcard .mk{font-family:var(--font-mono);font-size:10px;color:var(--cyan-glow);letter-spacing:.2em;text-transform:uppercase}
.mcard .mt{font-family:var(--font-display);font-size:17px;margin:6px 0 4px}
.mcard .mb{font-size:13px;color:var(--text-2);line-height:1.5}
.rail{position:fixed;bottom:0;left:0;right:0;padding:12px 16px env(safe-area-inset-bottom);background:linear-gradient(0deg,var(--ink) 70%,transparent);display:flex;gap:8px;justify-content:center;z-index:5}
@media(min-width:600px){.rail{position:static;background:none;margin-top:32px}}
</style></head><body class="env"><div class="wrap phone">
<div class="topbar"><div class="l"><span class="dot"></span><span>MOBILE</span></div><div>v1</div></div>
<section class="hero-m"><div class="eyebrow">[ EYEBROW ]</div><h1>[ Headline <span class="iridescent">word</span> ]</h1><div class="sub">Mobile-first lede. Two sentences max.</div><div class="action-stack"><a href="#" class="btn"><span class="dot"></span>PRIMARY</a><a href="#" class="btn alt">SECONDARY</a></div></section>
<section class="card-stack"><div class="mcard"><div class="mk">№ 01</div><div class="mt">[ Card title ]</div><div class="mb">Two-line description.</div></div><div class="mcard"><div class="mk">№ 02</div><div class="mt">[ Card title ]</div><div class="mb">Two-line description.</div></div><div class="mcard"><div class="mk">№ 03</div><div class="mt">[ Card title ]</div><div class="mb">Two-line description.</div></div></section>
<div class="rail"><a href="#" class="btn">Action</a><a href="#" class="btn alt">More</a></div>
<footer style="margin-bottom:80px">STYLISM TEMPLATE · MOBILE LANDING · 2026 · <a href="../">← index</a></footer>
</div></body></html>
