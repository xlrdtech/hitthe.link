<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a14">
<title>Liquid Glass Visualizer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  body {
    background:#05060c; color:#eef; position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  /* animated background gradient — hue shifts with spectral centroid */
  #bg {
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(120% 120% at 30% 20%, hsl(var(--h1,260) 80% 28% / .9), transparent 60%),
      radial-gradient(120% 120% at 70% 80%, hsl(var(--h2,200) 85% 30% / .85), transparent 60%),
      linear-gradient(160deg, #06070f, #0b0a18 60%, #05060c);
    transition:background .25s linear;
  }
  canvas#viz { position:fixed; inset:0; z-index:1; display:block; width:100%; height:100%; }

  /* glass control dock */
  .dock {
    position:fixed; z-index:3; left:50%; bottom:max(18px,env(safe-area-inset-bottom));
    transform:translateX(-50%);
    width:min(680px,92vw); padding:14px 16px;
    border-radius:26px;
    background:linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.04));
    backdrop-filter:blur(26px) saturate(180%); -webkit-backdrop-filter:blur(26px) saturate(180%);
    border:1px solid rgba(255,255,255,.22);
    box-shadow:0 18px 50px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.5), inset 0 -10px 24px rgba(0,0,0,.25);
  }
  .row { display:flex; align-items:center; gap:12px; }
  .row + .row { margin-top:12px; }
  .track {
    flex:1; min-width:0; font-size:13px; font-weight:600; letter-spacing:.2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    text-shadow:0 1px 2px rgba(0,0,0,.6); opacity:.92;
  }
  .time { font-size:11px; opacity:.7; font-variant-numeric:tabular-nums; min-width:84px; text-align:right; }

  button, label.btn {
    cursor:pointer; user-select:none; border:none; color:#f3f6ff;
    font-size:13px; font-weight:600; padding:10px 14px; border-radius:16px;
    background:linear-gradient(160deg, rgba(255,255,255,.28), rgba(180,200,255,.08));
    border:1px solid rgba(255,255,255,.3);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.6), inset 0 -6px 14px rgba(0,0,0,.28), 0 6px 16px rgba(0,0,0,.4);
    text-shadow:0 1px 2px rgba(0,0,0,.5); transition:transform .12s, filter .12s; white-space:nowrap;
  }
  button:active, label.btn:active { transform:scale(.94); filter:brightness(1.2); }
  button.icon { width:48px; height:48px; padding:0; border-radius:50%; font-size:18px; display:grid; place-items:center; }
  button[aria-pressed="true"] { background:linear-gradient(160deg, rgba(120,220,255,.55), rgba(80,160,255,.25)); }
  input[type=file] { display:none; }

  input[type=range] {
    -webkit-appearance:none; appearance:none; height:6px; border-radius:6px; flex:1; min-width:40px;
    background:linear-gradient(90deg, rgba(150,210,255,.95) var(--p,0%), rgba(255,255,255,.16) var(--p,0%));
    box-shadow:inset 0 1px 2px rgba(0,0,0,.5); outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #9fd0ff 50%, #4a8fe0);
    box-shadow:0 2px 6px rgba(0,0,0,.6), inset 0 1px 1px rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.5);
  }
  input[type=range]::-moz-range-thumb {
    width:18px; height:18px; border:none; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #9fd0ff 50%, #4a8fe0); box-shadow:0 2px 6px rgba(0,0,0,.6);
  }
  .vol { display:flex; align-items:center; gap:8px; width:130px; flex:0 0 auto; }
  .vol span { font-size:14px; opacity:.7; }

  /* start overlay (autoplay gesture gate) */
  #gate {
    position:fixed; inset:0; z-index:9; display:flex; flex-direction:column; gap:18px;
    align-items:center; justify-content:center; text-align:center;
    background:radial-gradient(circle at 50% 40%, rgba(40,30,80,.5), rgba(5,6,12,.92));
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); padding:24px;
  }
  #gate h1 { font-size:clamp(26px,7vw,46px); font-weight:800; letter-spacing:-.5px;
    background:linear-gradient(120deg,#cfe6ff,#9fb6ff,#e9d6ff); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 4px 18px rgba(120,150,255,.5)); }
  #gate p { opacity:.7; max-width:420px; font-size:14px; line-height:1.5; }
  #gate .start { font-size:18px; padding:16px 36px; border-radius:22px; }
  .hidden { display:none !important; }
  .hint { position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:3; font-size:11px; opacity:.45; z-index:3; }
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="viz"></canvas>
<div class="hint">drop an audio file anywhere · or use mic</div>

<div id="gate">
  <h1>Liquid Glass</h1>
  <p>A 3D-metal Apple-Vision music visualizer. Load a track or capture your mic / system audio — the environment reacts to rhythm, bass and treble in real time.</p>
  <button class="start btn" id="startBtn">Tap to begin</button>
</div>

<div class="dock hidden" id="dock">
  <div class="row">
    <button class="icon" id="play" title="Play/Pause">▶</button>
    <span class="time" id="cur">0:00</span>
    <input type="range" id="seek" min="0" max="1000" value="0" step="1">
    <span class="time" id="dur">0:00</span>
  </div>
  <div class="row">
    <span class="track" id="trackName">No track loaded</span>
    <div class="vol"><span>🔊</span><input type="range" id="vol" min="0" max="100" value="80"></div>
  </div>
  <div class="row">
    <label class="btn" for="file">📂 Load file</label>
    <input type="file" id="file" accept="audio/*,.mp3,.wav,.flac,.aac,.ogg,.m4a,.aiff,.aif,.opus,.weba,.webm,.oga">
    <button id="micBtn" aria-pressed="false">🎤 Mic / System</button>
  </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
(function(){
  "use strict";
  const $ = id => document.getElementById(id);
  const canvas = $('viz'), ctx = canvas.getContext('2d');
  const audioEl = $('audio'), bg = $('bg');
  let AC, analyser, srcNode, micStream, gainNode;
  let mode = 'file'; // 'file' | 'mic'
  let freq, time, running = false;

  // ---------- sizing ----------
  let W=0,H=0,DPR=1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    W = canvas.width = Math.floor(innerWidth*DPR);
    H = canvas.height = Math.floor(innerHeight*DPR);
    canvas.style.width = innerWidth+'px'; canvas.style.height = innerHeight+'px';
  }
  addEventListener('resize', resize); resize();

  // ---------- audio graph ----------
  function ensureCtx(){
    if(AC) return;
    AC = new (window.AudioContext||window.webkitAudioContext)();
    analyser = AC.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.82;
    gainNode = AC.createGain();
    gainNode.gain.value = parseInt($('vol').value,10)/100;
    analyser.connect(gainNode).connect(AC.destination);
    freq = new Uint8Array(analyser.frequencyBinCount);
    time = new Uint8Array(analyser.fftSize);
  }

  function connectFile(){
    ensureCtx();
    if(srcNode){ try{srcNode.disconnect();}catch(e){} }
    if(!audioEl._node){ audioEl._node = AC.createMediaElementSource(audioEl); }
    srcNode = audioEl._node;
    srcNode.connect(analyser);
    mode='file';
    $('micBtn').setAttribute('aria-pressed','false');
  }

  async function connectMic(){
    ensureCtx();
    try{
      micStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    }catch(e){ alert('Mic/system audio denied or unavailable: '+e.message); return; }
    if(srcNode){ try{srcNode.disconnect();}catch(e){} }
    srcNode = AC.createMediaStreamSource(micStream);
    srcNode.connect(analyser);
    // do NOT route mic to output (feedback). Disconnect gain->dest path for mic.
    try{ gainNode.disconnect(); }catch(e){}
    mode='mic';
    audioEl.pause();
    $('micBtn').setAttribute('aria-pressed','true');
    $('trackName').textContent='Live input (mic / system audio)';
    $('play').textContent='▶';
  }
  function micOffRestoreOutput(){
    if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
    try{ gainNode.connect(AC.destination); }catch(e){}
  }

  // ---------- analysis state ----------
  let smoothBass=0, smoothMid=0, smoothTreb=0, centroid=120;
  let beatEnergy=0, beatAvg=0, ripple=0, rot=0;

  function analyze(){
    analyser.getByteFrequencyData(freq);
    analyser.getByteTimeDomainData(time);
    const n = freq.length;
    const bassEnd=Math.floor(n*0.08), midEnd=Math.floor(n*0.35);
    let bass=0,mid=0,treb=0, cw=0, cs=0;
    for(let i=0;i<n;i++){
      const v=freq[i];
      if(i<bassEnd) bass+=v; else if(i<midEnd) mid+=v; else treb+=v;
      cw+=v*i; cs+=v;
    }
    bass/=(bassEnd*255); mid/=((midEnd-bassEnd)*255); treb/=((n-midEnd)*255);
    smoothBass+= (bass-smoothBass)*0.25;
    smoothMid += (mid -smoothMid )*0.2;
    smoothTreb+= (treb-smoothTreb)*0.18;
    const c = cs>0 ? cw/cs/n : 0.3; // 0..1 spectral centroid
    centroid += (c-(centroid/360))*0; // placeholder; map below
    // beat detection on bass energy
    const e = bass;
    beatAvg += (e-beatAvg)*0.05;
    if(e>beatAvg*1.35 && e>0.18 && beatEnergy<=0){ ripple=1; beatEnergy=8; }
    if(beatEnergy>0) beatEnergy--;
    ripple *= 0.92;
    // hue from centroid
    const baseHue = 200 + c*320;
    bg.style.setProperty('--h1', (baseHue%360).toFixed(0));
    bg.style.setProperty('--h2', ((baseHue+80)%360).toFixed(0));
    return {bass:smoothBass, mid:smoothMid, treb:smoothTreb, c, ripple};
  }

  // ---------- render ----------
  function draw(){
    requestAnimationFrame(draw);
    if(!running || !analyser) return;
    const a = analyze();
    ctx.clearRect(0,0,W,H);
    const cx=W/2, cy=H/2;
    const base = Math.min(W,H)*0.18;
    rot += 0.0025 + a.mid*0.03;

    // ---- outer reactive bar-ring ----
    const bars = 96;
    const innerR = base*1.5;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot);
    for(let i=0;i<bars;i++){
      const idx = Math.floor((i/bars)*freq.length*0.7);
      const amp = freq[idx]/255;
      const ang = (i/bars)*Math.PI*2;
      const len = innerR*0.12 + amp*base*1.3;
      const hue = (200 + a.c*320 + i*1.2)%360;
      ctx.save(); ctx.rotate(ang);
      const grad = ctx.createLinearGradient(0,innerR,0,innerR+len);
      grad.addColorStop(0, `hsla(${hue},90%,75%,.95)`);
      grad.addColorStop(1, `hsla(${hue},95%,55%,.15)`);
      ctx.fillStyle = grad;
      const bw = (innerR)*0.045;
      ctx.fillRect(-bw/2, innerR, bw, len);
      ctx.restore();
    }
    ctx.restore();

    // ---- central metallic blob (deforms with freq) ----
    const pts=128, blobR = base*(1 + a.bass*0.9) * (1 + a.ripple*0.35);
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(-rot*0.6);
    ctx.beginPath();
    for(let i=0;i<=pts;i++){
      const ang=(i/pts)*Math.PI*2;
      const idx=Math.floor((i/pts)*freq.length*0.5);
      const def = (freq[idx]/255) * base*0.5;
      const wobble = Math.sin(ang*5 + rot*3)*base*0.06*(1+a.treb*3);
      const r = blobR + def + wobble;
      const x=Math.cos(ang)*r, y=Math.sin(ang)*r;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    // chrome/metal gradient
    const mh = (200 + a.c*320)%360;
    const mg = ctx.createRadialGradient(-blobR*0.4,-blobR*0.4,blobR*0.1, 0,0,blobR*1.6);
    mg.addColorStop(0, `hsla(${mh},30%,98%,.98)`);
    mg.addColorStop(0.25, `hsla(${mh},70%,82%,.95)`);
    mg.addColorStop(0.55, `hsla(${(mh+30)%360},85%,55%,.9)`);
    mg.addColorStop(0.8, `hsla(${(mh+60)%360},90%,30%,.92)`);
    mg.addColorStop(1, `hsla(${(mh+60)%360},90%,12%,.95)`);
    ctx.fillStyle=mg;
    ctx.shadowColor=`hsla(${mh},95%,60%,${0.5+a.bass})`;
    ctx.shadowBlur=40+a.bass*120+a.ripple*120;
    ctx.fill();
    ctx.shadowBlur=0;
    // specular highlight
    const sg=ctx.createRadialGradient(-blobR*0.45,-blobR*0.5,1,-blobR*0.45,-blobR*0.5,blobR*0.9);
    sg.addColorStop(0,'rgba(255,255,255,.85)'); sg.addColorStop(0.5,'rgba(255,255,255,.12)'); sg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sg; ctx.fill();
    // rim
    ctx.lineWidth=2; ctx.strokeStyle=`hsla(${mh},60%,90%,.5)`; ctx.stroke();
    ctx.restore();

    // ---- waveform inner ring ----
    ctx.save(); ctx.translate(cx,cy);
    ctx.beginPath();
    const wr=base*0.7;
    for(let i=0;i<time.length;i+=4){
      const ang=(i/time.length)*Math.PI*2;
      const v=(time[i]-128)/128;
      const r=wr + v*base*0.35;
      const x=Math.cos(ang)*r, y=Math.sin(ang)*r;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.lineWidth=1.5; ctx.strokeStyle=`hsla(${(mh+180)%360},90%,80%,.6)`; ctx.stroke();
    ctx.restore();

    // ---- beat bloom ring ----
    if(a.ripple>0.02){
      ctx.save(); ctx.translate(cx,cy);
      ctx.beginPath();
      ctx.arc(0,0, base*1.5*(2-a.ripple), 0, Math.PI*2);
      ctx.lineWidth=4*a.ripple;
      ctx.strokeStyle=`hsla(${mh},95%,70%,${a.ripple*0.6})`;
      ctx.stroke(); ctx.restore();
    }
  }
  requestAnimationFrame(draw);

  // ---------- UI wiring ----------
  function fmt(t){ if(!isFinite(t))return '0:00'; const m=Math.floor(t/60), s=Math.floor(t%60); return m+':'+String(s).padStart(2,'0'); }

  $('startBtn').addEventListener('click', async ()=>{
    ensureCtx(); await AC.resume();
    running=true;
    $('gate').classList.add('hidden');
    $('dock').classList.remove('hidden');
  });

  $('play').addEventListener('click', async ()=>{
    if(mode==='mic') return;
    if(!audioEl.src){ $('file').click(); return; }
    await AC.resume();
    if(audioEl.paused){ audioEl.play(); $('play').textContent='❚❚'; }
    else { audioEl.pause(); $('play').textContent='▶'; }
  });

  $('file').addEventListener('change', e=>{
    const f=e.target.files[0]; if(!f) return;
    loadFile(f);
  });
  function loadFile(f){
    if(mode==='mic') micOffRestoreOutput();
    const url=URL.createObjectURL(f);
    audioEl.src=url;
    connectFile();
    $('trackName').textContent=f.name;
    AC.resume().then(()=>audioEl.play().then(()=>$('play').textContent='❚❚').catch(()=>{}));
  }

  $('micBtn').addEventListener('click', async ()=>{
    if(mode==='mic'){ micOffRestoreOutput(); mode='file'; $('micBtn').setAttribute('aria-pressed','false'); $('trackName').textContent= audioEl.src?$('trackName').textContent:'No track loaded'; if(audioEl.src) connectFile(); return; }
    await AC.resume(); await connectMic();
  });

  $('vol').addEventListener('input', e=>{
    const v=parseInt(e.target.value,10)/100;
    if(gainNode) gainNode.gain.value=v;
    audioEl.volume=v;
    e.target.style.setProperty('--p', e.target.value+'%');
  });

  $('seek').addEventListener('input', e=>{
    if(mode==='mic'||!audioEl.duration) return;
    audioEl.currentTime = (e.target.value/1000)*audioEl.duration;
  });
  audioEl.addEventListener('timeupdate', ()=>{
    if(audioEl.duration){
      const p=audioEl.currentTime/audioEl.duration;
      $('seek').value=Math.round(p*1000);
      $('seek').style.setProperty('--p',(p*100)+'%');
      $('cur').textContent=fmt(audioEl.currentTime);
      $('dur').textContent=fmt(audioEl.duration);
    }
  });
  audioEl.addEventListener('ended', ()=>$('play').textContent='▶');
  audioEl.volume = 0.8;

  // ---------- drag & drop ----------
  ['dragover','dragenter'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();}));
  document.addEventListener('drop', e=>{
    e.preventDefault();
    const AUDIO_EXTS = /\.(mp3|wav|ogg|oga|flac|aac|m4a|opus|weba|webm)$/i;
    const f=[...e.dataTransfer.files].find(x=>x.type.startsWith('audio') || AUDIO_EXTS.test(x.name));
    if(!f) return;
    if(!AC){ ensureCtx(); }
    AC.resume(); running=true;
    $('gate').classList.add('hidden'); $('dock').classList.remove('hidden');
    loadFile(f);
  });
})();
</script>
</body>
</html>
