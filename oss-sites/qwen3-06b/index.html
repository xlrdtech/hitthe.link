<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M_B - Southern Soul</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #1e1e1e;
      color: #ffffff;
    }
    header {
      background-color: #222;
      color: #fff;
      padding: 20px 0;
      text-align: center;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .hero h1 {
      font-size: 2.5em;
      color: #ff6b6b;
    }
    .hero p {
      font-size: 1.2em;
      color: #ff6b6b;
    }
    .hero a {
      color: #ff6b6b;
      text-decoration: none;
      font-weight: bold;
    }
    .tour-dates {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .tour-dates li {
      background-color: #f0f0f0;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    .tour-dates li a {
      color: #007bff;
    }
    .booking-email {
      font-size: 1.1em;
      color: #007bff;
    }
  </style>
</head>
<body>
  <header>
    <h1>M_B - Southern Soul</h1>
    <p>From Douglasville, GA</p>
    <a href="#">Listen</a>
  </header>
  <div class="tour-dates">
    <div><a href="#">March 15</a> - 7:00 PM</div>
    <div><a href="#">April 1</a> - 8:00 AM</div>
    <div><a href="#">May 3</a> - 9:00 AM</div>
  </div>
  <p class="booking-email">Email: m_b@example.com</p>
</body>
</html>
