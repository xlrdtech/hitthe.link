<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M_B - Southern Soul Music Artist</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            padding: 0;
        }
        .hero {
            background-color: #333;
            padding: 100px 0;
            text-align: center;
        }
        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .hero p {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .hero button {
            font-size: 18px;
            padding: 10px 20px;
            background-color: #ff6f00;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .hero button:hover {
            background-color: #ff9f00;
        }
        .tour-dates {
            padding: 50px;
            text-align: center;
        }
        .tour-dates h2 {
            font-size: 36px;
            margin-bottom: 30px;
        }
        .tour-dates ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .tour-dates li {
            background-color: #555;
            margin: 10px 0;
            padding: 20px;
            border-radius: 5px;
            width: 100%;
            max-width: 300px;
        }
        .booking {
            padding: 50px;
            text-align: center;
        }
        .booking h2 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .booking p {
            font-size: 24px;
            color: #ff6f00;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>M_B</h1>
        <p>Southern Soul Music Artist from Douglasville, GA</p>
        <button>Listen</button>
    </div>
    <div class="tour-dates">
        <h2>Upcoming Tour Dates</h2>
        <ul>
            <li>2023-06-15 - City A</li>
            <li>2023-06-20 - City B</li>
            <li>2023-07-05 - City C</li>
        </ul>
    </div>
    <div class="booking">
        <h2>Booking</h2>
        <p>Email: m_b_booking@ southern soul dot com</p>
    </div>
</body>
</html>
