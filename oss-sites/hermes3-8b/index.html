<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEINOM Copilot</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #333; }
        input, button { font-size: 16px; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>VEINOM Copilot - Web Onboarding</h1>
    
    <form id="onboardForm">
        <input type="text" id="nameInput" placeholder="Your Name" required>
        
        <input type="email" id="emailInput" placeholder="Your Email" required>
        
        <input type="password" id="passInput" placeholder="Choose a Password" required>
        
        <button type="submit">Sign Up</button>
    </form>

    <div id="message" class="error"></div>

    <script>
        document.getElementById('onboardForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var name = document.getElementById('nameInput').value;
            var email = document.getElementById('emailInput').value;  
            var password = document.getElementById('passInput').value;

            if (name && email && password) {
                // Perform server-side validation and registration
                
                alert("Welcome, " + name + "! Your account has been created.");
                
                // Redirect to login page or dashboard
                window.location.href = 'login.html';
            } else {
                document.getElementById('message').innerText = "Please fill out all fields correctly.";
            }
        });
    </script>
</body>
</html>
