<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XLRD TUI / AUA Inject Cookbook</title>
<link rel="stylesheet" href="/xlrd-org/styles.css" onerror="this.remove()">
<style>
body{background:#000;color:#fff;font-family:Inter,sans-serif;max-width:900px;margin:0 auto;padding:32px;line-height:1.6}
h1,h2,h3{font-family:Figtree,sans-serif}
h1{font-size:42px;margin-bottom:4px}
h2{font-size:26px;margin-top:48px;border-bottom:1px solid #333;padding-bottom:8px}
h3{font-size:18px;margin-top:24px;color:#ccc}
code,pre{font-family:'JetBrains Mono',monospace;background:#111;color:#9cf}
pre{padding:14px;border-radius:4px;overflow-x:auto;border-left:2px solid #555}
code{padding:2px 6px;font-size:14px}
table{border-collapse:collapse;margin:14px 0;width:100%}
th,td{border:1px solid #333;padding:10px 14px;text-align:left}
th{background:#0a0a0a}
a{color:#9cf}
hr{border:0;border-top:1px solid #222;margin:32px 0}
blockquote{border-left:3px solid #555;padding-left:14px;color:#aaa;margin:14px 0}
</style>
</head>
<body>
<div id="content">Loading cookbook…</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
fetch('index.md').then(r=>r.text()).then(md=>{document.getElementById('content').innerHTML=marked.parse(md)});
</script>
</body>
</html>
