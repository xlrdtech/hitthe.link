<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"/>
<title>hitthe.link — Connect</title>
<link rel="manifest" href="../manifest.webmanifest"/>
<meta name="theme-color" content="#0b1020"/>
<style>
  :root{ --bg:#0b1020; --card:rgba(255,255,255,.06); --line:rgba(255,255,255,.10); --txt:#fff; --dim:rgba(255,255,255,.6); --grn:#30d158; --acc:#2f8cff; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:radial-gradient(120% 120% at 50% -10%,#15213f 0%,#0b1020 55%,#070a14 100%);color:var(--txt);
    font:400 16px/1.45 -apple-system,system-ui,"Segoe UI",sans-serif;min-height:100%}
  body{padding:calc(env(safe-area-inset-top,0px) + 22px) 18px calc(env(safe-area-inset-bottom,0px) + 40px);max-width:680px;margin:0 auto}
  h1{font-size:26px;font-weight:700;margin:2px 0 2px;letter-spacing:-.02em}
  .sub{color:var(--dim);font-size:14px;margin-bottom:22px}
  .sub b{color:#fff;font-weight:600}
  /* login gate */
  #gate{display:flex;flex-direction:column;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px}
  #gate input{background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:12px;padding:14px 16px;color:#fff;font-size:17px;outline:0}
  .btn{all:unset;cursor:pointer;text-align:center;background:var(--acc);color:#fff;font-weight:600;font-size:16px;padding:14px;border-radius:12px;transition:filter .15s}
  .btn:active{filter:brightness(.85)}
  .btn.ghost{background:rgba(255,255,255,.10)}
  .err{color:#ff6b6b;font-size:14px;min-height:18px}
  /* grid */
  #cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:transform .12s,border-color .15s}
  .card:active{transform:scale(.97)}
  .ico{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;
    box-shadow:0 6px 16px -6px var(--c),inset 0 1px 0 rgba(255,255,255,.3);background:linear-gradient(150deg,color-mix(in srgb,var(--c) 92%,#fff 8%),color-mix(in srgb,var(--c) 70%,#000 30%))}
  .nm{font-weight:600;font-size:16px}
  .badge{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
  .badge.on .dot{background:var(--grn);box-shadow:0 0 8px var(--grn)} .badge.on{color:var(--grn)}
  .badge.off .dot{background:#ff6b6b} .badge.off{color:#ff8a8a}
  /* panel */
  #panel{position:fixed;inset:0;z-index:40;background:rgba(8,10,20,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;
    padding:calc(env(safe-area-inset-top,0px) + 14px) 16px calc(env(safe-area-inset-bottom,0px) + 14px)}
  #panel.open{transform:translateY(0)}
  .ptop{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .ptop .ico{width:38px;height:38px;font-size:15px;border-radius:11px}
  .ptop .nm{font-size:19px;flex:1}
  .pclose{all:unset;cursor:pointer;color:var(--acc);font-weight:600;font-size:16px;padding:6px 4px}
  .quick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .chip{all:unset;cursor:pointer;background:rgba(255,255,255,.10);border:1px solid var(--line);color:#fff;font-size:13px;font-weight:600;padding:8px 13px;border-radius:999px}
  .chip:active{background:rgba(255,255,255,.2)}
  #log{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:6px 2px}
  .msg{max-width:86%;padding:9px 13px;border-radius:15px;font-size:14.5px;white-space:pre-wrap;word-break:break-word}
  .msg.bot{align-self:flex-start;background:rgba(255,255,255,.10);border-bottom-left-radius:5px}
  .msg.me{align-self:flex-end;background:var(--acc);border-bottom-right-radius:5px}
  .msg.sys{align-self:center;color:var(--dim);font-size:12.5px;background:transparent;text-align:center}
  .msg img{max-width:248px;width:62vw;border-radius:12px;display:block;background:#fff;padding:8px}
  .qrhint{align-self:center;color:var(--grn);font-size:13px;font-weight:600;margin:2px 0}
  .pin{display:flex;gap:8px;margin-top:10px}
  .pin textarea,.pin input{flex:1;background:rgba(0,0,0,.35);border:1px solid var(--line);border-radius:12px;color:#fff;font-size:15px;padding:12px;outline:0;resize:none;font-family:inherit}
  .send{all:unset;cursor:pointer;background:var(--acc);color:#fff;font-weight:600;border-radius:12px;padding:0 18px;display:flex;align-items:center}
  .foot{color:var(--dim);font-size:12px;text-align:center;margin-top:24px;line-height:1.6}
  .foot a{color:var(--acc);text-decoration:none}
  .hide{display:none!important}
</style>
</head>
<body>
  <h1>Connect</h1>
  <div class="sub" id="who">Link your messaging accounts to <b>hitthe.link</b>.</div>

  <div id="gate">
    <div style="font-weight:600">Unlock your hub</div>
    <input id="pw" type="password" inputmode="numeric" placeholder="Homeserver passcode" autocomplete="current-password"/>
    <button class="btn" id="go">Unlock</button>
    <div class="err" id="gerr"></div>
  </div>

  <div id="cards" class="hide"></div>

  <div id="panel">
    <div class="ptop">
      <span class="ico" id="p-ico" style="--c:#2f8cff"></span>
      <span class="nm" id="p-nm"></span>
      <button class="pclose" id="p-x">Done</button>
    </div>
    <div class="quick" id="p-quick"></div>
    <div id="log"></div>
    <div class="qrhint hide" id="p-hint"></div>
    <div class="pin">
      <textarea id="p-in" rows="1" placeholder="Type a reply to the bot…"></textarea>
      <button class="send" id="p-send">Send</button>
    </div>
  </div>

  <div class="foot" id="foot"></div>

<script>
const HS='https://matrix.xlrd.org', LS=localStorage;
let TOKEN=LS.getItem('htlmx_token')||'', UID=LS.getItem('htlmx_uid')||'';
const $=s=>document.querySelector(s);

const NETS=[
  {k:'whatsapp', n:'WhatsApp',     mxid:'@whatsappbot:mymatrix.local', c:'#25d366', quick:['login qr','login phone','list-logins'], how:'Open WhatsApp → Settings → Linked Devices → Link a Device, then scan the QR.'},
  {k:'telegram', n:'Telegram',     mxid:'@telegrambot:mymatrix.local', c:'#229ed9', quick:['login qr','login phone','list-logins'], how:'Telegram → Settings → Devices → Link Desktop Device, then scan the QR.'},
  {k:'discord',  n:'Discord',      mxid:'@discordbot:mymatrix.local',  c:'#5865f2', quick:['login qr','login-qr','help'],          how:'Discord mobile → scan the QR from the login screen.'},
  {k:'gvoice',   n:'Google Voice', mxid:'@gvoicebot:mymatrix.local',   c:'#1a73e8', quick:['login','help'],                        how:'Sign in at voice.google.com, then paste your cookies JSON or a “Copy as cURL” from devtools below.'},
  {k:'meta',     n:'Messenger / IG',mxid:'@metabot:mymatrix.local',    c:'#e1306c', quick:['login','help'],                        how:'Choose Facebook or Instagram, then paste cookies / scan as prompted.'},
  {k:'slack',    n:'Slack',        mxid:'@slackbot:mymatrix.local',    c:'#4a154b', quick:['login','help'],                        how:'Paste your Slack token (xoxc-…) and cookie (xoxd-…) as the bot prompts.'},
  {k:'linkedin', n:'LinkedIn',     mxid:'@linkedinbot:mymatrix.local', c:'#0a66c2', quick:['login','help'],                        how:'Paste your LinkedIn cookies (li_at) as the bot prompts.'},
];
const initials=n=>n.replace(/[^A-Za-z0-9 ]/g,' ').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
const enc=r=>encodeURIComponent(r).replace(/!/g,'%21');

async function api(method,path,body){
  const h={'Content-Type':'application/json'}; if(TOKEN) h.Authorization='Bearer '+TOKEN;
  const r=await fetch(HS+path,{method,headers:h,body:body?JSON.stringify(body):undefined});
  const t=await r.text(); let j={}; try{j=JSON.parse(t)}catch{}
  if(!r.ok) throw Object.assign(new Error((j&&j.error)||('HTTP '+r.status)),{code:r.status,data:j});
  return j;
}
async function login(pw){
  const j=await api('POST','/_matrix/client/v3/login',{type:'m.login.password',identifier:{type:'m.id.user',user:'qi'},password:pw});
  TOKEN=j.access_token; UID=j.user_id; LS.setItem('htlmx_token',TOKEN); LS.setItem('htlmx_uid',UID);
}
// IMPORTANT: mautrix bridges only consume interactive login input (cookies/QR) in the
// bot's MANAGEMENT room (the first DM, greeted "marked as your management room").
// A fresh DM silently drops the step input — so we must find & reuse the management room.
async function dmRoom(net){
  const key='htlmx_room_'+net.k; const cached=LS.getItem(key);
  if(cached){ try{ await api('GET',`/_matrix/client/v3/rooms/${enc(cached)}/state/m.room.create/`); return cached; }catch{ LS.removeItem(key); } }
  // gather candidate DM rooms with this bot (m.direct first, then joined-rooms scan)
  let cands=[];
  try{ const dm=await api('GET',`/_matrix/client/v3/user/${encodeURIComponent(UID)}/account_data/m.direct`); cands=(dm[net.mxid]||[]).slice(); }catch{}
  if(!cands.length){
    try{ const jr=await api('GET','/_matrix/client/v3/joined_rooms');
      for(const rid of (jr.joined_rooms||[])){ try{ const m=await api('GET',`/_matrix/client/v3/rooms/${enc(rid)}/joined_members`); if(m.joined&&m.joined[net.mxid]&&Object.keys(m.joined).length<=2) cands.push(rid);}catch{} } }catch{}
  }
  // prefer the room marked as the management room
  for(const rid of cands){
    try{ const t=await api('GET',`/_matrix/client/v3/rooms/${enc(rid)}/messages?dir=f&limit=20`);
      if((t.chunk||[]).some(e=>((e.content&&e.content.body)||'').includes('management room'))){ LS.setItem(key,rid); return rid; } }catch{}
  }
  if(cands.length){ LS.setItem(key,cands[0]); return cands[0]; }
  // none exist yet -> creating the first DM makes it the management room
  const j=await api('POST','/_matrix/client/v3/createRoom',{invite:[net.mxid],is_direct:true,preset:'trusted_private_chat'});
  LS.setItem(key,j.room_id); return j.room_id;
}
async function send(rid,text){ return api('PUT',`/_matrix/client/v3/rooms/${enc(rid)}/send/m.room.message/m${Date.now()}`,{msgtype:'m.text',body:text}); }
async function timeline(rid){
  const j=await api('GET',`/_matrix/client/v3/rooms/${enc(rid)}/messages?dir=b&limit=24`);
  return (j.chunk||[]).filter(e=>e.type==='m.room.message');
}
async function mediaUrl(mxc){
  const p=mxc.replace('mxc://','').split('/');
  let r=await fetch(`${HS}/_matrix/client/v1/media/download/${p[0]}/${p[1]}`,{headers:{Authorization:'Bearer '+TOKEN}});
  if(!r.ok) r=await fetch(`${HS}/_matrix/media/v3/download/${p[0]}/${p[1]}`,{headers:{Authorization:'Bearer '+TOKEN}});
  return URL.createObjectURL(await r.blob());
}

/* ---------- UI ---------- */
function showApp(){
  $('#gate').classList.add('hide'); $('#cards').classList.remove('hide');
  $('#who').innerHTML=`Signed in as <b>${UID}</b> · tap a network to link.`;
  $('#foot').innerHTML=`Your homeserver: matrix.xlrd.org · 7 bridges on Nitro · <a href="#" id="logout">sign out</a>`;
  $('#logout').onclick=e=>{e.preventDefault();LS.removeItem('htlmx_token');location.reload();};
  renderCards();
}
function renderCards(){
  $('#cards').innerHTML=NETS.map(x=>`
    <div class="card" data-k="${x.k}">
      <span class="ico" style="--c:${x.c}">${initials(x.n)}</span>
      <span class="nm">${x.n}</span>
      <span class="badge" id="b-${x.k}"><span class="dot"></span><span>tap to connect</span></span>
    </div>`).join('');
  document.querySelectorAll('.card').forEach(c=>c.onclick=()=>openPanel(c.dataset.k));
}

let CUR=null, POLL=null, SEENQR=null;
function openPanel(k){
  const net=NETS.find(x=>x.k===k); CUR=net; SEENQR=null;
  $('#p-ico').style.setProperty('--c',net.c); $('#p-ico').textContent=initials(net.n); $('#p-nm').textContent=net.n;
  $('#p-quick').innerHTML=net.quick.map(q=>`<button class="chip" data-q="${q}">${q}</button>`).join('');
  $('#p-quick').querySelectorAll('.chip').forEach(b=>b.onclick=()=>doSend(b.dataset.q));
  $('#log').innerHTML=`<div class="msg sys">${net.how}</div><div class="msg sys">opening management room…</div>`;
  $('#p-hint').classList.add('hide'); $('#p-in').value='';
  $('#panel').classList.add('open');
  dmRoom(net).then(async rid=>{
    net.rid=rid; await refresh(); POLL=setInterval(refresh,2800);
    // wait for the bridge bot to actually join the room, then auto-start login once
    const joined=await waitBotJoin(net);
    const lg=$('#log');
    const already = lg.querySelector('.msg img') || /logged in|connected as/i.test(lg.textContent);
    if(joined && !already && /^login/.test(net.quick[0])){
      $('#log').insertAdjacentHTML('beforeend','<div class="msg sys">starting '+net.quick[0]+'…</div>');
      doSend(net.quick[0]);
    } else if(!joined){
      $('#log').insertAdjacentHTML('beforeend','<div class="msg sys">bot is waking up — tap a button below if nothing appears.</div>');
    }
  }).catch(e=>$('#log').innerHTML=`<div class="msg sys">error: ${e.message}</div>`);
}
async function waitBotJoin(net){
  for(let i=0;i<10;i++){
    try{ const j=await api('GET',`/_matrix/client/v3/rooms/${enc(net.rid)}/joined_members`); if(j.joined && j.joined[net.mxid]) return true; }catch{}
    await new Promise(r=>setTimeout(r,1500));
  }
  return false;
}
function closePanel(){ $('#panel').classList.remove('open'); clearInterval(POLL); POLL=null; CUR=null; }
$('#p-x').onclick=closePanel;

async function refresh(){
  if(!CUR||!CUR.rid) return;
  let evs; try{ evs=await timeline(CUR.rid); }catch{ return; }
  evs=evs.slice().reverse(); // oldest→newest
  const log=$('#log'); const atBottom=log.scrollHeight-log.scrollTop-log.clientHeight<60;
  log.innerHTML='';
  let qrSeen=false, success=false;
  for(const e of evs){
    const c=e.content||{}, mine=e.sender===UID, mt=c.msgtype;
    if(mt==='m.image' && c.url){
      qrSeen=true; const d=document.createElement('div'); d.className='msg bot';
      const img=document.createElement('img'); img.alt='QR'; d.appendChild(img); log.appendChild(d);
      mediaUrl(c.url).then(u=>img.src=u).catch(()=>{});
    } else {
      const body=(c.body||'').trim(); if(!body) continue;
      if(/successfully logged in|already logged in|login successful|connected as|logged in as/i.test(body)) success=true;
      const d=document.createElement('div'); d.className='msg '+(mine?'me':(mt==='m.notice'||e.sender!==UID?'bot':'bot'));
      d.textContent=body; log.appendChild(d);
    }
  }
  const hint=$('#p-hint');
  if(success){ hint.textContent='✅ Connected'; hint.classList.remove('hide'); setBadge(CUR.k,true); }
  else if(qrSeen){ hint.textContent='📷 Scan this QR with '+CUR.n; hint.classList.remove('hide'); }
  else hint.classList.add('hide');
  if(atBottom) log.scrollTop=log.scrollHeight;
}
function setBadge(k,on){ const b=$('#b-'+k); if(!b)return; b.className='badge '+(on?'on':'off'); b.lastChild.textContent=on?'connected':'not linked'; }

async function doSend(text){
  if(!CUR||!CUR.rid||!text.trim()) return;
  try{ await send(CUR.rid,text.trim()); $('#p-in').value=''; setTimeout(refresh,700); setTimeout(refresh,2200); }
  catch(e){ const d=document.createElement('div');d.className='msg sys';d.textContent='send failed: '+e.message;$('#log').appendChild(d); }
}
$('#p-send').onclick=()=>doSend($('#p-in').value);
$('#p-in').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend($('#p-in').value);} });

/* ---------- gate ---------- */
async function tryUnlock(){
  const pw=$('#pw').value; if(!pw){return;} $('#gerr').textContent='';
  try{ await login(pw); showApp(); }
  catch(e){ $('#gerr').textContent = e.code===403?'Wrong passcode.':('Login error: '+e.message); }
}
$('#go').onclick=tryUnlock;
$('#pw').addEventListener('keydown',e=>{ if(e.key==='Enter') tryUnlock(); });

/* boot: if we have a token, validate it */
(async()=>{
  if(TOKEN){
    try{ const w=await api('GET','/_matrix/client/v3/account/whoami'); UID=w.user_id; showApp(); return; }
    catch{ LS.removeItem('htlmx_token'); }
  }
})();
</script>
</body>
</html>
