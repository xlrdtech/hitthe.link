<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VVSVEI — live</title>
<style>
  :root{--bg:#0a0c10;--card:#141821;--ink:#e8edf4;--mut:#7d8794;--accent:#1fb866;--line:#222a35;--warn:#e0a13a;--red:#e0483d;--blue:#2f7df6}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);background:#0d1016;position:sticky;top:0}
  .brand{font-weight:800;letter-spacing:.04em}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--red);box-shadow:0 0 8px currentColor;transition:.3s}
  .dot.live{background:var(--accent)} .dot.reconnect{background:var(--warn)}
  #status{font:600 12px/1 ui-monospace,monospace;color:var(--mut)}
  #miss{margin-left:auto;font:600 11px/1 ui-monospace,monospace;color:var(--mut)}
  #feed{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
  .ev{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:10px;padding:10px 13px;animation:in .25s ease}
  .ev .meta{font:600 10px/1.2 ui-monospace,monospace;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .ev .txt{font-size:15px;line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .ev.vision{border-left-color:var(--blue)}.ev.sms{border-left-color:var(--warn)}
  /* injections (in:/typed:/aua:/sms:) — qi's tagged inputs */
  .ev.inject{border-left-color:var(--blue)}
  /* one-voice replies (xen-out) */
  .ev.reply{border-left-color:var(--accent)}
  /* terminal lines — distinct monospace block, tight, dimmer */
  .ev.term{background:#06080c;border-color:#10202a;border-left-color:#2f7df6;padding:6px 11px;border-radius:6px;margin:0}
  .ev.term .meta{color:#3f6b86;margin-bottom:2px}
  .ev.term .txt{font:13px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;color:#7fc7a6;white-space:pre-wrap}
  /* collapse consecutive terminal lines into one visual stream */
  .ev.term + .ev.term{border-top:0;border-top-left-radius:0;border-top-right-radius:0;margin-top:-10px;padding-top:2px}
  .ev.term + .ev.term .meta{display:none}
  .ev.term.run-start{margin-top:0;border-top-left-radius:6px;border-top-right-radius:6px}
  @keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .empty{color:var(--mut);text-align:center;margin-top:40px;font-size:14px}
  footer{padding:8px 16px;border-top:1px solid var(--line);font:500 11px/1.3 ui-monospace,monospace;color:var(--mut);text-align:center}
  /* in-browser voice: liquid-glass controls, fixed top-right */
  #voicebar{position:fixed;top:10px;right:12px;z-index:50;display:flex;align-items:center;gap:8px}
  .glass{-webkit-backdrop-filter:blur(14px) saturate(160%);backdrop-filter:blur(14px) saturate(160%);background:rgba(20,24,33,.55);border:1px solid rgba(255,255,255,.14);box-shadow:0 4px 20px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.10);border-radius:999px;color:var(--ink);font:700 13px/1 -apple-system,"Segoe UI",Roboto,sans-serif;padding:10px 16px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:7px}
  .glass:hover{background:rgba(31,184,102,.22);border-color:rgba(31,184,102,.5)}
  #enableVoice.on{background:rgba(31,184,102,.28);border-color:rgba(31,184,102,.6)}
  #muteBtn{padding:10px 13px}
  .devsel{padding:8px 12px;max-width:140px;font:600 12px/1 -apple-system,"Segoe UI",sans-serif;appearance:none;-webkit-appearance:none}
  .devsel option{background:#141821;color:var(--ink)}
  #speaking{display:none;align-items:center;gap:6px;font:600 11px/1 ui-monospace,monospace;color:var(--accent)}
  #speaking.show{display:flex}
  #speaking .bars{display:inline-flex;gap:2px;height:12px;align-items:flex-end}
  #speaking .bars i{width:3px;background:var(--accent);border-radius:1px;animation:sb .8s ease-in-out infinite}
  #speaking .bars i:nth-child(2){animation-delay:.15s}#speaking .bars i:nth-child(3){animation-delay:.3s}
  @keyframes sb{0%,100%{height:3px}50%{height:12px}}
  /* qi 2026-06-16 action pills per message */
  .ev .pills{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .pill{-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--mut);font:600 11px/1 ui-monospace,monospace;padding:5px 10px;border-radius:999px;cursor:pointer;text-decoration:none;transition:.15s}
  .pill:hover{background:rgba(31,184,102,.18);border-color:rgba(31,184,102,.5);color:var(--ink)}
  .pill.p-call{color:var(--accent);border-color:rgba(31,184,102,.4)}
  /* reply compose bar */
  #replybar{display:none;flex-direction:column;gap:6px;padding:10px 16px;border-top:1px solid var(--line);background:#0d1016}
  #replybar.show{display:flex}
  #replyquote{font:500 11px/1.3 ui-monospace,monospace;color:var(--mut);border-left:2px solid var(--accent);padding-left:8px;max-height:42px;overflow:hidden}
  #replyrow{display:flex;gap:8px}
  #replyinput{flex:1;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 12px;font-size:14px}
  #replysend{background:var(--accent);border:0;color:#04110a;font-weight:800;border-radius:8px;padding:0 16px;cursor:pointer}
  #replycancel{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:0 12px;cursor:pointer}
</style>
</head>
<body>
<header>
  <span class="dot" id="dot"></span><span class="brand">VVSVEI</span>
  <span id="status">connecting…</span><span id="miss">0 events</span>
</header>
<div id="voicebar">
  <span id="speaking"><span class="bars"><i></i><i></i><i></i></span>speaking…</span>
  <button id="enableVoice" class="glass" title="Hear Xen's voice in this browser">🔊 Enable Voice</button>
  <button id="muteBtn" class="glass" title="Mute / unmute Xen's voice" style="display:none">🔈</button>
  <select id="inDev" class="glass devsel" title="Microphone (input)"><option value="">🎤 Input</option></select>
  <select id="outDev" class="glass devsel" title="Speaker (output)"><option value="">🔊 Output</option></select>
  <button id="hardRefresh" class="glass" title="Hard refresh — reload latest, bypass cache">↻ Refresh</button>
</div>
<div id="feed"><div class="empty" id="empty">Waiting for the backlog + live stream…</div></div>
<div id="replybar">
  <div id="replyquote"></div>
  <div id="replyrow">
    <input id="replyinput" placeholder="Reply to Xen…" autocomplete="off">
    <button id="replysend">Send</button>
    <button id="replycancel">✕</button>
  </div>
</div>
<footer>lossless · Redis-Streams relay · replays backlog on every (re)connect — nothing missed</footer>

<script>
/* Durable lossless realtime VVS feed — reads the Railway relay's SSE (Redis Streams backed). */
const RELAY = "https://xen-vvs-relay-production.up.railway.app";  // VVSVEI scope (separate from TrackingTogether)
const feed=document.getElementById('feed'), empty=document.getElementById('empty');
const dot=document.getElementById('dot'), statusEl=document.getElementById('status'), missEl=document.getElementById('miss');
let lastId='0', count=0;

/* ---------- in-browser voice (window.speechSynthesis) ---------- */
const synth = window.speechSynthesis;
const PAGE_LOAD_TS = Date.now();          // de-dupe: never speak backlog older than this open
let voiceEnabled = localStorage.getItem('vvsvei.voice') === '1';
let muted = localStorage.getItem('vvsvei.muted') === '1';
let chosenVoice = null;
const spokenIds = new Set();              // belt-and-suspenders id de-dupe
const enableBtn = document.getElementById('enableVoice');
const muteBtn   = document.getElementById('muteBtn');
const speakingEl= document.getElementById('speaking');

function pickVoice(){
  if(!synth) return;
  const vs = synth.getVoices();
  if(!vs.length) return;
  // prefer a clear English voice; common good defaults across platforms
  const pref = ['Samantha','Google US English','Microsoft Aria Online (Natural) - English (United States)','Microsoft Zira','Karen','Daniel'];
  chosenVoice = pref.map(n=>vs.find(v=>v.name===n)).find(Boolean)
             || vs.find(v=>/^en[-_]US/i.test(v.lang))
             || vs.find(v=>/^en/i.test(v.lang)) || vs[0];
}
if(synth){ pickVoice(); synth.onvoiceschanged = pickVoice; }

function reflectUI(){
  enableBtn.classList.toggle('on', voiceEnabled);
  enableBtn.innerHTML = voiceEnabled ? '🔊 Voice On' : '🔊 Enable Voice';
  muteBtn.style.display = voiceEnabled ? 'flex' : 'none';
  muteBtn.textContent = muted ? '🔇' : '🔈';
  muteBtn.title = muted ? 'Unmute Xen' : 'Mute Xen';
}
function showSpeaking(on){ speakingEl.classList.toggle('show', on); }

function speak(text){
  if(!synth || !voiceEnabled || muted || !text) return;
  try{
    const u = new SpeechSynthesisUtterance(text);
    if(chosenVoice){ u.voice=chosenVoice; u.lang=chosenVoice.lang; }
    u.rate=1.0; u.pitch=1.0; u.volume=1.0;
    u.onstart=()=>showSpeaking(true);
    u.onend=()=>{ if(!synth.speaking&&!synth.pending) showSpeaking(false); };
    u.onerror=()=>showSpeaking(false);
    synth.speak(u);
  }catch{}
}

enableBtn.addEventListener('click', ()=>{
  voiceEnabled = !voiceEnabled;
  localStorage.setItem('vvsvei.voice', voiceEnabled?'1':'0');
  if(voiceEnabled && synth){
    pickVoice();
    // prime: a short utterance inside the user gesture unlocks autoplay
    try{ const p=new SpeechSynthesisUtterance(' '); p.volume=0.01; synth.speak(p); }catch{}
  } else if(synth){ synth.cancel(); showSpeaking(false); }
  reflectUI();
});
muteBtn.addEventListener('click', ()=>{
  muted = !muted;
  localStorage.setItem('vvsvei.muted', muted?'1':'0');
  if(muted && synth){ synth.cancel(); showSpeaking(false); }
  reflectUI();
});
reflectUI();

function setState(s){ dot.className='dot '+(s==='live'?'live':s==='reconnect'?'reconnect':''); statusEl.textContent=s==='live'?'LIVE':s==='reconnect'?'reconnecting…':'offline'; }
let lastTermPane=null;
function classify(kind){
  const k=String(kind||'xen-out');
  if(k.startsWith('term:')) return {cls:'term', label:'⌗ '+k, pane:k};
  if(k==='xen-out'||k==='xen-reply-vvs') return {cls:'reply', label:'xen ▸ reply', pane:null};
  if(k==='xen-dictate-in') return {cls:'inject', label:'inject', pane:null};
  return {cls:k.replace(/[^a-z0-9]+/gi,'-'), label:k, pane:null};
}
function render(ev){
  if(empty&&empty.parentNode) empty.remove();
  const c=classify(ev.kind);
  const d=document.createElement('div'); d.className='ev '+c.cls;
  // collapse a run of consecutive lines from the SAME terminal pane into one block
  if(c.cls==='term'){ if(c.pane!==lastTermPane) d.classList.add('run-start'); lastTermPane=c.pane; }
  else lastTermPane=null;
  const t=new Date(+ev.ts||Date.now()).toLocaleTimeString();
  d.innerHTML=`<div class="meta">${c.label} · ${t}</div><div class="txt"></div>`+
    `<div class="pills"><button class="pill p-copy">Copy</button>`+
    `<button class="pill p-reply">Reply</button>`+
    `<button class="pill p-share">Share</button>`+
    `<a class="pill p-call" href="tel:+14703696463">Call</a></div>`;
  d.querySelector('.txt').textContent=ev.text||'';
  // qi 2026-06-16 action pills: Copy / Reply / Share / Call per message
  const _txt = ev.text||'';
  d.querySelector('.p-copy').onclick=()=>{ navigator.clipboard?.writeText(_txt); flashPill(d.querySelector('.p-copy'),'Copied'); };
  d.querySelector('.p-share').onclick=()=>{ if(navigator.share){navigator.share({text:_txt}).catch(()=>{});} else {navigator.clipboard?.writeText(_txt); flashPill(d.querySelector('.p-share'),'Copied');} };
  d.querySelector('.p-reply').onclick=()=>replyTo(_txt, c.label);
  feed.appendChild(d); feed.scrollTop=feed.scrollHeight;
  count++; missEl.textContent=count+' events';

  // ---- speak ONLY Xen's voice (xen-out), only if NEW since this page opened ----
  if(c.cls==='reply'){
    const ts = +ev.ts || 0;
    const id = ev.id || ev.ts || ev.text;
    const isNew = (ts ? ts >= PAGE_LOAD_TS : false) && !spokenIds.has(id);
    if(isNew){ spokenIds.add(id); speak(ev.text); }
  }
}
/* ---- qi 2026-06-16 hard-refresh button: force latest, bypass cache ---- */
document.getElementById('hardRefresh').onclick=()=>{
  try{ if('caches' in window) caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))); }catch{}
  const u=new URL(location.href); u.searchParams.set('hardrefresh', Date.now());
  location.replace(u.toString());
};

/* ---- qi 2026-06-16 audio device dropdowns (input mic + output speaker) ---- */
const inDev=document.getElementById('inDev'), outDev=document.getElementById('outDev');
let savedIn=localStorage.getItem('vvsvei.inDev')||'', savedOut=localStorage.getItem('vvsvei.outDev')||'';
async function loadDevices(){
  if(!navigator.mediaDevices?.enumerateDevices) return;
  try{
    const devs=await navigator.mediaDevices.enumerateDevices();
    const fill=(sel,kind,saved,emoji)=>{
      const cur=sel.value; sel.innerHTML=`<option value="">${emoji} Default</option>`;
      devs.filter(d=>d.kind===kind).forEach(d=>{ const o=document.createElement('option'); o.value=d.deviceId; o.textContent=(d.label||kind)+''; sel.appendChild(o); });
      if(saved) sel.value=saved; else sel.value=cur;
    };
    fill(inDev,'audioinput',savedIn,'🎤'); fill(outDev,'audiooutput',savedOut,'🔊');
  }catch(e){}
}
inDev.onchange=()=>{ savedIn=inDev.value; localStorage.setItem('vvsvei.inDev',savedIn); };
outDev.onchange=async()=>{ savedOut=outDev.value; localStorage.setItem('vvsvei.outDev',savedOut); applySink(); };
// route spoken TTS to chosen output: speechSynthesis can't setSinkId, so mirror via an <audio> sink when a specific output is picked
let _sinkAudio=null;
async function applySink(){
  if(!savedOut) return;
  try{ if(!_sinkAudio){ _sinkAudio=new Audio(); } if(_sinkAudio.setSinkId) await _sinkAudio.setSinkId(savedOut); }catch(e){}
}
navigator.mediaDevices?.addEventListener?.('devicechange', loadDevices);
loadDevices();

/* ---- qi 2026-06-16 action pills: flash + reply-compose ---- */
function flashPill(el,label){ if(!el) return; const o=el.textContent; el.textContent=label; el.style.color='var(--accent)'; setTimeout(()=>{el.textContent=o;el.style.color='';},1100); }
const replybar=document.getElementById('replybar'), replyquote=document.getElementById('replyquote'),
      replyinput=document.getElementById('replyinput'), replysend=document.getElementById('replysend'),
      replycancel=document.getElementById('replycancel');
let replyCtx='';
function replyTo(text,label){ replyCtx=text||''; replyquote.textContent='↪ '+label+': '+(text||'').slice(0,140); replybar.classList.add('show'); replyinput.focus(); }
function closeReply(){ replybar.classList.remove('show'); replyinput.value=''; replyCtx=''; }
replycancel.onclick=closeReply;
async function sendReply(){
  const msg=replyinput.value.trim(); if(!msg) return;
  // quoted reply -> emit to VVSVEI as a qi inject (tag in:) so it routes to Xen like any input
  const body={ kind:'in:', tag:'in:', source:'vvsvei-ui-reply',
               text: replyCtx ? ('[reply to: '+replyCtx.slice(0,120)+'] '+msg) : msg };
  replysend.disabled=true;
  try{ await fetch(`${RELAY}/emit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); flashPill(replysend,'Sent'); }
  catch(e){ flashPill(replysend,'Err'); }
  replysend.disabled=false; setTimeout(closeReply,500);
}
replysend.onclick=sendReply;
replyinput.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();sendReply();} if(e.key==='Escape')closeReply(); });

function connect(){
  // reconnect always resumes from lastId → backlog replay = nothing missed
  const es=new EventSource(`${RELAY}/sse?since=${encodeURIComponent(lastId)}`);
  es.onopen=()=>setState('live');
  es.onmessage=e=>{ if(e.lastEventId) lastId=e.lastEventId; try{render(JSON.parse(e.data))}catch{} };
  es.onerror=()=>{ setState('reconnect'); es.close(); setTimeout(connect,2000); };
}
setState('reconnect'); connect();
</script>
<script src="https://hitthe.link/lib/grid-autofix.js" defer></script>
</body>
</html>
