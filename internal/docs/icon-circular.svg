<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- qi 2026-05-17 8672: circular avatar variant of the Xenphone OS icon.
       Same glyph as icon.svg but clipped to a circle for chat/persona slots. -->
  <defs>
    <radialGradient id="cbg" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#102019"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <filter id="cglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="90" cy="90" r="89" fill="url(#cbg)" stroke="#00dc82" stroke-opacity="0.25" stroke-width="2"/>
  <g filter="url(#cglow)" stroke="#00dc82" stroke-width="14" stroke-linecap="round" fill="none">
    <path d="M48 48 L132 132"/>
    <path d="M132 48 L48 132"/>
  </g>
</svg>
