<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Padre Closer OS</title>
<meta name="description" content="Padre Sales Ops — live prospect command center. Tap to call, one-tap text, track the pipeline.">
<meta name="theme-color" content="#0a0c10">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0c10'/%3E%3Ctext y='.92em' x='14' font-size='62' font-family='monospace' font-weight='bold' fill='%23f2b705'%3EP%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0c10'/%3E%3Ctext y='.92em' x='14' font-size='62' font-family='monospace' font-weight='bold' fill='%23f2b705'%3EP%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10; --panel:#12161f; --panel-2:#171c27; --line:#232a38;
  --fg:#eef2f8; --mute:#8a93a6; --dim:#5a6376;
  --gold:#f2b705; --gold-soft:#f2b70522;
  --new:#5a6376; --called:#3b82f6; --noans:#f59e0b; --interested:#a855f7; --sent:#06b6d4; --closed:#22c55e;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--fg);font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{padding-bottom:60px}
.mono{font-family:'JetBrains Mono',monospace}
a{color:inherit;text-decoration:none}

/* atmosphere */
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(900px 500px at 85% -10%, #f2b70514, transparent 60%),radial-gradient(700px 500px at -10% 110%, #06b6d40f, transparent 60%)}

header{position:sticky;top:0;z-index:50;background:rgba(10,12,16,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.bar{max-width:980px;margin:0 auto;padding:14px 16px calc(14px + env(safe-area-inset-top,0))}
.brand{display:flex;align-items:center;gap:11px}
.logo{width:34px;height:34px;border-radius:9px;background:var(--gold);color:#0a0c10;display:grid;place-items:center;font-weight:900;font-size:20px;font-family:'JetBrains Mono',monospace;box-shadow:0 0 22px #f2b70555}
.brand h1{font-size:17px;font-weight:800;letter-spacing:-.02em;margin:0;line-height:1}
.brand .sub{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-top:3px}
.counts{display:flex;flex-wrap:wrap;gap:6px;margin-top:13px}
.chip{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;border-radius:50px;border:1px solid var(--line);background:var(--panel);color:var(--mute);cursor:pointer;transition:.15s;white-space:nowrap}
.chip:hover{border-color:var(--dim)}
.chip.on{background:var(--gold);color:#0a0c10;border-color:var(--gold);font-weight:700}
.chip b{font-weight:700;color:var(--fg)}
.chip.on b{color:#0a0c10}

main{max-width:980px;margin:0 auto;padding:18px 16px 40px}
.hint{font-size:12.5px;color:var(--dim);margin:2px 2px 16px;line-height:1.5}

.card{background:linear-gradient(168deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:18px;margin-bottom:14px;overflow:hidden;transition:.2s}
.card:hover{border-color:#2e3546}
.card.lead{border-color:#f2b70566;box-shadow:0 0 0 1px #f2b70522, 0 14px 40px -20px #f2b70533}
.top{padding:16px 16px 13px;display:flex;gap:13px;align-items:flex-start}
.idx{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);padding-top:3px;min-width:20px}
.who{flex:1;min-width:0}
.who h2{margin:0;font-size:18px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.flag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);border-radius:5px;padding:2px 6px}
.meta{font-size:13px;color:var(--mute);margin-top:4px}
.proof{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--closed);margin-top:7px;display:inline-flex;align-items:center;gap:6px;background:#22c55e14;border:1px solid #22c55e33;padding:3px 8px;border-radius:6px}
.statusbtn{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:9px;padding:8px 11px;cursor:pointer;color:#0a0c10;min-width:96px;text-align:center;transition:.15s}
.statusbtn:active{transform:scale(.95)}

.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 14px}
.act{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 8px;border-radius:11px;font-weight:700;font-size:14px;border:1px solid var(--line);background:var(--panel-2);cursor:pointer;transition:.15s}
.act:active{transform:scale(.96)}
.act.call{background:var(--gold);color:#0a0c10;border-color:var(--gold)}
.act.sms{background:#06b6d4;color:#03161a;border-color:#06b6d4}
.act svg{width:17px;height:17px}
.act small{font-size:9px;display:block;opacity:.7}

.expand{border-top:1px solid var(--line);padding:0 16px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease}
.card.open .expand{max-height:1400px;padding:16px}
.kit h3{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 7px}
.kit .block{margin-bottom:16px}
.kit p{margin:0;font-size:14px;line-height:1.6;color:#dde3ee}
.kit ul{margin:0;padding-left:18px}
.kit li{font-size:13.5px;line-height:1.55;margin-bottom:5px;color:#cdd5e3}
.obj{background:#0a0c1080;border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:8px}
.obj .q{font-weight:700;font-size:13px;color:var(--fg)}
.obj .a{font-size:13px;color:var(--mute);margin-top:4px;line-height:1.5}
.note{font-size:12.5px;color:var(--noans);background:#f59e0b14;border:1px solid #f59e0b33;border-radius:9px;padding:9px 12px;line-height:1.5}
.anchor{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);font-weight:700}
textarea{width:100%;background:#0a0c10;border:1px solid var(--line);border-radius:10px;color:var(--fg);font-family:'JetBrains Mono',monospace;font-size:13px;padding:10px;resize:vertical;min-height:62px;margin-top:4px}
textarea:focus{outline:none;border-color:var(--gold)}
.tapnote{font-size:11px;color:var(--dim);text-align:center;padding:6px 0 2px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gold);color:#0a0c10;font-weight:800;font-size:13px;padding:11px 20px;border-radius:50px;opacity:0;pointer-events:none;transition:.25s;z-index:99;box-shadow:0 10px 30px -8px #f2b70588}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
footer{text-align:center;color:var(--dim);font-size:11px;font-family:'JetBrains Mono',monospace;padding:20px;letter-spacing:.05em}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand">
      <div class="logo">P</div>
      <div><h1>Padre Closer OS</h1><div class="sub">Executive Leverage · Live Pipeline</div></div>
    </div>
    <div class="counts" id="counts"></div>
  </div>
</header>

<main>
  <div class="hint">Tap a card to open its call kit. <b style="color:var(--gold)">Call</b> dials · <b style="color:#06b6d4">Text</b> opens a pre-written message · tap the status chip to advance the deal. Everything saves on this device.</div>
  <div id="list"></div>
  <footer>Padre Sales Ops · 8 live prospects · hitthe.link/padre/close</footer>
</main>
<div class="toast" id="toast"></div>

<script>
const P = [
 {slug:'t-and-g-plumbing-locust-grove',name:'T&G Plumbing',trade:'Plumbing',city:'Locust Grove, GA',owner:'Tracy Harper',tel:'+16787825514',disp:'(678) 782-5514',lead:true,
  proof:'★ 4.3 · 72 Google reviews · BBB A+ since 2016 · 15+ yrs',
  opener:"Hi, is this Tracy or someone with T&G Plumbing? This is Padre with Executive Leverage — I noticed you've got 4.3 stars from 72 reviews and an A+ with the BBB, but no real website showing any of it.",
  bullets:["15+ years and an A+ BBB rating — that trust is your edge, but it's buried on Google. The site puts it front and center.","One tap to call you from any phone — plumbing is an emergency search, you can't lose that caller to a competitor.","Captures the job while you're on another call — every missed call is a customer someone else is winning."],
  objs:[{q:"I already stay busy on word of mouth.",a:"That's exactly what got you 72 reviews. The site catches the people who heard your name then Googled before calling — that's the slice you're not seeing."},{q:"$1,500 is a lot.",a:"One drain or water-heater job covers it. It pays for itself the first month it lands you a call you'd have missed."}],
  note:"Their Facebook is geo-tagged 'Zebulon' — confirm current service area on the call."},
 {slug:'promasters-automotive',name:'ProMasters Automotive',trade:'Auto Repair',city:'Stockbridge, GA',owner:'',tel:'+16787591623',disp:'(678) 759-1623',lead:true,
  proof:'★ 4.4 · 92 Google reviews',
  opener:"Hey, is this the owner of ProMasters Automotive? Padre here with Executive Leverage — 4.4 stars from 92 reviews is serious reputation, but you've got no website showing it off.",
  bullets:["92 reviews at 4.4 stars is social proof most shops can't match — right now it only lives on Google Maps.","'We service all makes & models' + click-to-call gets the searching driver to you, not the chain down the road.","A real site with your warranty in writing turns first-timers into repeat customers."],
  objs:[{q:"People already find me on Google.",a:"They find your pin — but a real site closes the ones comparing 3 shops. It's the difference between a click and a no-show."},{q:"I don't have time for a website.",a:"That's the point — we built it. Half an hour of your time to tweak it, then it's done and working for you."}],
  note:"BBB lists them not-accredited with 2 old complaints — harmless, just don't lead with BBB."},
 {slug:'coker-heating-air',name:'Coker Heating & Air',trade:'HVAC',city:'McDonough, GA',owner:'Elijah Coker',tel:'+17703499809',disp:'(770) 349-9809',lead:false,
  proof:'',
  opener:"Hi, is this Elijah? Padre with Executive Leverage — folks say you answer day or night and do great HVAC work, but there's nowhere online for a new customer to find and book you.",
  bullets:["HVAC is urgent — when someone's AC dies in July they search and call the first pro with a real presence. Right now that's not you.","A 24/7 click-to-call site means the panic-search at 9pm becomes your job, not a competitor's.","Space for a financing/tune-up offer turns browsers into booked appointments."],
  objs:[{q:"I get enough from referrals.",a:"Referrals still Google you before they call. A site closes the gap — and catches the emergency searches referrals never send you."},{q:"Sounds expensive.",a:"One install or major repair covers it several times over. It's a marketing asset you own outright."}],
  note:"Don't confuse with 'Coker Air & Heat' in Louisiana — different company."},
 {slug:'jjs-painting',name:"JJ's Painting Company",trade:'Painting',city:'Stockbridge, GA',owner:'',tel:'+16786075878',disp:'(678) 607-5878',lead:false,
  proof:'',
  opener:"Hey, is this the owner of JJ's Painting? Padre with Executive Leverage — you've got a solid local rep but no website, so I built you a sample to see what it'd look like.",
  bullets:["Painting is a 'show me your work' sale — a site with a gallery and a free-estimate button closes far more than a phone number alone.","Residential and commercial customers can self-select and request a quote instantly.","Puts you ahead of every painter in the area still running on just a Facebook page."],
  objs:[{q:"Word of mouth keeps me booked.",a:"It got you here — the site catches the homeowner who got your name but checks you out online first. That's pure added work."},{q:"Can I see it first?",a:"Absolutely — that's why I built the sample. Take 5 minutes, look it over, and if you like it we make it yours."}],
  note:"Don't confuse with the North-Georgia 'JJ's Painting' (different number)."},
 {slug:'warner-lawn-care-service-mcdonough',name:'Warner Lawn Care',trade:'Lawn Care',city:'McDonough, GA',owner:'Faith Warner',tel:'+16784109876',disp:'(678) 410-9876',lead:false,
  proof:'★ 4.7 on HomeAdvisor & Angi',
  opener:"Hi, is this Faith? Padre with Executive Leverage — you're rated 4.7 on HomeAdvisor and Angi, but there's no website of your own that pulls it all together.",
  bullets:["A 4.7 rating is great, but it's split across HomeAdvisor and Angi — your own site puts it in one place that's all yours.","'Get your weekends back' lands with homeowners — a clean site with a quote button books recurring service.","Recurring lawn customers are gold; a site makes signing them up effortless."],
  objs:[{q:"The directories already get me leads.",a:"They do — and they take a cut and rank you next to competitors. Your own site is leads with no middleman."},{q:"Is it worth it?",a:"A couple recurring accounts covers it, and those clients stay for years. It pays for itself fast."}],
  note:"Don't cite a review count — only the 4.7 rating is verified."},
 {slug:'kdc-electrical-services-stockbridge',name:'KDC Electrical',trade:'Electrical',city:'Stockbridge, GA',owner:'Kenny Camp',tel:'+14048676527',disp:'(404) 867-6527',lead:false,
  proof:'Highly rated locally · owner-operated',
  opener:"Hi, is this Kenny? Padre with Executive Leverage — you've got a strong local reputation as an electrician but no real website, so I put a sample together for KDC.",
  bullets:["Electrical is trust-and-safety — a clean licensed site reassures the homeowner before they ever call.","Naming the trade and town up top ('Licensed Electricians in Stockbridge') wins the local search.","A first-call offer turns a browser into a booked job."],
  objs:[{q:"I'm busy enough.",a:"Then this is about the bigger, better jobs — the ones that check you out online first and pick the pro who looks established."},{q:"What's the catch?",a:"No catch — you own it outright. Half down to start, the rest when it's live in your name."}],
  note:"GA license EN216813 may have lapsed (~Jun 2024) — confirm verbally; don't print a license # without his OK."},
 {slug:'bridges-fencing-locust-grove',name:'Bridges Fencing',trade:'Fencing',city:'Locust Grove, GA',owner:'Billy Bridges',tel:'+17709607300',disp:'(770) 960-7300',lead:false,
  proof:'Family-run since 1996 · ~30 years',
  opener:"Hi, is this Billy? Padre with Executive Leverage — Bridges Fencing has been around since '96, that's almost 30 years, but there's no website showing that kind of track record.",
  bullets:["30 years in business is a massive trust signal — it belongs at the top of a real website, not buried.","Fencing is a visual, by-material sale — a site with wood/vinyl/chain-link/aluminum sections + a quote form closes more.","Your old domain is dead; a fresh site recaptures everyone who searches your name."],
  objs:[{q:"I've done fine 30 years without one.",a:"No doubt — and the next 30 are won online. Younger homeowners search before they call; this puts your reputation where they're looking."},{q:"Too much hassle.",a:"Zero hassle on your end — it's built. You approve it, we publish it. Done."}],
  note:"Don't cite a star rating — only the since-1996 longevity is verified."},
 {slug:'tobaz-towing-jonesboro',name:'Tobaz Towing',trade:'Towing',city:'Jonesboro, GA',owner:'',tel:'+14049250858',disp:'(404) 925-0858',lead:false,
  proof:'FMCSA-licensed since ~2012',
  opener:"Hi, is this the owner of Tobaz Towing? Padre with Executive Leverage — you've been FMCSA-licensed and running since 2012, but your website's broken, so a stranded driver searching can't reach you.",
  bullets:["Towing is the ultimate emergency search — the driver calls the first working result. A fast site with your number up top is that result.","Your current site throws a security error — every visitor bounces. A clean one recaptures all of them.","24/7 'call now' framing + a fast-response promise converts the panic moment into your job."],
  objs:[{q:"Dispatch keeps me busy.",a:"This is the cash, no-contract calls — the stranded driver with no auto club who just needs someone now. That's the highest-margin tow you get."},{q:"My nephew can build one.",a:"Maybe — but is it built? Yours is done today, works on every phone, and won't throw the error your current one does."}],
  note:"Address is ambiguous (Walden Dr vs Fitzgerald Rd) — confirm exact location on the call."},
];

const STATUSES=['New','Called','No answer','Interested','Sent site','Closed'];
const SCOLOR={'New':'var(--new)','Called':'var(--called)','No answer':'var(--noans)','Interested':'var(--interested)','Sent site':'var(--sent)','Closed':'var(--closed)'};
const url=s=>'https://hitthe.link/padre/'+s+'/';
const k=s=>'padre_'+s;
const getState=s=>{try{return JSON.parse(localStorage.getItem(k(s)))||{}}catch(e){return{}}};
const setState=(s,o)=>localStorage.setItem(k(s),JSON.stringify(o));
let filter=null;

function smsBody(p){return encodeURIComponent("Hi"+(p.owner?(" "+p.owner.split(' ')[0]):"")+" — this is Padre with Executive Leverage. I built a website for "+p.name+" — take a look: "+url(p.slug)+" — got 5 minutes for me to walk you through it? Reply YES.");}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600);}

function advance(slug){const st=getState(slug);const i=STATUSES.indexOf(st.status||'New');st.status=STATUSES[(i+1)%STATUSES.length];setState(slug,st);render();}

function copyLink(s){navigator.clipboard.writeText(url(s)).then(()=>toast('Link copied'));}

function saveNote(slug,v){const st=getState(slug);st.note=v;setState(slug,st);}

function render(){
  const counts={};STATUSES.forEach(s=>counts[s]=0);
  P.forEach(p=>{counts[getState(p.slug).status||'New']++});
  const cbar=document.getElementById('counts');
  cbar.innerHTML='<span class="chip'+(filter===null?' on':'')+'" onclick="filter=null;render()">ALL <b>'+P.length+'</b></span>'+
    STATUSES.map(s=>'<span class="chip'+(filter===s?' on':'')+'" onclick="filter=(filter===\''+s+'\'?null:\''+s+'\');render()" style="'+(filter===s?'':'border-left:3px solid '+SCOLOR[s])+'">'+s+' <b>'+counts[s]+'</b></span>').join('');

  const list=document.getElementById('list');
  list.innerHTML=P.filter(p=>filter===null||(getState(p.slug).status||'New')===filter).map((p,i)=>{
    const st=getState(p.slug);const status=st.status||'New';
    return '<div class="card'+(p.lead?' lead':'')+'" id="c-'+p.slug+'">'+
      '<div class="top" onclick="toggle(\''+p.slug+'\')">'+
        '<div class="idx">'+String(i+1).padStart(2,'0')+'</div>'+
        '<div class="who"><h2>'+p.name+(p.lead?' <span class="flag">Top Lead</span>':'')+'</h2>'+
          '<div class="meta">'+p.trade+' · '+p.city+(p.owner?' · '+p.owner:'')+'</div>'+
          (p.proof?'<div class="proof">'+p.proof+'</div>':'')+
        '</div>'+
        '<button class="statusbtn" style="background:'+SCOLOR[status]+'" onclick="event.stopPropagation();advance(\''+p.slug+'\')">'+status+'</button>'+
      '</div>'+
      '<div class="actions">'+
        '<a class="act call" href="tel:'+p.tel+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>Call<small>'+p.disp+'</small></span></a>'+
        '<a class="act sms" href="sms:'+p.tel+'?&body='+smsBody(p)+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Text<small>pre-filled</small></span></a>'+
        '<button class="act" onclick="copyLink(\''+p.slug+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><span>Link<small>copy</small></span></button>'+
      '</div>'+
      '<div class="expand"><div class="kit">'+
        '<div class="block"><h3>Opener</h3><p>'+p.opener+'</p></div>'+
        '<div class="block"><h3>Why they need it</h3><ul>'+p.bullets.map(b=>'<li>'+b+'</li>').join('')+'</ul></div>'+
        '<div class="block"><h3>Objections</h3>'+p.objs.map(o=>'<div class="obj"><div class="q">“'+o.q+'”</div><div class="a">'+o.a+'</div></div>').join('')+'</div>'+
        '<div class="block"><h3>The ask</h3><p class="anchor">$1,500 — $750 to start, balance when it goes live in your name. Live in 48 hrs.</p></div>'+
        (p.note?'<div class="block"><h3>Confirm on call</h3><div class="note">'+p.note+'</div></div>':'')+
        '<div class="block"><h3>Notes</h3><textarea placeholder="Log the call..." oninput="saveNote(\''+p.slug+'\',this.value)">'+(st.note||'')+'</textarea></div>'+
        '<div class="tapnote">tap the header to collapse</div>'+
      '</div></div>'+
    '</div>';
  }).join('');
}
function toggle(slug){document.getElementById('c-'+slug).classList.toggle('open');}
render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
