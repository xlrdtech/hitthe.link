<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Elite Electric Solutions emblem">
  <defs>
    <linearGradient id="ees-bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD980"/>
      <stop offset="0.5" stop-color="#F5A623"/>
      <stop offset="1" stop-color="#D6850A"/>
    </linearGradient>
    <linearGradient id="ees-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13314f"/>
      <stop offset="1" stop-color="#0B1F33"/>
    </linearGradient>
    <radialGradient id="ees-glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#F5A623" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
    <filter id="ees-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <!-- hex shield -->
  <polygon points="60,6 106,32 106,88 60,114 14,88 14,32"
           fill="url(#ees-ring)" stroke="#F5A623" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="60,14 99,36 99,84 60,106 21,84 21,36"
           fill="none" stroke="#F5A623" stroke-width="1" opacity="0.35"/>

  <circle cx="60" cy="58" r="34" fill="url(#ees-glow)"/>

  <!-- voltage bolt -->
  <path d="M70 22 L44 64 L57 64 L50 96 L80 50 L65 50 Z"
        fill="url(#ees-bolt)" stroke="#FFE9B0" stroke-width="1.4"
        stroke-linejoin="round" filter="url(#ees-soft)"/>
  <path d="M70 22 L44 64 L57 64 L50 96 L80 50 L65 50 Z"
        fill="url(#ees-bolt)" stroke="#FFE9B0" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- spark nodes -->
  <circle cx="33" cy="40" r="2" fill="#F5A623"/>
  <circle cx="88" cy="74" r="2" fill="#F5A623"/>
  <circle cx="86" cy="38" r="1.4" fill="#FFD980"/>
  <circle cx="34" cy="76" r="1.4" fill="#FFD980"/>
</svg>
