<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Wilson and Co. Pressure Washing">
  <defs>
    <linearGradient id="wc-drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5cb3ff"/>
      <stop offset="0.55" stop-color="#1E90FF"/>
      <stop offset="1" stop-color="#0B3D91"/>
    </linearGradient>
    <linearGradient id="wc-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E90FF"/>
      <stop offset="1" stop-color="#0B3D91"/>
    </linearGradient>
    <radialGradient id="wc-shine" cx="0.38" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- outer ring -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="url(#wc-ring)" stroke-width="4"/>
  <circle cx="60" cy="60" r="48" fill="#0B3D91"/>

  <!-- spray jet fanning toward droplet -->
  <g stroke="#5cb3ff" stroke-linecap="round" opacity="0.9">
    <line x1="22" y1="44" x2="44" y2="52" stroke-width="2.6"/>
    <line x1="20" y1="56" x2="44" y2="58" stroke-width="2.6"/>
    <line x1="22" y1="68" x2="44" y2="64" stroke-width="2.6"/>
    <line x1="27" y1="78" x2="46" y2="70" stroke-width="2.2"/>
  </g>

  <!-- water droplet -->
  <path d="M68 30
           C 84 50, 92 62, 92 73
           a 24 24 0 1 1 -48 0
           C 44 62, 52 50, 68 30 Z"
        fill="url(#wc-drop)" stroke="#bfe2ff" stroke-width="1.5"/>
  <path d="M68 30 C 84 50, 92 62, 92 73 a 24 24 0 1 1 -48 0 C 44 62, 52 50, 68 30 Z"
        fill="url(#wc-shine)"/>
  <!-- highlight -->
  <ellipse cx="60" cy="68" rx="6" ry="10" fill="#ffffff" opacity="0.55"/>

  <!-- monogram WC -->
  <text x="68" y="84" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="700" fill="#ffffff" opacity="0.95"
        letter-spacing="-1">WC</text>
</svg>
