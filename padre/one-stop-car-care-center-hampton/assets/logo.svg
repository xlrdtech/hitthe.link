<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="One Stop Car Care Center emblem">
  <defs>
    <linearGradient id="osShield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E2233F"/>
      <stop offset="0.55" stop-color="#C8102E"/>
      <stop offset="1" stop-color="#7A0A1C"/>
    </linearGradient>
    <linearGradient id="osSteel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f6f8"/>
      <stop offset="0.5" stop-color="#c2c9d1"/>
      <stop offset="1" stop-color="#8b939c"/>
    </linearGradient>
    <radialGradient id="osGlow" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- shield -->
  <path d="M60 6 L106 22 V58 C106 86 86 104 60 114 C34 104 14 86 14 58 V22 Z"
        fill="url(#osShield)" stroke="#5a0712" stroke-width="2.5"/>
  <path d="M60 6 L106 22 V58 C106 86 86 104 60 114 C34 104 14 86 14 58 V22 Z"
        fill="url(#osGlow)"/>
  <!-- inner ring -->
  <circle cx="60" cy="54" r="33" fill="none" stroke="url(#osSteel)" stroke-width="3.5" opacity="0.9"/>
  <!-- gear teeth -->
  <g fill="url(#osSteel)">
    <rect x="56.5" y="14" width="7" height="9" rx="1.5"/>
    <rect x="56.5" y="85" width="7" height="9" rx="1.5"/>
    <rect x="20" y="50.5" width="9" height="7" rx="1.5"/>
    <rect x="91" y="50.5" width="9" height="7" rx="1.5"/>
    <rect x="31" y="24" width="7" height="9" rx="1.5" transform="rotate(-45 34.5 28.5)"/>
    <rect x="82" y="24" width="7" height="9" rx="1.5" transform="rotate(45 85.5 28.5)"/>
    <rect x="31" y="76" width="7" height="9" rx="1.5" transform="rotate(45 34.5 80.5)"/>
    <rect x="82" y="76" width="7" height="9" rx="1.5" transform="rotate(-45 85.5 80.5)"/>
  </g>
  <!-- crossed wrench + piston -->
  <g stroke="url(#osSteel)" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M44 70 L72 42"/>
  </g>
  <!-- wrench head -->
  <path d="M40 74 a9 9 0 1 1 7-15 l-5 5 4 4 5-5 a9 9 0 0 1 -11 11 z" fill="url(#osSteel)"/>
  <!-- piston / spark -->
  <g fill="url(#osSteel)">
    <rect x="68" y="36" width="14" height="11" rx="2"/>
    <rect x="73" y="46" width="4" height="9"/>
    <circle cx="75" cy="57" r="4"/>
  </g>
  <!-- numeral 1 (the "One") -->
  <path d="M58 36 q3 -1 5 -3 v34 h-6 v-26 l-3 1 z" fill="#fff" opacity="0.92"/>
</svg>
