<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="T&amp;G Plumbing logo">
  <defs>
    <linearGradient id="tgPlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#103a66"/>
      <stop offset="1" stop-color="#061a33"/>
    </linearGradient>
  </defs>

  <!-- Rounded plate with dual ring -->
  <rect x="6" y="6" width="108" height="108" rx="26" fill="url(#tgPlate)"/>
  <rect x="6.75" y="6.75" width="106.5" height="106.5" rx="25.25" fill="none" stroke="#1565C0" stroke-width="3"/>
  <rect x="8.25" y="8.25" width="103.5" height="103.5" rx="23.5" fill="none" stroke="#19E3C8" stroke-width="1.5" opacity="0.45"/>

  <!-- Bespoke high-contrast serif "T" (Fraunces feel: slab serifs, thin/thick contrast) -->
  <g fill="#ffffff">
    <!-- top serif bar -->
    <rect x="20" y="34" width="34" height="9" rx="2.5"/>
    <!-- vertical stem (modulated: slight taper handled with two widths) -->
    <rect x="32.5" y="41" width="9" height="38" rx="1"/>
    <!-- baseline serif feet -->
    <rect x="27" y="76" width="20" height="7.5" rx="3"/>
  </g>

  <!-- Bespoke drawn ampersand in aqua (path only, no font) -->
  <path fill="#19E3C8" d="M55.6 65.4
           c0 -3 1.7 -5.2 4.5 -7.1
           c-1.6 -2 -2.4 -3.9 -2.4 -6.1
           c0 -4.2 3.2 -7.2 7.7 -7.2
           c4.2 0 7 2.5 7 6.3
           c0 3.1 -1.9 5.3 -5.1 7.3 l4.3 5
           c0.6 -1.3 1.1 -2.8 1.4 -4.7 l4 0
           c-0.3 3.1 -1.4 5.8 -2.8 7.9 l4.4 5.1 -5.4 0 -1.5 -1.8
           c-2.2 1.6 -4.7 2.5 -7.6 2.5 c-5.4 0 -9.1 -3.2 -9.1 -7.9 z
           m4.8 -0.4 c0 2.5 1.9 4.3 4.6 4.3 c1.6 0 3 -0.5 4.2 -1.4 l-5.9 -7
           c-1.9 1.3 -2.9 2.7 -2.9 4.1 z
           m4 -8.7 c1.8 -1.2 2.9 -2.4 2.9 -4 c0 -1.5 -1.1 -2.5 -2.8 -2.5
           c-1.7 0 -2.8 1.2 -2.8 2.9 c0 1.4 0.8 2.6 2.3 3.8 z"/>

  <!-- Bespoke high-contrast serif "G" (path only) -->
  <path fill="#ffffff" d="M92 33.4
           c4.1 0 7.6 0.9 10.5 2.6 l0.3 7.6 -2.7 0
           c-1.2 -4.9 -4.5 -7.1 -9.5 -7.1
           c-7.9 0 -13 5.9 -13 15
           c0 9.1 5.3 14.9 13.2 14.9
           c2.5 0 4.7 -0.5 6.3 -1.5 v-6.6
           c0 -1.8 -0.5 -2.4 -2.4 -2.7 l-2 -0.3 v-2.6 h14.6 v2.6 l-1.3 0.3
           c-1.7 0.3 -2.1 1 -2.1 2.8 v7.5
           c-3.1 2.5 -7.6 4 -12.7 4
           c-10.6 0 -17.8 -7 -17.8 -17.6
           c0 -10.8 7.6 -17.9 18.3 -17.9 z"/>

  <!-- Pipe / fitting accent bar -->
  <rect x="20" y="92" width="80" height="6" rx="3" fill="#1565C0"/>
  <circle cx="96" cy="95" r="5" fill="none" stroke="#19E3C8" stroke-width="2.5"/>
</svg>
