<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Perfect Touch Painting logo">
  <defs>
    <linearGradient id="ptBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="ptStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="ptDrip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>

  <!-- rounded badge -->
  <rect x="6" y="6" width="108" height="108" rx="28" fill="url(#ptBadge)"/>
  <rect x="7.5" y="7.5" width="105" height="105" rx="26.5" fill="none" stroke="url(#ptStroke)" stroke-width="2.5"/>

  <!-- paint roller: handle frame + roller sleeve laying a fresh stroke -->
  <g stroke="#ffffff" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95">
    <!-- handle -->
    <path d="M40 86 L40 72 L60 72"/>
    <!-- frame arm into roller -->
    <path d="M60 72 L60 60"/>
  </g>
  <!-- roller sleeve -->
  <rect x="50" y="42" width="44" height="17" rx="8.5" fill="url(#ptDrip)"/>
  <rect x="50" y="42" width="44" height="17" rx="8.5" fill="none" stroke="#1E3A8A" stroke-width="1.6" opacity="0.35"/>

  <!-- fresh painted stroke trailing behind the roller -->
  <path d="M30 50 Q40 47 50 50 L50 51 Q40 48.5 30 51 Z" fill="#ffffff" opacity="0.9"/>
  <rect x="28" y="49" width="22" height="3.2" rx="1.6" fill="#ffffff" opacity="0.55"/>

  <!-- monogram PT, high-contrast geometric serif feel, bottom -->
  <g fill="#ffffff" font-family="Georgia, 'Times New Roman', serif"></g>
  <text x="60" y="104" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="17" letter-spacing="1.5" fill="#EFF6FF">PT</text>

  <!-- single paint drip for character -->
  <circle cx="86" cy="64" r="3.1" fill="url(#ptDrip)"/>
  <path d="M86 60.5 q-2.4 2.4 0 4.8 q2.4 -2.4 0 -4.8 Z" fill="url(#ptDrip)"/>
</svg>
