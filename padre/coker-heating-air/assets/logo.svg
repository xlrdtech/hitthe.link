  <rect x="6" y="6" width="108" height="108" rx="26" fill="url(#badge)"/>
  <rect x="6" y="6" width="108" height="108" rx="26" fill="none" stroke="#2E7DB0" stroke-width="3" stroke-opacity="0.55"/>
  <!-- Bespoke high-contrast serif "CH" monogram, drawn as paths to match the Fraunces display face -->
  <g fill="#ffffff">
