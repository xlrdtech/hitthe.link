    <!-- C serifs -->
    <rect x="44.5" y="32.4" width="13.5" height="3.4" rx="1.7"/>
    <rect x="44.5" y="77.6" width="13.5" height="3.4" rx="1.7"/>
    <!-- H: serif with thick stems, thin crossbar -->
    <path d="M70.5 34h6.2v18.2h13.1V34h6.2v45.9h-6.2V60.7H76.7v19.2h-6.2z"/>
    <!-- H serifs -->
    <rect x="67.4" y="33" width="12.4" height="3.4" rx="1.7"/>
    <rect x="86.9" y="33" width="12.4" height="3.4" rx="1.7"/>
    <rect x="67.4" y="77.4" width="12.4" height="3.4" rx="1.7"/>
    <rect x="86.9" y="77.4" width="12.4" height="3.4" rx="1.7"/>
  </g>
  <rect x="22" y="92" width="76" height="7" rx="3.5" fill="url(#thermal)"/>
