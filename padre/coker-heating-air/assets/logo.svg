      <stop offset="0%" stop-color="#1d4e72"/>
      <stop offset="100%" stop-color="#143A56"/>
    </linearGradient>
    <linearGradient id="thermal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8924A"/>
      <stop offset="50%" stop-color="#F4B06A"/>
      <stop offset="100%" stop-color="#5FAFD8"/>
