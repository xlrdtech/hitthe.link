<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Warner Lawn Care Service logo">
  <defs>
    <linearGradient id="wlc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#236430"/>
      <stop offset="1" stop-color="#0e2a18"/>
    </linearGradient>
    <linearGradient id="wlc-blade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#8ef04b"/>
      <stop offset="1" stop-color="#b7ff57"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="108" height="108" rx="28" fill="url(#wlc-bg)"/>
  <rect x="7.5" y="7.5" width="105" height="105" rx="26.5" fill="none" stroke="#8ef04b" stroke-width="1.6" opacity="0.5"/>
  <!-- bespoke seriffed W wordmark mark, hand-built paths (not a system font) -->
  <g fill="#f7f4ec">
    <!-- left stroke of W with serif feet, tapered like the Fraunces display face -->
    <path d="M28 40
             C 33 40, 38 40, 43 40
             C 41.4 41.6, 41 43, 41.6 45.2
             L 48.2 70.5
             L 53.4 50.5
             C 54 48.2, 55.6 47, 58 47
             C 60.4 47, 62 48.2, 62.6 50.5
             L 67.8 70.5
             L 74.4 45.2
             C 75 43, 74.6 41.6, 73 40
             C 77 40, 81 40, 85 40
             C 83.4 41.4, 82.4 43, 81.7 45.6
             L 72.8 78.5
             C 72.1 81, 70.4 82.3, 68 82.3
             C 65.6 82.3, 63.9 81, 63.2 78.5
             L 58 59.4
             L 52.8 78.5
             C 52.1 81, 50.4 82.3, 48 82.3
             C 45.6 82.3, 43.9 81, 43.2 78.5
             L 34.3 45.6
             C 33.6 43, 32.6 41.4, 28 40 Z"/>
  </g>
  <!-- blade accent crossing the lower bowl -->
  <path d="M40 92
           C 52 84, 64 84, 80 92
           C 70 86, 58 86, 40 92 Z" fill="url(#wlc-blade)" opacity="0.95"/>
  <path d="M58 88 C 58 80, 60 74, 66 70 C 62 75, 61 81, 61 88 Z" fill="url(#wlc-blade)" opacity="0.9"/>
</svg>
