<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Star Towing emblem">
  <defs>
    <linearGradient id="st-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD479"/>
      <stop offset="0.45" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#B45309"/>
    </linearGradient>
    <radialGradient id="st-glow" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="st-steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
  </defs>
  <!-- night disc -->
  <circle cx="32" cy="32" r="30" fill="url(#st-steel)" stroke="url(#st-gold)" stroke-width="2"/>
  <circle cx="32" cy="30" r="22" fill="url(#st-glow)"/>
  <!-- four-point north star -->
  <path d="M32 8 L36.4 27.6 L56 32 L36.4 36.4 L32 56 L27.6 36.4 L8 32 L27.6 27.6 Z"
        fill="url(#st-gold)"/>
  <!-- secondary diagonal sparkle points -->
  <path d="M32 16 L34 30 L48 32 L34 34 L32 48 L30 34 L16 32 L30 30 Z"
        fill="#0B1220" opacity="0.35"/>
  <!-- tow hook integrated in the star core -->
  <g fill="none" stroke="#0B1220" stroke-width="2.4" stroke-linecap="round">
    <path d="M32 26 v6"/>
    <path d="M32 32 a4.5 4.5 0 1 0 4.5 4.5" />
  </g>
  <circle cx="32" cy="24.8" r="2" fill="#0B1220"/>
</svg>
