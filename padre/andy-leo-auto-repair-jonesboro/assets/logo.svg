<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Andy and Leo Auto Repair emblem">
  <defs>
    <linearGradient id="al-crimson" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E11331"/>
      <stop offset="1" stop-color="#7A0A1C"/>
    </linearGradient>
    <linearGradient id="al-steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3f48"/>
      <stop offset="1" stop-color="#16181c"/>
    </linearGradient>
    <radialGradient id="al-shine" cx="0.35" cy="0.28" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- outer gear ring -->
  <g fill="url(#al-steel)" stroke="#0d0e10" stroke-width="1.5">
    <path d="M60 4
      l6.5 3.0 7.0-1.8 4.9 5.4 7.2 0.6 2.7 6.7 6.6 3.0 0.2 7.2 5.4 4.8-2.3 6.9 3.6 6.3-4.6 5.6 1.2 7.1-6.2 3.7-1.6 7.1-7.0 1.6-4.3 5.8-7.0-0.9-6.3 3.5-6.0-3.9-7.0 1.4-4.8-5.4-7.1-1.1-2.8-6.6-6.7-2.5-0.6-7.2-5.6-4.5 1.8-7.0-3.9-6.1 4.3-5.8-1.6-7.0 6.0-4.0 1.2-7.1 6.9-2.0 4.0-6.0 7.0 0.5 6.0-3.9z"/>
  </g>

  <!-- inner disc -->
  <circle cx="60" cy="60" r="40" fill="url(#al-crimson)" stroke="#0d0e10" stroke-width="2"/>
  <circle cx="60" cy="60" r="40" fill="url(#al-shine)"/>
  <circle cx="60" cy="60" r="34" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.2"/>

  <!-- A monogram (left wrench-cut form) -->
  <g fill="#ffffff">
    <path d="M40 78 L52 42 L60 42 L60 50 L56 50 L48 78 Z"/>
    <rect x="47" y="62" width="13" height="6"/>
  </g>
  <!-- ampersand bar -->
  <rect x="58.5" y="44" width="3" height="34" fill="#0d0e10" opacity="0.35"/>
  <!-- L monogram (right) -->
  <g fill="#ffffff">
    <path d="M64 42 L72 42 L72 71 L84 71 L84 78 L64 78 Z"/>
  </g>

  <!-- piston accent at top center -->
  <g fill="#0d0e10" opacity="0.55">
    <rect x="56" y="22" width="8" height="9" rx="1"/>
    <rect x="58.5" y="30" width="3" height="7"/>
  </g>
</svg>
