<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>@stylism_ Visual Reference</title>
<meta name="theme-color" content="#0a0a0e">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0a0e;color:#fbf9f4;font-family:-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.bar{padding:18px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;background:rgba(10,10,14,.9);backdrop-filter:blur(12px);z-index:10}
.bar .brand{font-size:15px;font-weight:700;letter-spacing:-.01em}
.bar .brand span{color:rgba(255,255,255,.35)}
.bar .count{font-size:12px;color:rgba(255,255,255,.4)}
.hero{padding:36px 24px 20px;text-align:center}
.hero h1{font-size:clamp(24px,4vw,42px);font-weight:700;letter-spacing:-.03em;margin-bottom:6px}
.hero p{color:rgba(255,255,255,.4);font-size:13px;max-width:480px;margin:0 auto}
.grid{columns:2;column-gap:6px;padding:12px;max-width:1400px;margin:0 auto}
@media(min-width:560px){.grid{columns:3}}
@media(min-width:860px){.grid{columns:4}}
@media(min-width:1100px){.grid{columns:5}}
.pin{break-inside:avoid;margin-bottom:6px;border-radius:10px;overflow:hidden;background:#15151c;display:block;content-visibility:auto;contain-intrinsic-size:0 200px}
.pin img{width:100%;display:block;border-radius:10px;transition:transform .15s ease;will-change:transform}
.pin:hover img{transform:scale(1.025)}
.loading{text-align:center;padding:60px;color:rgba(255,255,255,.3);font-size:14px}
.sentinel{height:1px;width:100%}
footer{text-align:center;padding:28px;color:rgba(255,255,255,.2);font-size:11px;border-top:1px solid rgba(255,255,255,.05)}
</style>
</head>
<body>
<div class="bar">
  <div class="brand">@stylism_<span> · visual reference</span></div>
  <div class="count" id="cnt">loading…</div>
</div>
<div class="hero">
  <h1>The Reference Board</h1>
  <p>@stylism_ Pinterest aesthetic — hyper-realistic metallic, iridescent, 3D on black.</p>
</div>
<div class="grid" id="grid"><div class="loading">Loading pins…</div></div>
<footer>@stylism_ · @xlrd999 · hitthe.link</footer>
<script>
const BATCH = 30;
let pins = [], offset = 0, grid, sentinel;

function renderBatch() {
  const frag = document.createDocumentFragment();
  const end = Math.min(offset + BATCH, pins.length);
  for (let i = offset; i < end; i++) {
    const url = pins[i];
    const a = document.createElement('a');
    a.className = 'pin';
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener';
    const img = document.createElement('img');
    img.src = url;
    img.alt = '';
    img.loading = 'lazy';
    img.decoding = 'async';
    img.onerror = () => a.remove();
    a.appendChild(img);
    frag.appendChild(a);
  }
  offset = end;
  grid.insertBefore(frag, sentinel);
  document.getElementById('cnt').textContent = offset + ' / ' + pins.length;
  if (offset >= pins.length && sentinel.parentNode) sentinel.remove();
}

fetch('/stylism/pinterest-pins.json')
  .then(r => r.json())
  .then(d => {
    pins = d.urls || [];
    grid = document.getElementById('grid');
    grid.innerHTML = '';
    sentinel = document.createElement('div');
    sentinel.className = 'sentinel';
    grid.appendChild(sentinel);
    renderBatch();
    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting && offset < pins.length) renderBatch();
    }, { rootMargin: '600px' });
    obs.observe(sentinel);
  })
  .catch(() => {
    document.getElementById('grid').innerHTML = '<div class="loading">Could not load pins.</div>';
  });
</script>
</body>
</html>
