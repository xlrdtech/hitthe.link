<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Ben Jamie Records — vinyl center label">
  <title>Ben Jamie Records · vinyl-label circle</title>
  <defs>
    <radialGradient id="vinyl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f2a4a"/>
      <stop offset="60%" stop-color="#0A1929"/>
      <stop offset="100%" stop-color="#070b14"/>
    </radialGradient>
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="92%" stop-color="rgba(232,201,122,0)"/>
      <stop offset="96%" stop-color="rgba(232,201,122,0.55)"/>
      <stop offset="100%" stop-color="rgba(232,201,122,0)"/>
    </radialGradient>
    <path id="topArc" d="M 105 300 a 195 195 0 0 1 390 0" fill="none"/>
    <path id="bottomArc" d="M 105 300 a 195 195 0 0 0 390 0" fill="none"/>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Bodoni+Moda:wght@900&family=Inter:wght@600&display=swap');
      .curveTop{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;letter-spacing:0.18em}
      .curveBot{font-family:'Inter',sans-serif;font-weight:600;letter-spacing:0.42em;text-transform:uppercase}
      .records{font-family:'Bodoni Moda',serif;font-weight:900;letter-spacing:0.08em}
    ]]></style>
  </defs>

  <rect width="600" height="600" fill="#0A0A0A"/>

  <!-- Vinyl disc -->
  <circle cx="300" cy="300" r="270" fill="#070b14" stroke="rgba(232,201,122,0.18)" stroke-width="1"/>
  <circle cx="300" cy="300" r="240" fill="url(#vinyl)" stroke="rgba(201,150,43,0.45)" stroke-width="2"/>
  <circle cx="300" cy="300" r="240" fill="url(#rim)"/>

  <!-- Concentric label rings -->
  <circle cx="300" cy="300" r="210" fill="none" stroke="rgba(232,201,122,0.18)" stroke-width="1"/>
  <circle cx="300" cy="300" r="200" fill="none" stroke="rgba(232,201,122,0.12)" stroke-width="0.5"/>

  <!-- Top arc text: Ben Jamie -->
  <text class="curveTop" font-size="38" fill="#e8c97a">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">Ben&#160;Jamie</textPath>
  </text>

  <!-- Center: RECORDS with O-as-spindle -->
  <text class="records" x="300" y="315" text-anchor="middle" font-size="44" fill="#f0f5fa">REC</text>
  <text class="records" x="370" y="315" text-anchor="middle" font-size="44" fill="#f0f5fa">RDS</text>
  <!-- spindle hole -->
  <circle cx="300" cy="300" r="11" fill="#0A0A0A" stroke="#5ab8e8" stroke-width="1.5"/>
  <circle cx="300" cy="300" r="3" fill="#5ab8e8"/>

  <!-- Bottom arc text -->
  <text class="curveBot" font-size="16" fill="rgba(232,201,122,0.85)">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">Southern&#160;Soul&#160;·&#160;ATL&#160;·&#160;Est.&#160;MMXXVI</textPath>
  </text>
</svg>
