<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" role="img" aria-label="Ben Jamie Records — lowercase wordmark">
  <title>Ben Jamie Records · lowercase wordmark</title>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@900&display=swap');
      .word{font-family:'Bodoni Moda',serif;font-weight:900;letter-spacing:-0.018em}
      .accent{font-family:'Bodoni Moda',serif;font-weight:900}
    ]]></style>
  </defs>

  <rect width="1200" height="240" fill="#0A1929"/>

  <!-- Wordmark with ligatured-dot periods -->
  <text class="word" x="60" y="155" font-size="120" fill="#f0f5fa">ben<tspan fill="#e8c97a">.</tspan>jamie<tspan fill="#e8c97a">.</tspan>records<tspan class="accent" fill="#B83A2E">.</tspan></text>

  <!-- Sub-rule -->
  <line x1="60" y1="180" x2="1140" y2="180" stroke="rgba(232,201,122,0.32)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="60" y="215" font-family="Inter, sans-serif" font-weight="600" font-size="13" letter-spacing="0.5em" fill="rgba(232,201,122,0.7)" text-transform="uppercase">SOUTHERN&#160;&#160;SOUL&#160;&#160;·&#160;&#160;ATL&#160;&#160;·&#160;&#160;EST.&#160;MMXXVI</text>
</svg>
