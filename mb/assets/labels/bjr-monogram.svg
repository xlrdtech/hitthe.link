<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Ben Jamie Records — BJR monogram mark">
  <title>Ben Jamie Records · BJR monogram</title>
  <defs>
    <linearGradient id="bjrGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f5fa"/>
      <stop offset="35%" stop-color="#e8c97a"/>
      <stop offset="65%" stop-color="#c9962b"/>
      <stop offset="100%" stop-color="#7a5618"/>
    </linearGradient>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@900&family=Inter:wght@600&display=swap');
      .mono{font-family:'Bodoni Moda',serif;font-weight:900;font-style:italic;letter-spacing:-0.02em}
      .imprint{font-family:'Inter',sans-serif;font-weight:600;letter-spacing:0.42em;text-transform:uppercase}
      .rule{stroke:#c9962b;stroke-width:2;fill:none}
    ]]></style>
  </defs>

  <rect width="600" height="600" fill="#0A1929"/>

  <!-- Outer frame -->
  <rect x="40" y="40" width="520" height="520" fill="none" stroke="rgba(201,150,43,0.35)" stroke-width="1"/>
  <rect x="56" y="56" width="488" height="488" fill="none" stroke="rgba(201,150,43,0.18)" stroke-width="1"/>

  <!-- BJR monogram -->
  <text class="mono" x="300" y="345" text-anchor="middle" font-size="260" fill="url(#bjrGold)">BJR</text>

  <!-- R-leg extension underline -->
  <line class="rule" x1="120" y1="395" x2="480" y2="395" stroke="#c9962b" stroke-width="2"/>

  <!-- Imprint type -->
  <text class="imprint" x="300" y="450" text-anchor="middle" font-size="20" fill="#e8c97a">Ben&#160;&#160;Jamie&#160;&#160;Records</text>

  <!-- Est. line -->
  <text class="imprint" x="300" y="500" text-anchor="middle" font-size="11" fill="rgba(232,201,122,0.65)" letter-spacing="0.55em">Southern&#160;&#160;Soul&#160;&#160;·&#160;&#160;Est.&#160;&#160;MMXXVI</text>
</svg>
