<style>
:root{--bg:#0a0b0f;--card:#14161d;--line:#232733;--txt:#e8eaf0;--dim:#8b91a3;--accent:#7cf0c8;--gold:#e6c878;--chip:#1c2029}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
header{position:sticky;top:0;z-index:10;background:rgba(10,11,15,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:16px 20px}
h1{margin:0 0 2px;font-size:1.4rem;letter-spacing:-.02em;background:linear-gradient(90deg,#7cf0c8,#e6c878);-webkit-background-clip:text;background-clip:text;color:transparent}
.meta{color:var(--dim);font-size:.8rem;margin-bottom:10px}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
#q{flex:1;min-width:200px;background:var(--chip);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:9px 12px;font-size:.95rem;outline:none}
#q:focus{border-color:var(--accent)}
.filt{background:var(--chip);border:1px solid var(--line);border-radius:20px;color:var(--dim);padding:5px 12px;font-size:.78rem;cursor:pointer;user-select:none}
.filt.on{color:var(--accent);border-color:var(--accent);background:rgba(124,240,200,.1)}
#count{color:var(--dim);font-size:.78rem;margin-left:auto}
main{max-width:1100px;margin:0 auto;padding:16px 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;overflow:hidden}
.c-top{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.tag{font-size:.66rem;padding:2px 7px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.t-obs{background:rgba(124,240,200,.14);color:var(--accent)}
.t-summary{background:rgba(230,200,120,.14);color:var(--gold)}
.proj{font-size:.66rem;color:var(--dim);border:1px solid var(--line);padding:2px 7px;border-radius:20px}
.dt{margin-left:auto;font-size:.68rem;color:var(--dim)}
.c h3{margin:2px 0 4px;font-size:.98rem;line-height:1.3}
.sub{color:var(--dim);font-size:.82rem;margin:0 0 8px}
.facts{margin:6px 0 0;padding:0;list-style:none}
.facts li{font-size:.8rem;color:#c3c8d4;padding:3px 0 3px 14px;position:relative;border-top:1px solid var(--line)}
.facts li:before{content:"▹";position:absolute;left:0;color:var(--accent)}
.concepts{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap}
.concepts span{font-size:.66rem;color:var(--dim);background:var(--chip);padding:2px 7px;border-radius:5px}
mark{background:rgba(230,200,120,.35);color:#fff;border-radius:2px}
.empty{grid-column:1/-1;text-align:center;color:var(--dim);padding:60px 0}
</style>

const grid=document.getElementById('grid'),q=document.getElementById('q'),count=document.getElementById('count');
let kind='all';
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function hl(s,t){s=esc(s);if(!t)return s;try{return s.replace(new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>')}catch(e){return s}}
function render(){
  const t=q.value.trim().toLowerCase();
  let rows=DATA.filter(c=>kind==='all'||c.kind===kind);
  if(t){rows=rows.filter(c=>{
    const hay=(c.title+' '+c.subtitle+' '+c.facts.join(' ')+' '+c.concepts.join(' ')+' '+c.project+' '+c.type).toLowerCase();
    return t.split(/\s+/).every(w=>hay.includes(w));
  });}
  count.textContent=rows.length+' / '+DATA.length;
  if(!rows.length){grid.innerHTML='<div class="empty">no memories match "'+esc(t)+'"</div>';return;}
  grid.innerHTML=rows.slice(0,400).map(c=>`
    <div class="c">
      <div class="c-top">
        <span class="tag t-${c.kind}">${c.type}</span>
        <span class="proj">${esc(c.project)}</span>
        <span class="dt">${esc(c.created)}</span>
      </div>
      <h3>${hl(c.title,t)}</h3>
      ${c.subtitle?`<p class="sub">${hl(c.subtitle,t)}</p>`:''}
      ${c.facts.length?`<ul class="facts">${c.facts.slice(0,6).map(f=>`<li>${hl(String(f),t)}</li>`).join('')}</ul>`:''}
      ${c.concepts.length?`<div class="concepts">${c.concepts.slice(0,8).map(x=>`<span>${esc(String(x))}</span>`).join('')}</div>`:''}
    </div>`).join('')+(rows.length>400?`<div class="empty">+${rows.length-400} more — refine your search</div>`:'');
}
q.addEventListener('input',render);
document.querySelectorAll('.filt').forEach(f=>f.onclick=()=>{document.querySelectorAll('.filt').forEach(x=>x.classList.remove('on'));f.classList.add('on');kind=f.dataset.k;render();});
render();
</script>
