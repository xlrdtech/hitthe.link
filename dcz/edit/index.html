<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Diamond Cutz Studios — Edit Your Site</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#04060c; --ink:#0a0e1c; --navy:#0d1b3e; --navy-2:#13254e;
    --rose:#d7a08a; --rose-hi:#f0c4ad; --plat:#cdd4de; --plat-hi:#f4f8fd;
    --ice:#eaf2ff; --steel:#8893a6; --line:rgba(215,160,138,.22); --line-cool:rgba(205,212,222,.16);
    --gold-ink:#2a1206;
    --gold-grad:linear-gradient(135deg,#fbe4d6 0%,#edbfa6 22%,#e3aa8c 44%,#c07b5a 66%,#e3aa8c 84%,#fbe4d6 100%);
    --gold-text:linear-gradient(105deg,#fdeee6 6%,#f2cbb4 28%,#d98f6c 52%,#f2cbb4 76%,#fdeee6 96%);
    --serif:'Cinzel',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
    --ok:#7ee0a8; --bad:#ff9b8e;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:radial-gradient(120% 80% at 50% -10%, #0b1426 0%, var(--black) 60%) no-repeat fixed,var(--black);
    color:var(--ice);font-family:var(--sans);font-weight:300;line-height:1.6;-webkit-text-size-adjust:100%;
    padding:0 0 120px;min-height:100vh}
  a{color:var(--rose-hi);text-decoration:none}
  .wrap{max-width:680px;margin:0 auto;padding:0 18px}
  header.top{text-align:center;padding:38px 18px 14px}
  header.top .kicker{font-family:var(--serif);font-size:12px;letter-spacing:.28em;text-transform:uppercase;
    background:var(--gold-text);-webkit-background-clip:text;background-clip:text;color:transparent}
  header.top h1{font-family:var(--serif);font-weight:700;font-size:clamp(24px,6vw,34px);margin:8px 0 6px;
    background:var(--gold-text);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:.02em}
  header.top p{color:var(--rose-hi);opacity:.9;margin:0 auto;max-width:520px;font-size:15px}
  .card{background:linear-gradient(180deg,rgba(19,37,78,.34),rgba(10,14,28,.5));
    border:1px solid var(--line-cool);border-radius:16px;padding:20px 18px;margin:18px 0;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--rose),var(--plat),transparent)}
  .card h2{font-family:var(--serif);font-weight:600;font-size:17px;letter-spacing:.04em;color:var(--plat-hi);margin:2px 0 4px}
  .card .hint{font-size:12.5px;color:var(--steel);margin:0 0 14px}
  .field{margin:13px 0}
  label{display:block;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);margin:0 0 6px;font-weight:500}
  input[type=text],textarea{width:100%;background:rgba(4,6,12,.6);color:var(--ice);font-family:var(--sans);font-size:15px;
    border:1px solid var(--line-cool);border-radius:11px;padding:12px 13px;transition:.18s;line-height:1.5}
  textarea{resize:vertical;min-height:78px}
  input:focus,textarea:focus{outline:none;border-color:var(--rose);box-shadow:0 0 0 3px rgba(215,160,138,.18);background:rgba(4,6,12,.85)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row .field{flex:1;min-width:120px}
  .grow{flex:3 1 220px}
  .pinbar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .pinbar .field{flex:1;min-width:160px;margin:0}
  .btn{font-family:var(--sans);font-weight:600;font-size:14px;letter-spacing:.06em;padding:13px 24px;border-radius:11px;
    border:1px solid transparent;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
  .btn.primary{color:var(--gold-ink);border:1px solid rgba(251,228,214,.6);background:var(--gold-grad);box-shadow:0 10px 26px rgba(0,0,0,.4)}
  .btn.primary:active{transform:translateY(1px)}
  .btn.ghost{color:var(--ice);border:1px solid var(--line-cool);background:rgba(255,255,255,.02)}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:14px 18px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg,rgba(4,6,12,.96),rgba(4,6,12,.78));border-top:1px solid var(--line-cool);
    backdrop-filter:blur(10px);display:flex;gap:12px;align-items:center;justify-content:center}
  .bar .btn.primary{flex:1;max-width:380px}
  .status{text-align:center;font-size:14px;min-height:20px;margin:10px auto 0;max-width:520px}
  .status.ok{color:var(--ok)} .status.bad{color:var(--bad)} .status.work{color:var(--rose-hi)}
  .links{text-align:center;margin:18px 0 0;font-size:13px}
  .links a{margin:0 8px;border-bottom:1px solid var(--line)}
  .charwrap{position:relative}
  .note{font-size:12px;color:var(--steel);margin-top:5px}
  .skel{opacity:.4;pointer-events:none}
  @media(max-width:430px){ .row{gap:8px} .card{padding:18px 14px} }
</style>
</head>
<body>
<header class="top">
  <div class="kicker">Diamond Cutz Studios</div>
  <h1>Edit Your Site</h1>
  <p>Change any text below and tap <strong>Save changes</strong>. Your live site updates by itself in about a minute — no tech needed.</p>
</header>

<main class="wrap" id="app">
  <div class="card" id="loading"><h2>Loading your current site…</h2><p class="hint">One moment.</p></div>
</main>

<div class="bar" id="bar" hidden>
  <button class="btn primary" id="save" type="button">Save changes</button>
</div>
<p class="status" id="status"></p>
<p class="links">
  <a href="https://hitthe.link/dcz/" target="_blank" rel="noopener">View live site ↗</a>
  <a href="#" id="reload">Reset to current</a>
</p>

<script>
(function(){
  var API='https://nitro.salmon-alkaline.ts.net/dcz-edit';
  var app=document.getElementById('app'), bar=document.getElementById('bar'),
      statusEl=document.getElementById('status'), saveBtn=document.getElementById('save');
  var C={}; // working content

  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function el(html){var t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
  function setStatus(msg,kind){statusEl.textContent=msg||'';statusEl.className='status'+(kind?' '+kind:'');}

  function textField(label,id,val,hint){
    return '<div class="field"><label for="'+id+'">'+esc(label)+'</label>'+
      '<input type="text" id="'+id+'" value="'+esc(val)+'">'+(hint?'<div class="note">'+esc(hint)+'</div>':'')+'</div>';
  }
  function areaField(label,id,val,rows,hint){
    return '<div class="field"><label for="'+id+'">'+esc(label)+'</label>'+
      '<textarea id="'+id+'" rows="'+(rows||3)+'">'+esc(val)+'</textarea>'+(hint?'<div class="note">'+esc(hint)+'</div>':'')+'</div>';
  }
  function get(id){var n=document.getElementById(id);return n?n.value.trim():'';}

  function render(){
    var c=C, s=(c.shows||[]);
    function show(i,t){var sh=s[i]||{};var p='s'+i+'_';
      return '<div class="card"><h2>'+t+'</h2><p class="hint">The date, place and details for this show.</p>'+
        '<div class="row">'+
          '<div class="field" style="flex:0 0 120px">'+'<label>Date</label><input type="text" id="'+p+'date" value="'+esc(sh.date)+'"><div class="note">e.g. Jul 10</div></div>'+
          '<div class="field" style="flex:0 0 90px"><label>Year</label><input type="text" id="'+p+'year" value="'+esc(sh.year)+'"></div>'+
          '<div class="field grow"><label>Show title</label><input type="text" id="'+p+'title" value="'+esc(sh.title)+'"></div>'+
        '</div>'+
        textField('Subtitle',p+'sub',sh.sub)+
        textField('Performer / lineup',p+'act',sh.act)+
        textField('Venue & address',p+'venue',sh.venue)+
        textField('Time / tickets',p+'time',sh.time)+
        textField('Extra note',p+'note',sh.note)+
        textField('More info (optional)',p+'info',sh.info)+
      '</div>';
    }
    var ct=c.contacts||{}, la=ct.latina||{}, an=ct.andre||{};
    app.innerHTML=
      '<div class="card"><h2>Headline</h2><p class="hint">The lines under your studio name at the top.</p>'+
        textField('Tagline',('f_hero_tag'),(c.hero||{}).tagline)+
        areaField('Welcome line','f_hero_sub',(c.hero||{}).sub,2)+
      '</div>'+
      '<div class="card"><h2>About the Studio</h2>'+
        textField('Section heading','f_about_head',(c.about||{}).heading)+
        areaField('About paragraph','f_about_lead',(c.about||{}).lead,5)+
      '</div>'+
      '<div class="card"><h2>Artist Bio — Stal\'lyon</h2><p class="hint">Leave a blank line between paragraphs.</p>'+
        areaField('Bio','f_bio',c.bio,12)+
      '</div>'+
      show(0,'Show 1')+
      show(1,'Show 2')+
      '<div class="card"><h2>Contact Info</h2><p class="hint">Shown in the booking section and footer.</p>'+
        '<div class="row"><div class="field grow">'+'<label>Booking / Management name</label><input type="text" id="f_la_name" value="'+esc(la.name)+'"></div></div>'+
        '<div class="row"><div class="field"><label>Phone</label><input type="text" id="f_la_phone" value="'+esc(la.phone)+'"></div>'+
          '<div class="field grow"><label>Email</label><input type="text" id="f_la_email" value="'+esc(la.email)+'"></div></div>'+
        '<div class="row" style="margin-top:6px"><div class="field grow"><label>Artist name</label><input type="text" id="f_an_name" value="'+esc(an.name)+'"></div></div>'+
        '<div class="row"><div class="field"><label>Phone</label><input type="text" id="f_an_phone" value="'+esc(an.phone)+'"></div>'+
          '<div class="field grow"><label>Email</label><input type="text" id="f_an_email" value="'+esc(an.email)+'"></div></div>'+
      '</div>'+
      '<div class="card"><h2>Your save code</h2><p class="hint">Enter the code East gave you. Saved on this device so you only type it once.</p>'+
        '<div class="pinbar"><div class="field"><label>Save code</label><input type="text" id="f_pin" value="'+esc(localStorage.getItem('dcz_edit_pin')||'')+'" autocomplete="off"></div></div>'+
      '</div>';
    bar.hidden=false;
  }

  function collect(){
    var s0={date:get('s0_date'),year:get('s0_year'),title:get('s0_title'),sub:get('s0_sub'),act:get('s0_act'),venue:get('s0_venue'),time:get('s0_time'),note:get('s0_note'),info:get('s0_info')};
    var s1={date:get('s1_date'),year:get('s1_year'),title:get('s1_title'),sub:get('s1_sub'),act:get('s1_act'),venue:get('s1_venue'),time:get('s1_time'),note:get('s1_note'),info:get('s1_info')};
    return {
      hero:{tagline:get('f_hero_tag'),sub:get('f_hero_sub')},
      about:{heading:get('f_about_head'),lead:get('f_about_lead')},
      bio:document.getElementById('f_bio').value.replace(/\r/g,'').trim(),
      shows:[s0,s1],
      contacts:{
        latina:{name:get('f_la_name'),phone:get('f_la_phone'),email:get('f_la_email')},
        andre:{name:get('f_an_name'),phone:get('f_an_phone'),email:get('f_an_email')}
      }
    };
  }

  function save(){
    var pin=get('f_pin');
    if(!pin){ setStatus('Enter your save code first.','bad'); document.getElementById('f_pin').focus(); return; }
    localStorage.setItem('dcz_edit_pin',pin);
    saveBtn.disabled=true; saveBtn.textContent='Saving…'; setStatus('Saving your changes…','work');
    fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin,content:collect()})})
      .then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j};});})
      .then(function(res){
        if(res.ok && res.j.ok){
          setStatus('✓ Saved! Your site updates in about a minute. You can close this page.','ok');
          saveBtn.textContent='Saved ✓';
          setTimeout(function(){saveBtn.disabled=false;saveBtn.textContent='Save changes';},4000);
        } else {
          setStatus('✕ '+((res.j&&res.j.error)||'Could not save')+(res.j&&res.j.error==='wrong PIN'?' — check your save code.':''),'bad');
          saveBtn.disabled=false; saveBtn.textContent='Save changes';
        }
      })
      .catch(function(){ setStatus('✕ Network error. Check your connection and try again.','bad'); saveBtn.disabled=false; saveBtn.textContent='Save changes'; });
  }

  saveBtn.addEventListener('click',save);
  document.getElementById('reload').addEventListener('click',function(e){e.preventDefault();location.reload();});

  fetch('/dcz/content.json?ts='+Date.now(),{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(c){ C=c||{}; render(); })
    .catch(function(){ app.innerHTML='<div class="card"><h2>Couldn\'t load your content</h2><p class="hint">Please refresh the page. If it keeps happening, text East.</p></div>'; });
})();
</script>
</body>
</html>
