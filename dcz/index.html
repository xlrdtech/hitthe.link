<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diamond Cutz Studios — Design Variations</title>
<meta name="description" content="Diamond Cutz Studios — review gallery: every 3D hero design variation in one place.">
<meta name="theme-color" content="#05070a">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/dcz/assets/emblem-platinum-c.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--void:#000;--abyss:#05070a;--pearl:#f3f7fb;--bone:#c4ccd6;--mute:#7e8794;--ice:#eef6ff;--cyan:#a9e8ff;--azure:#7fb8ff;--glacier:#bfe9ff;--violet:#c7a0ff;--line:rgba(174,214,255,.16)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:#000;color:var(--pearl);font-family:'Inter',sans-serif;font-weight:300;overflow:hidden;display:flex;flex-direction:column}
  .topbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#070a10,#05070a)}
  .brand{font-family:'Cinzel',serif;font-weight:600;font-size:13px;letter-spacing:.34em;text-transform:uppercase;
    background:linear-gradient(110deg,var(--ice),var(--glacier) 30%,#fff 50%,var(--violet) 70%,var(--ice));-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
  .brand small{display:block;font-family:'Inter';font-weight:300;font-size:9px;letter-spacing:.28em;color:var(--mute);-webkit-text-fill-color:var(--mute)}
  .count{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.2em;color:var(--glacier)}
  .stage{flex:1 1 auto;position:relative;background:#000}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:#000}
  .nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:78px;display:flex;align-items:center;justify-content:center;background:rgba(8,11,16,.5);backdrop-filter:blur(6px);border:1px solid var(--line);color:var(--pearl);cursor:pointer;font-size:22px;z-index:5;transition:.18s;user-select:none}
  .nav:hover{background:rgba(127,184,255,.16);border-color:var(--cyan)}
  .nav.prev{left:0;border-left:0;border-radius:0 8px 8px 0}
  .nav.next{right:0;border-right:0;border-radius:8px 0 0 8px}
  .label{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:5;text-align:center;background:rgba(8,11,16,.55);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:999px;padding:8px 20px;pointer-events:none}
  .label .ln{font-family:'Cinzel',serif;font-weight:600;font-size:13px;letter-spacing:.12em;color:var(--ice)}
  .label .ld{font-size:11px;color:var(--bone);letter-spacing:.04em;margin-top:2px}
  .dock{flex:0 0 auto;display:flex;align-items:center;gap:7px;overflow-x:auto;padding:11px 14px;border-top:1px solid var(--line);background:linear-gradient(0deg,#070a10,#05070a);scrollbar-width:thin}
  .chip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:88px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:rgba(174,214,255,.03);cursor:pointer;transition:.18s}
  .chip:hover{border-color:var(--azure);background:rgba(127,184,255,.08)}
  .chip.active{border-color:var(--cyan);background:rgba(127,184,255,.14);box-shadow:0 0 0 1px var(--cyan) inset}
  .chip .cn{font-family:'Cinzel',serif;font-weight:600;font-size:11px;letter-spacing:.14em;color:var(--glacier)}
  .chip .cd{font-size:9.5px;color:var(--mute);text-align:center;line-height:1.2}
  .open{flex:0 0 auto;color:var(--cyan);text-decoration:none;font-size:11px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line);border-radius:8px;padding:8px 13px;transition:.18s;white-space:nowrap}
  .open:hover{border-color:var(--cyan);background:rgba(127,184,255,.1)}
  @media (max-width:640px){ .brand{font-size:11px;letter-spacing:.22em} .nav{width:38px;height:64px;font-size:18px} .chip{min-width:78px} }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">Diamond Cutz<small>Design Variations · review</small></div>
    <div class="count" id="count">—</div>
    <a class="open" id="openBtn" href="#" target="_blank" rel="noopener">Open ↗</a>
  </div>
  <div class="stage">
    <iframe id="frame" title="variation" loading="eager"></iframe>
    <div class="nav prev" id="prev" title="Previous (left arrow)">&lsaquo;</div>
    <div class="nav next" id="next" title="Next (right arrow)">&rsaquo;</div>
    <div class="label"><div class="ln" id="lname">&mdash;</div><div class="ld" id="ldesc"></div></div>
  </div>
  <div class="dock" id="dock"></div>
<script>
  var V=[
    {p:'/dcz/opt6/', n:'Opt 6', d:'Diamond dust · cinematic float'},
    {p:'/dcz/opt4/', n:'Opt 4', d:'3D medallion · drag-to-spin'},
    {p:'/dcz/opt8/', n:'Opt 8', d:'Big emblem · pointer + scroll + depth'}
  ];
  var i=0, frame=document.getElementById('frame'), dock=document.getElementById('dock');
  function esc(s){return s.replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  V.forEach(function(v,idx){ var c=document.createElement('div'); c.className='chip'; c.dataset.i=idx;
    c.innerHTML='<div class="cn">'+esc(v.n)+'</div><div class="cd">'+esc(v.d.split('·')[0].trim())+'</div>';
    c.addEventListener('click',function(){ go(idx); }); dock.appendChild(c); });
  function go(n){ i=(n+V.length)%V.length; var v=V[i];
    frame.src=v.p+'?g='+Date.now();
    document.getElementById('lname').textContent=v.n; document.getElementById('ldesc').textContent=v.d;
    document.getElementById('count').textContent=(i+1)+' / '+V.length;
    document.getElementById('openBtn').href=v.p;
    Array.prototype.forEach.call(dock.children,function(ch,idx){ ch.classList.toggle('active',idx===i); if(idx===i)ch.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'}); });
  }
  document.getElementById('prev').addEventListener('click',function(){ go(i-1); });
  document.getElementById('next').addEventListener('click',function(){ go(i+1); });
  window.addEventListener('keydown',function(e){ if(e.key==='ArrowLeft')go(i-1); else if(e.key==='ArrowRight')go(i+1); });
  go(0);
</script>
</body>
</html>
