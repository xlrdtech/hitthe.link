<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Conductor — Claude Code Orchestrator</title>
<meta name="description" content="Self-hosted Conductor OSS driving Claude Code workers across the account pool." />
<meta name="theme-color" content="#0b1020" />
<!-- break out of the in-OS iframe to the live app -->
<script>try{(window.top||window).location.replace("https://conductor.xlrd.org");}catch(e){location.href="https://conductor.xlrd.org";}</script>
<meta http-equiv="refresh" content="1;url=https://conductor.xlrd.org" />
<style>
  :root{--bg:#0b1020;--card:#121a33;--ink:#eaf0ff;--mut:#9fb0d6;--acc:#2f8cff;--acc2:#64d2ff}
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%,#16224a 0%,var(--bg) 60%);color:var(--ink);
       font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
       display:grid;place-items:center;min-height:100dvh;padding:24px;text-align:center}
  .wrap{max-width:520px}
  .badge{width:84px;height:84px;border-radius:22px;margin:0 auto 22px;
         background:linear-gradient(150deg,var(--acc),var(--acc2));display:grid;place-items:center;
         box-shadow:0 18px 50px rgba(47,140,255,.35);font-size:38px}
  h1{font-size:1.7rem;margin:.2em 0 .15em;letter-spacing:-.01em}
  p{color:var(--mut);margin:.4em 0}
  .go{display:inline-block;margin-top:20px;padding:14px 26px;border-radius:14px;text-decoration:none;
      font-weight:600;color:#06122e;background:linear-gradient(150deg,var(--acc2),var(--acc))}
  .sub{margin-top:18px;font-size:.85rem;color:#6f80a8}
  .spin{margin-top:16px;width:22px;height:22px;border:3px solid rgba(100,210,255,.25);
        border-top-color:var(--acc2);border-radius:50%;display:inline-block;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="badge">🎛️</div>
    <h1>Conductor</h1>
    <p>Self-hosted <b>Conductor OSS</b> orchestrating Claude Code workers across the account pool — durable workflow DAGs, retries, fan-out, live dashboard.</p>
    <a class="go" href="https://conductor.xlrd.org" target="_top" rel="noopener">Open the dashboard →</a>
    <div><span class="spin" aria-hidden="true"></span></div>
    <p class="sub">Redirecting to conductor.xlrd.org…</p>
  </div>
  <script src="https://hitthe.link/lib/grid-autofix.js" defer></script>
</body>
</html>
