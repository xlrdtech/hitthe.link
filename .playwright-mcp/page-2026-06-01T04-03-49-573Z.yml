        - generic [ref=e389]:
          - generic [ref=e396]:
            - generic [ref=e399]:
              - heading "Story" [level=2] [ref=e401]
              - generic [ref=e404]:
                - figure [ref=e406]:
                  - heading "Introduction" [level=3]
                - heading "When a young man disappears in a suspected demonic possession, Robin Sylvester - a physicist specialising in the science of demon summoning - is called in to help solve the case." [level=4] [ref=e407]
                - paragraph [ref=e408]: He’s joined by Detective Inspector Nicholas Hawthorn and consulting psychic Evelyn “Bash” Sebastian in a 1920s supernatural detective story that blurs the lines between science, magic and religion.
                - paragraph [ref=e409]: The Lion and the Adder is the first season of a new audio drama series from Monstrous Productions. Inspired by the Golden Age of detective fiction, it dares to ask, “What if Lord Peter Wimsey was gay and also trans and he teamed up with a psychic lesbian to solve crimes involving demons?”
                - paragraph [ref=e410]: The story takes place in a world where magic is a fact of life. Shots of holy water are doled out as cheap and easy security against demons; magazines regularly devote column inches to discussing the most effective - and fashionable - protective herbs to place in your door and window lintels; and it’s considered abominably rude to visit someone without introducing yourself to their household spirits.
                - paragraph [ref=e411]: Still, there are plenty of similarities between this world and our own. England in 1921 is still in the grip of enormous social upheaval following the Great War; homosexuality is still illegal; and transgender identities are only beginning to be understood in the way they are today.
                - paragraph [ref=e412]: The Lion and the Adder blends fantasy and history for a story that feels real and rooted even as its characters fight demons and talk to ghosts!
                - figure [ref=e414]:
                  - heading "Cast & Characters" [level=3]
                - figure [ref=e416]:
                  - img "A digital drawing of Robin Sylvester, a young man in a suit with slicked back hair and freckles. He's holding a book in one hand and smiling at the viewer" [ref=e417]
                - heading "H.R. Owen as Robin Sylvester" [level=4] [ref=e418]
                - paragraph [ref=e419]: Robin has never met a sentence he couldn’t “improve” by the addition of 15 extra words and a terrible pun. Fortunately, he belongs to that echelon of society where such behaviour gets you invited to parties rather than having the daylights knocked out of you. As a Quaker, he abhors violence and dishonesty. Other moral issues he is more loosey goosey on, especially if it’s him doing the loosing and goosing. He is the reason Hero knows finger guns aren't technically anachronistic for 1921, despite this being an audio-only show.
                - paragraph [ref=e420]: Hero (they/them) is the series creator and writer. They are the head of Monstrous Productions, and creator, writer and star of Monstrous Agonies and Travelling Light. They have also appeared in The Silt Verses and The Mistholme Museum of Mystery, Morbidity and Mortality.
                - figure [ref=e422]:
                  - img "A digital drawing of Nicholas Hawthorn, a tall, well-built man with dark hair. He's folding his arms and looking fondly down towards something out of frame." [ref=e423]
                - heading "Paul Warren as D.I. Nicholas Hawthorn" [level=4] [ref=e424]
                - paragraph [ref=e425]: Nicholas Hawthorn is a walking pile of contradictions dressed up as a policeman. He cares deeply for others, but is outright rude when he’s decided someone’s opinions don't matter. He’s driven by emotion, but there’s nobody in London who can beat him for refusing to talk about his feelings (except perhaps Robin). He takes almost fatherly pride in D.C. Edwards’ career, but stumbles over his own unchecked prejudices. And as a closeted gay man working for the police… Well, yes, he’s got some conflicting priorities. Thank goodness his shoulders are so broad and manly to help carry them all.
                - paragraph [ref=e426]: Paul Warren (he/him) has voiced a wide range of roles in games, audio drama, film and more, including Gawain in Camlann, a contemplative lighthouse keeper in A Highland Song, and a curious AI cat in the multi BAFTA-winning Viewfinder.
                - figure [ref=e428]:
                  - img "A digital drawing of Bash Sebastian, a young woman with curly hair and glasses. She's looking out of frame and adjusting the cuff of one sleeve in a flippant pose." [ref=e429]
                - heading "Méabh de Brún as Evelyn ‘Bash’ Sebastian" [level=4] [ref=e430]
                - paragraph [ref=e431]: As a freelance psychic, Bash uses her powers to speak to the domestic spirits that inhabit every home in the TLatA universe. Sometimes that means talking to the houses of the recently deceased to help solve their murders. If only she could use her powers to understand other people, whose mixed messages, unspoken expectations and frankly baffling emotions leave her flummoxed.
                - paragraph [ref=e432]: As well as writing and performing in her own work, Méabh de Brún (she/her) is known for her leading roles in The Silt Verses, Omen, The Secret of St. Kilda and her latest performance as Carmilla in BloodyFM’s audio adaptation of the Le Fanu novel.
                - heading "AMC as D.C. Edwards" [level=4] [ref=e433]
                - paragraph [ref=e434]: Detective Constable Edwards was absolutely described by her teachers as “a pleasure to have in class”. If she ever had a USB stick, she’d always eject it before taking it out of her computer. Despite these distinctly square tendencies, Edwards is no nerdy push-over. She’s a confident, capable detective who would have a bright career ahead of her - if only she could convince anyone besides Nicholas of that fact.
                - paragraph [ref=e435]: AMC (she/her) is the writer, creator and star of The Vesta Clinic, a cosy science fiction podcast that follows Dr Faye Underwood as treats patients from across the galaxy.
                - heading "Rhys Lawton as Puddle" [level=4] [ref=e436]
                - paragraph [ref=e437]: Puddle - Robin’s best friend and sometime lover - is probably a bit too old to be Bright Young Thing, but he’s not going to let that stop him. He enjoys a life of indolence and partying, and hasn’t seen 9AM since he was at school. A little ray of sunshine with a heart the size of a planet, Puddle genuinely, sincerely believes the best of everyone, despite their efforts to prove him wrong.
                - paragraph [ref=e438]: Rhys Lawton (he/him) has over a decade of performance experience. His previous voice acting roles include The Silt Verses, Ethics Town, The Nebulous Saga, Monstrous Agonies, and The Secret of St Kilda.
                - heading "Colette Hart as Aunt Clara" [level=4] [ref=e439]
                - paragraph [ref=e440]: Aunt Clara took 16-year-old Bash in when she first moved to London. She sets a lot of store by learning the proper rules for social behaviour and letting them guide one’s actions. She has yet to convince her favourite niece of the validity of this outlook, despite her best efforts.
                - paragraph [ref=e441]: Colette Hart (she/her) is an actor based in Northern Ireland. She appeared as The Dredger and Dame Guinevere in BPA & APA nominated audio drama, Last Dance, and is soon to be heard as Our Lady of Luck in Witchpunk.
                - paragraph [ref=e442]: We'll be running a call to fill out the rest of the cast ahead of recording the full season!
                - figure [ref=e444]:
                  - heading "Why Audio?" [level=3]
                - paragraph [ref=e445]: Detectives and audio fiction have gone hand in hand since the popularisation of radio plays in the 1920s. Some of the finest authors of the Golden Age wrote for radio, including Agatha Christie, Dorothy Sayers and Margery Allingham. The Lion and the Adder continues that tradition for a modern audience, offering a fresh, queer perspective on a beloved genre.
                - paragraph [ref=e446]: The Lion and the Adder was created and written by H.R. Owen (Monstrous Agonies, Travelling Light), and is co-produced by H.R. Owen, Eira Major (Not Quite Dead, Spirit Box Radio, Remnants), and Sophie B. (Monstrous Productions).
                - paragraph [ref=e447]: Our team has produced over 175 hours of audio fiction across all their previous titles - that's just over a full week of listening time! We know how to immerse listeners into a rich, authentic world and carry them along on a story told through audio alone.
                - paragraph [ref=e448]: The Lion and the Adder marks a significant step up for all of us in terms of scale. This is the first time we’ll be working with a full cast in an immersive radio play-style, giving us a whole new array of storytelling tools to play with - which is why we need your help to bring the show to life!
                - figure [ref=e450]:
                  - heading "Rewards" [level=3]
                - paragraph [ref=e451]: We've got a host of rewards available for backers at all levels, from acknowledgement on the website and in the show itself to online and in-person events! Each tier stacks with the rewards that came before it with the exception of The Physicist, which doesn't stack but is available as an add-on for all tiers.
                - figure [ref=e453]:
                  - img "A graphic showing all the available reward tiers. The same information is available on the Rewards tab of this campaign." [ref=e454]
                - figure [ref=e456]:
                  - heading "Shipping" [level=3]
                - paragraph [ref=e457]: We have two levels of postage and packing costs depending on what rewards you're receiving.
                - paragraph [ref=e458]: "For postcards and stickers only, shipping costs are:"
                - list [ref=e459]:
                  - listitem [ref=e460]: £2 UK
                  - listitem [ref=e461]: £3 within the EU
                  - listitem [ref=e462]: £4 everywhere else
                - paragraph [ref=e463]: "For cassette tapes and players, which we will send by tracked delivery for added safety, shipping costs are:"
                - list [ref=e464]:
                  - listitem [ref=e465]: £5 UK
                  - listitem [ref=e466]: £15 within the EU
                  - listitem [ref=e467]: £18 everywhere else
                - paragraph [ref=e468]: You'll be asked to pay the appropriate shipping costs whenever your pledge is processed.
                - figure [ref=e470]:
                  - heading "Stretch Goals" [level=3]
                - paragraph [ref=e471]: The main goal of this campaign is to get The Lion and the Adder out into the world, and to make sure everyone involved gets paid fairly. These stretch goals mark the point where your support goes above and beyond, and we want to give you some fantastic bonus content for each milestone we pass!
                - list [ref=e472]:
                  - listitem [ref=e473]:
                    - text: £5000 - Blooper Reel
                    - text: A blooper reel of the best outtakes at the end of the season
                  - listitem [ref=e474]:
                    - text: £6000 - Q&A with Hero, Eira and Sophie
                    - text: An end-of-season Q&A with the production team
                  - listitem [ref=e475]:
                    - text: £7000 - Full cast Q&A
                    - text: An end-of-season Q&A with the producers and the cast (depending on availability)
                  - listitem [ref=e476]:
                    - text: £8000 - Producers' commentary track
                    - text: Extended versions of each episode featuring commentary from the production team
                  - listitem [ref=e477]:
                    - text: £9000+ - Season wrap party with the cast and crew
                    - text: Join the cast and crew and other fans at an end-of-season online wrap party. We'll listen to the season finale together for live reactions, followed by a good old fashioned hang out sesh!
                - paragraph [ref=e478]: Finally, if we raise even more than this, any additional funds will be shared equitably between the rest of the cast and crew.
            - generic [ref=e482]:
              - heading "Risks and challenges" [level=2] [ref=e483]
              - paragraph [ref=e484]: As with all projects, there is a risk timelines will change or need to be adjusted according to the needs of our cast and crew. Everyone involved in the series has been making podcasts for long enough to know that sometimes, life gets in the way! At the same time, that experience means we’re confident we’ll be able to adapt to every eventuality to ensure The Lion and the Adder is produced to our own high standards. As this campaign features some physical rewards, there are risks associated with postage. We’ve attempted to minimise these by focusing primarily on digital rewards. The delivery date for some of these rewards may seem later than you might expect, but this is to make sure we can give proper time and attention to delivering rewards of real quality, whether they’re physical or digital.
