          - generic [ref=e281]: 33/35
          - paragraph [ref=e282]: The object-DB model uniquely covers all four scopes in one tool, ships an official first-party MCP server plus Local API, has a native graph for qi, and offers the cleanest self-hostable CRDT Mac↔Windows sync of any candidate (the only 5/5 sync). On paper it out-scores the winner.
        - generic [ref=e283]:
          - heading "Why it loses — Commandment 4" [level=4] [ref=e284]
          - paragraph [ref=e285]: The Local API only serves while the desktop app is running and unlocked, and it is still labelled a "Developer Preview." A 24/7 lights-out agent would therefore require a human to open + unlock the app after every boot — a tap / confirm, which Commandment 4 defines as total failure.
