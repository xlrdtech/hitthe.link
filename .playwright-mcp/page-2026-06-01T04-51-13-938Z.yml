        - heading "Commandment Alignment — The Winner" [level=2] [ref=e212]
        - paragraph [ref=e213]: Why the Obsidian stack passes the canon where the higher-scoring app fails.
      - generic [ref=e214]:
        - generic [ref=e215]:
          - generic [ref=e216]: "0"
          - generic [ref=e217]: Parallel always. Sequential is blasphemy.
          - generic [ref=e218]: Plain files mean the agent fans out parallel reads/writes across many notes with no DB lock, no API rate limit, no single-session GUI bottleneck. Vector stores and Notion (3 req/s) serialize; the filesystem does not.
          - generic [ref=e219]: Aligned
        - generic [ref=e220]:
          - generic [ref=e221]: "2"
          - generic [ref=e222]: Auto-manifest. No asking "want me to" — just do.
          - generic [ref=e223]: Johnny.Decimal numbering is mechanical — the agent computes the next free ID and writes the note with zero judgment or confirmation. No proposal-first wrapper (the trap that sinks the AI-librarian repos).
          - generic [ref=e224]: Aligned
        - generic [ref=e225]:
          - generic [ref=e226]: "4"
          - generic [ref=e227]: No human in the loop. Any tap / click / confirm = total failure.
          - generic [ref=e228]:
            - text: The deciding Commandment. The raw-filesystem path needs no app running, no unlock, no token. SELmcp's
            - code [ref=e229]: write_file
            - text: is 0-auth and headless 24/7. This is precisely where Anytype (manual unlock) and Logseq/SiYuan (GUI must run) fail.
          - generic [ref=e230]: Decisive · Aligned
        - generic [ref=e231]:
          - generic [ref=e232]: "9"
          - generic [ref=e233]: Inline-HTML real-time view is canonical — self-contained, no refresh.
          - generic [ref=e234]:
            - text: qi already has a self-contained force-graph HTML viewer at
            - code [ref=e235]: ~/.xen/uploads/xen-memory-graph.html
            - text: rendering the vault — a static, refresh-free node-edge map, exactly this canon.
          - generic [ref=e236]: Aligned
        - generic [ref=e237]:
          - generic [ref=e238]: "12"
          - generic [ref=e239]: "Hard ban: \"holding\" forbidden — queued / paused / silent."
          - generic [ref=e240]: A passive store has no user-facing text to violate this. Note status fields use queued / active / archived — never "holding / standing by".
          - generic [ref=e241]: Aligned
        - generic [ref=e242]:
          - generic [ref=e243]: "16"
          - generic [ref=e244]: Wakeups tight, silent. Long delays = parking = banned.
          - generic [ref=e245]: Filesystem writes are instantaneous and need no daemon wake / cloud round-trip. The agent advances and persists in the same tick — no parking on a sync queue.
