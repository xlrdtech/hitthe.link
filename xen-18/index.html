<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XEN — Quantum Resonance</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Courier New',monospace;overflow-x:hidden;min-height:100vh}
canvas{position:fixed;top:0;left:0;z-index:0;opacity:.7}
.content{position:relative;z-index:1}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.quantum-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;position:absolute;inset:0;opacity:.08;pointer-events:none}
.quantum-cell{border:1px solid #0ff;animation:qflicker 3s infinite}
@keyframes qflicker{0%,100%{opacity:0}50%{opacity:1}}
.badge{font-size:.7rem;letter-spacing:.4em;color:#0ff;text-transform:uppercase;margin-bottom:2rem;opacity:.7}
h1{font-size:clamp(3rem,10vw,8rem);font-weight:900;letter-spacing:-.02em;line-height:.9;background:linear-gradient(135deg,#0ff 0%,#fff 40%,#0ff 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 40px rgba(0,255,255,.5))}
.tagline{font-size:1.2rem;color:#888;letter-spacing:.2em;margin:2rem 0;text-transform:uppercase}
.particles{display:flex;gap:1rem;margin:2rem 0;flex-wrap:wrap;justify-content:center}
.particle{width:8px;height:8px;border-radius:50%;background:#0ff;animation:orbit 2s linear infinite}
.particle:nth-child(2){animation-delay:.3s;background:#fff;width:5px;height:5px}
.particle:nth-child(3){animation-delay:.6s;background:#0af;width:6px;height:6px}
.particle:nth-child(4){animation-delay:.9s;background:#0ff;width:4px;height:4px}
.particle:nth-child(5){animation-delay:1.2s;background:#fff;width:7px;height:7px}
@keyframes orbit{0%,100%{transform:translateY(0);opacity:1}50%{transform:translateY(-20px);opacity:.3}}
.cta{display:inline-flex;align-items:center;gap:.8rem;padding:1rem 2.5rem;border:1px solid rgba(0,255,255,.4);color:#0ff;text-decoration:none;letter-spacing:.15em;font-size:.85rem;text-transform:uppercase;transition:all .3s;margin-top:2rem;cursor:pointer}
.cta:hover{background:rgba(0,255,255,.1);border-color:#0ff;box-shadow:0 0 30px rgba(0,255,255,.3)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:3rem;padding:6rem 4rem;border-top:1px solid rgba(0,255,255,.1)}
.stat-num{font-size:3rem;font-weight:900;color:#0ff;display:block}
.stat-label{font-size:.75rem;letter-spacing:.2em;color:#444;text-transform:uppercase;margin-top:.5rem}
.freq{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);font-size:.65rem;letter-spacing:.3em;color:rgba(0,255,255,.3);text-transform:uppercase}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="content">
<section class="hero">
  <div class="badge">Quantum Resonance Interface</div>
  <h1>XEN</h1>
  <p class="tagline">Entangled. Instantaneous. Infinite.</p>
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>
  <a class="cta">Initialize Quantum Link</a>
  <div class="freq">FREQ: 432.000 Hz — COHERENCE: 99.97%</div>
</section>
<section class="stats">
  <div><span class="stat-num">∞</span><p class="stat-label">Entangled States</p></div>
  <div><span class="stat-num">0ms</span><p class="stat-label">Collapse Latency</p></div>
  <div><span class="stat-num">∀</span><p class="stat-label">Superposition</p></div>
</section>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H,pts=[];
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;pts=[];for(let i=0;i<80;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1})}
function draw(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(0,255,255,0.6)';ctx.fill()});pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<120){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(0,255,255,${(1-d/120)*.2})`;ctx.stroke()}}));requestAnimationFrame(draw)}
resize();draw();window.addEventListener('resize',resize);
</script>
</body>
</html>
