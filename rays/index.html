<html lang="en">

<style>
*{box-sizing:border-box;margin:0;padding:0;overflow-wrap:break-word;word-break:normal;hyphens:none}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:#0d0f14;color:#e8eef6;line-height:1.5}
header{padding:48px 24px 24px;text-align:center;background:linear-gradient(180deg,#141821 0%,#0d0f14 100%)}
header h1{font-size:clamp(28px,5vw,46px);font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#7dd3fc,#a78bfa,#f0abfc);-webkit-background-clip:text;background-clip:text;color:transparent}
header p{color:#8b96a8;margin-top:8px;font-size:14px}
#count{color:#5b6478;font-size:13px;margin-top:4px}
.search{max-width:680px;margin:24px auto 0;padding:0 16px}
.search input{width:100%;padding:14px 20px;font-size:16px;background:#1a1f2a;border:1px solid #2a3142;border-radius:12px;color:#e8eef6;outline:none;transition:border .15s}
.search input:focus{border-color:#7dd3fc}
main{max-width:1200px;margin:0 auto;padding:24px 16px 80px}
.cat{margin-top:40px}
.cat-head{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:#7dd3fc;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #1f2530;display:flex;justify-content:space-between;align-items:baseline}
.cat-head .n{color:#5b6478;font-weight:400;letter-spacing:normal}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{display:block;padding:16px 18px;background:#141821;border:1px solid #1f2530;border-radius:10px;text-decoration:none;color:#e8eef6;transition:all .15s;font-size:15px;font-weight:500}
.card:hover{background:#1a1f2a;border-color:#7dd3fc;transform:translateY(-2px)}
.card .url{display:block;color:#5b6478;font-size:11px;font-weight:400;margin-top:4px;font-family:ui-monospace,monospace}
footer{text-align:center;color:#5b6478;font-size:12px;padding:32px 16px;border-top:1px solid #1f2530;margin-top:40px}
footer a{color:#7dd3fc}
</style>
</head>

<p id="count"></p>
<div class="search"><input id="q" type="search" placeholder="Search courses..." autocomplete="off" autofocus></div>
</header>

<footer>Built with care · <a href="https://hitthe.link/rays/">hitthe.link/rays</a></footer>

{c:"Puzzles",t:"Sudoku Fun",u:"https://rays-sudoku.netlify.app/"},
{c:"Finance",t:"Investing & Stock Options",u:"https://rays-stocks.netlify.app/"}
];
const CATS=["Programming & Web","Digital Art & 3D","Tabletop RPGs","Board & Strategy Games","Languages","Puzzles","Finance"];
const main=document.getElementById("main");
const count=document.getElementById("count");
const q=document.getElementById("q");
function el(tag,attrs,text){
  const n=document.createElement(tag);
  if(attrs)for(const k in attrs)n.setAttribute(k,attrs[k]);
  if(text!=null)n.textContent=text;
  return n;
}
function render(filter){
  while(main.firstChild)main.removeChild(main.firstChild);
  const f=(filter||"").trim().toLowerCase();
  let shown=0;
  for(const cat of CATS){
    const items=COURSES.filter(c=>c.c===cat && (!f || c.t.toLowerCase().indexOf(f)>=0 || c.c.toLowerCase().indexOf(f)>=0));
    if(!items.length)continue;
    const sec=el("section",{class:"cat"});
    const head=el("div",{class:"cat-head"});
    head.appendChild(el("span",null,cat));
    head.appendChild(el("span",{class:"n"},"("+items.length+")"));
    sec.appendChild(head);
    const grid=el("div",{class:"grid"});
    for(const it of items){
      const a=el("a",{class:"card",href:it.u,target:"_blank",rel:"noopener"},it.t);
      a.appendChild(el("span",{class:"url"},it.u.replace(/^https?:\/\//,"").replace(/\/$/,"")));
      grid.appendChild(a);
      shown++;
    }
    sec.appendChild(grid);
    main.appendChild(sec);
  }
  count.textContent=f?(shown+" of "+COURSES.length+" courses"):(COURSES.length+" courses");
}
q.placeholder="Search "+COURSES.length+" courses...";
q.addEventListener("input",function(e){render(e.target.value);});
render("");
</script>
