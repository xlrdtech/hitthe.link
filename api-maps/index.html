<script>
const DOCS=[{"title":"Google Voice","sub":"call + SMS, protobuf-JSON REST","md":"# Google Voice Web — Network API Map (reverse-engineered, UI-free)\n\nAuthorized reverse-engineering of qi's own logged-in Google Voice account\n(`xlrdtech@gmail.com`, GV line **+14706159983**) for building headless automation.\nCaptured 2026-06-21 via Chrome DevTools Protocol on the BrowserOS instance at\n`http://127.0.0.1:9223` against the live Calls + Messages tabs.\n\n> **NO secret values are printed in this doc** — only header *names* and structure.\n\n---\n\n## TL;DR — the big picture\n\nGoogle Voice web does **NOT** use `batchexecute` / `f.req` RPC. It uses a clean\n**protobuf-over-JSON (\"protojson\") REST API**:\n\n```\nPOST https://clients6.google.com/voice/v1/voiceclient/<service>/<method>\n     ?alt=protojson&key=<WEB_API_KEY>\nContent-Type: application/json+protobuf\nBody: a POSITIONAL JSON array (protobuf field number N -> array index N-1)\n```\n\n- **SMS SEND** = `api2thread/sendsms` — **VERIFIED LIVE** (HTTP 200, message delivered to qi's iPhone +17707711610 and confirmed present in-thread).\n- **OUTBOUND CALL** = `communication/startclicktocall` — \"click-to-call\": GV rings *your* line, then bridges to the callee. Payload reverse-engineered + corroborated against `account/get`; not live-fired (would ring a real phone).\n- **INBOUND CALL signaling** = there is no separate inbound-call HTTP API for the web client; an inbound call surfaces in the **realtime/poll layer** (see below) and is answered via the same call/session RPCs. The web app has no native auto-answer.\n- **SMS RECEIVE / realtime** = the web app **polls** `api2thread/list` + `threadinginfo/get` every **~2.4 s** (no WebSocket was ever opened during capture). New inbound messages appear as new items in `api2thread/list`. This poll-and-diff is the auto-detect → webhook mechanism.\n- **CONTACT / THREAD list** = `api2thread/list` (threads + recent messages), `account/get` (own + forwarding numbers), `threadinginfo/get` (unread counts).\n\n### Why a naive `fetch()` replay fails (and how we solved it)\nA direct cross-origin `fetch()` from the top `voice.google.com` page is rejected:\n`HTTP 400 \"Bad request: Origin doesn't match Host for XD3\"`. The browser forces an\n`Origin: https://voice.google.com` header that `clients6.google.com` rejects. GV ships a\n**gapi proxy iframe** (`https://clients6.google.com/static/proxy.html`) precisely to avoid\nthis. The working replay therefore runs through the page's own **`gapi.client.request`**,\nwhich routes via that proxy iframe, attaches the SAPISIDHASH `Authorization`, sets\n`X-Origin`/`X-Referer = voice.google.com`, and avoids the Origin check entirely. This also\nmeans **we never see or handle the auth secret** — gapi does it.\n\n---\n\n## Auth & required headers\n\nThe real app requests carry (header **names** + format only — values redacted):\n\n| Header | Format / value | Notes |\n|---|---|---|\n| `Authorization` | `SAPISIDHASH <unixSeconds>_<sha1hex>` (~195 chars) | SHA1 of `<ts> <SAPISID-cookie> <origin>`. Computed by gapi from the `SAPISID`/`__Secure-3PAPISID` cookies. **Never recompute it — let gapi attach it.** |\n| Cookies (browser-sent) | `SAPISID`, `__Secure-3PAPISID`, `SID`, `HSID`, `SSID`, `APISID`, `__Secure-1PSID/3PSID`, ... | Standard Google auth cookies; sent automatically with `credentials:'include'` / via gapi. |\n| `X-Goog-AuthUser` | `0` | Which signed-in user (the `/u/0/` index). |\n| `X-Origin` | `https://voice.google.com` | gapi sets this in lieu of a real `Origin`. |\n| `X-Referer` | `https://voice.google.com` | \" |\n| `Content-Type` | `application/json+protobuf` | Request + response. |\n| `X-Client-Version` | e.g. `933698695` | GV build number; optional for replay. |\n| `X-Goog-Encode-Response-If-Executable` | `base64` | Optional. |\n| `X-JavaScript-User-Agent` | `google-api-javascript-client/1.1.0` | Set by gapi. |\n| `X-Requested-With` | `XMLHttpRequest` | Set by gapi. |\n| query `key` | `AIzaSyDTYc1N4xiODyrQYK0Kl6g_y279LjYkrBg` | **Public** GV web API key (appears in app URLs; not secret). |\n| query `alt` | `protojson` | Selects the array-encoded protobuf wire format. |\n\nThere is **no `Origin` header** on the real requests and **no separate XSRF token** in\nthe body (the app uses cookie + SAPISIDHASH, not the `SNlM0e`/batchexecute scheme).\n\n---\n\n## protojson encoding rule\n\n`_.q(this, N, value)` in the bundle sets **protobuf field N**, serialized at **array\nindex N-1**. Sparse arrays are fine (omitted = `null`). Sub-messages are nested arrays;\na phone-number sub-message is `[\"phnnmbr\", \"+1NPANXXXXXX\"]`.\n\n---\n\n## 1. SMS SEND — `api2thread/sendsms`  ✅ VERIFIED LIVE\n\n```\nPOST https://clients6.google.com/voice/v1/voiceclient/api2thread/sendsms?alt=protojson&key=<KEY>\nContent-Type: application/json+protobuf\n```\n\n**Request body** (array index = protobuf field# − 1):\n\n| index | field# | meaning | example |\n|---|---|---|---|\n| 4 | 5 | message text (string) | `\"hello\"` |\n| 6 | 7 | **recipients — repeated E.164 array** | `[\"+17707711610\"]` |\n| 8 | 9 | client/transaction id — **repeated int64** (dedupe) | `[1782027297263]` |\n| (9) | 10 | media/attachment (msg) — omit for plain text | — |\n| (10) | 11 | client context (msg) — not required | — |\n\nConcrete verified body (single recipient):\n```json\n[null,null,null,null,\"hello\",null,[\"+17707711610\"],null,[1782027297263]]\n```\n\n> NOTE: the recipient MUST be the **repeated field 7** (`[\"+1...\"]`), not the single\n> field 6. Field-6 / single-string forms all returned `google_voice: INVALID_ARGUMENT`.\n> This was determined empirically against the live endpoint (the field *map* came from\n> the bundle; the working *form* was confirmed by HTTP 200 + in-thread delivery).\n\n**Response** (HTTP 200):\n```json\n[null, \"t.+17707711610\", \"<messageId-hex>\", <serverTimestampMs>, [1,2]]\n```\n- index1 = thread id (`t.<E164>`), index2 = new message id, index3 = server ts (ms).\n\n---\n\n## 2. OUTBOUND CALL — `communication/startclicktocall`  ⚠️ code-shipped-unverified\n\nGoogle Voice web placing a call is **click-to-call**: it rings *your own* linked/\nforwarding line first, then bridges the call to the destination. (There is no WebRTC\nsoftphone in this flow — the audio happens on your linked phone.)\n\n```\nPOST https://clients6.google.com/voice/v1/voiceclient/communication/startclicktocall?alt=protojson&key=<KEY>\nContent-Type: application/json+protobuf\n```\n\n**Request body** (proto `aGb`; each number is a `[\"phnnmbr\",\"+1...\"]` sub-message):\n\n| index | field# | meaning | example |\n|---|---|---|---|\n| 0 | 1 | **source / your forwarding number** (your own line) | `[\"phnnmbr\",\"+14706159983\"]` |\n| 1 | 2 | **destination number** (callee) | `[\"phnnmbr\",\"+17707711610\"]` |\n\n```json\n[[\"phnnmbr\",\"+14706159983\"], [\"phnnmbr\",\"+17707711610\"]]\n```\n\nDerived from the bundle builder `iZ.oa(a,b)` → `_.B(f,uu,1,uu(a))`, `_.B(f,uu,2,uu(b))`,\ncalled by the orchestrator as `iZ.oa(ut(ownNumber), destination)` with the UI string\nliteral `\"Calling \" + destination`. Corroborated: `account/get` stores forwarding\nnumbers in the identical `[\"phnnmbr\",\"+1...\"]` wrapper. **Not live-fired** (would ring a\nreal phone unprompted). Response decoder is `bGb` (a call/session descriptor).\n\n---\n\n## 3. INBOUND CALL signaling\n\nThe web client has **no dedicated inbound-call HTTP endpoint** and **no native\nauto-answer** (verified: no answer affordance exists in the DOM until a call actually\nrings). An inbound call is delivered through the realtime/poll layer (same transport as\ninbound SMS, below) and is answered by clicking Answer, which drives the call/session\nRPCs under `communication/`. For headless auto-answer, qi's existing\n`gv-autoanswer-watch.mjs` (CDP DOM watcher) remains the mechanism — the network layer\ndoes not expose a clean \"answer(callId)\" we could verify without a live inbound call.\n\nRelated call-config RPCs present in the bundle (not individually exercised):\n`sipregisterinfo/get`, `inboundcallrule/{list,create,update,delete,move}`,\n`billing/refundcall`, `communication/startclicktocall`.\n\n---\n\n## 4. SMS RECEIVE / realtime (the auto-detect → webhook mechanism)\n\n**No WebSocket is used.** Over a 20 s idle capture the app issued only:\n\n| every | request | purpose |\n|---|---|---|\n| ~2.4 s | `POST api2thread/list` | pull recent threads + their latest messages |\n| ~2.4 s | `POST threadinginfo/get` | unread counts |\n\nSo the inbound mechanism = **poll `api2thread/list` (~2–3 s) and diff against the last\nseen message ids**. New inbound text = a new item whose direction marks it inbound.\n(The bundle references a `webchannel`/`signaler` push path, but it was never activated in\nthis session — polling is the reliable, observed behavior.)\n\n### `api2thread/list` request\n\n```\nPOST .../voiceclient/api2thread/list?alt=protojson&key=<KEY>\nbody: [1, 20, 15, null, null, [null,1,1,1]]\n       │   │   └ page size hint    └ options\n       │   └ count\n       └ tab/folder (1 = All/Inbox)\n```\n\n### `api2thread/list` response shape\n\n```\n[[[ threadId, unreadFlag, [ <message>, <message>, ... ] ], <thread>, ... ]]\n```\n\nEach `<message>` array (the load-bearing fields):\n\n| index | meaning |\n|---|---|\n| 0 | message id (hex) |\n| 1 | timestamp (ms) |\n| 2 | **own GV line** (`+14706159983`) |\n| 3 | `[fromNumber, fromNumber, …]` |\n| 4 | type code — **inbound vs outbound**: `11` = inbound (received), `10` = outbound/sent (also seen `5`/`6`) |\n| 5 | read state (`0` unread / `1` read) |\n| 11 | **message text** |\n| 15 | counterparty number (`+1…`) |\n\nTo detect a new inbound SMS: poll, find items with `type==11`, id not seen before → emit\n`{from: msg[15], text: msg[11], ts: msg[1], threadId}` to your webhook.\n\n### `account/get`\n\n```\nPOST .../voiceclient/account/get?alt=protojson&key=<KEY>\nbody: [null, 1]\nresp: [\"+14706159983\", null, [[[[\"phnnmbr\",\"+14706159983\"],1,1,...]]], ...]\n       └ own GV number             └ linked/forwarding numbers (phnnmbr wrappers)\n```\n\n---\n\n## Working client — `bin/gv-api.mjs`\n\n`/Volumes/M4/sync_/exodus/dev_/xen/bin/gv-api.mjs` drives GV headless by replaying these\nRPCs through the logged-in tab's own `gapi.client.request` over CDP (so auth + origin are\ninherited; **no secret handling**).\n\n```\nnode bin/gv-api.mjs send +17707711610 \"hello\"   # ✅ verified delivers\nnode bin/gv-api.mjs call +17707711610            # click-to-call (rings your line)\nnode bin/gv-api.mjs threads 20                   # list inbox / poll for inbound\nnode bin/gv-api.mjs account                       # own + forwarding numbers\n```\n\nExports: `sendSMS(to,text)`, `placeCall(to,from?)`, `listThreads(n)`, `getAccount()`.\nEnv: `CDP_PORT` (default 9223), `GV_API_KEY` (default = the public web key).\n\n### Verification record\n- `sendSMS(\"+17707711610\", \"gv-api.mjs verified send <stamp> …\")` → **HTTP 200**,\n  response `[null,\"t.+17707711610\",\"215e32d6…\",1782027297263,[1,2]]`.\n- Immediately polled `api2thread/list` → the exact message text was present in thread\n  `t.+17707711610` (1 occurrence). **Inbound/outbound round-trip confirmed end-to-end.**\n\n---\n\n## Tooling / captures produced\n\n- `bin/gv-cdp-trace.mjs` — generic CDP network tracer (records requests, response bodies,\n  WebSocket frames; optional `Runtime.evaluate` trigger). Saves raw JSON to `api-maps/`.\n- `bin/gv-api.mjs` — the headless GV client (above).\n- `api-maps/*.json` — raw captures: `baseline-messages-*`, `sms-send*-*`,\n  `intercept*-*`, `send-final-*`, `realsms-body-*` (the empirical shape search lives in the\n  send/threads runs).\n\n### Gotchas for future work\n1. Replay **must** go through `gapi.client.request` (or the clients6 proxy iframe), never a\n   top-page `fetch()` — else `400 Origin doesn't match Host`.\n2. SMS recipient = repeated **field 7** array; text = field 5; txn id = repeated int64\n   field 9. Single-string recipient forms are rejected.\n3. The SAPISIDHASH `Authorization` is time-bound; relying on gapi to regenerate it per\n   call (as this client does) avoids any staleness/secret handling.\n4. CDP synthetic `Input.*` key events did **not** land in the GV composer on this BrowserOS\n   instance (Angular ngModel never updated, Send stayed disabled) — which is *why* the\n   direct-API replay is the right automation surface, not DOM puppetry.\n"},{"title":"Beside","sub":"two Connect-RPC gateways, one token → 2027","md":"# Beside (app.beside.com) Web API — Reverse-Engineered Map\n\nUI-free programmatic control of qi's own Beside SMS / voice-receptionist account.\nBackend is **Connect-RPC** (protobuf-over-HTTP, JSON or `connect+json`), split across\n**two gateways**. Captured live from the logged-in SPA via CDP and **verified\nend-to-end against qi's real account** on **2026-06-21** (real, non-empty responses).\n\n- **Client:** `/Volumes/M4/sync_/exodus/dev_/xen/bin/beside-api.mjs`\n- **Status:** SEND ✅ · INBOX/CHAT-LIST ✅ · MESSAGES ✅ · NOTES ✅ · SETTINGS ✅ ·\n  REALTIME (StreamUpdates server-stream + ListChatUpdates poll) ✅ — all **verified live**.\n- **Domain note:** the SPA is **`app.beside.com`** (`.com`). `app.beside.ai` is dead/parked\n  — ignore it; the prior \"NXDOMAIN/pending\" blocker was the wrong host.\n\n---\n\n## 0. Hosts, services & identifiers\n\n| Thing | Value |\n|---|---|\n| **SEND** gateway | `https://api.prod.tma.hearthands.tech:8443` — `MessageService` |\n| **READ + REALTIME** gateway | `https://api.prod.beside.com:8443` — `UserService` + `DeliveryService` |\n| Web app (SPA) | `https://app.beside.com/` (Next.js / turbopack; Connect-Web + protobuf-es) |\n| RPC `Origin` header | `https://app.beside.com` |\n| Realtime voice (separate) | `wss://rtc.telnyx.com` (Telnyx WebRTC — calls only, NOT SMS) |\n| Inbox ID | `ibx_8KNDNS4HMN6VQD2AFN0NM2K4V0` |\n| qi user ID | `usr_FCSX00E6Q56YFANQA51KGADNK0` |\n| qi org ID | `org_06EMTXKXDHXM5F5239AB22ACVC` |\n| qi device ID | `1b9cca68-7eb0-45f4-810f-47967d028d25` (= `x-tma-device-id`) |\n| qi 9983 chat | `prv_XJ9CGSMWY50R7691SXSKFJ7NDW` (XLRDTECH; canonical send-self) |\n| qi total chats | 531 (`GetChatListView.totalCount`) |\n\n**ID prefixes:** `ibx_` inbox · `usr_` user · `org_` org · `prv_` private chat ·\n`grp_` group chat · `tpc_` topic/AskBeside chat · `msg_` message · `cll_` call/note ·\n`dst_` delivery-status · `tmd_` topic-mode.\n\n**Connect-RPC services (proto packages, decoded from the bundle's fileDescriptors):**\n`services.message.proto.v1.MessageService`, `services.user.proto.v1.UserService`,\n`services.delivery.proto.v1.DeliveryService`, `services.calendar.proto.v1.*` (calendar\nsync), `services.meetingcontact.proto.v1.*` (CRM-ish contacts), plus `CreateAlgoliaCredentials`\n(client-side search index).\n\n---\n\n## 1. AUTH — the perpetual session ✅\n\nOne **180-char opaque token** authenticates BOTH gateways. It is the value of the\n**`tma_token`** cookie (`domain=.beside.com`, `HttpOnly`, `Secure`, **expires 2027-06-21**,\ni.e. issued with a 1-year TTL). It is **not a JWT** (no dotted segments).\n\nTwo equivalent transports — the READ host accepts **either** (both verified live):\n- `Authorization: Bearer <token>`  ← the client uses this everywhere (simplest server-side)\n- `Cookie: tma_token=<token>`\n\n**Standard request headers** (read host expects these; no `Authorization` is needed\nif you send the cookie, but sending Bearer always works):\n```\nContent-Type: application/json            (unary)   |  application/connect+json (server-stream)\nAuthorization: Bearer <token>\nconnect-protocol-version: 1\nx-tma-client: web\nx-tma-device-id: 1b9cca68-7eb0-45f4-810f-47967d028d25\nOrigin: https://app.beside.com\n```\n\n**Storage on this machine (captured live, perpetual reuse):**\n- `~/.xen/secrets.env` → `BESIDE_TOKEN`, `BESIDE_DEVICE_ID`, `BESIDE_ORG_ID`,\n  `BESIDE_INBOX_ID`, `BESIDE_USER_ID`, `BESIDE_READ_BASE`, `BESIDE_SEND_BASE` (mode 600).\n- `~/.config/xen/beside.token` (mode 600) — refreshed to the freshest live cookie value\n  (old value saved as `.bak`). `beside-api.mjs` reads env → token-file → secrets.env in order.\n- Raw capture (values, never committed): `api-maps/SESSION-SECRETS-*.json` (mode 600).\n\n**Login flow (for re-auth only — NOT exercised; no credentials entered):** SPA routes\n`/auth/login`, `/auth/email`; mechanisms `sendCode` / `verifyCode` (email OTP) and `oauth`\n(Google). The exchange yields the `tma_token` cookie. qi login email: `info@xlrd.org`.\n**Do not enter passwords/OTP** — the captured token is valid ~1 year, so re-auth is rarely needed.\n\n---\n\n## 2. SEND MESSAGE — VERIFIED ✅  (`MessageService`, SEND gateway)\n\n```\nPOST https://api.prod.tma.hearthands.tech:8443/services.message.proto.v1.MessageService/SendMessage\n```\nBody `{ chatId, text, idempotencyKey(fresh uuid v4), inboxId }` →\n`{ message:{ id:\"msg_…\", authorId, senderInboxId, chatId, text, sentAt, updatedAt } }`.\n`idempotencyKey` must be unique per distinct send (dedups retries). Errors: Connect JSON\n`{code,message}`; unknown route = plain `404 page not found`.\n\n> Note: `SendMessage` is ALSO present on the read host? No — send stays on the hearthands\n> gateway; the read host only serves UserService/DeliveryService. Keep them split.\n\n---\n\n## 3. READ — inbox, messages, notes, settings — VERIFIED ✅  (`UserService`, READ gateway)\n\nBase: `https://api.prod.beside.com:8443/services.user.proto.v1.UserService/<Method>`\n\n### 3a. `GetChatListView` — the INBOX / chat list ✅\nBody `{ limit?, cursor? }` (default seen: `{limit:20}`). Response:\n```json\n{ \"items\": [ {\n    \"id\":\"prv_…|grp_…|tpc_…\", \"inboxId\":\"ibx_…\", \"displayName\":\"XLRDTECH\",\n    \"avatarUrls\":[…], \"lastActivity\":\"<epoch_ms str>\", \"formattedLastActivity\":\"2 minutes ago\",\n    \"lastMessagePreview\":\"Xen: …\", \"type\":\"private|group|topic\",\n    \"participantUserIds\":[\"usr_…\"], \"direction\":\"inbound|outbound\", \"status\":\"accepted\",\n    \"chips\":[{\"icon\":\"call\",\"title\":\"Callback needed\",\"style\":\"…\"}], \"actionCardTag\":\"…\"\n  } ],\n  \"cursorFirst\":\"v1:prv=…&tpc=…\", \"cursorLast\":\"v1:prv=<ms>&tpc=<ms>\", \"totalCount\":531 }\n```\nPagination: pass `cursor: <cursorLast>` to page further. Cursor form: `v1:<prefix>=<epoch_ms>`\n(composite across entity types). Verified: returns qi's 531 real chats with live previews.\n\n### 3b. `GetChatElementsView` — MESSAGES (+ calls) in one chat ✅\nBody `{ chatId, cursorBefore? }` (also accepts `beforeId` / `olderThan`; **not** `before`).\nResponse:\n```json\n{ \"chatId\":\"prv_…\", \"displayName\":\"XLRDTECH\", \"avatarUrls\":[…], \"chatType\":\"private\",\n  \"hasMoreBefore\": true,\n  \"elementsJson\": \"<STRING containing a JSON array of cells>\",\n  \"cursorFirst\":\"…\", \"cursorLast\":\"…\" }\n```\n**`elementsJson` is a stringified JSON array** — parse it. Cell types:\n- `{\"type\":\"dateSeparator\",\"label\":\"2026-05-24\",\"dateKey\":\"…\",\"id\":\"date-…\"}`\n- `{\"type\":\"textMessage\",\"id\":\"msg_…\",\"authorId\":\"usr_…\",\"isOwn\":bool,\"text\":\"…\",\"formattedTime\":\"8:46 AM\", …}`\n- `{\"type\":\"callCell\",\"id\":\"cll_…\",\"callerName\":\"…\",\"isOutgoing\":bool,\"isMissed\":bool,\"formattedDuration\":\"3:56 mins\",\"statusLabel\":\"Completed\",\"wasAnsweredByVoicemailAssistant\":bool,\"summary\":\"…\"}`\nPagination: when `hasMoreBefore`, re-request with `cursorBefore: <cursorFirst>`.\nVerified: 51 real cells incl. actual SMS text + call records.\n\n### 3c. `GetNotesListView` — calls / voicemails / AI summaries ✅\nBody `{ inboxId, limit }` → `{ items:[ { id:\"cll_…\", noteType:\"cll\", title, summary(markdown),\nupdatedAt, createdAt, status:\"CALL_STATUS_COMPLETED|NO_ANSWER|IN_PROGRESS|ACCEPTED\",\ndirection, durationSeconds, chatId, participants:[{userId,displayName,phoneNumber,avatarUrl}] } ] }`.\n\n### 3d. `GetInboxSettings` — AI receptionist config ✅\nBody `{ inboxId }` → `{ inboxSettings:{ aiReceptionistTextEnabled, aiReceptionistVoiceEnabled,\naiReceptionistTextScope:\"RECEPTIONIST_SCOPE_EVERYONE\", textReceptionistSignature:\"#SelfOwn_\",\nemailDraftingSignature, numberOfRings:4, voiceMailGreetingUrl, useCustomVoiceMailGreeting,\nringingMode:\"RINGING_MODE_PARALLEL\", businessHoursTimezone:\"America/New_York\", … } }`.\n\n> Other `UserService` methods exist (e.g. `UpdateCurrentUser`, `UpdateVoicemailAssistant`\n> from bundle schemas) but are not yet mapped. Naive guesses (`GetMe`, `ListChats`,\n> `MarkAsRead`, …) all return **404** — method names are exact and not guessable; capture\n> from a live trace or decode the bundle fileDescriptor to add more.\n\n---\n\n## 4. REALTIME INBOUND — VERIFIED ✅  (`DeliveryService`, READ gateway)\n\nBase: `https://api.prod.beside.com:8443/services.delivery.proto.v1.DeliveryService/<Method>`\n**This is the SMS/event push channel** (the Telnyx WS is voice-only). Two methods:\n\n### 4a. `StreamUpdates` — true server-stream (preferred for auto-detect→webhook) ✅\nConnect **server-streaming**. Requires `Content-Type: application/connect+json` and the\n**5-byte envelope frame**: `[flag:uint8][len:uint32 big-endian][json payload]`.\n- Request payload: `{ \"afterCursor\": \"<cursor>\" }` (empty string = from now; cursor resumes).\n- Each **data frame** (flag `0`): `{ \"updates\":[ { \"cursor\":\"<id>\", \"<oneofCase>\":{…} } ] }`.\n- **End/error frame** (flag `2`): trailing metadata / `{error:…}` — reconnect.\nVerified: `status 200`, first frame `{\"updates\":[{\"cursor\":\"…\",\"performFullSync\":{}}]}`.\nA plain `application/json` POST returns **415** — the connect+json framing is mandatory.\n\n### 4b. `ListChatUpdates` — unary delta poll (per-chat; robust fallback) ✅\nBody `{ chatId(REQUIRED), afterCursor?, beforeCursor?, limit?, filterPrefixes? }` →\n`{ updates:[ {<oneofCase>:{…}} ], cursorFirst, cursorLast }`. `chatId` is required\n(inbox-wide must use `StreamUpdates`). `cursorLast` form: `v1:cll=<ms>&dst=<ms>&msg=<ms>`.\nVerified: returns 20 real `deliveryStatusReceived` updates for qi's chat.\n\n### 4c. `Update` oneof — every realtime event case (decoded from proto descriptor)\nEach update is `{ cursor, <case>:{…} }`. The cases (snake_case in proto / camelCase in JSON):\n\n**Messaging / SMS (the auto-detect targets):**\n`message_sent` (inbound+outbound SMS — *the key inbound trigger*) ·\n`media_message_sent` (MMS; has `media_url`, `mime_type`, `attachments`, `thumbhash_base64`) ·\n`delivery_status_received` (`{deliveryStatus:{id:\"dst_…\",recipientId,entityId:\"msg_…\",via:\"DELIVERY_STATUS_VIA_SMS\",code:\"DELIVERY_STATUS_CODE_DELIVERED\",updatedAt}}`) ·\n`read_status_updated` · `chat_system_message_sent` ·\n`private_chat_created` / `private_chat_deleted` ·\n`group_chat_created` / `_deleted` / `_updated` / `_member_removed` ·\n`chat_row_chips_updated` · `question_asked` ·\n`topic_created` / `_deleted` / `_updated`.\n\n**Calls / voice (the receptionist):**\n`call_initiated` · `call_answered` · `call_accepted` · `call_rejected` · `call_finished` ·\n`call_recording_stopped` · `call_summarized` · `call_updated` · `call_shared` ·\n`call_voicemail_left` · `call_forwarding_test` · `call_error_received` ·\n`voice_note_sent` / `_summarized` / `_transcribed` / `_updated` / `_audio_invalid` ·\n`voice_print_created` / `_updated` · `force_resync_voip_token`.\n\n**Captures / AskBeside AI:**\n`activity_captured` · `capture_summarized` / `_transcribed` / `_transcribed_diarized` /\n`_uploaded` / `_user_feedback_updated` · `realtime_capture_summarized` ·\n`answer_generated` / `_fragment_generated` / `_shared` / `_updated` ·\n`action_fragment_generated` · `action_response_generated` ·\n`action_card_created` / `_resolved` / `_updated`.\n\n**Bookings / calendar / contacts / account:**\n`booking_created` / `_cancelled` · `calendars_updated` · `calendar_events_updated` ·\n`calendar_integration_disconnected` · `meeting_prep_updated` · `meeting_contact_updated` ·\n`contact_details_updated` · `business_scrape_completed` · `phone_numbers_updated` ·\n`user_updated` / `_onboarded` / `_input_created|confirmed|skipped` ·\n`user_settings_updated` / `_ai_updated` · `user_trialist_limits_updated` ·\n`inbox_updated` / `_call_forwarding_status_updated` / `_membership_revoked` ·\n`kyc_request_status_updated` · `m1_status_updated` · `workspace_access_changed` /\n`workspace_member_updated` · `call_flow_deploy_status_updated` · `referral_reward_updated` ·\n`entity_removed_from_inbox` · `view_updated` / `view_updates` · `push_notification`\n(`{title,subtitle,body,notification_type,data_json,should_trigger_alert_notification}`).\n\n**Control:** `ping` (keepalive) · `perform_full_sync` (client must refetch list views).\n\n> **Auto-detect→webhook recipe:** open `StreamUpdates` once (inbox-wide), and on each\n> update whose case is `messageSent` / `mediaMessageSent`, POST the inner object to the local\n> webhook. (On `performFullSync`, refetch `GetChatListView`.) Persist `cursor` to resume after\n> a drop. The client's `watchInbound(cb)` does exactly this (auto-reconnect built in).\n> Do NOT re-enable the retired `com.exedus.beside-inbox-poller` (caused a feedback loop).\n\n---\n\n## 5. Client usage (`bin/beside-api.mjs`)\n\n```bash\nnode bin/beside-api.mjs send <chatId> \"text\"      # SEND (verified)\nnode bin/beside-api.mjs send-self \"text\"           # qi's 9983 thread (verified)\nnode bin/beside-api.mjs inbox [limit]              # chat list (verified)\nnode bin/beside-api.mjs messages <chatId>          # messages+calls in a chat (verified)\nnode bin/beside-api.mjs notes [limit]              # call/voicemail notes (verified)\nnode bin/beside-api.mjs settings                   # AI receptionist settings (verified)\nnode bin/beside-api.mjs updates <chatId> [cursor]  # raw delta updates (verified)\nnode bin/beside-api.mjs watch [chatId] [intervalMs]# tail inbound forever (stream/poll)\n```\n```js\nimport { sendMessage, listInbox, getChatMessages, listNotes, getInboxSettings,\n         getChatUpdates, streamUpdates, watchInbound } from './bin/beside-api.mjs';\nawait sendMessage(QI_9983_CHAT, 'hi');\nconst { items } = await listInbox({ limit: 50 });\nconst stop = watchInbound((u, chat) => { /* u = {cursor, <case>:{…}} */ });  // live server-stream\n```\nAuth/env auto-load order: `BESIDE_TOKEN` env → `~/.config/xen/beside.token` → `~/.xen/secrets.env`.\nEnv overrides: `BESIDE_TOKEN`, `BESIDE_DEVICE_ID`, `BESIDE_INBOX_ID`, `BESIDE_READ_BASE`, `BESIDE_SEND_BASE`.\n\n---\n\n## 6. Capture provenance & tooling\n\n- **Verified live 2026-06-21** off the logged-in SPA (`app.beside.com/chats/…`, account \"EAST ALLEN\"):\n  SendMessage; GetChatListView (531 chats); GetChatElementsView (51 cells); GetNotesListView;\n  GetInboxSettings; ListChatUpdates (real delivery-status); StreamUpdates (server-stream, real frame).\n- **Method discovery:** live CDP network trace gave the read RPCs + hosts; the realtime\n  service/methods (`DeliveryService.StreamUpdates`/`ListChatUpdates`) and the full `Update`\n  oneof were decoded from the SPA's base64 protobuf fileDescriptors in `_next/static/chunks/`.\n- **Scripts** (under `api-maps/`):\n  - `cdp-capture-full.mjs` — attaches to the live tab, captures req/res/body/WS/SSE, reads\n    localStorage+cookies (→ `SESSION-SECRETS-*.json`, 600), soft-drives the SPA.\n  - `cdp-recover-trace.mjs`, `cdp-trace.mjs`, `cdp-capture-drive.mjs`, `probe-rpc.mjs` — earlier tracers/probers.\n  - `jschunks/` — the 67 downloaded SPA chunks (source for fileDescriptor decode).\n  - raw captures: `raw-capture-live-*.jsonl`, `bundle-grep*.json`.\n- **Security:** token value never printed/logged/committed; only names+lengths+hashes surfaced.\n  Per qi canon: scrub-to-env, **never rotate** (rotation breaks the live SPA session).\n"},{"title":"Beeper (Matrix)","sub":"Matrix client-server API","md":"# Beeper API Map — driving chat.beeper.com without the UI\n\nReverse-engineered 2026-06-21 from the live BrowserOS tab (`chat.beeper.com`, CDP @ :9223),\nthe live Beeper Desktop API (`127.0.0.1:23373`, app v4.2.945, **Beeper Client API spec v5.0.0**),\nand Beeper's public homeserver + dev docs. Account login email: `info@xlrd.org`.\n\n**SECURITY:** No token/cookie/secret VALUES are recorded here — header NAMES + formats only.\n\n> **Companion map:** [`beeper-desktop-api.md`](./beeper-desktop-api.md) is the focused, fully-verified\n> reference for **Plane B (the local Desktop API)** — including the **native realtime WebSocket\n> `ws://127.0.0.1:23373/v1/ws`** (`ws_events`, emits `message.upserted`) that this document\n> originally missed, plus complete forensics on the (currently expired) token state. For Desktop-API\n> send/list/**push**, prefer that map. The driver `../bin/beeper-api.mjs` implements both planes\n> (`watchInbound()` uses the Desktop WebSocket; `syncLoop()` uses Matrix `/sync`).\n\n---\n\n## 0. TL;DR — two independent control planes\n\nBeeper is a **Matrix** client (element-web fork; page globals `matrixcs`, `mxMatrixClientPeg`,\n`mxReactSdkConfig`). There are **two ways** to drive it programmatically, both currently behind a\none-time credential step:\n\n| Plane | Base URL | Auth | Best for |\n|---|---|---|---|\n| **A. Matrix CS API** (what the web app actually calls) | `https://matrix.beeper.com` | `Authorization: Bearer <matrix access_token>` | send, room list, **realtime sync** (sliding-sync / `/sync`) |\n| **B. Beeper Desktop API** (local app, richer/easier) | `http://127.0.0.1:23373` (LAN proxy `:23374`, tunnel `https://beeper-mcp.xlrd.org`) | `Authorization: Bearer <desktop token>` | send/list/search/read **and native realtime** via WebSocket `ws://127.0.0.1:23373/v1/ws` (`message.upserted`) — see `beeper-desktop-api.md` |\n\nThe Desktop API spec (`GET http://127.0.0.1:23373/v1/spec`, OpenAPI 3.1.0, 775KB — saved as\n`beeper-desktop-openapi.json`) also **proxies a subset of raw `/_matrix/client/v3/*` endpoints**, so\none base host can speak both dialects.\n\n### CURRENT BLOCKERS (both planes need a one-time human credential step)\n1. **Web tab is LOGGED OUT.** `localStorage` has no `mx_access_token` / `mx_user_id` / `mx_hs_url`\n   (only `mx_local_settings`). Screen shows \"Welcome to Beeper! / Email / Continue\". So no live\n   Matrix `access_token` is capturable from the page right now.\n2. **Desktop API token is STALE.** `~/.config/beeper/token` exists (49 chars) but\n   `POST /oauth/introspect` returns `{\"active\": false}`; authed endpoints answer `200 OK` with\n   `Content-Length: 0` (the app's \"unauthenticated\" tell). Needs re-issue via Beeper Desktop →\n   Settings → Integrations → \"+\" (GUI), or OAuth-PKCE (see §4B).\n\nPick **whichever** you re-auth first. Desktop API is the lower-effort path and matches the user's\nexisting `selmcp__beeper__*` tooling; the Matrix plane is required if you want a true push webhook.\n\n---\n\n## 1. SEND MESSAGE\n\n### A. Matrix (homeserver) — canonical\n```\nPUT https://matrix.beeper.com/_matrix/client/v3/rooms/{roomId}/send/m.room.message/{txnId}\n```\n- `{roomId}` = e.g. `!NCdzlIaMjZUmvmvyHU:beeper.com` (URL-encode the `!` and `:` → `%21`,`%3A`)\n- `{txnId}` = client-generated unique id (idempotency key), e.g. `m<epoch>.<rand>`\n- Headers: `Authorization: Bearer <matrix access_token>`, `Content-Type: application/json`\n- Body:\n  ```json\n  { \"msgtype\": \"m.text\", \"body\": \"hello world\" }\n  ```\n  (rich text: add `\"format\":\"org.matrix.custom.html\",\"formatted_body\":\"<b>hi</b>\"`)\n- Response `200`: `{ \"event_id\": \"$abc123...\" }`\n\n> NOTE: this raw `…/send/…/{txnId}` form is the standard Matrix CS endpoint the element-web client\n> uses; it is **not** in the Desktop API's proxied subset (which exposes createRoom/join/state/etc.,\n> but routes message-send through its own `/v1/chats/{chatID}/messages`).\n\n### B. Beeper Desktop API — easiest (uses Beeper chat IDs, not raw Matrix room IDs)\n```\nPOST http://127.0.0.1:23373/v1/chats/{chatID}/messages          (current, v5.0.0)\nPOST http://127.0.0.1:23373/v0/send-message                     (DEPRECATED, body {chatID,text,replyToMessageID})\n```\n- `{chatID}` = Beeper chat id (often the Matrix room id, e.g. `!…:beeper.com`; URL-encode it)\n- Headers: `Authorization: Bearer <desktop token>`, `Content-Type: application/json`\n- Body (verified from `/v1/spec`):\n  ```json\n  { \"text\": \"hello\", \"replyToMessageID\": \"<optional>\", \"attachment\": { } }\n  ```\n- Response `200`: `{ \"chatID\": \"string\", \"pendingMessageID\": \"string\" }`\n  (message send is async → you get a `pendingMessageID`, confirm via List messages or realtime.)\n\n---\n\n## 2. ROOM / INBOX LIST\n\n### B. Beeper Desktop API — preferred (rich chat objects)\n```\nGET http://127.0.0.1:23373/v1/chats?direction=after&cursor=&accountIDs=          (list)\nGET http://127.0.0.1:23373/v1/chats/search?query=&inbox=primary&unreadOnly=true  (search/filter)\nGET http://127.0.0.1:23373/v1/chats/{chatID}                                     (one chat)\nGET http://127.0.0.1:23373/v1/accounts                                           (bridged networks)\n```\n- Headers: `Authorization: Bearer <desktop token>`\n- `GET /v1/chats` query params: `cursor` (opaque), `direction` (`after`|`before`), `accountIDs[]`\n- `GET /v1/chats/search` query params: `limit`(1-200, def 50), `cursor`, `direction`, `query`\n  (literal token, non-semantic), `scope`(`titles`|`participants`), `inbox`(`primary`|`low-priority`|`archive`),\n  `type`(`single`|`group`|`any`), `unreadOnly`, `includeMuted`(def true),\n  `lastActivityBefore`/`After`, `accountIDs[]`\n- Response `200`:\n  ```json\n  { \"items\": [ {chat} ], \"hasMore\": true, \"oldestCursor\": \"…\", \"newestCursor\": \"…\" }\n  ```\n- **chat object** fields: `id`, `localChatID`, `accountID`, `network` (\"WhatsApp\"…), `title`,\n  `type` (`single`|`group`), `participants` ({items,total}), `lastActivity` (ISO),\n  `unreadCount`, `lastReadMessageSortKey`, `isArchived`, `isMuted`, `isPinned`\n\nList messages within a chat:\n```\nGET http://127.0.0.1:23373/v1/chats/{chatID}/messages?cursor=&direction=before\n```\n→ `{ \"items\":[ {message} ], \"hasMore\":bool, \"oldestCursor\":\"…\", \"newestCursor\":\"…\" }`\n\n### A. Matrix equivalent\nThere is no single \"list rooms\" REST call in classic Matrix — the room list comes from **`/sync`**\n(see §3). The Desktop API's `/v1/chats` is the convenient substitute. (The proxied Matrix subset does\nexpose per-room reads: `GET /_matrix/client/v3/rooms/{roomId}/state`,\n`…/rooms/{roomId}/event/{eventId}`, `GET /_matrix/client/v3/profile/{userId}`.)\n\n---\n\n## 3. REALTIME INBOUND SYNC  ← the channel for auto-detect → webhook\n\n### A. Matrix — THE realtime push channel (what the web app uses)\nBeeper's homeserver advertises **simplified sliding sync**:\n`unstable_features` from `GET https://matrix.beeper.com/_matrix/client/versions` →\n`\"org.matrix.simplified_msc3575\": true`.\n\nTwo inbound mechanisms (both long-poll over HTTPS; hold the connection open, server pushes deltas):\n\n1. **Simplified sliding sync (MSC3575, what element-web/Beeper uses):**\n   ```\n   POST https://matrix.beeper.com/_matrix/client/unstable/org.matrix.simplified_msc3575/sync?pos={pos}\n   ```\n   - Headers: `Authorization: Bearer <matrix access_token>`, `Content-Type: application/json`\n   - Body = sliding-sync request: `lists` (windowed room ranges), `room_subscriptions`, `extensions`\n     (e.g. `{\"lists\":{\"all\":{\"ranges\":[[0,20]],\"required_state\":[[\"m.room.name\",\"\"]],\"timeline_limit\":10}}}`)\n   - Response: `{ \"pos\":\"<next-pos>\", \"lists\":{…}, \"rooms\":{ \"<roomId>\": { \"timeline\":[ {event} ], \"notification_count\":n } }, \"extensions\":{} }`\n   - Loop: feed the returned `pos` back as `?pos=` to receive the next delta (new messages arrive here).\n   - **NOTE on path:** `org.matrix.simplified_msc3575` is what the homeserver flags as supported; the\n     classic unprefixed `org.matrix.msc3575/sync` returned 404 (this server only does the *simplified*\n     variant). Confirm the exact prefix by capturing one logged-in request (see §5) — element-web sends\n     it as the homeserver's advertised flavor.\n\n2. **Classic long-poll `/sync` (always works, simpler to script):**\n   ```\n   GET https://matrix.beeper.com/_matrix/client/v3/sync?since={next_batch}&timeout=30000\n   ```\n   - Headers: `Authorization: Bearer <matrix access_token>`  (returns 401 without it — verified)\n   - First call: omit `since` (or use a stored token / `filter`) → full state + a `next_batch`.\n   - Each subsequent call: pass `since={next_batch}&timeout=30000`. Server holds up to `timeout` ms\n     then returns deltas. New inbound messages appear under\n     `rooms.join.<roomId>.timeline.events[]` with `type:\"m.room.message\"`.\n   - Response top-level: `{ \"next_batch\":\"s…\", \"rooms\":{ \"join\":{ \"<roomId>\":{ \"timeline\":{\"events\":[…]}, \"unread_notifications\":{} } }, \"invite\":{}, \"leave\":{} }, \"account_data\":{}, \"presence\":{} }`\n   - **This is the recommended webhook driver:** a single Node loop calling `/sync` with the rolling\n     `next_batch`, emitting each new `m.room.message` to your webhook. Decoupled, push-latency.\n\n### B. Beeper Desktop API — NO native realtime (as of v5.0.0)\n- The v5.0.0 OpenAPI spec exposes **no SSE / websocket / events / subscribe** path (the older\n  `/v0/sse` referenced in Beeper's auth docs now returns **404** — removed).\n- Options: (1) **poll** `GET /v1/chats?direction=after` / `/v1/messages/search` on an interval and\n  diff cursors; or (2) the **MCP channel** `POST /v0/mcp` (returns 401 → needs the desktop token;\n  MCP streamable-HTTP, the path `selmcp__beeper__*` already uses) which can stream tool results.\n- For a true push webhook, prefer the **Matrix `/sync`** loop (§3A-2).\n\n---\n\n## 4. AUTH\n\n### A. Web app login (email + emailed code) — CAPTURED LIVE, ground truth\nBeeper mints a custom JWT via `api.beeper.com`, then exchanges it for a Matrix `access_token`.\nBase: `https://api.beeper.com` (from `localStorage.bp_ServerConfig` = `{\"url\":\"https://api.beeper.com\"}`).\nAll calls send `Authorization: Bearer <bootstrap/anonymous JWT>` + `Content-Type: application/json`;\nCORS origin `https://chat.beeper.com`.\n\n**Step 1 — start login (get a request id):**\n```\nPOST https://api.beeper.com/user/login          → 201\n```\nResponse body (verified):\n```json\n{ \"request\": \"2026621722-e6ac78a9-…\", \"type\": [\"email\"], \"expires\": \"2026-06-21T07:52:15.666Z\" }\n```\n\n**Step 2 — request the email code (triggers Beeper to EMAIL a 6-char code):**\n```\nPOST https://api.beeper.com/user/login/email     → 204\nbody: { \"request\": \"<request id from step 1>\", \"email\": \"info@xlrd.org\" }\n```\n✅ Steps 1–2 were executed live during capture → Beeper emailed a code to `info@xlrd.org`.\n\n**Step 3 — submit the emailed code  ⛔ CREDENTIAL STEP — NOT EXECUTED (user completes):**\n```\nPOST https://api.beeper.com/user/login/response  → 200\nbody: { \"request\": \"<request id>\", \"response\": \"<code from email>\" }\n→ returns a Beeper JWT, e.g. { \"token\": \"<jwt>\", \"whoami\": {…} }   (field name to confirm at runtime)\n```\n\n**Step 4 — exchange JWT for a Matrix access_token (standard Matrix JWT login):**\n```\nPOST https://matrix.beeper.com/_matrix/client/v3/login   → 200\nbody: { \"type\": \"org.matrix.login.jwt\", \"token\": \"<jwt from step 3>\" }\n→ { \"access_token\":\"<REDACTED>\", \"user_id\":\"@user:beeper.com\", \"device_id\":\"…\", \"home_server\":\"beeper.com\" }\n```\n(`GET /_matrix/client/v3/login` confirms supported flows:\n`org.matrix.login.jwt`, `m.login.password`, `m.login.application_service`.)\nThat `access_token` is the Bearer used for §1A / §2A / §3A. Persist it; reuse until 401.\n\n> Element-web stores it in `localStorage` as `mx_access_token`, `mx_user_id`, `mx_home_server`,\n> `mx_device_id` — so once the user logs the tab in, you can also just read those keys via CDP\n> (`Runtime.evaluate` → `localStorage.getItem('mx_access_token')`) instead of re-running steps 3–4.\n\n### B. Beeper Desktop API auth\n- Header: **`Authorization: Bearer <desktop token>`** (same for REST and MCP `/v0/mcp`,`/v0/sse`).\n- Token file: `~/.config/beeper/token` (currently **stale** → re-issue).\n- Re-issue options:\n  - **GUI:** Beeper Desktop → Settings → Integrations → \"+\" next to \"Approved connections\".\n  - **OAuth 2.0 + PKCE** (no client secret; `token_endpoint_auth_methods_supported: [\"none\"]`),\n    metadata at `GET http://127.0.0.1:23373/.well-known/oauth-authorization-server`:\n    - `authorization_endpoint` `…/oauth/authorize`, `token_endpoint` `…/oauth/token`,\n      `registration_endpoint` `…/oauth/register`, `revocation_endpoint` `…/oauth/revoke`,\n      `userinfo_endpoint` `…/oauth/userinfo`, scopes `[\"read\",\"write\"]`, PKCE `S256`.\n    - Flow: `POST /oauth/register` → `GET /oauth/authorize?...&code_challenge=…` (user approves in app,\n      `POST /oauth/authorize/callback`) → `POST /oauth/token` (code+verifier) → Bearer.\n  - Validate any token: `POST /oauth/introspect` (form `token=…`) → `{\"active\":true|false}`.\n- Security schemes in spec: `bearerAuth`, `oauth2`.\n\n---\n\n## 5. HOW TO CAPTURE THE LOGGED-IN CALLS (when the tab is logged in)\n\nRe-run the CDP tracer after login to record real send/sync requests with live values:\n```\nnode /Volumes/M4/sync_/exodus/dev_/xen/bin/beeper-cdp-capture.mjs 30 --trigger\n```\nIt attaches to the `chat.beeper.com` tab (`http://127.0.0.1:9223/json/list`), enables\n`Network`/`Runtime`, captures `requestWillBeSent` / `responseReceived` (+ bodies for\n`_matrix`/`beeper.com`/`sync` hosts) and **WebSocket frames**, redacting tokens. Triggers\n(open a room, view the inbox) will surface the exact sliding-sync path + send `txnId` format.\n\n---\n\n## 6. FILE INVENTORY (this reverse-engineering session)\n- `beeper-api.md` — this spec\n- `beeper-api.mjs` — runnable client (`sendMessage`, `listRooms`, `syncLoop` — Matrix + Desktop modes)\n- `beeper-desktop-openapi.json` — **authoritative** local OpenAPI 3.1.0 spec (Beeper Client API 5.0.0)\n- `beeper-authflow-*.json` — live capture of the email-code auth flow (steps 1–2)\n- `beeper-login-dom.json` — login-screen DOM + globals (proves logged-out + element-web)\n- `beeper-page-probe.json` — localStorage probe (proves no Matrix token present)\n- `beeper-capture-*.json`, `beeper-auth-capture-*.json` — raw idle/auth network captures\n- Capture scripts: `bin/beeper-cdp-capture.mjs`, `bin/beeper-auth-probe.mjs`, `bin/beeper-auth-trigger.mjs`\n"},{"title":"Beeper Desktop","sub":"local :23373 client API","md":"# Beeper Desktop Local HTTP + WebSocket API — Verified Map\n\nSource of truth: the live OpenAPI spec served by the running Beeper Desktop app at\n`GET http://127.0.0.1:23373/v1/spec` (OpenAPI 3.1.0, **API title \"Beeper Client API\", version 5.0.0**),\ncross-checked against the installed `@beeper/desktop-api` SDK source\n(`~/.npm/_npx/21171e4c7dc067cb/node_modules/@beeper/desktop-api/`).\nMapped 2026-06-21. App version 4.2.945, bundle `com.automattic.beeper.desktop`.\n\n> NO chat.beeper.com web login is involved. This is purely the on-device Desktop API.\n\n---\n\n## Base URL + port\n\n- **Base URL: `http://127.0.0.1:23373`** (also bound on `0.0.0.0:23373`, so LAN-reachable;\n  `config.json` has `\"desktop_api_remote_access\": true`).\n- Verified listening: `Beeper` main process (was pid 78638) holds `TCP *:23373 (LISTEN)`.\n  (`lsof` must run with a full PATH, e.g. `/usr/sbin/lsof`, or it appears to show nothing —\n  this is why an earlier check wrongly concluded \"nothing is listening\".)\n- The earlier **empty HTTP 200 bodies** on `/chats`, `/messages`, `/accounts`, `/openapi.json`\n  were because **those paths do not exist** — the API is versioned under **`/v1/...`**, and the\n  server returns a content-less 200 for unknown top-level paths. They are NOT a phantom port;\n  23373 is the real API. Correct paths (e.g. `/v1/info`) return real JSON.\n\n### Service discovery (no auth)\n`GET /v1/info` → returns app/platform/server info + endpoint map. Example (live):\n```json\n{\n  \"app\": {\"name\":\"Beeper\",\"version\":\"4.2.945\",\"bundle_id\":\"com.automattic.beeper.desktop\"},\n  \"server\": {\"status\":\"running\",\"base_url\":\"http://127.0.0.1:23373\",\"port\":23373,\n             \"hostname\":\"0.0.0.0\",\"remote_access\":true,\"mcp_enabled\":true},\n  \"endpoints\": {\n    \"oauth\": { \"authorization_endpoint\":\".../oauth/authorize\", \"token_endpoint\":\".../oauth/token\",\n               \"introspection_endpoint\":\".../oauth/introspect\", \"revocation_endpoint\":\".../oauth/revoke\",\n               \"registration_endpoint\":\".../oauth/register\", \"userinfo_endpoint\":\".../oauth/userinfo\" },\n    \"spec\": \"http://127.0.0.1:23373/v1/spec\",\n    \"mcp\":  \"http://127.0.0.1:23373/v0/mcp\",\n    \"ws_events\": \"http://127.0.0.1:23373/v1/ws\"\n  }\n}\n```\n\n---\n\n## Auth — header NAME + format (NO values stored here)\n\n- Scheme: **HTTP Bearer**. Every `/v1/*` operation requires it (global `security: [{bearerAuth: []}]`).\n- **Primary header:** `Authorization: Bearer <ACCESS_TOKEN>`\n- **Alternate header** (accepted by the MCP bridge layer, per SDK `auth.js`):\n  `X-Beeper-Access-Token: <ACCESS_TOKEN>`\n- SDK env var names: `BEEPER_ACCESS_TOKEN` (token), `BEEPER_BASE_URL` (override base; default\n  `http://localhost:23373`).\n- A valid call returns real JSON. A bad/expired/missing token returns\n  `401 {\"message\":\"Invalid token\",\"code\":\"unauthorized\"}`.\n\n### How a token is obtained (per spec description)\n> \"Access token obtained via OAuth2 PKCE flow **or created in-app**. Required for all API operations.\"\n\nTwo sources only:\n1. **In-app:** Beeper Desktop → Settings → Desktop API → create/copy a token. (One-time human action.)\n2. **OAuth2 Authorization-Code + PKCE** via the `/oauth/*` endpoints (see below). The authorize step\n   renders an HTML **consent page** that the user must approve in the running app.\n\n### ⚠️ Token state on THIS machine (2026-06-21) — all stored tokens are DEAD\nEmpirically tested against `GET /v1/accounts`:\n\n| Source | Length | Result |\n|---|---|---|\n| `~/.xen/secrets.env` `BEEPER_DESKTOP_TOKEN` | 49 | **401 Invalid token** |\n| `~/.config/beeper/token` (read by `beeper-mcp-proxy.js`) | 49 | **401 Invalid token** |\n| `~/.xen/secrets.env` `BEEPER_MATRIX_TOKEN` | 44 | 401 (Matrix token, not a Desktop-API token) |\n| keychain `Raycast / raycast_mcp_Beeper` → `oauth.access_token` | 36 | 401 (created 2026-02-28, TTL 86400s → expired) |\n| keychain `Raycast / raycast_mcp_BeeperXen` → `oauth.access_token` | 49 | 401 (created 2026-05-07, TTL 86400s → expired) |\n\nDesktop-API access tokens have **`expires_in: 86400` (24h)** and **no refresh_token is stored**, so\nevery cached token has long expired. The valid token currently lives only inside the running app\n(renderer memory / encrypted store); it is NOT present in any plaintext file, leveldb, IndexedDB,\nWebStorage, or readable keychain entry on disk.\n\n### Why we did NOT auto-mint one (HOTL boundary, documented)\nThe full PKCE flow was driven over HTTP headlessly:\n- `POST /oauth/register` → **201**, returns `client_id` (dynamic client registration works, no UI).\n- `POST /oauth/authorize/callback` with the exact body the consent page itself posts\n  (`{mode:\"oauth2\", clientInfo:{name, clientID}, scopes:[\"read\",\"write\"], redirectUri, scope, state,\n  codeChallenge, codeChallengeMethod}`) → **200 but `{\"error\":\"server_error\"}`** for every body\n  variant tried (with/without `resource`, `approved:true`, `action:approve`).\n- `grant_type=client_credentials` → **400 unsupported_grant_type** (only `authorization_code`).\n\n→ The app refuses to issue a code to a programmatically-registered client without genuine in-app\nuser approval. Minting a fresh token therefore requires **one** human action (approve the consent\npage, or create a token in Settings → Desktop API). This is Beeper's security design, not a code gap,\nand is intentionally left to the user (no token rotation performed; canon: scrub-don't-rotate).\n\n**To go live:** put a valid token in `~/.config/beeper/token` (preferred — the proxy hot-reloads it)\nor export `BEEPER_ACCESS_TOKEN`. The driver and proxy then work immediately; no code change needed.\n\n---\n\n## Endpoints (operationId — from live `/v1/spec`)\n\nFull set includes accounts, bridges (+login flows/sessions), chats, messages, reactions, reminders,\ncontacts, assets (upload/download/serve), search, app setup, and OAuth. The load-bearing ones:\n\n### LIST CHATS — `GET /v1/chats`  (op `listChats`)\n- Query params: `cursor` (string), `direction` (`after`|`before`), `accountIDs` (array), plus\n  filters (`inbox`, `type`, `includeMuted`, `limit`, …).\n- Response (cursor-paginated):\n  ```\n  { items: Chat[], hasMore: boolean, oldestCursor: string, newestCursor: string }\n  ```\n- `Chat` fields: `id, accountID, network, title, type ('single'|'group'), participants{items[],total,hasMore},\n  unreadCount, lastActivity, lastMessage, isArchived, isMuted, isPinned, capabilities, draft, …`\n- Find the self-chat / Note-to-Self: a `type:\"single\"` chat whose sole participant `isSelf===true`\n  (or title like \"Note to Self\" / \"Saved Messages\"). See `findSelfChat()` in the driver.\n\n### SEARCH CHATS — `GET /v1/chats/search` (op `searchChats`)\n- Query: `query` (title/network/participant), `cursor`, `direction`, `limit`. Same paginated shape.\n\n### LIST MESSAGES — `GET /v1/chats/{chatID}/messages` (op `listMessages`)\n- Path: `chatID*`. Query: `cursor`, `direction` (`after`|`before`), `limit`. Sorted by timestamp.\n- Response: `{ items: Message[], hasMore, oldestCursor, newestCursor }`\n\n### GET ONE MESSAGE — `GET /v1/chats/{chatID}/messages/{messageID}` (op `getMessage`)\n- Accepts final message ID, `pendingMessageID`, or Matrix event ID for `{messageID}`.\n- Response = `Message`: `{ id, chatID, accountID, senderID, senderName, timestamp, sortKey, type,\n  text, editedTimestamp, isSender, sendStatus, isHidden, isDeleted, attachments[], isUnread,\n  linkedMessageID, mentions[], links[], reactions[], seen }`\n\n### SEARCH MESSAGES — `GET /v1/messages/search` (op `searchMessages`)\n- Query: `query, cursor, direction, chatIDs[], accountIDs[], chatType, mediaTypes[], sender,\n  dateAfter, dateBefore, limit, excludeLowPriority, includeMuted`.\n- Response: `{ items: Message[], hasMore, oldestCursor, newestCursor, chats: {<chatID>: Chat} }`\n\n### SEND MESSAGE — `POST /v1/chats/{chatID}/messages` (op `sendMessage`)\n- Path: `chatID*`.\n- Request body (`application/json`):\n  ```json\n  { \"text\": \"hello\", \"replyToMessageID\": \"<optional msg id>\", \"attachment\": { /* optional */ } }\n  ```\n- Response: `{ \"chatID\": \"...\", \"pendingMessageID\": \"...\" }`\n  - The send is async. To confirm delivery: `GET /v1/chats/{chatID}/messages/{pendingMessageID}`\n    and read `sendStatus`, **or** wait for the matching `message.upserted` over the WebSocket.\n\n### EDIT / DELETE / REACT\n- `PUT /v1/chats/{chatID}/messages/{messageID}`  body `{ \"text\": \"...\" }`  (op `editMessage`)\n- `DELETE /v1/chats/{chatID}/messages/{messageID}`  (op `deleteMessage`)\n- `POST /v1/chats/{chatID}/messages/{messageID}/reactions`  body `{ \"reactionKey\": \"👍\" }`  (op `addReaction`)\n- `DELETE /v1/chats/{chatID}/messages/{messageID}/reactions/{reactionKey}` (op `removeReaction`)\n\n### Other useful\n- `GET /v1/accounts` (op `getAccounts`) — connected networks/accounts.\n- `POST /v1/chats/start` (op `startChat`) body `{accountID, participantIDs[], text?}` — DM by participant.\n- `POST /v1/chats` (op `createChat`) body `{accountID, participantIDs[], type:'single'|'group', ...}`.\n- `POST /v1/chats/{chatID}/archive` body `{archived:bool}`; `/read`, `/unread`; `/reminders`.\n- `POST /v1/assets/upload` (multipart) / `/v1/assets/upload/base64` / `POST /v1/assets/download` / `GET /v1/assets/serve`.\n- `POST /v1/focus` (op `focusApp`).\n\n---\n\n## REALTIME inbound (powers auto-detect → webhook)\n\n**WebSocket: `ws://127.0.0.1:23373/v1/ws`** (the `ws_events` endpoint from `/v1/info`).\n- Auth: send the same bearer token. The SDK sends it as a header on the WS upgrade\n  (`Authorization: Bearer <token>`); the driver also appends `?access_token=<token>` as a fallback.\n- Inbound frames are JSON of type **`WSDomainEventMessage`**:\n  ```\n  { type: string, seq: number, ts: number, chatID: string, ids: string[], entries: any[] }\n  ```\n- The event that signals a new/updated message is **`message.upserted`** (per SDK\n  `messages.d.ts`: \"wait for the matching message.upserted over the WebSocket\"). `entries` carries the\n  upserted `Message` object(s); `chatID`/`ids` identify the chat and message ids. Other domain events\n  (chat updates, read receipts, typing) arrive on the same socket distinguished by `type`.\n- `seq` is monotonic — use it to detect gaps / resume.\n- On `message.upserted` where the message is inbound (`isSender===false`), fire the\n  auto-detect → webhook. The driver's `watchInbound(cb)` does exactly this with auto-reconnect.\n\n---\n\n## Quick verification recipe\n```bash\n# 1. discovery (no auth) — proves the port is real:\ncurl -s http://127.0.0.1:23373/v1/info | jq .\n\n# 2. with a VALID token (place it first; see \"To go live\"):\nTOKEN=$(cat ~/.config/beeper/token)            # or $BEEPER_ACCESS_TOKEN\ncurl -s -H \"Authorization: Bearer $TOKEN\" http://127.0.0.1:23373/v1/accounts | jq .\ncurl -s -H \"Authorization: Bearer $TOKEN\" 'http://127.0.0.1:23373/v1/chats?limit=5' | jq '.items[]|{id,title,type}'\n\n# 3. validate any token:\ncurl -s -X POST http://127.0.0.1:23373/oauth/introspect \\\n  -H 'content-type: application/x-www-form-urlencoded' --data-urlencode \"token=$TOKEN\"\n#   -> {\"active\":true,...} if valid, {\"active\":false} if dead.\n```\n\n## Driver\n`/Volumes/M4/sync_/exodus/dev_/xen/bin/beeper-api.mjs` — exposes `listChats()`, `sendMessage(chatId,text)`,\n`watchInbound(cb)`, plus `getInfo()`, `getAccounts()`, `listMessages()`, `searchChats()`, `findSelfChat()`,\n`introspect()`. Reads token from `BEEPER_ACCESS_TOKEN` → `BEEPER_DESKTOP_TOKEN` → `~/.config/beeper/token`.\nCLI: `node beeper-api.mjs info|accounts|chats|self|send <chatId> <text>|watch`.\n"}];
// minimal markdown renderer (headings, code, tables, lists, bold, inline-code, links)
function md2html(md){
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines=md.split('\n'); let out=[],i=0,inTable=false;
  function inline(t){return esc(t)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');}
  while(i<lines.length){
    let l=lines[i];
    if(/^```/.test(l)){let b=[];i++;while(i<lines.length&&!/^```/.test(lines[i])){b.push(esc(lines[i]));i++}i++;out.push('<pre><code>'+b.join('\n')+'</code></pre>');continue}
    if(/^\|/.test(l)){let rows=[];while(i<lines.length&&/^\|/.test(lines[i])){rows.push(lines[i]);i++}
      let cells=rows.filter(r=>!/^\|[\s:|-]+\|?$/.test(r)).map(r=>r.split('|').slice(1,-1).map(c=>c.trim()));
      if(cells.length){out.push('<table><tr>'+cells[0].map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr>'+cells.slice(1).map(rw=>'<tr>'+rw.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>').join('')+'</table>')}
      continue}
    let h=l.match(/^(#{1,4})\s+(.*)/);
    if(h){out.push('<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>');i++;continue}
    if(/^[-*]\s+/.test(l)){let items=[];while(i<lines.length&&/^[-*]\s+/.test(lines[i])){items.push('<li>'+inline(lines[i].replace(/^[-*]\s+/,''))+'</li>');i++}out.push('<ul>'+items.join('')+'</ul>');continue}
    if(l.trim()==='')out.push(''); else out.push('<p>'+inline(l)+'</p>');
    i++;
  }
  return out.join('\n');
}
const tabs=document.getElementById('tabs'),docs=document.getElementById('docs');
DOCS.forEach((d,idx)=>{
  const t=document.createElement('div');t.className='tab'+(idx===0?' on':'');t.innerHTML=d.title+'<small>'+d.sub+'</small>';
  t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.doc').forEach(x=>x.classList.remove('on'));t.classList.add('on');document.getElementById('doc'+idx).classList.add('on')};
  tabs.appendChild(t);
  const dv=document.createElement('div');dv.className='doc'+(idx===0?' on':'');dv.id='doc'+idx;dv.innerHTML=md2html(d.md);docs.appendChild(dv);
});
