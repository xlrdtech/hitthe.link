##  Hetzner installimage config — Auction #3034210 (AMD Ryzen)
##  Ubuntu 24.04 LTS, single disk (adjust DRIVE if server has 2 disks)
##
##  USAGE (from rescue system):
##    1. Upload this file: scp installimage.conf root@142.132.204.105:/root/
##    2. SSH in: ssh root@142.132.204.105
##    3. Run: installimage -c /root/installimage.conf
##    4. Reboot when prompted
##
##  DISK DETECTION — check with: lsblk
##  If NVMe:  DRIVE1 /dev/nvme0n1
##  If SATA:  DRIVE1 /dev/sda
##  Uncomment the correct line:

DRIVE1 /dev/sda
# DRIVE1 /dev/nvme0n1

## If 2 identical disks — enable software RAID 1:
# DRIVE2 /dev/sdb
# SWRAID 1
# SWRAIDLEVEL 1

## Single disk (default):
SWRAID 0

BOOTLOADER grub

HOSTNAME xen-hetzner

## Partition layout
PART /boot  ext4   512M
PART swap   swap   8G
PART /      ext4   all

## OS image — Ubuntu 24.04 LTS
IMAGE /root/.oldroot/nfs/images/Ubuntu-2404-noble-amd64-base.tar.gz

## SSH public key (paste your key below — remove the placeholder line)
## SSHKEYS_URL https://github.com/YOUR_GITHUB_USERNAME.keys
## Or paste directly:
# PUBKEY ssh-ed25519 AAAAC3... qi@xlrd
