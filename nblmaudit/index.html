                                </div>
                                
                                <div className="flex gap-2 text-xs font-medium">
                                    <div className="px-3 py-1.5 bg-slate-100 rounded-full text-slate-600 border border-slate-200">
                                        Total: {stats.total}
                                    </div>
                                    <div className="px-3 py-1.5 bg-[#C5A059]/10 text-[#C5A059] rounded-full border border-[#C5A059]/20">
                                        Kept: {stats.keep}
                                    </div>
                                    <div className="px-3 py-1.5 bg-red-50 text-red-500 rounded-full border border-red-100">
                                        Trash: {stats.delete}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 sm:px-6 py-8">
                        
                        {/* Controls Bar */}
                        <div className="flex flex-col sm:flex-row gap-4 mb-8 sticky top-24 z-10 bg-[#fafafa]/95 backdrop-blur-sm py-2">
                            {/* Search */}
                            <div className="relative flex-grow">
                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                                    <Search size={18} />
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="Search notebooks..." 
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                    className="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-[#C5A059]/50 focus:border-[#C5A059] transition-all"
                                />
                            </div>

                            {/* Filter Tabs */}
                            <div className="flex bg-white p-1 rounded-lg border border-slate-200 shadow-sm overflow-x-auto">
                                {['all', 'pending', 'keep', 'delete'].map(f => (
                                    <button
                                        key={f}
                                        onClick={() => setFilter(f)}
                                        className={`
                                            px-4 py-1.5 rounded-md text-sm font-medium capitalize whitespace-nowrap transition-all
                                            ${filter === f 
                                                ? 'bg-[#C5A059] text-white shadow-sm' 
                                                : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'}
                                        `}
                                    >
                                        {f === 'all' ? 'All Items' : f}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Notebook List */}
                        <div className="space-y-1">
                            {filteredNotebooks.length > 0 ? (
                                filteredNotebooks.map(notebook => (
                                    <NotebookItem 
                                        key={notebook.id} 
                                        item={notebook} 
                                        onAction={handleAction} 
                                    />
                                ))
                            ) : (
                                <div className="text-center py-20 text-slate-400">
                                    <div className="flex justify-center mb-4 opacity-20"><Filter size={48} /></div>
                                    <p>No notebooks found in this category.</p>
                                </div>
                            )}
                        </div>

                        {/* Action Footer */}
                        {stats.total > 0 && (
                            <div className="mt-12 pt-8 border-t border-slate-200 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <button 
                                    onClick={() => copyToClipboard('keep')}
                                    disabled={stats.keep === 0}
                                    className="flex items-center justify-center gap-2 px-6 py-3 bg-[#C5A059] text-white rounded-lg hover:bg-[#b08d2f] transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-md shadow-[#C5A059]/20"
                                >
                                    <Download size={18} />
                                    Copy Kept List ({stats.keep})
                                </button>
                                <button 
                                    onClick={() => copyToClipboard('delete')}
                                    disabled={stats.delete === 0}
                                    className="flex items-center justify-center gap-2 px-6 py-3 bg-white border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    <MoreHorizontal size={18} />
                                    Copy Deletion List ({stats.delete})
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<script src="https://hitthe.link/lib/grid-autofix.js" defer></script>
</body>
</html>
