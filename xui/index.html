<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="theme-color" content="#000"><title>XUI — XOS2 3-Panel (v1 hot 2026-06-03)</title><link rel="manifest" href="./manifest.webmanifest"><link rel="icon" type="image/svg+xml" href="icon.svg" /><link rel="shortcut icon" type="image/svg+xml" href="icon.svg" /><link rel="apple-touch-icon" href="icon.svg" /><meta name="theme-color" content="#000000" /><meta name="apple-mobile-web-app-capable" content="yes" /><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" /><meta name="apple-mobile-web-app-title" content="XUI" /><style>:root{--bg:#0a0d09;--panel:#0f1411;--card:#131814;--fg:#e5ede9;--dim:#7a8780;--accent:#00dc82;--red:#ff5566;--amber:#f0a060;--bd:rgba(255,255,255,.08);--bd-strong:rgba(255,255,255,.16);--pill-beside:#9F7AEA;--pill-spark:#F6AD55;--pill-beeper:#3FA9F5}*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font:14px/1.45 -apple-system,system-ui,SF Pro Text,Segoe UI,Inter,sans-serif;overflow:hidden}button{font:inherit;color:inherit}.topbar{height:36px;display:flex;align-items:center;gap:14px;padding:0 14px;border-bottom:1px solid var(--bd);background:var(--panel);user-select:none}.topbar .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}.topbar .build{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}.layout{display:grid;height:calc(100% - 36px);grid-template-columns:280px 1fr 300px;grid-template-areas:"inbox thread crm"}@media (max-width:980px){.layout{grid-template-columns:1fr;grid-template-areas:"thread"}.panel.inbox,.panel.crm{display:none}.layout.show-inbox{grid-template-areas:"inbox"}.layout.show-inbox .panel.inbox{display:flex}.layout.show-inbox .panel.thread,.layout.show-inbox .panel.crm{display:none}.layout.show-crm{grid-template-areas:"crm"}.layout.show-crm .panel.crm{display:flex}.layout.show-crm .panel.thread,.layout.show-crm .panel.inbox{display:none}.mobile-nav{display:flex!important}}.panel{display:flex;flex-direction:column;min-width:0;min-height:0;border-right:1px solid var(--bd);background:var(--panel)}.panel:last-child{border-right:none}.panel.inbox{grid-area:inbox}.panel.thread{grid-area:thread;background:var(--bg)}.panel.crm{grid-area:crm}.panel-head{padding:8px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px}.panel-head .title{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}.personas{display:flex;gap:4px;padding:4px 8px;flex-wrap:wrap}.persona-pill{font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid var(--bd);color:var(--dim);background:transparent;cursor:pointer;text-transform:uppercase}.persona-pill.active{color:var(--fg);border-color:var(--accent);background:var(--card)}.pills{display:flex;gap:4px;padding:4px 8px;flex-wrap:wrap}.pill{font-size:10px;padding:2px 6px;border-radius:999px;border:1px solid var(--bd);color:var(--dim);background:transparent;cursor:pointer;text-transform:uppercase}.pill.active{color:var(--fg);border-color:var(--bd-strong);background:var(--card)}.thread-row{padding:8px 10px;border-bottom:1px solid var(--bd);cursor:pointer;display:flex;gap:8px;align-items:flex-start}.thread-row.active{background:rgba(0,220,130,.06);border-left:3px solid var(--accent);padding-left:7px}.thread-row .avatar{width:28px;height:28px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;flex-shrink:0}.thread-row .body{flex:1;min-width:0}.thread-row .name{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.thread-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}.msg{max-width:75%;padding:6px 10px;border-radius:12px;font-size:12px;line-height:1.4;word-wrap:break-word}.msg.in{align-self:flex-start;background:var(--card);border:1px solid var(--bd)}.msg.out{align-self:flex-end;background:var(--accent);color:#0a0d09;font-weight:500}.reply-row{border-top:1px solid var(--bd);padding:8px;background:var(--panel);display:flex;gap:6px;align-items:flex-end}.reply-row textarea{flex:1;resize:none;background:var(--card);border:1px solid var(--bd);color:var(--fg);padding:6px 8px;border-radius:6px;font:inherit;outline:none;min-height:28px;max-height:80px}.reply-row button.send{background:var(--accent);color:#0a0d09;border:none;padding:6px 12px;border-radius:6px;font-weight:600;cursor:pointer;font-size:11px}#voice-mic{background:var(--card);border:1px solid var(--bd);padding:4px 8px;border-radius:6px;cursor:pointer}.#voice-mic.listening{background:var(--accent);color:#0a0d09}.vei-bar{padding:4px 8px;background:#111;font-size:10px;color:var(--dim);display:flex;gap:8px;align-items:center}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:8px}.keypad button{padding:8px;border:1px solid var(--bd);background:var(--card);color:var(--fg);border-radius:6px;font-size:14px}.dialer-status{padding:6px 10px;font-family:ui-monospace,monospace;font-size:11px;color:var(--accent);border-bottom:1px solid var(--bd)}.contact{padding:8px 10px;border-bottom:1px solid var(--bd);cursor:pointer;display:flex;gap:8px;align-items:center}.contact .actions button{font-size:10px;padding:2px 6px}.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--bd);padding:6px;justify-content:space-around;z-index:100}.mobile-nav button{background:transparent;border:none;color:var(--dim);font-size:10px;padding:4px 8px;cursor:pointer;text-transform:uppercase}.err{color:var(--red);padding:8px;font-size:11px}</style></head><body><div class="topbar"><span class="dot"></span><span class="build">XUI v1 · 2026-06-03 hot+versioned</span><span class="pane">3-PANEL XOS2</span><span class="right">left: omni+personas · mid: vei+webview+composer+voice · right: Beside dialer/CRM · no-auth remote · <a href="https://hitthe.link/xui" style="color:var(--accent)">hitthe.link/xui</a></span></div><div class="layout" id="layout"><div class="panel inbox"><div class="panel-head"><span class="title">OMNI INBOX</span><input id="search" placeholder="search threads" style="flex:1"></div><div id="personas" class="personas"></div><div class="pills" id="pills"><button class="pill active" data-src="all">ALL</button><button class="pill" data-src="beside">BESIDE</button><button class="pill" data-src="beeper">BEEPER</button><button class="pill" data-src="spark">SPARK</button></div><div class="panel-body" id="inbox-list"></div></div><div class="panel thread"><div class="thread-head"><div><div id="thread-name" class="name">Select thread or load webview</div><div id="thread-meta" class="meta"></div></div></div><div class="vei-bar">VEI active (echo immunity) <button id="voice-mic" title="Voice to composer (browser SR)">🎤</button><span id="vei-log" style="flex:1;font-size:9px;overflow:hidden;white-space:nowrap"></span><button onclick="loadWebview('https://xen.xlrd.org/muse/')">load muse</button><button onclick="loadWebview('https://xlrdtech.github.io/xen-pwa/3/')">load 3/</button></div><div id="thread-messages" style="flex:1;overflow:auto;padding:8px"></div><div class="reply-row" id="reply-row"><span id="reply-persona" class="persona">QI</span><textarea id="reply-text" placeholder="reply or cmd (voice or type)"></textarea><button id="reply-send" class="send" disabled>send</button></div></div><div class="panel crm"><div class="panel-head"><span class="title">BESIDE DIALER / CRM</span></div><div id="dialer-status" class="dialer-status">idle</div><div id="keypad" class="keypad"><button data-d="1">1</button><button data-d="2">2</button><button data-d="3">3</button><button data-d="4">4</button><button data-d="5">5</button><button data-d="6">6</button><button data-d="7">7</button><button data-d="8">8</button><button data-d="9">9</button><button data-d="*">*</button><button data-d="0">0</button><button data-d="#">#</button><button data-d="clr">CLR</button><button data-d="call" style="grid-column:span 2;background:var(--accent);color:#000">CALL</button></div><input id="dial-input" placeholder="+1..." style="margin:4px 8px;padding:4px;border:1px solid var(--bd);background:var(--card);color:var(--fg);border-radius:4px"><div class="panel-body" id="contacts-list" style="max-height:40%"></div><div style="padding:6px;display:flex;gap:4px;flex-wrap:wrap"><button onclick="if(window.__phone)window.__phone.apply('answer')">ANSWER</button><button onclick="if(window.__phone)window.__phone.apply('hangup')">HANGUP</button><button onclick="if(window.__phone)window.__phone.apply('mute',{on:true})">MUTE</button><button onclick="if(window.__phone)window.__phone.apply('hold')">HOLD</button><button onclick="if(window.__phone)window.__phone.apply('merge')">MERGE</button><button onclick="if(window.__phone)window.__phone.apply('swap')">SWAP</button></div></div></div><div class="mobile-nav"><button data-view="inbox">INBOX</button><button data-view="thread" class="active">THREAD</button><button data-view="crm">DIALER</button></div><script>const API_BASE = (location.hostname.includes('github.io') || location.hostname.includes('hitthe.link') || location.hostname.includes('xlrd.org')) ? 'https://api.xlrd.org' : '';const $ = s => document.querySelector(s); const $$ = s => Array.from(document.querySelectorAll(s));const fmt = ts => { if(!ts) return ''; const d=new Date(ts),ago=(Date.now()-ts)/1000; if(ago<60)return'now'; if(ago<3600)return Math.floor(ago/60)+'m'; if(ago<86400)return Math.floor(ago/3600)+'h'; return d.toISOString().slice(5,10); };const initials = name => { const w=String(name||'').replace(/^\+?/,'').split(/\s+/).filter(Boolean); return w.length ? (w[0].match(/^\d/)?w[0].slice(-2):w.slice(0,2).map(s=>s[0]).join('').toUpperCase()) : '?'; };function el(tag, attrs, children) { const node=document.createElement(tag); if(attrs){for(const [k,v] of Object.entries(attrs)){if(v==null||v===false)continue; if(k==='class')node.className=v; else if(k==='style')node.style.cssText=v; else if(k.startsWith('data-'))node.setAttribute(k,v); else if(k==='on')for(const [evt,fn] of Object.entries(v)) node.addEventListener(evt,fn); else node.setAttribute(k,v);}} if(children){for(const c of [].concat(children)){if(c==null)continue; node.appendChild(typeof c==='string'?document.createTextNode(c):c);}} return node; }const state = {threads:[],filter:'all',query:'',activeChatID:null}; let contactsCache=[];async function loadThreads(){ try{ const r=await fetch(`${API_BASE}/api/omni/threads`); const j=await r.json(); state.threads=j.threads||[]; renderInbox(); renderContactsFromThreads(); }catch(e){ const list=$('#inbox-list'); if(list)list.replaceChildren(el('div',{class:'err'},e.message)); } }function renderInbox(){ const list=$('#inbox-list'); if(!list)return; const filtered=state.threads.filter(t=>{ if(state.filter!=='all'&&t.source!==state.filter)return false; if(state.query){const q=state.query.toLowerCase(); if(!String(t.name||'').toLowerCase().includes(q)&&!String(t.snippet||'').toLowerCase().includes(q))return false;} return personaFilter(t.name); }); if(!filtered.length){list.replaceChildren(el('div',{class:'skeleton'},'No matching threads.'));return;} const rows=filtered.map(t=>{ const cls=['thread-row']; if(t.unread)cls.push('unread'); if(t.id===state.activeChatID)cls.push('active'); const av=t.avatar?el('div',{class:'avatar',style:`background-image:url('${String(t.avatar).replace(/'/g,'')}')`}):el('div',{class:'avatar'},initials(t.name)); return el('div',{class:cls.join(' '),'data-id':t.id,'data-source':t.source},[av,el('div',{class:'body'},[el('div',{class:'row1'},[el('div',{class:'name'},t.name||''),el('div',{class:'ts'},fmt(t.timestamp))]),el('div',{class:'snippet'},[el('span',{class:`src-tag ${t.source}`},t.source),' '+(t.snippet||'')])])]); }); list.replaceChildren(...rows); }let currentPersona='all';function renderPersonas(){ const p=$('#personas'); if(!p)return; p.replaceChildren(); ['all','qi','lyn','eli'].forEach(pr=>{ const b=el('button',{class:'persona-pill'+(currentPersona===pr?' active':''),'data-persona':pr},pr==='all'?'ALL':pr.toUpperCase()); b.onclick=()=>{currentPersona=pr;$$('.persona-pill').forEach(bb=>bb.classList.toggle('active',bb.dataset.persona===pr)); renderInbox();}; p.appendChild(b); }); }function personaFilter(name){ if(currentPersona==='all')return true; const n=String(name||'').toLowerCase(); if(currentPersona==='qi')return !n.includes('luckie')&&!n.includes('goggins')&&!n.includes('anthony')&&!n.includes('vasquez'); if(currentPersona==='lyn')return n.includes('luckie')||n.includes('goggins'); if(currentPersona==='eli')return n.includes('anthony')||n.includes('vasquez'); return true; }async function loadThread(chatID,source){ const t=state.threads.find(x=>x.id===chatID); $('#thread-empty')&&($('#thread-empty').hidden=true); $('#thread-head')&&($('#thread-head').hidden=false); $('#thread-messages')&&($('#thread-messages').hidden=false); $('#reply-row')&&($('#reply-row').hidden=false); $('#thread-name')&&($('#thread-name').textContent=t?t.name:chatID); $('#thread-meta')&&($('#thread-meta').textContent=t?`${t.network||t.source} · ${t.protocol||''}`:''); const msgs=$('#thread-messages'); if(msgs)msgs.replaceChildren(el('div',{class:'skeleton'},'Loading...')); const pn=String(t?.name||'').toLowerCase(); let persona='qi'; if(pn.includes('luckie')||pn.includes('goggins'))persona='lyn'; else if(pn.includes('anthony')||pn.includes('vasquez'))persona='eli'; $('#reply-persona')&&($('#reply-persona').textContent=persona); try{ const url=`${API_BASE}/api/omni/messages?chatId=${encodeURIComponent(chatID)}&source=${encodeURIComponent(source)}&limit=40`; const r=await fetch(url); const j=await r.json(); const arr=j.messages||[]; if(!arr.length){if(msgs)msgs.replaceChildren(el('div',{class:'skeleton'},'No messages.'));return;} const nodes=arr.slice().reverse().map(m=>{ const cls=`msg ${m.isOwn?'out':'in'}`; const ch=[]; if(m.author&&!m.isOwn)ch.push(el('div',{class:'author'},m.author)); ch.push(el('div',null,m.text||'')); ch.push(el('div',{class:'ts'},fmt(m.ts))); return el('div',{class:cls},ch); }); if(msgs){msgs.replaceChildren(...nodes); msgs.scrollTop=msgs.scrollHeight;} }catch(e){if(msgs)msgs.replaceChildren(el('div',{class:'err'},e.message));} }$('#inbox-list')&&$('#inbox-list').addEventListener('click',async e=>{ const row=e.target.closest('.thread-row'); if(!row)return; state.activeChatID=row.dataset.id; renderInbox(); await loadThread(row.dataset.id,row.dataset.source); if(window.innerWidth<=980){ $('#layout').className='layout'; $$('.mobile-nav button').forEach(b=>b.classList.toggle('active',b.dataset.view==='thread')); } });$('#reply-text')&&$('#reply-text').addEventListener('input',e=>{ $('#reply-send')&&($('#reply-send').disabled=!e.target.value.trim()); e.target.style.height='auto'; e.target.style.height=Math.min(80,e.target.scrollHeight)+'px'; });$('#reply-send')&&$('#reply-send').addEventListener('click',async ()=>{ const text=$('#reply-text').value.trim(); if(!text||!state.activeChatID)return; const t=state.threads.find(x=>x.id===state.activeChatID); try{ const r=await fetch(`${API_BASE}/api/omni/send`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({chatID:state.activeChatID,source:t?.source||'beeper',text})}); const j=await r.json(); if(!j.ok)throw new Error(j.error||'send failed'); $('#reply-text').value=''; $('#reply-send')&&($('#reply-send').disabled=true); setTimeout(()=>loadThread(state.activeChatID,t?.source||'beeper'),400); }catch(e){alert('send failed: '+e.message);} });$('#pills')&&$('#pills').addEventListener('click',e=>{ const p=e.target.closest('.pill'); if(!p)return; state.filter=p.dataset.src; $$('.pill').forEach(b=>b.classList.toggle('active',b===p)); renderInbox(); });$('#search')&&$('#search').addEventListener('input',e=>{ state.query=e.target.value.trim(); renderInbox(); });async function loadContacts(){ try{ const r=await fetch(`${API_BASE}/api/contacts`); const j=await r.json(); contactsCache=j.contacts||[]; renderContacts(); }catch(e){ const l=$('#contacts-list'); if(l)l.replaceChildren(el('div',{class:'err'},e.message)); } }function renderContacts(){ const list=$('#contacts-list'); if(!list)return; const q=($('#contact-search')&&$('#contact-search').value||'').trim().toLowerCase(); let rows=contactsCache; if(q)rows=rows.filter(c=>String(c.name||'').toLowerCase().includes(q)||String(c.e164||'').toLowerCase().includes(q)); if(!rows.length){list.replaceChildren(el('div',{class:'skeleton'},'No contacts.'));return;} const nodes=rows.slice(0,60).map(c=>{ const display=c.name||c.e164||'?'; return el('div',{class:'contact','data-e164':c.e164||'','data-name':c.name||''},[el('div',{class:'avatar'},initials(display)),el('div',{class:'body'},[el('div',{class:'name'},display),el('div',{class:'phone'},c.e164||'')]),el('div',{class:'actions'},[el('button',{class:'dial','data-e164':c.e164||''},'📞'),el('button',{class:'sms','data-e164':c.e164||''},'✉')])]); }); list.replaceChildren(...nodes); }$('#contact-search')&&$('#contact-search').addEventListener('input',renderContacts);$('#contacts-list')&&$('#contacts-list').addEventListener('click',async e=>{ const dial=e.target.closest('.dial'); const sms=e.target.closest('.sms'); if(dial&&dial.dataset.e164){ if(window.__phone&&window.__phone.apply){ window.__phone.apply('place-call',{e164:dial.dataset.e164,name:dial.dataset.name||''}); } else { try{ await fetch(`${API_BASE}/api/call-start`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({caller_e164:dial.dataset.e164})}); }catch{} } return; } if(sms&&sms.dataset.e164){ const text=prompt('SMS to '+sms.dataset.e164+':'); if(!text)return; try{ await fetch(`${API_BASE}/send`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({phoneNumber:sms.dataset.e164,body:text})}); }catch{} } });function renderContactsFromThreads(){ if(!contactsCache.length)loadContacts(); else renderContacts(); }function loadWebview(u){ const msgs=$('#thread-messages'); if(!msgs)return; msgs.replaceChildren(el('iframe',{src:u,style:'width:100%;height:100%;border:0;background:#fff'})); $('#reply-row')&&($('#reply-row').hidden=true); $('#thread-name')&&($('#thread-name').textContent=new URL(u).hostname); }function initVoice(){ const mic=$('#voice-mic'); if(!mic)return; const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR){mic.disabled=true;mic.title='no SR';return;} const rec=new SR(); rec.continuous=false; rec.interimResults=false; rec.onresult=ev=>{ const txt=ev.results[0][0].transcript.trim(); const ta=$('#reply-text'); if(ta){ta.value=(ta.value?ta.value+' ':'')+txt; $('#reply-send')&&($('#reply-send').disabled=!ta.value.trim());} const vei=$('#vei-log'); if(vei){vei.textContent=(vei.textContent?vei.textContent+' | ':'')+txt; } }; rec.onend=()=>mic.classList.remove('listening'); mic.onclick=()=>{mic.classList.add('listening');try{rec.start();}catch{}}; }let __phoneState={mode:'idle',primary:null,secondary:null}; function applyPhoneAction(a,p={}){ const s=__phoneState; if(a==='place-call'){ s.primary={...p,connectedAt:Date.now()}; s.mode='oncall'; } else if(a==='hangup'){ s.primary=s.secondary=null; s.mode='idle'; } else if(a==='mute'){ s.muted=!!p.on; } else if(a==='hold'&&s.primary){ s.primary.held=!s.primary.held; } document.body.setAttribute('data-mode',s.mode); const st=$('#dialer-status'); if(st)st.textContent=s.mode+(s.primary?' '+s.primary.e164:'')+(s.muted?' (m)': ''); }window.__phone={apply:applyPhoneAction}; function initDialer(){ const kp=$('#keypad'); const din=$('#dial-input'); if(kp&&din){ kp.onclick=e=>{ const b=e.target.closest('button[data-d]'); if(!b)return; const d=b.dataset.d; if(d==='call'){ const num=din.value.trim(); if(num)applyPhoneAction('place-call',{e164:num}); } else if(d==='clr'){din.value='';} else din.value=(din.value||'')+d; }; } document.addEventListener('phonestate',e=>{ const st=$('#dialer-status'); if(st&&e.detail)st.textContent=e.detail.mode+(e.detail.primary?' '+e.detail.primary.e164:''); }); }function initPersonasAndVoiceAndDialer(){ renderPersonas(); initVoice(); initDialer(); const pl=$('#pills'); if(pl)pl.onclick=e=>{ const p=e.target.closest('.pill'); if(!p)return; state.filter=p.dataset.src; $$('.pill').forEach(b=>b.classList.toggle('active',b===p)); renderInbox(); }; }$('#inbox-list')&&$('#inbox-list').addEventListener('click',async e=>{ /* delegated above */ });try{ const sse=new EventSource(`${API_BASE}/events`); sse.onmessage=()=>loadThreads(); }catch{}loadThreads(); loadContacts(); initPersonasAndVoiceAndDialer(); setInterval(loadThreads,5000); setInterval(loadContacts,60000); setInterval(renderPersonas,30000);console.log('[XUI] 3-panel loaded — voice-first no-auth remote control ready. API_BASE=',API_BASE||'local');</script></body></html>
