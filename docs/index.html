<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Docs · hitthe.link</title>
<meta name="description" content="All markdown docs across hitthe.link, rendered as sites.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📚%3C/text%3E%3C/svg%3E">
<style>
  :root{--ink:#0a0a0e;--gold:#d4af37;--paper:#fbf9f4;--ash:#6b6b6b;--line:rgba(255,255,255,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:linear-gradient(180deg,#0a0a0e 0%,#1a1a2e 100%);color:var(--paper);font-family:"Cormorant Garamond",Georgia,serif;min-height:100vh;padding:40px 20px}
  header{max-width:920px;margin:0 auto 36px;text-align:center}
  h1{font-family:"Cinzel",Georgia,serif;font-size:clamp(28px,5vw,44px);letter-spacing:.1em;background:linear-gradient(90deg,#5ab8e8,var(--gold) 60%,var(--paper));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:10px}
  .sub{color:#aaa;font-style:italic;font-size:16px;max-width:600px;margin:0 auto;line-height:1.5}
  .meta{margin-top:14px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase}
  main{max-width:920px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .card{display:block;padding:20px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;text-decoration:none;color:var(--paper);transition:all .2s;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#5ab8e8,var(--gold))}
  .card:hover{background:rgba(212,175,55,.08);border-color:var(--gold);transform:translateY(-2px)}
  .title{font-family:"Cinzel",serif;font-size:15px;letter-spacing:.05em;color:var(--gold);margin-bottom:8px;font-weight:700}
  .path{font-family:"JetBrains Mono",monospace;font-size:11px;color:#bbb;word-break:break-all;line-height:1.4}
  footer{max-width:920px;margin:48px auto 0;text-align:center;color:#666;font-size:12px;border-top:1px solid var(--line);padding-top:20px;line-height:1.6}
  footer code{background:rgba(255,255,255,.05);padding:2px 8px;border-radius:4px;color:var(--gold);font-size:11px}
</style>
</head>
<body>
<header>
  <div style="font-size:48px;margin-bottom:8px">📚</div>
  <h1>DOCS</h1>
  <p class="sub">All markdown docs across hitthe.link, rendered as readable sites.</p>
  <div class="meta" id="count">SCANNING…</div>
</header>
<main id="grid"></main>
<footer>
  Each card renders the source .md via <code>marked.js</code> client-side.<br>
  Add a new doc · drop a .md into any subdir of <code>hitthe.link/</code> and append to <code>docs/manifest.json</code>.
</footer>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
fetch('manifest.json').then(r=>r.json()).then(docs=>{
  const grid=document.getElementById('grid');
  document.getElementById('count').textContent=`${docs.length} DOCS · LIVE`;
  docs.forEach(d=>{
    const a=document.createElement('a');
    a.className='card';
    a.href=`view.html?path=${encodeURIComponent(d.path)}&title=${encodeURIComponent(d.title)}`;
    a.innerHTML=`<div class="title">${d.title}</div><div class="path">${d.path}</div>`;
    grid.appendChild(a);
  });
});
</script>
</body>
</html>
