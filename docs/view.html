<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="t">Doc · hitthe.link</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📄%3C/text%3E%3C/svg%3E">
<style>
  :root{--ink:#0a0a0e;--gold:#d4af37;--paper:#fbf9f4;--ash:#6b6b6b;--line:rgba(255,255,255,.08);--accent:#5ab8e8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0c0c14;color:var(--paper);font-family:"Cormorant Garamond",Georgia,serif;min-height:100vh;line-height:1.65;padding:24px}
  .nav{max-width:840px;margin:0 auto 24px;display:flex;justify-content:space-between;align-items:center;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ash);letter-spacing:.1em;text-transform:uppercase}
  .nav a{color:var(--gold);text-decoration:none}
  .nav a:hover{color:var(--accent)}
  article{max-width:840px;margin:0 auto;padding:36px 40px 60px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;font-size:17px}
  article h1{font-family:"Cinzel",Georgia,serif;font-size:32px;margin:0 0 12px;letter-spacing:.04em;background:linear-gradient(90deg,var(--accent),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  article h2{font-family:"Cinzel",serif;font-size:22px;color:var(--gold);margin:28px 0 12px;letter-spacing:.04em;padding-bottom:6px;border-bottom:1px solid rgba(212,175,55,.2)}
  article h3{font-family:"Cinzel",serif;font-size:17px;color:var(--accent);margin:22px 0 10px;letter-spacing:.03em}
  article p{margin-bottom:14px;color:#dde6f0}
  article ul,article ol{margin:0 0 14px 24px;color:#dde6f0}
  article li{margin-bottom:6px}
  article code{font-family:"JetBrains Mono",monospace;background:rgba(255,255,255,.06);color:var(--gold);padding:2px 7px;border-radius:4px;font-size:14px}
  article pre{background:rgba(0,0,0,.4);padding:16px 18px;border-radius:8px;overflow-x:auto;margin:14px 0;border-left:3px solid var(--accent)}
  article pre code{background:none;color:#dde6f0;padding:0;font-size:13px;line-height:1.5}
  article a{color:var(--accent);text-decoration:none;border-bottom:1px dotted currentColor}
  article a:hover{color:var(--gold)}
  article blockquote{border-left:3px solid var(--gold);padding:6px 18px;margin:14px 0;background:rgba(212,175,55,.05);font-style:italic;color:#cccccc}
  article table{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px}
  article th,article td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--line)}
  article th{background:rgba(212,175,55,.08);color:var(--gold);font-family:"Cinzel",serif;letter-spacing:.06em;font-size:11px;text-transform:uppercase}
  .err{color:#ff6b6b;font-family:"JetBrains Mono",monospace;padding:24px;text-align:center}
</style>
</head>
<body>
<div class="nav">
  <a href="./">← All Docs</a>
  <span id="path-display">—</span>
</div>
<article id="doc"><p>Loading…</p></article>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const params = new URLSearchParams(location.search);
const path = params.get('path');
const title = params.get('title') || 'Doc';
document.getElementById('t').textContent = title + ' · Docs';
document.getElementById('path-display').textContent = path || '';
if (!path) {
  document.getElementById('doc').innerHTML = '<div class="err">No path specified. <a href="./">← Back to index</a></div>';
} else {
  fetch(path).then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(md => {
      document.getElementById('doc').innerHTML = marked.parse(md);
    })
    .catch(e => {
      document.getElementById('doc').innerHTML = `<div class="err">Failed to load ${path} (${e}). <a href="./">← Back</a></div>`;
    });
}
</script>
</body>
</html>
