<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>hitthe.link</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="hitthe.link" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/os.css" />
</head>
<body>
  <main id="os" data-screen-label="OS">
    <div id="wallpaper" aria-hidden="true">
      <span class="blob blob-a"></span>
      <span class="blob blob-b"></span>
      <span class="blob blob-c"></span>
      <div class="wp-grain"></div>
    </div>

    <!-- Global status bar -->
    <header id="statusbar" aria-hidden="true">
      <div class="sb-time" id="sb-time">9:41</div>
      <div class="sb-island" id="sb-island"></div>
      <div class="sb-right">
        <span class="sb-signal" title="signal">
          <i></i><i></i><i></i><i></i>
        </span>
        <span class="sb-wifi" id="sb-wifi" title="wi-fi">
          <svg viewBox="0 0 18 13" width="17" height="13"><path d="M9 12.4 11.1 9.8a2.8 2.8 0 0 0-4.2 0L9 12.4Zm0-5.1a5.6 5.6 0 0 1 4.4 2.1l1.7-2.1a8.4 8.4 0 0 0-12.2 0l1.7 2.1A5.6 5.6 0 0 1 9 7.3Zm0-5.2A11.2 11.2 0 0 0 .3 6.2L2 8.3a8.4 8.4 0 0 1 14 0l1.7-2.1A11.2 11.2 0 0 0 9 2.1Z"/></svg>
        </span>
        <span class="sb-batt" title="battery">
          <span class="sb-batt-shell"><b id="sb-batt-fill" style="width:78%"></b></span>
          <span class="sb-batt-cap"></span>
        </span>
      </div>
    </header>

    <!-- Lock screen -->
    <section id="lockscreen" data-screen-label="Lock screen" aria-label="Lock screen">
      <div class="lock-top">
        <div class="lock-glyph">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M6 10V8a6 6 0 1 1 12 0v2h1a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h1Zm2 0h8V8a4 4 0 0 0-8 0v2Z"/></svg>
        </div>
        <div class="lock-date" id="lock-date">Tuesday, June 3</div>
        <div class="lock-time" id="lock-time">9:41</div>
      </div>

      <div class="lock-notes" id="lock-notes"></div>

      <div class="lock-bottom">
        <button class="lock-quick" id="lock-flash" aria-label="Flashlight">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M7 2h10l-1.2 5.2a2 2 0 0 1-.5 1L14 9.8V21a2 2 0 0 1-4 0V9.8L8.7 8.2a2 2 0 0 1-.5-1L7 2Z"/></svg>
        </button>
        <div class="lock-hint">
          <span>Swipe up to open</span>
          <div class="lock-grip"></div>
        </div>
        <button class="lock-quick" id="lock-cam" aria-label="Camera">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M9 4l-1.2 1.6H5A2 2 0 0 0 3 7.6V18a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7.6a2 2 0 0 0-2-2h-2.8L15 4H9Zm3 5.2a4.4 4.4 0 1 1 0 8.8 4.4 4.4 0 0 1 0-8.8Z"/></svg>
        </button>
      </div>
    </section>

    <!-- Home screen -->
    <section id="home" data-screen-label="Home screen" aria-label="Home screen" hidden>
      <div class="home-scroll">
        <div id="widgets"></div>
        <div id="grid"></div>
      </div>
      <div id="dots"></div>
      <nav id="dock" aria-label="Dock"></nav>
    </section>

    <!-- App layer -->
    <div id="app-layer" aria-live="polite"></div>

    <!-- Control center -->
    <div id="cc-scrim"></div>
    <section id="control-center" data-screen-label="Control Center" aria-label="Control Center"></section>

    <!-- Home indicator -->
    <button id="home-indicator" aria-label="Home"></button>

    <!-- top edge grab zone for control center -->
    <div id="cc-grab" aria-hidden="true"></div>
  </main>

  <script src="js/icons.js"></script>
  <script src="js/apps.js"></script>
  <script src="js/os.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
