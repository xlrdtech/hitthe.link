<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000001;color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* COSMIC SWARM — fixed full-bleed background */
#swarm-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
#swarm-bg canvas{display:block}
.vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(circle at 50% 38%,transparent 12%,rgba(0,0,1,.62) 78%,#000001 115%)}
.page{position:relative;z-index:2}

/* NAV */
.nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:clamp(12px,2vw,14px) clamp(16px,4vw,32px);background:rgba(0,0,1,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);gap:12px}
.nav-left{display:flex;align-items:center;gap:8px}
.nav-logo{font-size:clamp(15px,2.2vw,17px);font-weight:700;letter-spacing:-.03em;display:flex;align-items:center;gap:8px;min-height:44px}
.nav-logo img{width:26px;height:26px;border-radius:7px;object-fit:cover}
.nav-pill{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:999px;padding:4px 6px;backdrop-filter:blur(12px)}
.nav-pill a{font-size:clamp(12px,1.6vw,13px);font-weight:500;color:rgba(255,255,255,.6);padding:10px 16px;border-radius:999px;transition:.2s;white-space:nowrap;min-height:44px;display:inline-flex;align-items:center}
.nav-pill a:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-right{display:flex;align-items:center;gap:clamp(10px,2vw,18px);margin-left:auto}
.nav-right .book{font-size:clamp(12px,1.6vw,13px);font-weight:500;color:rgba(255,255,255,.7);padding:10px 4px;min-height:44px;display:inline-flex;align-items:center}
.nav-right .book:hover{color:#fff}
.nav-right .cta{font-size:clamp(12px,1.6vw,13px);font-weight:600;background:#fff;color:#000;padding:10px 20px;border-radius:999px;transition:.15s;min-height:44px;display:inline-flex;align-items:center}
.nav-right .cta:hover{background:#cfe8ff}
.nav-menu-btn{display:none;align-items:center;justify-content:center;width:44px;height:44px;padding:0;border:1px solid rgba(255,255,255,.14);border-radius:10px;background:rgba(255,255,255,.05);color:#fff;cursor:pointer}
.nav-drawer{display:none;position:fixed;inset:0;top:calc(clamp(12px,2vw,14px)*2 + 44px);z-index:190;background:rgba(0,0,1,.6);backdrop-filter:blur(10px)}
.nav-drawer.open{display:block}
.nav-drawer-inner{background:rgba(6,10,16,.96);border-top:1px solid rgba(255,255,255,.08);padding:12px 20px 20px;display:flex;flex-direction:column;gap:4px}
.nav-drawer a{font-size:clamp(14px,2vw,15px);font-weight:500;color:rgba(255,255,255,.8);padding:14px 12px;border-radius:10px;min-height:44px;display:flex;align-items:center}
.nav-drawer a:hover{background:rgba(255,255,255,.07);color:#fff}

/* HERO (over swarm — no icon cloud) */
.hero{text-align:center;padding:clamp(56px,12vh,140px) clamp(16px,4vw,24px) clamp(40px,9vh,90px)}
.hero .kick{font-size:11px;font-weight:600;letter-spacing:.4em;text-transform:uppercase;color:#7dd3fc;margin-bottom:18px;text-shadow:0 0 18px rgba(0,240,255,.4)}
.hero h1{font-family:'Playfair Display',Georgia,serif;font-size:clamp(34px,6vw,76px);font-weight:400;letter-spacing:-.02em;line-height:1.06;margin-bottom:14px;text-shadow:0 2px 40px rgba(0,0,1,.9)}
.hero h1 i{font-style:italic;color:#cfe2ff}
.hero p{color:rgba(224,242,254,.62);font-size:clamp(13px,2vw,15px);max-width:480px;margin:0 auto;line-height:1.55;text-wrap:balance;text-shadow:0 1px 16px rgba(0,0,1,.9)}

/* FILTER */
.filterbar{max-width:1140px;margin:0 auto;padding:0 clamp(16px,4vw,28px);display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:nowrap;position:sticky;top:64px;z-index:150}
.filter-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;width:100%;background:rgba(4,9,16,.66);border:1px solid rgba(125,211,252,.14);border-radius:14px;padding:8px 10px;backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%)}
.filter-pills{display:flex;align-items:center;gap:6px;flex:1;min-width:0;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-pills::-webkit-scrollbar{display:none}
.fp{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:9px 14px;border-radius:999px;cursor:pointer;border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.5);background:transparent;transition:.15s;white-space:nowrap;min-height:40px;flex-shrink:0;display:inline-flex;align-items:center;gap:7px}
.fp:hover{color:#fff;border-color:rgba(125,211,252,.5)}
.fp.on{background:#fff;color:#000;border-color:#fff}
.fp .ct{font-size:10px;opacity:.6;font-weight:700}
.fp.on .ct{opacity:.55}
.search-box{position:relative;flex-shrink:0}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
#q{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-size:14px;padding:11px 30px 11px 36px;outline:none;width:min(220px,42vw);min-height:40px;transition:.15s;font-family:inherit}
#q::placeholder{color:rgba(255,255,255,.32)}
#q:focus{border-color:rgba(125,211,252,.5);background:rgba(255,255,255,.08);width:min(260px,52vw)}
#qx{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;border:0;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:13px;line-height:1}
#qx.show{display:flex}

/* GRID — auto-fill, no fixed breakpoints, no orphan centering */
.grid-wrap{max-width:1140px;margin:clamp(20px,3vw,30px) auto clamp(40px,6vw,72px);padding:0 clamp(16px,4vw,28px)}
.section-label{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(125,211,252,.7);margin:clamp(20px,3vw,30px) 2px 12px;display:flex;align-items:center;gap:10px}
.section-label::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(125,211,252,.3),transparent)}
.section-label .n{color:rgba(255,255,255,.3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:clamp(10px,1.5vw,13px);align-items:stretch}
.app{display:flex;align-items:flex-start;gap:12px;background:rgba(16,20,28,.62);border-radius:13px;padding:clamp(14px,2.5vw,16px);cursor:pointer;min-height:104px;transition:background .15s,border-color .15s,transform .15s;border:1px solid rgba(255,255,255,.06);height:100%;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.app:hover{background:rgba(24,30,42,.8);border-color:rgba(125,211,252,.35);transform:translateY(-2px)}
.aicon{flex:0 0 44px;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0}
.aicon img,.aicon svg{width:100%;height:100%;object-fit:cover;border-radius:10px;display:block}
.abody{flex:1;min-width:0}
.aname{font-size:15px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.adesc{font-size:12px;color:rgba(224,242,254,.5);line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.anew{font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#001;background:#5dffb0;padding:2px 6px;border-radius:50px;flex-shrink:0}
.empty{text-align:center;color:rgba(255,255,255,.3);padding:clamp(48px,8vw,72px) 0;font-size:14px;display:none}
footer{text-align:center;color:rgba(255,255,255,.32);font-size:11px;padding:clamp(16px,3vw,20px) clamp(16px,4vw,28px) clamp(28px,5vw,44px);max-width:1140px;margin:0 auto}

@media(max-width:768px){
  .nav-right .book{display:none}
  .nav-pill{display:none}
  .nav-menu-btn{display:inline-flex}
  .filterbar{top:60px;flex-direction:column;align-items:stretch}
  .filter-inner{flex-direction:column;gap:10px}
  .filter-pills{width:100%}
  .search-box{width:100%}#q,#q:focus{width:100%}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .hero{padding-top:clamp(40px,9vh,80px)}
}
@media(max-width:430px){.grid{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:2px solid rgba(125,211,252,.7);outline-offset:2px;border-radius:6px}
</style>

<div class="page">

<script>
let SITES=[],cat='ALL',q='';
const CAT={'Music & Studio':'linear-gradient(145deg,#9b3fe8,#e8388a)','Business & L7S':'linear-gradient(145deg,#c8901a,#e8c84a)','Xen / Voice OS':'linear-gradient(145deg,#0fa86e,#22d3a8)','Client Sites':'linear-gradient(145deg,#1a6ee8,#38b2f8)','Tools & Calculators':'linear-gradient(145deg,#e85a1a,#f8a838)','Builds & Apps':'linear-gradient(145deg,#3b5be8,#7c8cff)'};
const ORDER=['Music & Studio','Xen / Voice OS','Business & L7S','Client Sites','Tools & Calculators','Builds & Apps'];
const SHORT={'Music & Studio':'Music','Xen / Voice OS':'Xen','Business & L7S':'Business','Client Sites':'Client','Tools & Calculators':'Tools','Builds & Apps':'Builds'};
const g=c=>CAT[c]||'linear-gradient(145deg,#333,#1a1a1a)';
const recent=iso=>iso&&(Date.now()-new Date(iso).getTime())<7*864e5;
function esc(t){const d=document.createElement('div');d.textContent=t||'';return d.innerHTML;}
function mono(t){const w=(t||'').replace(/[·•|—\-].*$/,'').replace(/[^A-Za-z0-9 ]/g,' ').trim().split(/\s+/).filter(Boolean);return((w.length>=2?w[0][0]+w[1][0]:(t||'').slice(0,2)||'??').toUpperCase());}
function iconHtml(slug,title,category){
  const m=esc(mono(title)),bg=g(category);
  if(!slug)return`<span class="aicon" style="background:${bg}"><b class="mono">${m}</b></span>`;
  const png='/'+slug+'/icon.png',svg='/'+slug+'/icon.svg';
  return`<span class="aicon" style="background:${bg}"><b class="mono">${m}</b><img src="${png}" alt="" loading="lazy" onload="var p=this.previousElementSibling;if(p)p.style.display='none'" onerror="this.onerror=null;this.src='${svg}';this.onerror=function(){this.remove()}"></span>`;
}
function renderPills(){
  const counts={};SITES.forEach(s=>{counts[s.category]=(counts[s.category]||0)+1;});
  const seen=new Set(SITES.map(s=>s.category).filter(Boolean));
  const cats=['ALL',...ORDER.filter(c=>seen.has(c)),...Array.from(seen).filter(c=>!ORDER.includes(c))];
  document.getElementById('pills').innerHTML=cats.map(c=>{
    const label=c==='ALL'?'All':(SHORT[c]||c);const n=c==='ALL'?SITES.length:(counts[c]||0);
    return`<button type="button" class="fp${c===cat?' on':''}" data-c="${esc(c)}">${esc(label)}<span class="ct">${n}</span></button>`;
  }).join('');
  document.querySelectorAll('.fp').forEach(el=>{el.onclick=()=>{cat=el.dataset.c;document.querySelectorAll('.fp').forEach(p=>p.classList.toggle('on',p===el));renderGrid();};});
}
function renderGrid(){
  const f=SITES.filter(s=>(cat==='ALL'||s.category===cat)&&(q===''||(s.title+' '+s.desc+' '+s.slug+' '+s.category).toLowerCase().includes(q)));
  document.getElementById('empty').style.display=f.length?'none':'block';
  document.getElementById('grid').innerHTML=f.map(s=>`<a class="app" href="${esc(s.url)}">${iconHtml(s.slug,s.title,s.category)}<span class="abody"><span class="aname">${esc(s.title)}${recent(s.updated)?'<span class="anew">New</span>':''}</span><span class="adesc">${esc(s.desc||s.category)}</span></span></a>`).join('');
}
fetch('/sites.json?v='+Date.now()).then(r=>{if(!r.ok)throw 0;return r.json();}).then(d=>{
  SITES=(d.sites||[]).filter(s=>s&&s.url&&s.title);
  document.getElementById('foot').textContent=SITES.length+' apps · auto-updating · '+new Date(d.generated||Date.now()).toLocaleDateString();
  renderPills();renderGrid();
}).catch(()=>{document.getElementById('foot').textContent='Catalog unavailable — check sites.json';});
const qIn=document.getElementById('q'),qX=document.getElementById('qx');
qIn.addEventListener('input',e=>{q=e.target.value.toLowerCase().trim();qX.classList.toggle('show',!!q);renderGrid();});
qX.onclick=()=>{qIn.value='';q='';qX.classList.remove('show');renderGrid();qIn.focus();};
const navBtn=document.getElementById('nav-menu-btn'),navDrawer=document.getElementById('nav-drawer');
function setNavOpen(o){navDrawer.classList.toggle('open',o);navDrawer.hidden=!o;navBtn.setAttribute('aria-expanded',o?'true':'false');}
navBtn.addEventListener('click',()=>setNavOpen(!navDrawer.classList.contains('open')));
navDrawer.addEventListener('click',e=>{if(e.target===navDrawer)setNavOpen(false);});
navDrawer.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>setNavOpen(false)));
</script>

<script type="module">
// Cosmic Anomaly swarm — ambient full-bleed background (no UI, auto-cycling). Fails silent if WebGL/reduced-motion.
if(!matchMedia('(prefers-reduced-motion:reduce)').matches){
try{
  const THREE = await import('https://esm.sh/three');
  const { OrbitControls } = await import('https://esm.sh/three/addons/controls/OrbitControls.js');
  const { EffectComposer } = await import('https://esm.sh/three/addons/postprocessing/EffectComposer.js');
  const { RenderPass } = await import('https://esm.sh/three/addons/postprocessing/RenderPass.js');
  const { UnrealBloomPass } = await import('https://esm.sh/three/addons/postprocessing/UnrealBloomPass.js');
  const container=document.getElementById('swarm-bg');
  const MOBILE=matchMedia('(max-width:768px)').matches;
  const TOTAL_SHAPES=3; let currentShape=0,targetShape=0,isTransitioning=false,morphProgress=0;
  const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(0x000001,0.0025);
  const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
  function updateCameraZ(){const a=innerWidth/innerHeight;const fov=(camera.fov*Math.PI)/180;let z=55/Math.tan(fov/2);if(a<1)z/=a;camera.position.set(0,z*0.35,z);}
  updateCameraZ();
  const renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:'high-performance'});
  renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,MOBILE?1.4:1.8));
  renderer.setClearColor(0x000001,0);renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
  container.appendChild(renderer.domElement);
  const controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=0.03;controls.enablePan=false;controls.enableZoom=false;controls.autoRotate=true;controls.autoRotateSpeed=0.45;controls.enabled=false;
  const composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,camera));
  composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),MOBILE?1.3:1.6,0.65,0.25));
  const N=MOBILE?42000:120000;
  const geo=new THREE.BufferGeometry();const pos=new Float32Array(N*3),ids=new Float32Array(N),rnd=new Float32Array(N*3);
  for(let i=0;i<N;i++){ids[i]=i/N;rnd[i*3]=Math.random();rnd[i*3+1]=Math.random();rnd[i*3+2]=Math.random();}
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.setAttribute('aId',new THREE.BufferAttribute(ids,1));geo.setAttribute('aRandom',new THREE.BufferAttribute(rnd,3));
  const vert=`uniform float uTime;uniform float uMorphProgress;uniform int uCurrentShape;uniform int uTargetShape;attribute float aId;attribute vec3 aRandom;varying vec3 vColor;varying float vAlpha;varying float vDepth;varying float vGlowMult;
  #define PI 3.14159265359
  #define TAU 6.28318530718
  float sp(float b,float e){return pow(max(abs(b),0.00001),e);} vec3 sn(vec3 v){float l=length(v);return l>0.00001?v/l:vec3(0.,1.,0.);}
  float ci(float t){return t<0.5?4.*t*t*t:1.-sp(-2.*t+2.,3.)/2.;}
  mat3 rY(float a){float s=sin(a),c=cos(a);return mat3(c,0.,s,0.,1.,0.,-s,0.,c);}
  vec3 pulsar(float id,vec3 r){float t=uTime*2.5;if(r.x<0.1){float u=r.y*TAU,v=acos(2.*r.z-1.),rr=2.+sin(u*12.+t)*0.15+cos(v*8.-t)*0.15;return vec3(rr*sin(v)*cos(u),rr*cos(v),rr*sin(v)*sin(u));}else if(r.x<0.25){float top=(r.y>0.5)?1.:-1.,h=sp(abs(r.y*2.-1.),3.)*70.,tp=sp(1.-(h/70.),2.),rr=r.z*1.5*tp,u=id*TAU*150.,w=sin(h*0.15-t*8.)*0.8*tp;return vec3(rr*cos(u)+w,h*top,rr*sin(u)+w);}else{float ln=42.,li=floor((r.x-0.25)/0.75*ln),la=(li/ln)*TAU,v=r.y*PI,mx=12.+fract(li*17.5)*25.,rr=mx*sp(sin(v),2.),tw=sin(v*PI-t)*0.8;la+=t*2.+tw;float no=sin(v*15.-t*4.)*0.4;return vec3((rr+no)*cos(la),(mx*0.6)*cos(v),(rr+no)*sin(la));}}
  vec3 galaxy(float id,vec3 r){float t=uTime*0.2;if(r.x<0.2){float u=r.y*TAU,v=acos(2.*r.z-1.),rr=5.*sp(r.y,2.5);return vec3(rr*sin(v)*cos(u),rr*cos(v)*0.25,rr*sin(v)*sin(u));}else{float arms=(r.x>0.8)?4.:2.,ai=floor(fract(r.x*23.)*arms),u=r.y*TAU*1.8,br=2.5*exp(0.32*u),cl=sign(r.z-0.5)*sp(abs(r.z-0.5)*2.,2.),sp2=cl*br*0.25,cm=sin(br*3.)*0.5,rr=br+sp2+cm,an=u+(ai*TAU/arms)-t;an+=sin(rr*2.-t*3.)*0.1*cl;float yt=exp(-rr*0.12)*2.,y=cl*yt+sin(an*4.)*0.3;return vec3(rr*cos(an),y,rr*sin(an))*0.85;}}

  vec3 gc(int s,float id,vec3 r,vec3 p){if(s==0){if(r.x<0.1)return vec3(1.,0.2,1.);if(r.x<0.25)return vec3(0.,0.9,1.);float li=floor((r.x-0.25)/0.75*42.);return mix(vec3(0.4,0.,1.),vec3(0.1,0.5,1.),fract(li*0.3));}if(s==1){if(r.x<0.2)return mix(vec3(1.,0.8,0.2),vec3(1.,0.3,0.),r.y);vec3 ba=mix(vec3(0.,1.,0.8),vec3(0.,0.5,1.),r.y);return mix(ba,vec3(0.02,0.,0.15),sp(abs(r.z-0.5)*2.,1.5));}if(s==2){vec3 hot=vec3(1.,0.5,0.1),md=vec3(0.8,0.1,0.),cd=vec3(0.2,0.,0.1),bc;if(r.x>0.7&&r.x<0.9)bc=mix(vec3(1.,0.8,0.3),hot,r.y);else if(r.x>=0.9)bc=mix(hot,md,r.z);else{float dn=length(p.xz)/38.;bc=dn<0.3?mix(hot,md,dn*3.33):mix(md,cd,(dn-0.3)*1.42);}float db=clamp(p.x/20.,-1.,1.);if(db>0.){bc=mix(bc,vec3(0.,0.4,1.),db*0.8);bc*=(1.+db*0.5);}else{bc=mix(bc,vec3(1.,0.,0.),abs(db)*0.8);bc*=(1.-abs(db)*0.5);}return bc;}return vec3(1.);}
