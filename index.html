<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>hitthe.link — App Catalog</title>
<meta name="description" content="Every site, app, and tool shipped on hitthe.link. Browse the catalog.">
<meta name="theme-color" content="#000000">
<meta property="og:title" content="hitthe.link — App Catalog">
<meta property="og:image" content="/icon.png">
<link rel="icon" href="/favicon.png">
<link rel="apple-touch-icon" href="/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* ── Nav ── */
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;position:sticky;top:0;z-index:50;background:rgba(0,0,0,.7);backdrop-filter:blur(16px)}
.nav-brand{font-weight:700;font-size:18px;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.nav-brand img{width:26px;height:26px;border-radius:7px}
.nav-count{font-size:12px;color:rgba(255,255,255,.4);font-weight:500;display:flex;align-items:center;gap:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#30d158;box-shadow:0 0 8px #30d158;animation:blink 2s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Hero ── */
.hero{text-align:center;padding:60px 24px 0}
.hero h1{font-family:'Playfair Display',Georgia,serif;font-size:clamp(36px,6vw,72px);font-weight:400;letter-spacing:-.02em;line-height:1.1;margin-bottom:16px}
.hero p{color:rgba(255,255,255,.5);font-size:clamp(14px,2vw,17px);max-width:480px;margin:0 auto;line-height:1.6}

/* ── Floating icon cloud ── */
.cloud{position:relative;height:260px;overflow:hidden;margin:0 auto;max-width:900px}
.cloud-icon{position:absolute;border-radius:22%;background:#111;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:rgba(255,255,255,.7);box-shadow:0 8px 32px rgba(0,0,0,.6);animation:float linear infinite;transform-style:preserve-3d;overflow:hidden}
.cloud-icon img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
@keyframes float{0%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.03)}100%{transform:translateY(0) scale(1)}}
.cloud-grad{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(to top,#000,transparent);pointer-events:none;z-index:2}

/* ── Filter bar ── */
.filterbar{max-width:1100px;margin:32px auto 0;padding:0 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pills{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.pill{font-size:12px;font-weight:600;letter-spacing:.02em;padding:7px 15px;border-radius:50px;cursor:pointer;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.55);background:transparent;transition:.15s;white-space:nowrap}
.pill:hover{color:#fff;border-color:rgba(255,255,255,.4)}
.pill.on{background:#fff;color:#000;border-color:#fff}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none}
#q{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-size:14px;padding:9px 14px 9px 36px;outline:none;width:220px;transition:.15s}
#q:focus{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.1)}
#q::placeholder{color:rgba(255,255,255,.3)}

/* ── Grid ── */
.grid-wrap{max-width:1100px;margin:28px auto 90px;padding:0 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2px}
.app{display:flex;align-items:flex-start;gap:14px;padding:18px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:0;transition:.15s;cursor:pointer}
.app:hover{background:rgba(255,255,255,.06)}
.grid .app:first-child{border-radius:12px 12px 0 0}
.grid .app:last-child{border-radius:0 0 12px 12px}
.app-icon{flex:0 0 46px;width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.app-icon img{width:100%;height:100%;object-fit:cover}
.app-body{flex:1;min-width:0}
.app-name{font-size:15px;font-weight:600;letter-spacing:-.01em;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-desc{font-size:12.5px;color:rgba(255,255,255,.4);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.app-new{display:inline-block;font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#000;background:#30d158;padding:2px 6px;border-radius:50px;margin-left:7px;vertical-align:middle}

.empty{text-align:center;color:rgba(255,255,255,.25);padding:80px 0;font-size:15px}
footer{text-align:center;color:rgba(255,255,255,.2);font-size:11.5px;padding:28px;border-top:1px solid rgba(255,255,255,.06);max-width:1100px;margin:0 auto}
@media(max-width:600px){.cloud{height:200px}.hero h1{font-size:36px}#q{width:160px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<nav>
  <div class="nav-brand"><img src="/icon.png" id="navicon" onerror="this.style.display='none'"><span>hitthe.link</span></div>
  <div class="nav-count"><span class="live-dot"></span><span id="livecount">loading…</span></div>
</nav>

<section class="hero">
  <h1>App catalog</h1>
  <p>Every site, app, and tool shipped here — live and open.</p>
</section>

<div class="cloud" id="cloud">
  <div class="cloud-grad"></div>
</div>

<div class="filterbar">
  <div class="pills" id="pills"></div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/><path d="M10 10l2.5 2.5" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input id="q" type="search" placeholder="Search…" autocomplete="off">
  </div>
</div>

<div class="grid-wrap"><div class="grid" id="grid"></div><div class="empty" id="empty" style="display:none">No matches.</div></div>
<footer id="gen"></footer>

<script>
let SITES=[], cat='All', q='';
const CAT={
  'Music & Studio':'linear-gradient(145deg,#9b3fe8,#e8388a)',
  'Business & L7S':'linear-gradient(145deg,#c8901a,#e8c84a)',
  'Xen / Voice OS':'linear-gradient(145deg,#0fa86e,#22d3a8)',
  'Client Sites':'linear-gradient(145deg,#1a6ee8,#38b2f8)',
  'Tools & Calculators':'linear-gradient(145deg,#e85a1a,#f8a838)',
  'Builds & Apps':'linear-gradient(145deg,#3b5be8,#7c8cff)'
};
const ORDER=['Music & Studio','Xen / Voice OS','Business & L7S','Client Sites','Tools & Calculators','Builds & Apps'];
const g=c=>CAT[c]||'linear-gradient(145deg,#444,#222)';
const recent=iso=>iso&&(Date.now()-new Date(iso).getTime())<7*864e5;
function esc(t){const d=document.createElement('div');d.textContent=t||'';return d.innerHTML;}
function mono(t){
  const w=(t||'').replace(/[·•|—\-].*$/,'').replace(/[^A-Za-z0-9 ]/g,' ').trim().split(/\s+/).filter(Boolean);
  return esc((w.length>=2?w[0][0]+w[1][0]:(t||'').slice(0,2)||'??').toUpperCase());
}
function iconEl(s,sz){
  const sz2=sz||46,r=Math.round(sz2*.24);
  return `<span class="app-icon" style="width:${sz2}px;height:${sz2}px;border-radius:${r}px;background:${g(s.category)}">${mono(s.title)}</span>`;
}

// Build floating cloud
function buildCloud(){
  const cloud=document.getElementById('cloud');
  const picks=SITES.slice(0,18);
  const W=cloud.offsetWidth||900, H=cloud.offsetHeight||260;
  picks.forEach((s,i)=>{
    const angle=(i/picks.length)*Math.PI;
    const cx=W/2, spread=W*.42;
    const x=cx+Math.cos(angle-(Math.PI/2)+(i%2?-.3:.3))*spread*(0.5+Math.random()*.5)-30;
    const y=H*.18+Math.sin(angle)*H*.55+Math.random()*30;
    const sz=40+Math.floor(Math.random()*28);
    const delay=(Math.random()*4).toFixed(1);
    const dur=(3+Math.random()*3).toFixed(1);
    const el=document.createElement('a');
    el.className='cloud-icon';
    el.href=s.url;
    el.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;border-radius:${Math.round(sz*.24)}px;background:${g(s.category)};font-size:${Math.round(sz*.38)}px;animation-duration:${dur}s;animation-delay:-${delay}s;z-index:${i}`;
    el.innerHTML=mono(s.title);
    cloud.insertBefore(el,cloud.querySelector('.cloud-grad'));
  });
}

function renderGrid(){
  const f=SITES.filter(s=>(cat==='All'||s.category===cat)&&(q===''||(s.title+' '+s.desc+' '+s.slug+' '+s.category).toLowerCase().includes(q)));
  document.getElementById('empty').style.display=f.length?'none':'block';
  document.getElementById('grid').innerHTML=f.map(s=>`<a class="app" href="${s.url}">
    ${iconEl(s)}
    <span class="app-body">
      <span class="app-name">${esc(s.title)}${recent(s.updated)?'<span class="app-new">New</span>':''}</span>
      <span class="app-desc">${esc(s.desc||s.category)}</span>
    </span></a>`).join('');
}

function renderPills(){
  const cats=['All',...ORDER.filter(c=>SITES.some(s=>s.category===c)),...Array.from(new Set(SITES.map(s=>s.category))).filter(c=>!ORDER.includes(c))];
  document.getElementById('pills').innerHTML=cats.map(c=>`<span class="pill${c===cat?' on':''}" data-c="${esc(c)}">${esc(c)}</span>`).join('');
  document.querySelectorAll('.pill').forEach(el=>el.onclick=()=>{
    cat=el.dataset.c;
    document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('on',p===el));
    renderGrid();
  });
}

fetch('sites.json?v='+Date.now()).then(r=>r.json()).then(d=>{
  SITES=(d.sites||[]).filter(s=>s&&s.url&&s.title);
  document.getElementById('livecount').textContent=SITES.length+' apps';
  document.getElementById('gen').textContent='Auto-updating from sites.json · '+new Date(d.generated||Date.now()).toLocaleDateString();
  buildCloud();renderPills();renderGrid();
}).catch(()=>{document.getElementById('livecount').textContent='catalog unavailable';});
document.getElementById('q').addEventListener('input',e=>{q=e.target.value.toLowerCase().trim();renderGrid();});
</script>
</body>
</html>
