let activeCat="ALL";
let query="";

function mk(tag,cls,txt){
  const el=document.createElement(tag);
  if(cls)el.className=cls;
  if(txt!=null)el.textContent=txt;
  return el;
}

function makeEntry(k,v,isGap){
  const e=mk("div", isGap?"entry gap":"entry");
  e.appendChild(mk("span","key",k));
  e.appendChild(mk("span","arrow","→"));
  e.appendChild(mk("span","val",v));
  return e;
}

function makeSection(title,countText,extraClass){
  const sec=mk("div", extraClass?"section "+extraClass:"section");
  const t=mk("div","section-title");
  t.appendChild(document.createTextNode(title));
  if(countText){
    const c=mk("span","count",countText);
    t.appendChild(document.createTextNode(" "));
    t.appendChild(c);
  }
  sec.appendChild(t);
  const grid=mk("div","grid");
  sec.appendChild(grid);
  return [sec, grid];
}

function render(){
  main.replaceChildren();
  let shown=0;
  const todayKeys=Object.keys(TODAY);
  if(todayKeys.length){
    const [sec,grid]=makeSection("Today's session gaps", todayKeys.length+" entries to add", "gaps");
    for(const [k,v] of Object.entries(TODAY)){
      grid.appendChild(makeEntry(k,v,true));
    }
    main.appendChild(sec);
  }
  for(const [cat,entries] of Object.entries(CATS)){
    if(activeCat!=="ALL"&&activeCat!==cat)continue;
    const filtered=entries.filter(([k,v])=>{
      if(!query)return true;
      const q=query.toLowerCase();
      return k.toLowerCase().includes(q)||v.toLowerCase().includes(q);
    });
    if(!filtered.length)continue;
    const cnt=filtered.length+(filtered.length!==entries.length?"/"+entries.length:"");
    const [sec,grid]=makeSection(cat, cnt);
    for(const [k,v] of filtered){
      grid.appendChild(makeEntry(k,v,false));
      shown++;
    }
    main.appendChild(sec);
  }
  shownCount.textContent=shown;
}

search.addEventListener("input",e=>{query=e.target.value;render()});
document.querySelectorAll(".cat-btn").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".cat-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    activeCat=b.dataset.cat;
    render();
  });
});
render();
</script></body></html>
