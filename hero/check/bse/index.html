<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Check Hero — Business Starter Edition</title>
<meta name="description" content="Check Hero · Business Starter Edition. 8-mission empire builder. Pre-loaded LLC/EIN/bank/license/launch workflow.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'] }
      }
    },
    safelist: [
      { pattern: /bg-(slate|blue|amber|emerald|pink|orange|violet|fuchsia|cyan|zinc|rose)-(50|100|200|300|400|500|600|700|800|900|950)/ },
      { pattern: /text-(slate|blue|amber|emerald|pink|orange|violet|fuchsia|cyan|zinc|rose)-(50|100|200|300|400|500|600|700|800|900|950)/ },
      { pattern: /border-(slate|blue|amber|emerald|pink|orange|violet|fuchsia|cyan|zinc|rose)-(50|100|200|300|400|500|600|700|800|900|950)/ }
    ]
  };
</script>
<style>
  html, body { background:#0f172a; margin:0; }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
  .no-scrollbar::-webkit-scrollbar { display:none; }
  .no-scrollbar { scrollbar-width:none; }
  .animate-in { animation: animate-in .35s ease both; }
  @keyframes animate-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .animate-fade-in { animation: fade-in .25s ease both; }
  @keyframes fade-in { from { opacity:0; } to { opacity:1; } }
  .progress-fill { transition: width 1s cubic-bezier(.4,.0,.2,1); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="env,react" src="app.jsx"></script>
</body>
</html>
