<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>VVSVEI · voice vision sms · Xen</title>
<meta name="description" content="VEI (Voice Echo Input). Ruach-class STT, glass-over-video shell, omnimind dictate-inject pipeline. Public, no-auth, multi-device simultaneous.">
<link rel="manifest" href="/vei/manifest.json">
<meta name="theme-color" content="#0A1F12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VEI">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/vei/icon.svg">
<link rel="icon" type="image/svg+xml" href="/vei/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* VEI — qi-locked design (Photoroom_20260523_134010.png reference).
   Deep green radial gradient bg, phosphor-green waveform, soft cream chat bubbles.
   Aesthetic: terminal-organism. Hebrew Ruach (breath/spirit) made visible. */
:root {
  --bg:#0A1F12;
  --bg-glow:#1A4D2E;
  --bg-elev:rgba(20, 60, 35, .25);
  --bg-input:rgba(20, 60, 35, .45);
  --fg:#F0EAD6;
  --fg-dim:#A8C0A4;
  --fg-mute:#6B8B72;
  --line:rgba(176, 255, 200, .12);
  --line-strong:rgba(176, 255, 200, .22);
  --accent:#00FF88;
  --accent-hover:#5FFF9E;
  --accent-glow:rgba(0, 255, 136, .35);
  --bubble-bg:rgba(176, 200, 170, .92);
  --bubble-fg:#0A1F12;
  --good:#00FF88;
  --warn:#F5C842;
  --bad:#FF6B5A;
  --r-card:18px;
  --r-pill:9999px;
  --sans:'Inter','SF Pro Text',-apple-system,system-ui,sans-serif;
  --mono:'JetBrains Mono','SF Mono',ui-monospace,monospace;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body {
  height:100dvh;
  background:var(--bg);
  color:var(--fg);
  font-family:var(--sans);
  font-feature-settings:"ss01","cv11";
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow:hidden;
}
/* Background layer — Ophanim 3D avatar (qi-XLRD-ID). Dim until touched. */
.bg-video, .bg-iframe {
  position:fixed; inset:0; width:100%; height:100%;
  object-fit:cover; z-index:0; pointer-events:none;
  border:0;
  opacity:.32;
  filter:saturate(.95);
  transition:opacity .55s ease-out, filter .55s ease-out;
}
body.lit .bg-video, body.lit .bg-iframe { opacity:.78; filter:saturate(1.15); }
/* Glass over the video — frosted layer with heavy blur + soft tint.
   qi 2026-05-23: 'video needs to be behind glass'. */
.bg-overlay {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 50% 55%, rgba(10,31,18,.30), rgba(2,6,10,.72)),
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  backdrop-filter:blur(22px) saturate(1.15);
  -webkit-backdrop-filter:blur(22px) saturate(1.15);
  border-top:1px solid rgba(255,255,255,.04);
  border-bottom:1px solid rgba(0,0,0,.18);
  transition:backdrop-filter .55s ease-out, background .55s ease-out;
}
body.lit .bg-overlay {
  background:
    radial-gradient(ellipse 80% 60% at 50% 55%, rgba(10,31,18,.12), rgba(2,6,10,.42)),
    linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
  backdrop-filter:blur(10px) saturate(1.3);
  -webkit-backdrop-filter:blur(10px) saturate(1.3);
}
.wrap { position:relative; z-index:2; }
.wrap {
  display:flex; flex-direction:column;
  height:100dvh; width:100%;
  max-width:760px; margin:0 auto;
  padding:env(safe-area-inset-top, 18px) 20px env(safe-area-inset-bottom, 16px);
  position:relative;
}

/* Header — top-right mic icon, top-left brand, minimal chrome */
header { padding:8px 0 22px; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
.brand { display:flex; align-items:center; gap:10px; }
.brand-dot { display:none; }
.brand-text { display:flex; flex-direction:column; gap:3px; }
.title { font-size:15px; font-weight:500; letter-spacing:.02em; line-height:1; color:var(--fg-dim); }
.title .heb { color:var(--accent); margin-left:6px; font-size:14px; }
.subtitle { font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; color:var(--fg-mute); text-transform:uppercase; }

.mic-icon {
  width:32px; height:32px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  color:var(--fg);
  opacity:.85;
  cursor:pointer;
  transition:opacity .15s, transform .15s, color .15s;
}
.mic-icon svg { width:18px; height:18px; }
.mic-icon:hover { opacity:1; transform:scale(1.05); }
.mic-icon.active { color:var(--accent); opacity:1; filter:drop-shadow(0 0 6px var(--accent-glow)); }

.count-chip { display:none; }

/* Status pill removed — replaced by waveform-bottom-bar visual feedback */
.status-bar { display:none; }
@keyframes pulse { 0%, 100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(1.5); } }

/* Transcript = top-anchored chat bubbles, cream-on-green */
#transcript {
  flex:1; overflow-y:auto;
  display:flex; flex-direction:column; gap:10px;
  padding:4px 4px 100px;  /* bottom pad clears the waveform footer */
  scroll-behavior:smooth;
}
#transcript::-webkit-scrollbar { width:5px; }
#transcript::-webkit-scrollbar-thumb { background:var(--line-strong); border-radius:3px; }

/* Glass bubbles — heavy backdrop-blur + thin gloss highlight + translucent fill.
   qi-spec 2026-05-23: "super hyper realistic glass" */
/* qi 2026-05-25 timestamp canon — h:mm AM/PM tag on every bubble. */
.bubble-ts {
  display:block; font-family:var(--mono); font-size:9.5px; letter-spacing:.16em;
  text-transform:uppercase; color:var(--fg-dim); opacity:.62;
  margin-bottom:4px;
}
.bubble-txt { display:block; }

/* qi 2026-05-25 — drag-drop active state. Subtle accent ring across the body
   so qi knows the page will catch the file anywhere he releases it. */
body.drop-active::before {
  content: ""; position: fixed; inset: 12px; pointer-events: none; z-index: 9000;
  border: 2px dashed rgba(0,153,255,0.65); border-radius: 18px;
  background: rgba(0,153,255,0.05);
  box-shadow: inset 0 0 32px rgba(0,153,255,0.18);
}
body.drop-active::after {
  content: "drop to attach"; position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
  z-index: 9001; padding: 8px 18px; border-radius: 999px;
  background: rgba(0,153,255,0.18); border: 1px solid rgba(0,153,255,0.45);
  color: #cfe6ff; font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  pointer-events: none;
}

.final, .interim, .xen-reply {
  position:relative;
  max-width:78%; align-self:flex-start;
  padding:12px 16px; border-radius:var(--r-card);
  background:linear-gradient(145deg, rgba(255,255,255,.22), rgba(255,255,255,.08));
  border:1px solid rgba(255,255,255,.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.30),
    inset 0 -1px 0 rgba(255,255,255,.06),
    0 8px 24px rgba(0,0,0,.28),
    0 0 0 0.5px rgba(255,255,255,.06);
  backdrop-filter:blur(18px) saturate(1.3);
  -webkit-backdrop-filter:blur(18px) saturate(1.3);
  color:var(--fg);
  font-size:15px; line-height:1.45; font-weight:500;
  word-break:break-word;
  animation:fadeIn .22s cubic-bezier(.32,.72,.2,1);
}
/* Top-gloss specular reflection */
.final::before, .interim::before, .xen-reply::before {
  content:""; position:absolute; inset:1px 1px auto 1px; height:38%;
  border-radius:var(--r-card) var(--r-card) 30% 30%/var(--r-card) var(--r-card) 60% 60%;
  background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,0));
  pointer-events:none;
}
.final.posted-flag { box-shadow:
    inset 0 1px 0 rgba(255,255,255,.30),
    inset 0 -1px 0 rgba(255,255,255,.06),
    0 8px 24px rgba(0,0,0,.28),
    0 0 0 1px var(--accent-glow); }
.interim { opacity:.78; font-style:italic; }
.xen-reply { align-self:flex-end; background:linear-gradient(145deg, rgba(0,255,136,.16), rgba(0,255,136,.04)); border-color:rgba(0,255,136,.28); color:var(--fg); }
.firehose {
  max-width:78%; align-self:flex-start;
  padding:8px 12px; border-radius:10px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  color:var(--fg-dim);
  font-family:var(--mono); font-size:11.5px; line-height:1.35;
  word-break:break-word;
  opacity:.7;
}
.firehose .src {
  display:inline-block; margin-right:6px;
  font-size:9.5px; letter-spacing:.10em; text-transform:uppercase;
  color:var(--accent);
}

/* ── Events panel (Task #10 · operator state in-pane) ───────────────── */
#events-rail {
  position:fixed; z-index:20;
  right:0; top:60px; bottom:120px; width:320px;
  background:rgba(8,18,12,.86); backdrop-filter:blur(16px);
  border-left:1px solid rgba(0,255,136,.18);
  box-shadow:-12px 0 36px rgba(0,0,0,.45);
  display:flex; flex-direction:column;
  transform:translateX(100%); transition:transform .28s ease-out, width .28s ease-out, top .28s ease-out, bottom .28s ease-out, left .28s ease-out;
  font-family:var(--mono); font-size:11.5px; color:var(--fg-dim);
}
#events-rail.open { transform:translateX(0); }
/* qi 2026-05-25 — fullscreen mode for the firehose panel. Toggle via the
   ⤢ button in the header. Covers the viewport so qi can read the whole
   chronicle without the rest of VEI peeking through. */
#events-rail.fullscreen {
  top:0; bottom:0; left:0; width:100vw;
  border-left:0; box-shadow:none;
  background:rgba(4,10,7,.96);
}
#events-rail .er-head .er-fs {
  cursor:pointer; padding:2px 8px; border-radius:6px;
  background:rgba(0,255,136,.08); border:1px solid rgba(0,255,136,.18);
  color:var(--accent); font-size:11px; letter-spacing:.04em; text-transform:none;
  transition:background .15s, border-color .15s;
}
#events-rail .er-head .er-fs:hover { background:rgba(0,255,136,.18); }
#events-rail .er-head {
  padding:12px 16px; border-bottom:1px solid rgba(0,255,136,.18);
  display:flex; align-items:center; justify-content:space-between;
  font-size:10.5px; letter-spacing:.22em; text-transform:uppercase;
  color:var(--accent);
}
#events-rail .er-status {
  display:flex; gap:10px; padding:8px 16px;
  border-bottom:1px solid rgba(255,255,255,.06);
  font-size:10px; letter-spacing:.06em;
}
#events-rail .er-status span {
  flex:1; padding:4px 8px; border-radius:6px;
  background:rgba(255,255,255,.03); color:var(--fg-dim);
  text-align:center;
}
#events-rail .er-status span.ok { color:var(--accent); border:1px solid rgba(0,255,136,.22); }
#events-rail .er-status span.warn { color:#ffaa44; border:1px solid rgba(255,170,68,.32); }
#events-rail .er-status span.err { color:#ff4d6d; border:1px solid rgba(255,77,109,.32); }
#events-rail .er-list {
  flex:1; overflow-y:auto; padding:8px 12px 24px;
  display:flex; flex-direction:column; gap:6px;
}
#events-rail .er-item {
  padding:6px 10px; border-radius:6px;
  background:rgba(255,255,255,.03);
  border-left:2px solid rgba(0,255,136,.25);
  word-break:break-word; line-height:1.35;
}
#events-rail .er-item .src {
  display:inline-block; margin-right:6px;
  font-size:9px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--accent);
}
#events-rail .er-item .ts {
  display:block; font-size:9px; color:rgba(255,255,255,.32); margin-top:2px;
}
#er-toggle {
  /* 2026-05-25 — was right:14px which overlapped the mic-icon qi designed
     into the header. Shifted left of the mic (32px icon + 14px padding + 14px gap). */
  position:fixed; right:60px; top:14px; z-index:21;
  width:auto; min-width:56px; padding:8px 14px;
  background:rgba(8,18,12,.78); backdrop-filter:blur(10px);
  border:1px solid rgba(0,255,136,.32); border-radius:18px;
  color:var(--accent); font-family:var(--mono);
  font-size:10.5px; letter-spacing:.18em; text-transform:uppercase;
  cursor:pointer; user-select:none;
  display:flex; align-items:center; gap:8px;
}
#er-toggle .pip { width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }
#er-toggle .pip.off { background:#555; box-shadow:none; }
#er-toggle .count { background:var(--accent); color:#000; padding:1px 7px; border-radius:9px; font-weight:600; min-width:18px; text-align:center; }
#er-toggle .count.zero { background:rgba(255,255,255,.08); color:var(--fg-dim); }
@media (max-width:720px) {
  #events-rail {
    right:0; left:0; top:auto; width:auto;
    bottom:0; height:55vh; border-left:0;
    border-top:1px solid rgba(0,255,136,.22);
    transform:translateY(100%);
    box-shadow:0 -12px 36px rgba(0,0,0,.45);
  }
  #events-rail.open { transform:translateY(0); }
}
.posted {
  display:inline-block; margin-left:6px; padding:1px 7px; border-radius:var(--r-pill);
  background:rgba(0,0,0,.32); color:var(--accent);
  font-family:var(--mono); font-size:9.5px; letter-spacing:.04em; font-weight:600;
}
/* Per-bubble action row (copy/share) */
.bubble-actions {
  display:flex; gap:6px; margin-top:8px;
  opacity:0; transition:opacity .15s;
}
.final:hover .bubble-actions, .xen-reply:hover .bubble-actions { opacity:1; }
.bubble-actions button {
  padding:3px 8px; font-size:9.5px; font-weight:600; letter-spacing:.06em;
  background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18);
  color:var(--fg-dim); border-radius:var(--r-pill);
  cursor:pointer; transition:background .12s, color .12s;
}
.bubble-actions button:hover { background:rgba(0,255,136,.16); color:var(--accent); }
/* Top transcript toolbar — copy-all / export / share */
.transcript-toolbar {
  display:flex; gap:6px; padding:0 4px 8px;
}
.transcript-toolbar button {
  padding:5px 10px; font-family:var(--mono); font-size:9.5px; font-weight:600;
  letter-spacing:.10em; text-transform:uppercase;
  background:rgba(255,255,255,.06); border:1px solid var(--line);
  color:var(--fg-dim); border-radius:var(--r-pill);
  cursor:pointer; transition:all .12s;
}
.transcript-toolbar button:hover { background:rgba(0,255,136,.12); border-color:var(--accent); color:var(--accent); }
.error-line {
  align-self:flex-start; max-width:78%; padding:10px 14px; border-radius:var(--r-card);
  background:rgba(255,107,90,.14); color:var(--bad);
  font-family:var(--mono); font-size:12px; line-height:1.4;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

/* Composer = waveform-anchored bottom bar (matches qi reference image). Buttons
   live IN the waveform pill, mic on left, stop on right. */
.composer {
  position:absolute;
  left:env(safe-area-inset-left, 16px); right:env(safe-area-inset-right, 16px);
  bottom:env(safe-area-inset-bottom, 16px);
  padding:0;
}
.waveform-bar {
  display:flex; align-items:center; gap:10px;
  background:var(--bg-input);
  border:1px solid var(--line);
  border-radius:var(--r-pill);
  padding:10px 14px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.waveform {
  flex:1; height:48px;
  position:relative;
  overflow:hidden;
}
.waveform canvas {
  width:100%; height:100%;
  display:block;
}
.waveform.err canvas { filter:hue-rotate(140deg) saturate(1.4); }

.controls { display:flex; gap:8px; }
button {
  padding:10px 16px;
  border-radius:var(--r-pill); border:1px solid var(--line-strong);
  background:transparent; color:var(--fg);
  font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:.14em; text-transform:uppercase;
  cursor:pointer; transition:transform .12s, background .12s, border-color .12s, color .12s;
}
button:hover:not(:disabled) { background:var(--bg-elev); border-color:var(--accent); color:var(--accent); transform:translateY(-1px); }
button.start { background:var(--accent); color:var(--bg); border-color:var(--accent); box-shadow:0 0 12px var(--accent-glow); }
button.start:hover:not(:disabled) { background:var(--accent-hover); border-color:var(--accent-hover); color:var(--bg); }
button.stop { color:var(--fg-dim); }
button.stop:hover:not(:disabled) { color:var(--bad); border-color:var(--bad); background:rgba(255,107,90,.08); }
button:disabled { opacity:.35; cursor:not-allowed; transform:none; }

/* Single unified composer bar — paperclip · field(waveform + textarea overlap) · send.
   No stacking. qi 2026-05-23: "only needs one input field I dont want it stacked" */
.composer-bar {
  display:flex; align-items:center; gap:6px;
  background:linear-gradient(145deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.14);
  border-radius:var(--r-pill);
  padding:6px 8px;
  backdrop-filter:blur(16px) saturate(1.3);
  -webkit-backdrop-filter:blur(16px) saturate(1.3);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.22), 0 8px 24px rgba(0,0,0,.28);
}
.field {
  flex:1; position:relative; min-height:36px;
  display:flex; align-items:center;
}
.field canvas {
  position:absolute; inset:0; width:100%; height:100%;
  display:block; pointer-events:none;
  opacity:.85;
}
.field textarea {
  position:relative; z-index:1;
  flex:1; min-height:20px; max-height:120px;
  background:transparent; color:var(--fg);
  border:0; outline:none; resize:none;
  font-family:var(--sans); font-size:15px; line-height:1.4;
  padding:8px 12px;
  -webkit-appearance:none;
  text-shadow:0 0 4px rgba(0,0,0,.6);
}
.field textarea::placeholder { color:rgba(240,234,214,.42); }
.composer-bar .icon-btn {
  width:36px; height:36px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:transparent; border:0;
  color:var(--fg-dim);
  cursor:pointer;
  border-radius:50%;
  transition:background .12s, color .12s, transform .12s;
}
.composer-bar .icon-btn:hover { background:rgba(255,255,255,.10); color:var(--accent); transform:translateY(-1px); }
.composer-bar .icon-btn svg { width:18px; height:18px; }
.composer-bar .icon-btn.send { background:transparent; color:var(--fg-dim); box-shadow:none; }
.composer-bar .icon-btn.send:hover:not(:disabled) { background:rgba(0,255,136,.12); color:var(--accent); }
.composer-bar .icon-btn.send:disabled { opacity:.35; cursor:not-allowed; box-shadow:none; }

/* Legacy hidden */
.text-row, .waveform-bar, .fallback { display:none; }

.unsupported {
  align-self:flex-start; max-width:88%; padding:14px 16px;
  background:rgba(255,107,90,.10); border:1px solid rgba(255,107,90,.32);
  border-radius:var(--r-card); color:var(--bad); font-size:14px; line-height:1.4;
}
</style>
</head>
<body>
<!-- qi 2026-05-30: avatar iframe deferred on VVSVEI — the /vei/avatar Three.js
     bundle was the load-struggle. Voice page loads fast without it; the avatar
     attaches only after the page is interactive + voice armed (idle-time). -->
<iframe class="bg-iframe" id="bg-iframe" data-src="/vei/avatar/" aria-hidden="true" tabindex="-1" loading="lazy"></iframe>
<div class="bg-overlay" aria-hidden="true"></div>
<div class="wrap">

<header>
  <div class="brand">
    <div class="brand-text">
      <div class="title">VEI<span class="heb">· רוּחַ</span></div>
      <div class="subtitle" id="count">0 sent · xen.xlrd.org</div>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
    <span id="ava-node" style="font-size:9px;opacity:.4;font-family:monospace;letter-spacing:.3px;pointer-events:none;align-self:flex-end;padding-bottom:3px"></span>
    <div class="mic-icon" id="ava-icon" title="Xen voice (tap to mute/unmute)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </div>
    <div class="mic-icon" id="mic-icon" title="Microphone status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </div>

// Retry queue — POSTs that fail during omnimind flap get queued in localStorage
// and replayed every 5s + on online/focus. qi 2026-05-23: 'the posts are failing'.
const QUEUE_KEY = 'vei-pending-posts';
function loadQueue() { try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch { return []; } }
function saveQueue(q) { try { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); } catch {} }
function enqueuePost(payload) {
  const q = loadQueue(); q.push(payload);
  if (q.length > 200) q.splice(0, q.length - 200);
  saveQueue(q);
}
async function tryPostOnce(payload) {
  const res = await fetch(API_URL, { method:'POST', headers:HEADERS, body:JSON.stringify(payload) });
  // 5xx = retry-worthy (server broken/down, queue + replay later).
  if (res.status >= 500) throw new Error('http ' + res.status);
  // 4xx = deterministic reject (bad payload, auth, route gone). Do NOT queue —
  // retrying won't fix a 400. Show inline so qi sees the failure and the queue
  // doesn't grow forever. Fix A per Xen-Primary draft 2026-05-23 (queue overflow
  // diagnosis), composes with Fix B server-side bodyKeys logging.
  if (!res.ok) {
    appendError(`server rejected (${res.status}) — not retrying`);
    return false;
  }
  return true;
}
async function postTranscript(text) {
  const payload = { source: 'xen-vei', ts: Date.now(), text };
  try {
    const ok = await tryPostOnce(payload);
    if (!ok) return false;  // 4xx — deterministic reject, do NOT count or queue
    sentCount++;
    countEl.textContent = sentCount + ' sent · xen.xlrd.org';
    return true;
  } catch (e) {
    // 5xx or network — retry-worthy, queue + replay later
    enqueuePost(payload);
    appendError(`queued (${loadQueue().length} pending) — will retry`);
    return false;
  }
}
async function drainQueue() {
  let q = loadQueue();
  if (!q.length) return;
  const startLen = q.length;
  while (q.length) {
    try {
      const ok = await tryPostOnce(q[0]);
      if (!ok) { q.shift(); saveQueue(q); continue; }  // 4xx — drop item, don't requeue forever
      sentCount++; q.shift(); saveQueue(q);
    } catch { break; }
  }
  countEl.textContent = sentCount + ' sent · xen.xlrd.org';
  if (q.length === 0 && startLen > 0) {
    appendError(`✓ queue drained — ${startLen} replayed, omnimind back online`);
  }
}

async function postAudioChunk(blob) {
  // Diagnostics: surface blob size + mime + URL so "Failed to fetch" gives
  // us actionable info instead of opaque browser-network errors.
  const blobInfo = `${blob?.size || 0}B ${blob?.type || 'no-type'}`;
  if (!blob || blob.size === 0) {
    appendError(`audio chunk EMPTY (${blobInfo}) — mic capture may be silenced`);
    return false;
  }
  try {
    const fd = new FormData();
    // Use mp4 extension if blob says mp4, else webm
    const ext = (blob.type && blob.type.includes('mp4')) ? 'mp4' : 'webm';
    fd.append('audio', blob, `chunk.${ext}`);
    fd.append('source', 'xen-vei-audio');
    fd.append('ts', Date.now().toString());
    const res = await fetch(AUDIO_URL, { method: 'POST', body: fd, mode: 'cors' });
    if (res.ok) {
      sentCount++;
      countEl.textContent = sentCount + ' chunks';
      const j = await res.json().catch(() => null);
      if (j && j.text) appendFinal(j.text, true);
      return true;
    } else {
      const errBody = await res.text().catch(() => '');
      appendError(`audio POST → HTTP ${res.status} ${errBody.slice(0, 80)}`);
      return false;
    }
  } catch (e) {
    appendError(`audio POST failed: ${e.name}: ${e.message} (${blobInfo} → ${AUDIO_URL})`);
    return false;
  }
}

  // after resolve), (2) interim spam closed by NOT POSTing interims (visual-only),
  // (3) dedup applies ONLY to finals (interim refinement passes never blocked).

  // Time-windowed dedup: suppress identical text only if it arrives within
  // 500ms of prior final (Web Speech bounces / confidence re-confirms typically

const waveformEl = document.getElementById('waveform');

let audioCtx = null;
let analyser = null;
let analyserStream = null;
let rafId = null;
let viz_listening = false;

// Idle: canvas stays empty. Waveform only renders while the mic is on.

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = waveformEl.clientWidth;
  const h = waveformEl.clientHeight;
  waveCanvas.width = Math.floor(w * dpr);
  waveCanvas.height = Math.floor(h * dpr);
  waveCanvas.style.width = w + 'px';
  waveCanvas.style.height = h + 'px';
  waveCtx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawWave(samples, listening) {
  const w = waveCanvas.width / (window.devicePixelRatio || 1);
  const h = waveCanvas.height / (window.devicePixelRatio || 1);
  waveCtx2d.clearRect(0, 0, w, h);
  // Skip drawing if amplitude is below silence threshold — no flat line baseline.
  // qi 2026-05-23: 'the sound wave should still work without starting with a line'.
  const N = samples.length;
  let peak = 0;
  for (let i = 0; i < N; i++) {
    const d = Math.abs(samples[i] - 128);
    if (d > peak) peak = d;
  }
  const SILENCE_THRESHOLD = 6;  // out of 128 — below this, no draw
  if (peak < SILENCE_THRESHOLD) return;
  // Amplitude-driven opacity ramp so soft voice doesn't slam into full glow
  const ampScale = Math.min(1, (peak - SILENCE_THRESHOLD) / 40);
  const mid = h / 2;
  waveCtx2d.lineWidth = 1.4;
  waveCtx2d.strokeStyle = '#00FF88';
  waveCtx2d.shadowColor = 'rgba(0,255,136,.85)';
  waveCtx2d.shadowBlur = 6 + 12 * ampScale;
  waveCtx2d.globalAlpha = 0.45 + 0.55 * ampScale;
  waveCtx2d.beginPath();
  for (let i = 0; i < N; i++) {
    const x = (i / (N - 1)) * w;
    const norm = (samples[i] - 128) / 128;
    const y = mid + norm * mid * 0.92;
    if (i === 0) waveCtx2d.moveTo(x, y);
    else waveCtx2d.lineTo(x, y);
  }
  waveCtx2d.stroke();
  // Secondary inner glow line
  waveCtx2d.lineWidth = 3.0;
  waveCtx2d.strokeStyle = 'rgba(0,255,136,.22)';
  waveCtx2d.shadowBlur = 0;
  waveCtx2d.stroke();
  waveCtx2d.globalAlpha = 1;
}

// ─── Energy VAD + barge-in cuts (qi 2026-06-09: "web vad and barge in cuts") ──
// Hands-free barge-in. The visualizer's AnalyserNode already hands us the raw mic
// waveform every animation frame, so we compute short-time RMS energy on it — no
// extra dependency, no Silero/ONNX model that could fail to load (reliability >
// accuracy for a voice OS whose breakage paralyzes qi). On a speech ONSET we cut
// Ava mid-sentence through the existing _avaBargeIn(); echoCancellation on the
// analyser stream keeps her own playback from self-triggering the cut.
let _vadSpeaking = false;        // currently inside a detected speech segment
let _vadHot = 0;                 // consecutive frames above threshold (onset debounce)
let _vadCold = 0;                // consecutive frames below threshold (offset debounce)
let _vadFloor = 0.012;           // adaptive noise floor (EMA), seeded at a quiet-room guess
const VAD_ONSET_FRAMES = 4;      // ~66ms @60fps of energy before we trust it's real speech
const VAD_OFFSET_FRAMES = 12;    // ~200ms of quiet ends the segment and re-arms the cut
const VAD_ABS_MIN = 0.045;       // absolute floor so a silent room can't collapse the
                                 // adaptive threshold to ~0 and trigger on faint hiss
function _vadCheck(samples) {
  // Short-time RMS of the centered waveform (bytes 0..255, 128 = silence).
  let sum = 0;
  for (let i = 0; i < samples.length; i++) { const v = (samples[i] - 128) / 128; sum += v * v; }
  const rms = Math.sqrt(sum / samples.length);
  const avaActive = _avaPlaying || (_avaQueue && _avaQueue.length > 0);
  // Adapt the noise floor ONLY while Ava is silent — otherwise her playback (even the
  // post-AEC residue) inflates the floor and qi would have to shout to barge in.
  if (!avaActive) _vadFloor = _vadFloor * 0.95 + rms * 0.05;
  const thresh = Math.max(VAD_ABS_MIN, _vadFloor * 2.4);
  if (rms > thresh) { _vadHot++; _vadCold = 0; } else { _vadCold++; _vadHot = 0; }
  // Rising edge → speech onset confirmed: cut Ava the instant qi talks over her.
  if (!_vadSpeaking && _vadHot >= VAD_ONSET_FRAMES) {

function tickListening() {
  if (!analyser) return;

  analyser.getByteTimeDomainData(samples);
  _vadCheck(samples);          // energy VAD → barge-in cut (qi 2026-06-09)
  drawWave(samples, true);
  rafId = requestAnimationFrame(tickListening);
}

  const w = waveCanvas.width / (window.devicePixelRatio || 1);
  const h = waveCanvas.height / (window.devicePixelRatio || 1);

async function startAnalyser() {
  if (analyser) return;
  try {
    // echoCancellation is the load-bearing flag (qi 2026-06-09): it subtracts Ava's
    // own TTS playback from the mic signal so her voice does NOT self-trigger the VAD
    // barge-in below. noiseSuppression cleans hiss; autoGainControl normalizes level.
    // This is the analyser-only stream — Web Speech STT runs its own internal stream,
    // so these constraints never affect recognition accuracy.
    analyserStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(analyserStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.78;
    source.connect(analyser);
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(tickListening);
  } catch (e) {
    appendError('mic visualizer denied: ' + e.message);
  }
}

function stopAnalyser() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (analyser) { try { analyser.disconnect(); } catch (_) {} analyser = null; }
  if (audioCtx) { try { audioCtx.close(); } catch (_) {} audioCtx = null; }
  if (analyserStream) { analyserStream.getTracks().forEach(t => t.stop()); analyserStream = null; }
  clearWave();   // no idle line — canvas stays empty when not listening
}

// Drag-drop on the whole page — accepts FILES AND FOLDERS. qi 2026-05-25 08:45
// PT "I try to drag a whole folder into the UI and it didn't work". Folders
// are walked recursively via webkitGetAsEntry; every file inside ships to
// /api/dictate-attach with a relative-path prefix so the server preserves
// folder structure.
(function wireDragDrop() {
  const stop = (e) => { e.preventDefault(); e.stopPropagation(); };
  let depth = 0;
  function setActive(on) {
    document.body.classList.toggle('drop-active', !!on);
  }
  ['dragenter','dragover'].forEach(ev =>
    document.addEventListener(ev, (e) => { stop(e); if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy'; if (ev === 'dragenter') depth++; setActive(true); })
  );
  document.addEventListener('dragleave', (e) => {
    stop(e);
    depth = Math.max(0, depth - 1);
    if (depth === 0) setActive(false);
  });

  // Recursive walk over a FileSystemEntry (browser File API directory entry).
  // Returns array of File objects with __path set to the relative path.
  function walkEntry(entry, pathPrefix = '') {
    return new Promise((resolve) => {
      if (!entry) return resolve([]);
      if (entry.isFile) {
        entry.file(
          (file) => { file.__path = pathPrefix + file.name; resolve([file]); },
          () => resolve([])
        );
      } else if (entry.isDirectory) {
        const reader = entry.createReader();
        const collected = [];
        const readBatch = () => reader.readEntries(async (entries) => {
          if (!entries.length) return resolve(collected);
          for (const e of entries) {
            const sub = await walkEntry(e, pathPrefix + entry.name + '/');
            collected.push(...sub);
          }
          readBatch(); // keep reading until empty (some browsers chunk readEntries)
        }, () => resolve(collected));
        readBatch();
      } else {
        resolve([]);
      }
    });
  }

  document.addEventListener('drop', async (e) => {
    stop(e);
    depth = 0;
    setActive(false);
    const dt = e.dataTransfer;
    if (!dt) return;
    const items = dt.items ? Array.from(dt.items) : [];
    let collected = [];
    // Prefer items[] which can expose directories via webkitGetAsEntry().
    if (items.length && items[0].webkitGetAsEntry) {
      for (const it of items) {
        const entry = it.webkitGetAsEntry && it.webkitGetAsEntry();
        if (entry) {
          const sub = await walkEntry(entry);
          collected.push(...sub);
        } else if (it.kind === 'file') {
          const f = it.getAsFile && it.getAsFile();
          if (f) collected.push(f);
        }
      }
    }
    // Fallback: plain files[] (no folder support, but covers older drag sources).
    if (!collected.length && dt.files && dt.files.length) {
      collected = Array.from(dt.files);
    }
    if (collected.length) {
      appendError(`drag-drop · ${collected.length} file${collected.length === 1 ? '' : 's'} queued`);
      await uploadAttachments(collected);
    }
  });
})();

// ─── Paste-anywhere + text-drop-anywhere → composer input ──────────────
// qi 2026-05-25 09:16-09:17 PT: same idea as drag-drop files but for text —
// cmd-V paste from any focus state, or dragging selected text from anywhere
// on the page (or another window), should auto-route into the chat composer.
(function pasteAndTextDropAnywhere() {
  function injectToComposer(text) {
    if (!text) return;
    const t = String(text);
    // Append (preserve any existing draft) with a space separator if needed.
    const current = fbText.value;
    fbText.value = current ? (current.endsWith('\n') ? current + t : current + (current ? '\n' : '') + t) : t;
    fbText.dispatchEvent(new Event('input', { bubbles: true }));
    fbText.focus();
    // Auto-grow if your CSS supports it
    try { fbText.style.height = 'auto'; fbText.style.height = fbText.scrollHeight + 'px'; } catch (_) {}
  }

  // Paste anywhere on page — if focus isn't already in the textarea, capture
  // clipboard text and route it. If the user is pasting into the textarea
  // directly, leave the default behavior alone.
  document.addEventListener('paste', (e) => {
    const active = document.activeElement;
    if (active === fbText) return; // user is already in the input, default paste handles it
    if (!e.clipboardData) return;
    const text = e.clipboardData.getData('text/plain');
    if (!text) return;
    e.preventDefault();
    injectToComposer(text);
  });

  // Drag-drop TEXT (already dragged-and-dropped from another app or selection).
  // The file drop handler above already preventDefaults and reads dataTransfer;
  // we extend it to also pick up text/plain when no files are in the transfer.
  document.addEventListener('drop', (e) => {
    const dt = e.dataTransfer;
    if (!dt) return;
    // If files dropped, the earlier listener handled it. Only route text when
    // no files came with the drop.
    const hasFiles = (dt.files && dt.files.length) || (dt.items && Array.from(dt.items).some((it) => it.kind === 'file'));
    if (hasFiles) return;
    const text = dt.getData && (dt.getData('text/plain') || dt.getData('text'));
    if (!text) return;
    // The earlier drop handler already preventDefault'd; just route.
    injectToComposer(text);
  }, true); // capture phase so we see it before the file-walk handler bails on no files
})();

// qi 2026-05-25 08:25 PT — URLs in bubble text were not clickable
// because we wrote textContent directly. linkifyTo() returns an array of
// DOM nodes (text + <a> nodes) that bubbles append in order. Stops the
// "can't tap the link" friction.
function linkifyTo(parent, text) {
  // Match https?:// URLs AND bare domains (hitthe.link/... xlrd.org/... etc)
  const urlRe = /\bhttps?:\/\/[^\s<>"']+|\b(?:[a-z0-9-]+\.)+(?:link|org|com|io|app|dev|net|ai)[/\w.?=&#%-]*/gi;
  let last = 0;
  let m;
  while ((m = urlRe.exec(text)) !== null) {
    if (m.index > last) parent.appendChild(document.createTextNode(text.slice(last, m.index)));
    const a = document.createElement('a');
    a.href = m[0].startsWith('http') ? m[0] : 'https://' + m[0];
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.textContent = m[0];
    a.style.cssText = 'color:#00ff88;text-decoration:underline;font-weight:600;word-break:break-all';
    parent.appendChild(a);
    last = m.index + m[0].length;
  }
  if (last < text.length) parent.appendChild(document.createTextNode(text.slice(last)));
}

      await fetch(RTC_SIGNAL_URL, {
        method: 'POST',
        headers: HEADERS,
        body: JSON.stringify({ room: RTC_ROOM, from: peerId, role, type, payload }),
      });
    } catch (e) { console.warn('[rtc] signal post failed', e); }
  }

  function newPC() {
    const c = new RTCPeerConnection(RTC_ICE);
    c.onicecandidate = (e) => {
      if (e.candidate) postSignal('ice', e.candidate.toJSON());
    };
    c.onconnectionstatechange = () => {
      console.log('[rtc] state', c.connectionState);
    };
    c.ontrack = (e) => {
      if (!remoteAudio) {
        remoteAudio = document.createElement('audio');
        remoteAudio.autoplay = true;
        remoteAudio.playsInline = true;
        remoteAudio.id = 'vei-rtc-audio';
        remoteAudio.style.display = 'none';
        document.body.appendChild(remoteAudio);
      }
      remoteAudio.srcObject = e.streams[0] || new MediaStream([e.track]);
      remoteAudio.play().catch(() => { /* needs gesture; first-tap unlock below */ });
    };
    return c;
  }

  async function attachBroadcasterTracks(c) {
    // Find the Loopback virtual device that carries Mac say audio. qi 2026-05-25
    // canon (canon_stt_vei_inout): system audio routes through "out" Loopback;
    // STT input arrives via "in" Loopback. Try labels in this order:
    //   1. "out" (canon default — system audio bus)
    //   2. "in"  (qi may set output→in during testing, channel still captures)
    //   3. any Loopback / BlackHole virtual device
    //   4. fall back to default mic (worst case, captures room audio)
    // We need an audioinput permission once so labels populate; ask for it.
    try { (await navigator.mediaDevices.getUserMedia({ audio: true })).getTracks().forEach(t => t.stop()); } catch (_) {}
    let stream, chosen = null;
    try {
      const devs = await navigator.mediaDevices.enumerateDevices();
      const inputs = devs.filter(d => d.kind === 'audioinput');
      console.log('[rtc] audioinputs:', inputs.map(d => d.label || '(unlabeled)'));
      chosen =
        inputs.find(d => /^out\b/i.test(d.label)) ||
        inputs.find(d => /^in\b/i.test(d.label)) ||
        inputs.find(d => /loopback|blackhole|virtual/i.test(d.label)) ||
        null;
      const constraints = chosen
        ? { audio: { deviceId: { exact: chosen.deviceId }, echoCancellation: false, noiseSuppression: false, autoGainControl: false } }
        : { audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } };
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      console.log('[rtc] broadcasting via:', chosen ? chosen.label : '(default mic)');
    } catch (e) {
      console.warn('[rtc] getUserMedia failed', e); return;
    }
    stream.getAudioTracks().forEach(t => c.addTrack(t, stream));
  }

  async function handleSignal(msg) {
    if (msg.from === peerId) return; // self
    if (!pc) pc = newPC();
    try {
      if (msg.type === 'offer' && role === 'receive') {
        await pc.setRemoteDescription(msg.payload);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        postSignal('answer', answer);
      } else if (msg.type === 'answer' && role === 'broadcast') {
        await pc.setRemoteDescription(msg.payload);
      } else if (msg.type === 'ice' && pc.remoteDescription) {
        await pc.addIceCandidate(msg.payload).catch(() => {});
      } else if (msg.type === 'hello' && role === 'broadcast') {
        // Receiver said hi → make a fresh offer
        await startBroadcast();
      }
    } catch (e) { console.warn('[rtc] signal handle', msg.type, e); }
  }

  async function startBroadcast() {
    if (pc) try { pc.close(); } catch (_) {}
    pc = newPC();
    await attachBroadcasterTracks(pc);
    const offer = await pc.createOffer({ offerToReceiveAudio: false });
    await pc.setLocalDescription(offer);
    postSignal('offer', offer);
  }

  function openSSE() {
    try {
      sseEs = new EventSource(`${RTC_SIGNAL_URL}/sse?room=${encodeURIComponent(RTC_ROOM)}&peer=${peerId}`);
      sseEs.onmessage = (e) => { try { handleSignal(JSON.parse(e.data)); } catch (_) {} };
      sseEs.onerror = () => { setTimeout(openSSE, 3000); };
    } catch (e) { console.warn('[rtc] sse open', e); }
  }

  // Unlock audio playback on first gesture (iOS Safari needs this)
  document.body.addEventListener('click', () => {
    if (remoteAudio) remoteAudio.play().catch(() => {});
  }, { passive: true, once: false });

  // Boot
  openSSE();
  if (role === 'broadcast') {
    // wait a beat for SSE to be ready, then announce and start
    setTimeout(() => { postSignal('hello', {}); startBroadcast(); }, 600);
  } else {
    setTimeout(() => postSignal('hello', {}), 600);
  }

  // Expose for debugging
  window._veiRTC = { get pc(){return pc;}, get role(){return role;}, room: RTC_ROOM, peerId };
})();

// ─── vdo.ninja underlay — proven WebRTC transport behind VEI UI ───
// qi 2026-05-25 "Can you underlay vdo.ninja so it's invisible behind the vei
// interface?". Mac broadcaster pushes to room; phone receiver pulls and plays.
// Audio-only, autostart, hidden chrome. iframe stays in DOM so the stream
// persists for the whole VEI session.
(function vdoUnderlay() {
  const iframe = document.getElementById('vdo-rtc');
  if (!iframe) return;
  const room = RTC_ROOM + '-vdo';
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const role = RTC_ROLE_OVERRIDE || (isMobile ? 'receive' : 'broadcast');
  // Common params: audio only, no video, hidden UI, autostart skip-prompts
  const common = '&webcam=0&audiooutput=default&hands=0&cleanoutput&fullscreen&noheader&nomic';
  let url;
  if (role === 'broadcast') {
    // push=ROOM = sender. label=xen-mac so receiver sees a name.
    // audiodevice param accepts substring match on device label.
    url = `https://vdo.ninja/?push=${encodeURIComponent(room)}&audioonly&autostart&webcam=0&label=xen-mac&audiodevice=out&proaudio&stereo=2`;
  } else {
    // view=ROOM = receiver. Autoplay needs a gesture first (handled by VEI's
    // existing first-tap unlock for remote audio).
    url = `https://vdo.ninja/?view=${encodeURIComponent(room)}&autoplay&audiooutput=default&cleanoutput`;
  }
  iframe.src = url;
  window._veiVDO = { url, role, room };
  console.log('[vdo] underlay role=' + role + ' url=' + url);
})();
</script>
