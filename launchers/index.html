<title>10 Android Launchers — Live Prototypes</title>
<meta name="description" content="A countdown of 10 Android launcher concepts, each a live interactive prototype.">
<style>
  :root{
    --bg:#08090d; --surface:#12141c; --card:#161923; --border:#242838;
    --text:#e9ecf5; --muted:#7a8199; --accent:#5b8cff; --accent2:#a06bff;
    --mono:ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;line-height:1.5}
  header{position:relative;padding:72px 24px 40px;text-align:center;overflow:hidden}
  header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% -10%,rgba(91,140,255,.18),transparent 70%);pointer-events:none}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:18px}
  h1{font-size:clamp(2.1rem,5.5vw,3.6rem);font-weight:800;letter-spacing:-.02em;line-height:1.05;text-wrap:balance;
     background:linear-gradient(120deg,#fff 40%,var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px}
  .sub{color:var(--muted);max-width:520px;margin:0 auto;font-size:1.02rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;max-width:1200px;margin:0 auto;padding:32px 24px 72px}
  .card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;
        transition:transform .2s,border-color .2s,box-shadow .2s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 12px 40px rgba(91,140,255,.16)}
  .rank{position:absolute;top:12px;left:12px;z-index:2;font-family:var(--mono);font-size:13px;font-weight:700;
        background:rgba(8,9,13,.72);backdrop-filter:blur(8px);color:var(--accent);border:1px solid var(--border);
        padding:5px 10px;border-radius:999px;letter-spacing:.05em}
  .frame{position:relative;height:320px;background:#0d0f16;overflow:hidden;border-bottom:1px solid var(--border)}
  .frame iframe{position:absolute;top:0;left:50%;width:390px;height:844px;border:0;transform:translateX(-50%) scale(.42);transform-origin:top center;pointer-events:none}
  .meta{padding:16px 18px 18px}
  .name{font-size:1.15rem;font-weight:700;letter-spacing:-.01em;margin-bottom:5px}
  .desc{color:var(--muted);font-size:.9rem;line-height:1.45}
  .open{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--accent);text-transform:uppercase}
  footer{text-align:center;padding:40px 24px 60px;border-top:1px solid var(--border);font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.06em}
  @media(max-width:640px){.frame{height:260px}}
</style>

<header>
  <p class="eyebrow">hitthe.link · Live Prototypes · 2025</p>
  <h1>10 Launchers That Overhaul Android</h1>
  <p class="sub">A countdown of ten launcher concepts — every one a fully interactive, self-contained prototype. Tap any card to open the live demo.</p>
</header>

<main class="grid" id="grid"></main>
<footer>Ten single-file prototypes · zero dependencies · hitthe.link</footer>

<script>
const L=[
 {rank:'#1',slug:'aio-launcher',name:'AIO Launcher',desc:'Everything at a glance — notifications, weather, messages and stock tickers in one info-dense dashboard. Function over flash.'},
 {rank:'#2',slug:'square-home',name:'Square Home',desc:'Windows 10 Mobile Metro reborn — resizable live tiles that flip through weather, photos and messages on a snapping grid.'},
 {rank:'#3',slug:'scribble-launcher',name:'Scribble Launcher',desc:'The Nokia Z idea, modernized. Scribble a letter anywhere to surface apps & contacts, with usage-based smart suggestions.'},
 {rank:'#4',slug:'big-launcher',name:'Big Launcher',desc:'Accessibility first — huge icons, large text, emergency contacts and oversized phone/camera. Clarity and dignity.'},
 {rank:'#5',slug:'parallax-launcher',name:'Parallax Launcher',desc:'A wallpaper with real depth — multi-layer 3D parallax that reacts to tilt and touch. Immersive, premium motion.'},
 {rank:'#6',slug:'victor-launcher',name:'Victor Launcher',desc:'The flexible all-rounder — adaptive icon color, shape options, themes, live wallpapers and deep power-user settings.'},
 {rank:'#7',slug:'new-launcher',name:'NewLauncher',desc:'Full Nothing OS vibes — monochrome dot-matrix icons, bold fonts and a futuristic minimal feel on any device.'},
 {rank:'#8',slug:'lawnchair',name:'Lawnchair',desc:'Clean Pixel look, full icon-pack support, custom gestures and a Discover feed. Open source — no ads, no bloat.'},
 {rank:'#9',slug:'anime-launcher',name:'Anime Launcher',desc:'A tappable 2D anime character that changes poses and outfits, plus colorful particle trails on every swipe.'},
 {rank:'★',slug:'crystal-blur',name:'Crystal Blur Launcher',desc:'Sleek glassmorphism — 25 blur wallpapers, 35 icon packs, a swipe-up control center and Spotlight-style search.'},
];
const g=document.getElementById('grid');
L.forEach(l=>{
  const a=document.createElement('a');
  a.className='card';a.href='../'+l.slug+'/';a.target='_blank';a.rel='noopener';
  a.innerHTML=`<span class="rank">${l.rank}</span>
    <div class="frame"><iframe src="../${l.slug}/" loading="lazy" title="${l.name}" sandbox="allow-scripts allow-same-origin"></iframe></div>
    <div class="meta"><div class="name">${l.name}</div><div class="desc">${l.desc}</div><span class="open">Open live demo ↗</span></div>`;
  g.appendChild(a);
});
</script>
