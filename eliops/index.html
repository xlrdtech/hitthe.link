<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eli Ops — Tracking Together</title>
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="Eli Ops — live lead command center for Tracking Together.">
<meta name="theme-color" content="#05060a">
<link rel="icon" href="/favicon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --bg:#05060a; --glass:rgba(17,19,30,.62); --glass-2:rgba(24,27,42,.55);
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.14);
    --fg:#e9ecf5; --mut:#8b93ad; --faint:#5b6478;
    --blue:#60a5fa; --emerald:#34d399; --purple:#c084fc; --amber:#fbbf24; --orange:#fb923c; --red:#f87171; --slate:#94a3b8;
    --mono:ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;
    overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.34;transition:opacity .4s}
  body.flat #bg-canvas{display:none}
  .vig{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 90% at 50% -10%,transparent 30%,rgba(5,6,10,.65) 78%,#05060a 110%)}
  .page{position:relative;z-index:2;max-width:1180px;margin:0 auto;padding:0 clamp(10px,3vw,22px) 80px}

  /* TOP BAR */
  .top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:10px;
    padding:12px 4px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    background:linear-gradient(180deg,rgba(5,6,10,.92),rgba(5,6,10,.55) 80%,transparent)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;letter-spacing:-.02em}
  .brand .dot{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
    background:linear-gradient(135deg,#3b82f6,#7c3aed);box-shadow:0 4px 16px rgba(79,70,229,.4);font-size:15px}
  .brand .sub{font-size:9.5px;font-weight:700;letter-spacing:.22em;color:var(--blue);text-transform:uppercase;opacity:.7;margin-left:-3px}
  .top .spacer{flex:1}
  .iconbtn{width:42px;height:42px;border-radius:11px;border:1px solid var(--line-2);background:var(--glass);
    color:var(--fg);display:grid;place-items:center;font-size:17px;transition:.15s}
  .iconbtn:hover{background:var(--glass-2);border-color:var(--blue)}
  .addbtn{height:42px;padding:0 16px;border-radius:11px;border:1px solid rgba(96,165,250,.4);
    background:linear-gradient(180deg,#3b82f6,#4f46e5);color:#fff;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:7px;
    box-shadow:0 4px 18px rgba(79,70,229,.3)}
  .addbtn:hover{filter:brightness(1.08)}

  /* METRIC CHIPS — clickable filters */
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0 12px}
  .chip{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:13px;border:1px solid var(--line);
    background:var(--glass);min-height:44px;transition:.15s;font-size:13px;font-weight:600;color:var(--mut)}
  .chip:hover{border-color:var(--line-2);color:var(--fg);transform:translateY(-1px)}
  .chip .n{font-size:18px;font-weight:800;color:var(--fg);font-variant-numeric:tabular-nums}
  .chip.on{background:#fff;color:#000;border-color:#fff}
  .chip.on .n{color:#000}
  .chip[data-k="STOP"] .n{color:var(--red)} .chip[data-k="STOP"].on{background:rgba(248,113,113,.18);color:var(--red);border-color:var(--red)} .chip[data-k="STOP"].on .n{color:var(--red)}
  .chip[data-k="Booked"] .n{color:var(--emerald)}
  .chip[data-k="New"] .n{color:var(--purple)}

  /* FILTER BAR */
  .filters{position:sticky;top:64px;z-index:30;display:flex;flex-wrap:wrap;gap:8px;align-items:center;
    padding:10px;border-radius:14px;border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(14px);margin-bottom:14px}
  .search{flex:1;min-width:160px;position:relative}
  .search input{width:100%;height:44px;padding:0 14px 0 38px;border-radius:11px;border:1px solid var(--line-2);
    background:rgba(0,0,0,.34);color:var(--fg);font-size:15px;outline:none}
  .search input:focus{border-color:var(--blue)}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5}
  .filters select{height:44px;padding:0 12px;border-radius:11px;border:1px solid var(--line-2);
    background:rgba(0,0,0,.34);color:var(--fg);font-size:14px;outline:none;max-width:46vw}
  .filters select:focus{border-color:var(--blue)}
  .clearf{height:44px;padding:0 14px;border-radius:11px;border:1px solid var(--line-2);background:transparent;color:var(--mut);font-size:13px;font-weight:600}
  .clearf:hover{color:var(--fg);border-color:var(--red)}

  /* LEAD LIST — full page scroll */
  .count{font-size:11.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);padding:2px 4px 10px}
  .list{display:flex;flex-direction:column;gap:9px}
  .card{border:1px solid var(--line);border-left:3px solid var(--slate);border-radius:14px;padding:14px;
    background:var(--glass);backdrop-filter:blur(10px);transition:.14s}
  .card:hover{border-color:var(--line-2);background:var(--glass-2)}
  .card.stop{border-left-color:var(--red);background:rgba(248,113,113,.07)}
  .card.Booked{border-left-color:var(--emerald)} .card.New{border-left-color:var(--purple)}
  .card.FollowUp{border-left-color:var(--amber)} .card.Attempted{border-left-color:var(--orange)}
  .card.Interested{border-left-color:var(--blue)}
  .crow{display:flex;align-items:flex-start;gap:12px}
  .cmain{flex:1;min-width:0}
  .cname{font-size:16px;font-weight:700;color:var(--fg);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .cmeta{font-size:12.5px;color:var(--mut);margin-top:3px;line-height:1.5;word-break:break-word}
  .cmeta b{color:var(--fg);font-weight:600}
  .badge{font-size:10.5px;font-weight:800;letter-spacing:.04em;padding:4px 9px;border-radius:7px;border:1px solid;cursor:pointer;white-space:nowrap}
  .notes{font-size:12px;font-style:italic;color:var(--mut);margin-top:8px;padding:8px 10px;border-radius:9px;
    background:rgba(0,0,0,.28);border:1px solid var(--line);line-height:1.45}
  .actions{display:flex;gap:7px;flex-shrink:0}
  .act{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:16px;border:1px solid var(--line-2);background:rgba(0,0,0,.3)}
  .act.call{border-color:rgba(52,211,153,.45);color:var(--emerald)} .act.call:hover{background:rgba(52,211,153,.16)}
  .act.text{border-color:rgba(96,165,250,.45);color:var(--blue)} .act.text:hover{background:rgba(96,165,250,.16)}
  .phone-link{font-variant-numeric:tabular-nums}
  .empty{text-align:center;padding:60px 20px;color:var(--mut);font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:13px}

  /* MODALS / SLIDEOVER */
  .scrim{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:.25s;display:grid;place-items:center;padding:14px}
  .scrim.open{opacity:1;pointer-events:auto}
  .modal{width:100%;max-width:440px;max-height:90vh;overflow:auto;border-radius:20px;border:1px solid var(--line-2);
    background:rgba(14,16,26,.96);backdrop-filter:blur(20px);transform:scale(.96);transition:.25s}
  .scrim.open .modal{transform:scale(1)}
  .mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
  .mhead h3{margin:0;font-size:17px;font-weight:800}
  .mbody{padding:18px;display:flex;flex-direction:column;gap:14px}
  .fld label{display:block;font-size:10.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);opacity:.8;margin-bottom:6px}
  .fld input,.fld select,.fld textarea{width:100%;padding:11px 12px;border-radius:11px;border:1px solid var(--line-2);background:rgba(0,0,0,.34);color:var(--fg);font-size:15px;outline:none;font-family:inherit}
  .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--blue)}
  .mfoot{display:flex;gap:10px;justify-content:flex-end;padding:14px 18px;border-top:1px solid var(--line)}
  .btn{padding:10px 16px;border-radius:11px;font-weight:700;font-size:14px;border:1px solid var(--line-2);background:transparent;color:var(--fg)}
  .btn.primary{background:linear-gradient(180deg,#3b82f6,#4f46e5);border-color:rgba(96,165,250,.4);color:#fff}

  /* AGENT SLIDEOVER */
  .agent{position:fixed;top:0;right:0;z-index:95;height:100dvh;width:min(440px,100vw);background:rgba(11,13,22,.97);
    backdrop-filter:blur(22px);border-left:1px solid var(--line-2);transform:translateX(105%);transition:.3s;display:flex;flex-direction:column}
  .agent.open{transform:translateX(0)}
  .ahead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
  .ahead h3{margin:0;font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
  .alog{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .msg{padding:11px 13px;border-radius:13px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .msg.u{align-self:flex-end;background:linear-gradient(180deg,#3b82f6,#4f46e5);color:#fff;max-width:85%;border-bottom-right-radius:4px}
  .msg.a{align-self:flex-start;background:var(--glass-2);border:1px solid var(--line);max-width:92%;border-bottom-left-radius:4px}
  .msg.sys{align-self:center;font-size:11.5px;color:var(--mut);background:transparent;text-align:center}
  .quick{display:flex;flex-wrap:wrap;gap:7px;padding:0 16px 10px}
  .quick button{font-size:12px;font-weight:600;padding:8px 11px;border-radius:10px;border:1px solid var(--line-2);background:var(--glass);color:var(--mut)}
  .quick button:hover{color:var(--fg);border-color:var(--blue)}
  .ainput{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line)}
  .ainput textarea{flex:1;resize:none;min-height:44px;max-height:120px;padding:11px;border-radius:11px;border:1px solid var(--line-2);background:rgba(0,0,0,.34);color:var(--fg);font-size:15px;outline:none;font-family:inherit}
  .ainput button{width:44px;border-radius:11px;border:none;background:linear-gradient(180deg,#3b82f6,#4f46e5);color:#fff;font-size:18px}
  .keyrow{font-size:11px;color:var(--mut);padding:8px 16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:6px}
  .keyrow a{color:var(--blue);cursor:pointer;text-decoration:underline}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--line-2);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* SECOND VIEW — embedded site behind passcode */
  .siteview{position:fixed;inset:0;z-index:120;background:#05060a;display:none;flex-direction:column}
  .siteview.open{display:flex}
  .sv-bar{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line);
    font-size:13px;font-weight:700;color:var(--mut);backdrop-filter:blur(10px)}
  .siteview iframe{flex:1;width:100%;border:0;background:#05060a}
  .brand{cursor:pointer;user-select:none}
  @media (max-width:560px){ .filters select{max-width:100%;flex:1} .brand .sub{display:none} }
</style>
</head>
<body>
<div id="bg-canvas"></div>
<div class="vig"></div>

<div class="page">
  <header class="top">
    <div class="brand"><span class="dot">◎</span> Eli Ops <span class="sub">Tracking Together</span></div>
    <div class="spacer"></div>
    <button class="iconbtn" id="btn-3d" title="Toggle 3D background">✦</button>
    <button class="iconbtn" id="btn-export" title="Export CSV">⭳</button>
    <button class="iconbtn" id="btn-agent" title="Ask Eli (AI)">✷</button>
    <button class="addbtn" id="btn-add">＋ Lead</button>
  </header>

  <div class="chips" id="chips"></div>

  <div class="filters">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="Search name, phone, service, notes...">
    </div>
    <select id="f-event"><option value="">All Events</option></select>
    <select id="f-rep"><option value="">All Reps</option></select>
    <button class="clearf" id="f-clear">Clear</button>
  </div>

  <div class="count" id="count"></div>
  <div class="list" id="list"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="scrim" id="modal-scrim">
  <div class="modal">
    <div class="mhead"><h3 id="modal-title">New Lead</h3><button class="iconbtn" id="modal-x" style="width:34px;height:34px">✕</button></div>
    <form id="lead-form" class="mbody">
      <input type="hidden" id="m-id">
      <div class="fld"><label>Name</label><input id="m-name" required></div>
      <div class="fld"><label>Phone</label><input id="m-phone" inputmode="tel"></div>
      <div class="fld"><label>Service</label><input id="m-service"></div>
      <div class="fld" style="display:flex;gap:10px"><div style="flex:1"><label>Status</label><select id="m-status"></select></div><div style="flex:1"><label>Event</label><select id="m-event"></select></div></div>
      <div class="fld"><label>Rep</label><select id="m-rep"></select></div>
      <div class="fld"><label>Notes</label><textarea id="m-notes" rows="3"></textarea></div>
    </form>
    <div class="mfoot"><button class="btn" id="m-del" style="margin-right:auto;border-color:rgba(248,113,113,.4);color:var(--red);display:none">Delete</button><button class="btn" id="m-cancel">Cancel</button><button class="btn primary" id="m-save">Save</button></div>
  </div>
</div>

<!-- SECOND VIEW: embedded site (passcode 0) -->
<div class="siteview" id="siteview">
  <div class="sv-bar"><button class="iconbtn" id="sv-back" style="width:36px;height:36px">←</button><span id="sv-label">hitthe.link</span></div>
  <iframe id="sv-frame" src="about:blank" title="site" referrerpolicy="no-referrer"></iframe>
</div>

<!-- AGENT SLIDEOVER -->
<div class="agent" id="agent">
  <div class="ahead"><h3>✷ Ask Eli</h3><button class="iconbtn" id="agent-x" style="width:34px;height:34px">✕</button></div>
  <div class="alog" id="alog"></div>
  <div class="quick" id="quick"></div>
  <div class="ainput"><textarea id="ainput" rows="1" placeholder="Ask about the leads, or say 'make the cards bigger'..."></textarea><button id="asend">➤</button></div>
  <div class="keyrow" id="keyrow"></div>
</div>

<script>
const MODEL='claude-sonnet-4-6';
const STATUS_COLOR={STOP:'red',Booked:'emerald',New:'purple',Interested:'blue','Follow Up':'amber',Attempted:'orange','Not Interested':'slate'};
const STATUS_CLASS={'Follow Up':'FollowUp','Not Interested':'NotInterested'};
const LS={edits:'eliops.edits',added:'eliops.added',css:'eliops.css',key:'eliops.key'};

let BASE=[], SETTINGS={statuses:[],events:[],reps:[],services:[]}, FILT={chip:'all',q:'',event:'',rep:''};

const $=s=>document.querySelector(s), el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const lsGet=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}};
const lsSet=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const telHref=p=>'tel:'+String(p).replace(/[^0-9+]/g,'');
const smsHref=p=>'sms:'+String(p).replace(/[^0-9+]/g,'');
const hasPhone=p=>p && /\d/.test(p) && !/not provided/i.test(p);

// merged dataset = base (with per-id edits) + locally added
function leads(){
  const edits=lsGet(LS.edits,{}), added=lsGet(LS.added,[]);
  const merged=BASE.map(l=>({...l, ...(edits[l.id]||{})}));
  return added.concat(merged);
}
const isStop=l=>l.status==='STOP';   // sheet's authoritative STOP status (no notes-regex: avoids hiding real leads whose script says "reply STOP")

function patch(id,changes){ const e=lsGet(LS.edits,{}); e[id]={...(e[id]||{}),...changes}; lsSet(LS.edits,e); render(); }

function counts(all){
  const c={all:all.length,New:0,Booked:0,'Follow Up':0,Attempted:0,STOP:0};
  all.forEach(l=>{ if(isStop(l)){c.STOP++;return;} if(l.status in c)c[l.status]++; });
  return c;
}
function filtered(){
  const all=leads();
  return all.filter(l=>{
    if(FILT.chip==='STOP') return isStop(l);
    if(isStop(l)) return false;                 // STOPs suppressed unless STOP chip
    if(FILT.chip!=='all' && l.status!==FILT.chip) return false;
    if(FILT.event && l.event!==FILT.event) return false;
    if(FILT.rep && l.rep!==FILT.rep) return false;
    if(FILT.q){const q=FILT.q.toLowerCase(); if(!((l.name||'')+ (l.phone||'')+(l.service||'')+(l.notes||'')+(l.event||'')+(l.rep||'')).toLowerCase().includes(q)) return false;}
    return true;
  });
}

function renderChips(){
  const c=counts(leads()), box=$('#chips'); box.innerHTML='';
  const defs=[['all','All'],['New','New'],['Booked','Booked'],['Follow Up','Follow Up'],['Attempted','Attempted'],['STOP','STOP']];
  defs.forEach(([k,lab])=>{
    const b=el('button','chip'+(FILT.chip===k?' on':'')); b.dataset.k=k;
    b.innerHTML=`<span class="n">${k==='all'?c.all:(c[k]||0)}</span> ${lab}`;
    b.onclick=()=>{FILT.chip=k;render();};
    box.appendChild(b);
  });
}
function badge(status){
  const col='var(--'+(STATUS_COLOR[status]||'slate')+')';
  return `<span class="badge" style="color:${col};border-color:${col};background:color-mix(in srgb,${col} 16%,transparent)" data-act="status">${esc(status)}</span>`;
}
function render(){
  renderChips();
  const rows=filtered(), list=$('#list'); list.innerHTML='';
  $('#count').textContent=`${rows.length} of ${leads().length} leads`+(FILT.chip!=='STOP'?` · ${counts(leads()).STOP} STOP suppressed`:'');
  if(!rows.length){ list.innerHTML='<div class="empty">No matching leads</div>'; return; }
  const frag=document.createDocumentFragment();
  rows.forEach(l=>{
    const stop=isStop(l), cls='card '+(stop?'stop':(STATUS_CLASS[l.status]||l.status||''));
    const c=el('div',cls); c.dataset.id=l.id;
    const ph=hasPhone(l.phone);
    c.innerHTML=`
      <div class="crow">
        <div class="cmain">
          <div class="cname">${esc(l.name)} ${badge(l.status)}</div>
          <div class="cmeta">
            ${ph?`📞 <a class="phone-link" href="${telHref(l.phone)}">${esc(l.phone)}</a>`:`<span style="opacity:.6">no phone</span>`}
            &nbsp;·&nbsp; <b>${esc(l.service||'—')}</b><br>
            ${esc(l.event||'—')} &nbsp;·&nbsp; ${esc(l.rep||'Unassigned')}${l.added?` &nbsp;·&nbsp; ${esc(l.added)}`:''}
          </div>
          ${l.notes?`<div class="notes">${esc(l.notes)}</div>`:''}
        </div>
        <div class="actions">
          ${ph?`<a class="act call" href="${telHref(l.phone)}" title="Call">📞</a><a class="act text" href="${smsHref(l.phone)}" title="Text">💬</a>`:''}
        </div>
      </div>`;
    c.querySelector('[data-act="status"]').onclick=e=>{e.stopPropagation();cycleStatus(l);};
    c.addEventListener('click',ev=>{ if(ev.target.closest('a')||ev.target.closest('.badge'))return; openModal(l); });
    frag.appendChild(c);
  });
  list.appendChild(frag);
}
function cycleStatus(l){
  const order=['New','Attempted','Follow Up','Interested','Booked','Not Interested','STOP'];
  const i=order.indexOf(l.status); const next=order[(i+1)%order.length];
  if(String(l.id).startsWith('add-')){ const a=lsGet(LS.added,[]); const t=a.find(x=>x.id===l.id); if(t){t.status=next;lsSet(LS.added,a);render();} }
  else patch(l.id,{status:next});
}

/* ---------- modal ---------- */
function fillSelect(sel,opts,val){ sel.innerHTML=opts.map(o=>`<option ${o===val?'selected':''}>${esc(o)}</option>`).join(''); }
function openModal(l){
  $('#modal-title').textContent=l?'Edit Lead':'New Lead';
  $('#m-id').value=l?l.id:'';
  $('#m-name').value=l?l.name:''; $('#m-phone').value=l?(l.phone||''):''; $('#m-service').value=l?(l.service||''):'';
  fillSelect($('#m-status'),SETTINGS.statuses,l?l.status:'New');
  fillSelect($('#m-event'),SETTINGS.events,l?l.event:'Unknown');
  fillSelect($('#m-rep'),SETTINGS.reps,l?l.rep:'Unassigned');
  $('#m-notes').value=l?(l.notes||''):'';
  $('#m-del').style.display = (l&&String(l.id).startsWith('add-'))?'block':'none';
  $('#modal-scrim').classList.add('open');
}
function closeModal(){ $('#modal-scrim').classList.remove('open'); }
$('#btn-add').onclick=()=>openModal(null);
$('#modal-x').onclick=$('#m-cancel').onclick=closeModal;
$('#modal-scrim').onclick=e=>{if(e.target===$('#modal-scrim'))closeModal();};
$('#m-save').onclick=()=>{
  const id=$('#m-id').value;
  const data={name:$('#m-name').value.trim(),phone:$('#m-phone').value.trim()||'Not provided',service:$('#m-service').value.trim()||'Unknown',
    status:$('#m-status').value,event:$('#m-event').value,rep:$('#m-rep').value,notes:$('#m-notes').value.trim()};
  if(!data.name)return;
  if(!id){ const a=lsGet(LS.added,[]); a.unshift({id:'add-'+Date.now(),added:new Date().toISOString().slice(0,10),...data}); lsSet(LS.added,a); }
  else if(String(id).startsWith('add-')){ const a=lsGet(LS.added,[]); const t=a.find(x=>x.id===id); Object.assign(t,data); lsSet(LS.added,a); }
  else patch(Number(id),data);
  closeModal(); render();
};
$('#m-del').onclick=()=>{ const id=$('#m-id').value; let a=lsGet(LS.added,[]); a=a.filter(x=>x.id!==id); lsSet(LS.added,a); closeModal(); render(); };

/* ---------- filters ---------- */
$('#q').oninput=e=>{FILT.q=e.target.value;render();};
$('#f-event').onchange=e=>{FILT.event=e.target.value;render();};
$('#f-rep').onchange=e=>{FILT.rep=e.target.value;render();};
$('#f-clear').onclick=()=>{FILT={chip:'all',q:'',event:'',rep:''};$('#q').value='';$('#f-event').value='';$('#f-rep').value='';render();};

/* ---------- export ---------- */

/* ---------- AGENT (Claude via API key, direct browser access) ---------- */
const agent={open:()=>$('#agent').classList.add('open'),close:()=>$('#agent').classList.remove('open')};
$('#btn-agent').onclick=()=>{agent.open();renderKeyrow();};
$('#agent-x').onclick=agent.close;
function renderKeyrow(){
  const k=localStorage.getItem(LS.key);
  $('#keyrow').innerHTML=k?`🔑 key set · <a id="key-clear">change</a>`:`🔑 no key · <a id="key-set">add Anthropic API key</a> for live AI`;
  const set=$('#key-set'),clr=$('#key-clear');
  if(set)set.onclick=()=>{const v=prompt('Anthropic API key (sk-ant-...). Stored only in this browser.');if(v){localStorage.setItem(LS.key,v.trim());renderKeyrow();aMsg('sys','Key saved. Live AI enabled.');}};
  if(clr)clr.onclick=()=>{const v=prompt('New Anthropic API key (blank to remove):',''); if(v===null)return; v?localStorage.setItem(LS.key,v.trim()):localStorage.removeItem(LS.key); renderKeyrow();};
}
function aMsg(role,text){const m=el('div','msg '+role);m.textContent=text;$('#alog').appendChild(m);$('#alog').scrollTop=1e9;return m;}
function localInsights(){
  const all=leads(),c=counts(all);
  const byEvent={},byRep={},noPhone=all.filter(l=>!hasPhone(l.phone)&&!isStop(l)).length;
  all.forEach(l=>{if(!isStop(l)){byEvent[l.event]=(byEvent[l.event]||0)+1;byRep[l.rep]=(byRep[l.rep]||0)+1;}});
  const top=o=>Object.entries(o).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k,v])=>`  • ${k}: ${v}`).join('\n');
  const unworked=all.filter(l=>l.status==='New'&&hasPhone(l.phone)&&!isStop(l)).length;
  return `LOCAL SNAPSHOT (no AI key needed)\n\nTotal: ${c.all} · Booked: ${c.Booked} · New: ${c.New} · Follow Up: ${c['Follow Up']} · Attempted: ${c.Attempted} · STOP(suppress): ${c.STOP}\n\n📞 Callable NEW leads (priority): ${unworked}\n⚠ Leads with no phone: ${noPhone}\n\nTop events:\n${top(byEvent)}\n\nTop reps:\n${top(byRep)}\n\nAdd an API key for prioritized call lists + deeper analysis.`;
}
async function callClaude(userText){
  const key=localStorage.getItem(LS.key);
  if(!key){ aMsg('a',localInsights()); aMsg('sys','That was a local snapshot. Add a key for live AI.'); return; }
  const all=leads(),c=counts(all);
  const sample=filtered().slice(0,80).map(l=>({n:l.name,ph:l.phone,s:l.service,e:l.event,st:l.status,r:l.rep,note:(l.notes||'').slice(0,120)}));
  const sys=`You are Eli, the lead-ops analyst for Tracking Together (Anthony Vasquez). Be concise, direct, action-first. Data: ${c.all} leads, status counts ${JSON.stringify(c)}. Current filtered sample (${sample.length}) below. When asked for design changes, reply ONLY with a fenced \`\`\`css block of overrides for the existing CSS variables/classes (root vars: --bg,--glass,--blue,--emerald etc; classes: .card,.chip,.cname,.badge). When asked about leads, give a prioritized, specific answer (who to call first and why).`;
  const m=aMsg('a',''); m.innerHTML='<span class="spin"></span>';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:MODEL,max_tokens:1400,system:sys,messages:[{role:'user',content:userText+'\n\nDATA:\n'+JSON.stringify(sample)}]})});
    const j=await r.json();
    if(!r.ok){m.textContent='API error: '+(j.error?.message||r.status);return;}
    const txt=j.content.map(b=>b.text||'').join('');
    m.textContent=txt;
    const css=txt.match(/```css\s*([\s\S]*?)```/);
    if(css){ applyCSS(css[1]); aMsg('sys','✓ Design applied + saved to this browser.'); }
  }catch(e){m.textContent='Request failed: '+e.message+' (check key / network)';}
}
function applyCSS(css){ let s=$('#agent-css'); if(!s){s=el('style');s.id='agent-css';document.head.appendChild(s);} s.textContent=css; lsSet(LS.css,css); }
function send(t){ if(!t.trim())return; aMsg('u',t); callClaude(t); }
$('#asend').onclick=()=>{const v=$('#ainput').value;$('#ainput').value='';send(v);};
$('#ainput').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();$('#asend').click();}};
const QUICK=['Who should Anthony call first?','Insights on all the leads','Best events by booking rate','Make the cards bigger and bolder','Switch to a warmer color theme'];
$('#quick').innerHTML=QUICK.map(q=>`<button>${q}</button>`).join('');
$('#quick').querySelectorAll('button').forEach((b,i)=>b.onclick=()=>send(QUICK[i]));

/* ---------- boot ---------- */
function initSelects(){
  $('#f-event').innerHTML='<option value="">All Events</option>'+SETTINGS.events.map(e=>`<option>${esc(e)}</option>`).join('');
  $('#f-rep').innerHTML='<option value="">All Reps</option>'+SETTINGS.reps.map(r=>`<option>${esc(r)}</option>`).join('');
}
(async function(){
  const saved=lsGet(LS.css,''); if(saved)applyCSS(saved);
  try{
    const r=await fetch('leads.json',{cache:'no-store'}); const d=await r.json();
    BASE=d.leads; SETTINGS=d.settings;
  }catch(e){ $('#list').innerHTML='<div class="empty">Could not load leads.json</div>'; return; }
  initSelects(); render();
  aMsg('sys','Hi — I\'m Eli. Ask me who to call first, for insights, or to restyle the app. Tap a number to call or text. Tap a status to advance it.');
  initBG();
})();

/* ---------- tamed 3D background ---------- */
function initBG(){
  if(document.body.classList.contains('flat'))return;
  try{
    const c=document.getElementById('bg-canvas');
    const scene=new THREE.Scene(), cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,1000);
    const rnd=new THREE.WebGLRenderer({antialias:true,alpha:true}); rnd.setSize(innerWidth,innerHeight);
    rnd.setPixelRatio(Math.min(devicePixelRatio,1.5)); c.appendChild(rnd.domElement);
    const geo=new THREE.PlaneGeometry(16,16,80,80);
    const mat=new THREE.ShaderMaterial({uniforms:{t:{value:0}},transparent:true,
      vertexShader:`uniform float t;varying float v;
        float n(vec2 p){return sin(p.x*1.3+t*.25)*cos(p.y*1.1-t*.2);}
        void main(){vec3 p=position;float e=n(p.xy*.6)*.7+n(p.xy*1.7)*.25;v=e;p.z+=e;gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.);}`,
      fragmentShader:`varying float v;void main(){vec3 a=vec3(.02,.03,.07),b=vec3(.16,.22,.45),i=vec3(.42,.12,.7);
        float m=(v+1.)*.5;vec3 col=mix(a,b,m)+i*v*.18;gl_FragColor=vec4(col,.9);}`});
    const mesh=new THREE.Mesh(geo,mat); mesh.rotation.x=-1.05; scene.add(mesh); cam.position.z=4.2;
    const clk=new THREE.Clock();
    (function loop(){ if(document.body.classList.contains('flat')){requestAnimationFrame(loop);return;}
      requestAnimationFrame(loop); mat.uniforms.t.value=clk.getElapsedTime(); rnd.render(scene,cam); })();
    addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();rnd.setSize(innerWidth,innerHeight);});
  }catch(e){document.body.classList.add('flat');}
}
</script>
