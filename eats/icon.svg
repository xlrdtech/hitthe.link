<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <!-- Backdrop -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0a1a14"/>
      <stop offset="55%" stop-color="#040806"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="55%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="emeraldDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scanline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="40%" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#10b981" stroke-opacity="0.06" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Background with subtle grid -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#grid)"/>
  <!-- Ambient bloom behind hex -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Outer scan rings (concentric pulse) -->
  <circle cx="256" cy="256" r="200" stroke="#10b981" stroke-opacity="0.12" stroke-width="1.5" stroke-dasharray="2 6"/>
  <circle cx="256" cy="256" r="170" stroke="#10b981" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="3 4"/>
  <circle cx="256" cy="256" r="140" stroke="#10b981" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- Hexagonal molecule frame -->
  <g filter="url(#bloom)">
    <polygon
      points="256,80 396,160 396,320 256,400 116,320 116,160"
      fill="none"
      stroke="url(#emerald)"
      stroke-width="6"
      stroke-linejoin="round"
    />
  </g>

  <!-- Inner hex highlight stroke -->
  <polygon
    points="256,108 372,172 372,308 256,372 140,308 140,172"
    fill="#06120c"
    fill-opacity="0.55"
    stroke="#10b981"
    stroke-opacity="0.35"
    stroke-width="1.5"
  />

  <!-- Vertex molecule nodes -->
  <g fill="url(#emerald)">
    <circle cx="256" cy="80" r="9"/>
    <circle cx="396" cy="160" r="9"/>
    <circle cx="396" cy="320" r="9"/>
    <circle cx="256" cy="400" r="9"/>
    <circle cx="116" cy="320" r="9"/>
    <circle cx="116" cy="160" r="9"/>
  </g>

  <!-- Center "E" mark -->
  <g transform="translate(180,160)">
    <rect x="0" y="0" width="152" height="32" rx="6" fill="url(#emeraldDeep)"/>
    <rect x="0" y="60" width="120" height="28" rx="6" fill="url(#emerald)"/>
    <rect x="0" y="120" width="152" height="32" rx="6" fill="url(#emeraldDeep)"/>
    <rect x="0" y="0" width="22" height="152" rx="6" fill="#0c2a1b"/>
    <rect x="0" y="0" width="22" height="152" rx="6" fill="#10b981" fill-opacity="0.85"/>
  </g>

  <!-- Animated scan line (CSS animates if in browser, decorative in raster) -->
  <rect x="80" y="248" width="352" height="16" fill="url(#scanline)" opacity="0.85"/>

  <!-- Corner electrodes -->
  <g stroke="#10b981" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 60 60 L 92 60 M 60 60 L 60 92"/>
    <path d="M 452 60 L 420 60 M 452 60 L 452 92"/>
    <path d="M 60 452 L 92 452 M 60 452 L 60 420"/>
    <path d="M 452 452 L 420 452 M 452 452 L 452 420"/>
  </g>

  <!-- Micro chip line under the E -->
  <g stroke="url(#emerald)" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 188 360 L 220 360 L 232 352 L 296 352 L 308 360 L 340 360"/>
    <circle cx="220" cy="360" r="3" fill="#10b981" stroke="none"/>
    <circle cx="296" cy="352" r="3" fill="#34d399" stroke="none"/>
  </g>

  <!-- Pulse dot (animated in SVG-supporting renderers) -->
  <circle cx="256" cy="80" r="14" fill="#10b981" opacity="0.35">
    <animate attributeName="r" values="9;18;9" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.05;0.55" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="80" r="9" fill="#34d399"/>

  <!-- Wordmark micro-text on bottom edge -->
  <g font-family="ui-monospace, Menlo, monospace" fill="#10b981" opacity="0.85" font-size="13" letter-spacing="6">
    <text x="256" y="442" text-anchor="middle">E . A . T . S .</text>
  </g>
</svg>
