<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Electric EATS — Decode every food decision</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=EB+Garamond:wght@400;500;600&family=DM+Serif+Display&display=swap" />

  <link rel="stylesheet" href="app/style.css" />

  <template id="__bundler_thumbnail" data-bg-color="#000000">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow" cx="50%" cy="40%" r="55%">
          <stop offset="0%" stop-color="#22e07a" stop-opacity="0.65"/>
          <stop offset="60%" stop-color="#22e07a" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#22e07a" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#22e07a"/>
          <stop offset="100%" stop-color="#9eff9e"/>
        </linearGradient>
      </defs>
      <rect width="1200" height="800" fill="#000"/>
      <rect width="1200" height="800" fill="url(#glow)"/>
      <!-- Stylized E mark + bolt -->
      <g transform="translate(600 400)">
        <circle r="160" fill="none" stroke="url(#g)" stroke-width="6" opacity="0.4"/>
        <circle r="120" fill="none" stroke="url(#g)" stroke-width="10"/>
        <path d="M -30 -60 L -30 60 L 40 60 M -30 0 L 30 0 M -30 -60 L 40 -60"
              fill="none" stroke="url(#g)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <g transform="translate(600 660)" text-anchor="middle" font-family="Georgia, serif" fill="#9eff9e" opacity="0.85">
        <text font-size="44" letter-spacing="0.2em" font-family="ui-monospace, monospace" fill="#9eff9e" opacity="0.7">E.A.T.S.</text>
        <text y="42" font-size="22" font-family="ui-monospace, monospace" fill="#9eff9e" opacity="0.4" letter-spacing="0.3em">ELECTRIC EATS · DECODE FOOD</text>
      </g>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data first (plain JS) -->
  <script src="app/data.js"></script>

  <!-- iOS frame + Tweaks panel (must come before any consumer) -->
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Shared atoms -->
  <script type="text/babel" src="app/lib.jsx"></script>

  <!-- Screens + scan -->
  <script type="text/babel" src="app/scan.jsx"></script>
  <script type="text/babel" src="app/screen-home.jsx"></script>
