<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PURGATORY 6 · P6.5 — 10.13.2026</title>
<meta name="description" content="PURGATORY 6 (P6.5) — arriving 10.13.2026. Reserve your copy.">
<meta property="og:title" content="PURGATORY 6 · P6.5">
<meta property="og:description" content="Arriving 10.13.2026. Reserve your copy.">
<meta property="og:type" content="music.album">
<meta name="theme-color" content="#0a0708">
<style>
  :root{
    --bg:#0a0708; --ink:#f3ece6; --dim:#9a8f86; --faint:#5c534d;
    --ember:#ff5a1f; --ember2:#ff9a3c; --gold:#d8b46a; --ash:#1a1513; --line:#2a2320;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font:16px/1.6 ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; overflow-x:hidden; min-height:100svh;
    display:flex; flex-direction:column;
  }
  /* purgatory glow + ember rise + grain */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(120% 80% at 50% 118%, rgba(255,90,31,.34), rgba(255,90,31,0) 60%),
      radial-gradient(90% 60% at 50% -10%, rgba(216,180,106,.10), rgba(0,0,0,0) 55%);
    animation:breathe 7s ease-in-out infinite;}
  body::after{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  @keyframes breathe{0%,100%{opacity:.85}50%{opacity:1}}
  .wrap{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:48px 22px;gap:6px}
  .mark{font:700 13px/1 ui-monospace,Menlo,monospace;letter-spacing:.5em;color:var(--gold);text-indent:.5em;
    opacity:0;animation:rise .9s .1s forwards}
  .kicker{font:500 12px/1 ui-monospace,Menlo,monospace;letter-spacing:.42em;color:var(--ember2);text-indent:.42em;margin-top:18px;
    opacity:0;animation:rise .9s .25s forwards}
  h1{margin:.18em 0 0;font-weight:800;letter-spacing:-.02em;line-height:.92;
    font-size:clamp(52px,15vw,180px);
    background:linear-gradient(180deg,#fff 0%,#f3ece6 38%,var(--ember2) 92%,var(--ember) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 60px rgba(255,90,31,.25);
    opacity:0;animation:rise 1s .35s forwards}
  .sub{font-size:clamp(13px,2.4vw,17px);color:var(--dim);letter-spacing:.06em;margin-top:.4em;
    opacity:0;animation:rise 1s .5s forwards}
  .sub b{color:var(--ink);font-weight:600}
  /* countdown */
  .cd{display:flex;gap:clamp(10px,3.5vw,30px);margin:34px 0 8px;opacity:0;animation:rise 1s .65s forwards}
  .cd .u{min-width:64px}
  .cd .n{font:800 clamp(30px,7vw,58px)/1 ui-monospace,Menlo,monospace;color:var(--ink);
    font-variant-numeric:tabular-nums;text-shadow:0 0 28px rgba(255,90,31,.22)}
  .cd .l{font:600 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.28em;color:var(--faint);text-indent:.28em;margin-top:9px;text-transform:uppercase}
  .when{font:600 13px/1 ui-monospace,Menlo,monospace;letter-spacing:.34em;color:var(--ember2);text-indent:.34em;margin-top:6px;
    opacity:0;animation:rise 1s .8s forwards}
  /* reserve */
  form{margin-top:34px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;max-width:480px;
    opacity:0;animation:rise 1s .95s forwards}
  input[type=email]{flex:1 1 240px;min-width:200px;background:rgba(255,255,255,.04);border:1px solid var(--line);
    border-radius:11px;padding:14px 16px;color:var(--ink);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
  input[type=email]:focus{border-color:var(--ember);box-shadow:0 0 0 3px rgba(255,90,31,.18)}
  input::placeholder{color:var(--faint)}
  button{flex:0 0 auto;background:linear-gradient(180deg,var(--ember2),var(--ember));color:#190a04;font-weight:800;
    border:none;border-radius:11px;padding:14px 24px;font-size:15px;letter-spacing:.02em;cursor:pointer;
    box-shadow:0 8px 30px rgba(255,90,31,.32);transition:transform .15s,box-shadow .15s}
  button:hover{transform:translateY(-1px);box-shadow:0 12px 38px rgba(255,90,31,.45)}
  .msg{min-height:20px;margin-top:14px;font-size:13px;color:var(--ember2);letter-spacing:.04em;
    opacity:0;animation:rise 1s 1.05s forwards}
  .foot{position:relative;z-index:2;text-align:center;padding:20px;color:var(--faint);
    font:500 11px/1.5 ui-monospace,Menlo,monospace;letter-spacing:.12em}
  .foot a{color:var(--gold);text-decoration:none}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}body::before{opacity:.9}}
</style>
</head>
<body>
  <main class="wrap">
    <div class="mark">XLRD999</div>
    <div class="kicker">THE DESCENT CONTINUES</div>
    <h1>PURGATORY&nbsp;6</h1>
    <div class="sub"><b>P6.5</b> &nbsp;·&nbsp; a full body of work</div>

    <div class="cd" id="cd" aria-label="countdown to release">
      <div class="u"><div class="n" id="d">—</div><div class="l">Days</div></div>
      <div class="u"><div class="n" id="h">—</div><div class="l">Hrs</div></div>
      <div class="u"><div class="n" id="m">—</div><div class="l">Min</div></div>
      <div class="u"><div class="n" id="s">—</div><div class="l">Sec</div></div>
    </div>
    <div class="when">10 · 13 · 2026</div>

    <form id="reserve">
      <input type="email" id="email" placeholder="your email" required autocomplete="email" aria-label="email">
      <button type="submit">Reserve your copy</button>
    </form>
    <div class="msg" id="msg">Be first through the gate. Reserve now — release alert + pre-order the moment it opens.</div>
  </main>

  <footer class="foot">PURGATORY 6 · P6.5 — 10.13.2026 &nbsp;·&nbsp; <a href="https://hitthe.link">XLRD999</a></footer>

<script>
  // Live countdown to release: Oct 13 2026, 00:00 local.
  var TARGET = new Date(2026, 9, 13, 0, 0, 0).getTime(); // month is 0-indexed: 9 = October
  var $ = function(id){ return document.getElementById(id); };
  function pad(n){ return (n<10?'0':'')+n; }
  function tick(){
    var diff = TARGET - Date.now();
    if (diff <= 0){
      $('cd').innerHTML = '<div class="n" style="font-size:clamp(26px,6vw,48px)">THE GATE IS OPEN</div>';
      return;
    }
    var s = Math.floor(diff/1000);
    $('d').textContent = Math.floor(s/86400);
    $('h').textContent = pad(Math.floor(s%86400/3600));
    $('m').textContent = pad(Math.floor(s%3600/60));
    $('s').textContent = pad(s%60);
  }
  tick(); setInterval(tick, 1000);

  // Reserve: real capture — saves locally + opens a pre-filled email to East so the reservation lands.
  // (When the pre-order/payment link is set, this button swaps to the live checkout.)
  $('reserve').addEventListener('submit', function(e){
    e.preventDefault();
    var email = $('email').value.trim();
    if (!email) return;
    try {
      var list = JSON.parse(localStorage.getItem('p6-reserve')||'[]');
      list.push({ email: email, ts: new Date().toISOString() });
      localStorage.setItem('p6-reserve', JSON.stringify(list));
    } catch(_){}
    var subj = encodeURIComponent('PURGATORY 6 (P6.5) — reserve my copy');
    var body = encodeURIComponent('Reserve me for PURGATORY 6 (P6.5), 10.13.2026.\nEmail: ' + email);
    window.location.href = 'mailto:east@xlrd.org?subject=' + subj + '&body=' + body;
    $('msg').textContent = "You're on the list. Watch your inbox - the gate opens 10.13.2026.";
    $('email').value = '';
  });
</script>
</body>
</html>
