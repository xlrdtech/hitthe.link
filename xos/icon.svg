<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- qi 2026-05-17 8672: Xenphone OS favicon + apple-touch-icon.
       Per-subpage icon canon: each hitthe.link subdir owns its own. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1310"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="180" height="180" rx="40" ry="40" fill="url(#bg)"/>
  <g filter="url(#glow)" stroke="#00dc82" stroke-width="14" stroke-linecap="round" fill="none">
    <path d="M48 48 L132 132"/>
    <path d="M132 48 L48 132"/>
  </g>
  <text x="90" y="158" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="600" fill="#00dc82" opacity="0.7" letter-spacing="2">XOS</text>
  <rect x="0" y="0" width="180" height="180" rx="40" ry="40" fill="url(#sheen)" pointer-events="none"/>
</svg>
